version: 1
scope:
  in_scope: >-
    Live public JSON selectors in this manifest with measurement_scope primary or
    diagnostic. Historical classification source:
    .agentera/archive/d58-json-output-surface-inventory.md. Capability-context rows
    expand across all twelve CAPABILITY_NAMES. Uses repo-root fixtures, isolated temp
    projects, and AGENTERA_HOME / AGENTERA_PROFILE_DIR overrides so doctor, upgrade,
    prime, check compact, and report paths do not mutate the caller's app or profile state.
  historical_inventory: .agentera/archive/d58-json-output-surface-inventory.md
  budget_proposal_archive: .agentera/archive/d59-json-output-budget-proposal.md
  closeout_measurements_archive: .agentera/archive/d59-json-output-closeout-measurements.md
  excluded:
  - classification: historical
    examples:
    - agentera hej --format json --capability-context (removed 3.0)
    - agentera --context-profile full (removed 3.0)
  - classification: private/excluded
    examples:
    - scripts/setup_doctor.py --json
    - scripts/measure_token_payload.py --json
    - direct scripts/validate_*.py stdout
  - classification: historical
    examples:
    - scripts/measure_token_payload.py
  - classification: preserve
    examples:
    - agentera query routine-artifact redirect surfaces that do not emit JSON
  notes:
  - query design --format json routes to generic schema JSON when a design schema
    exists; inventory defer row is retained for the text-only handler gap.

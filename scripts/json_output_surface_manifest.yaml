  command: agentera describe
  selector: --format json (default)
  argv:
  - describe
  - --format
  - json
  inventory_classification: change
  budget_classification: unbudgeted
  measurement_scope: primary
  fixture: repo_root
  enforcement_tier: enforce
  byte_budget: 115000
  token_budget: 26000

version: 1
scope:
  in_scope: 'Live public JSON selectors from docs/d58-json-output-surface-inventory.md
    with measurement_scope primary or diagnostic. Capability-context rows expand across
    all twelve CAPABILITY_NAMES. Uses repo-root fixtures, isolated temp projects,
    and AGENTERA_HOME / PROFILERA_PROFILE_DIR overrides so doctor, upgrade, hej, compact,
    gate, and stats paths do not mutate the caller''s app or profile state.

    '
  excluded:
  - classification: planned/future
    examples:
    - agentera prime JSON surfaces not implemented in v2
    - direct capability-name top-level commands
  - classification: private/excluded
    examples:
    - scripts/setup_doctor.py --json
    - scripts/measure_token_payload.py --json
    - direct scripts/validate_*.py stdout
  - classification: historical
    examples:
    - scripts/measure_token_payload.py
  - classification: preserve
    examples:
    - agentera query routine-artifact redirect surfaces that do not emit JSON
  notes:
  - query design --format json routes to generic schema JSON when a design schema
    exists; inventory defer row is retained for the text-only handler gap.
surfaces:

overall_acceptance:
  - >-
    GIVEN a concrete Planera plan draft is linted WHEN it includes accepted
    anchors THEN it does not receive a false no-anchor advisory.
  - >-
    GIVEN generic artifact prose is linted WHEN it lacks concrete anchors THEN
    the abstraction advisory still appears.
  - >-
    GIVEN existing lint callers use supported inputs, outputs, and strictness
    modes WHEN the fix ships THEN command compatibility is preserved.
  - >-
    GIVEN the plan closes WHEN verification and state sync finish THEN the TODO
    is resolved with exact evidence and fix-level release metadata handled under
    the documented semver policy.
surprises:

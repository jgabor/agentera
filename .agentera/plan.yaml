        completed patch scope.
      - >-
        GIVEN version policy is applied WHEN metadata changes are made THEN only
        version files declared by .agentera/docs.yaml and the package registry are
        changed for 2.3.13 alignment.
      - >-
        GIVEN local metadata sync completes WHEN scope is audited THEN no

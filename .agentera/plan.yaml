overall_acceptance: >
  GIVEN `packages/cli` WHEN its toolchain is inspected THEN vitest runs at
  `^4.1.0` (directly or transitively via `vite-plus`), the test script
  invokes `vp test run`, `vite.config.ts` is the single config ship under
  `vite-plus`, and `lint`/`fmt` scripts use `vp`. GIVEN the full vitest
  suite WHEN run from a clean build THEN 1145/1145 tests pass with no
  fixture drift. GIVEN the compaction gate WHEN run via the built CLI
  THEN it passes. GIVEN pre-commit and CI WHEN the test step runs THEN
  both use the new `vp test run` entry point and pass. GIVEN the worker-
  budget config WHEN multiple agents run the suite concurrently THEN
  peak RSS stays near 2.4 GiB per run (no regression vs the v2 baseline
  that motivated the cap).
surprises: "vitest 4 enforces the 5000ms default testTimeout on blocking spawnSync/DB tests where v2 did not — the extractCorpusParity Python-probe tests (~9-16s legit) timed out at 5000ms on v4 despite passing on v2. Unanticipated by the design note's cross-check (which covered pool/workspace/minWorkers/mock/snapshot but not timeout-enforcement tightening). Fixed in-scope by adding a global testTimeout: 30_000 to vitest.config.ts (restores v2 effective behavior with 2x headroom); no test file edits needed."

  title: Align v2 self-audit linter lookup with CLI artifact vocabulary (2.7.7)
what: >-
  Fix the v2 self-audit linter budget-lookup mismatch where `scripts/self_audit.py`
  looks up `_PER_ENTRY_BUDGETS` and `_FULL_FILE_BUDGETS` by canonical display
  label keys like `PROGRESS.md` while the `agentera lint` CLI passes lowercase
  no-extension schema names like `progress` (the very names `agentera query
  --list-artifacts` returns). The lookup misses in `--text` and `--file` paths,
  falling back to the 1000-word default. Change the helper to normalize the
  artifact input (lowercase, strip `.md`/`.yaml`) and key the budgets by the
  lowercase schema name so any caller input — schema name, canonical label, or
  mixed case — hits the right per-artifact budget. Fix the CLI lint code path
  to compute the budget lookup name for `--text` and `--file` too (not just the
  artifact-resolved path). Add regression coverage pinning the matching
  behavior across all three input forms. Defer cross-surface vocabulary
  unification to the in-flight 3.0.0 Decision 58 work.
why: >-
  The v2 linter's verbosity check is the pre-write gate for every capability
  that writes artifacts (planera, realisera, dokumentera, inspektera, etc.). A
  silent miss against the per-artifact budget means over-budget entries can
  ship through `agentera lint` and `agentera check lint` and only get caught
  later by length inspection. The user-facing CLI example in `agentera lint
  --help` already documents `--artifact plan` (lowercase) and the v2 fix
  aligns the helper to match that input. Decision 58 owns the broader
  cross-surface vocabulary unification on 3.0.0; this plan ships the linter
  half on 2.x and explicitly hands off the rest.
constraints: >-
  All existing `agentera lint` and `agentera check lint` observable behavior is
  preserved for callers that pass canonical labels (`PLAN.md`, `PROGRESS.md`,
  `DECISIONS.md`, `TODO.md`, `CHANGELOG.md`, `VISION.md`, `DESIGN.md`,
  `DOCS.md`, `HEALTH.md`, `EXPERIMENTS.md`): budgets hit, no messages change,
  no exit code changes. Schema-name callers (`progress`, `decisions`, `plan`)
  must now hit the per-artifact budget instead of the 1000-word default (this
  is the intended fix). All other CLI commands, capability contracts, and
  hooks continue to work unchanged. No new third-party dependencies. No
  vision.yaml or objective state edits; no remote push. Version bump follows
  DOCS semver policy: this is a `fix` (patch bump to 2.7.7). Do not modify
  the v2→v3 split: this work is on `main` only.
scope:
  included:
    - scripts/self_audit.py (flip budget dict keys to lowercase schema names; add a normalize helper for case/extension tolerance; add a defense-in-depth lookup that walks per-entry → full-file/5 → 1000 default)
    - 'scripts/agentera (_lint_input_text and _lint_payload: compute budget_artifact for --text and --file paths; remove the or str(args.artifact) fallback when a budget name is computed; preserve canonical-label acceptance unchanged)'
    - 'tests/test_self_audit.py (new or extended: cover schema-name, canonical-label, and mixed-case lookups; per-entry vs full-file/5 fallback; unknown-artifact default)'
    - tests/test_lint_cli.py or equivalent (end-to-end CLI test pinning that `agentera lint --artifact plan --text "<600 words>"` reports the per-artifact budget failure)
    - CHANGELOG.md [Unreleased] Fixed entry
    - UPGRADE.md (note that the linter now matches CLI schema-name input)
    - TODO.md (move the entry to Resolved with the implementation commit hash)
    - .agentera/progress.yaml (closeout evidence with the product commit hash)
    - version bump to 2.7.7 per semver_policy
  excluded:
    - The cross-surface vocabulary unification (file path → display label → CLI arg) — already in flight as the 3.0.0 Decision 58 work on `feat/v3`
    - Bun/npm packaging and TypeScript CLI rewrite initiatives (3.0.0)
    - Replacing the regex banned-pattern list in self_audit.py
    - Adding new artifacts or new budget groups
    - A neutral shared-package home for cross-layer modules (deferred to 3.0 packaging)
  deferred:
    - A future v2.x release that adopts the 3.0.0 D58 single-name boundary once feat/v3 lands (no work on this branch)
design: >-
  The linter gets one shared normalize step: `_resolve_budget_artifact(name)`
  lowercases the input, strips a trailing `.md` or `.yaml` (case-insensitive),
  and returns the normalized form. The two budget dicts (`_PER_ENTRY_BUDGETS`,
  `_FULL_FILE_BUDGETS`) are keyed by that normalized lowercase no-extension
  name. The lookup chain becomes: explicit per-entry budget → full-file
  budget // 5 → 1000 default. The CLI lint code path passes the normalized
  name to the helper, so any caller input — schema name from
  `agentera query --list-artifacts`, canonical display label from help text,
  or mixed case — produces a single budget lookup. The existing
  `_LINT_CANONICAL_LABELS` dict and the artifact record `display_name` stay
  where they are; they are still used for path resolution and CLI payload
  emission. The fix is purely the budget-lookup layer and the lint code path
  that feeds it.
tasks:
  - number: 1
    name: Flip budget dict keys and add a normalize-and-lookup helper
    depends_on: []
    status: complete
    acceptance:
      - GIVEN _PER_ENTRY_BUDGETS and _FULL_FILE_BUDGETS in scripts/self_audit.py WHEN read THEN their keys are lowercase no-extension (progress, decisions, plan, todo, changelog, vision, design, docs, health, experiments) and the values are unchanged
      - GIVEN a new _resolve_budget_artifact(name) helper WHEN called with schema name, canonical label, or mixed case THEN it returns the lowercase no-extension form (e.g. "PROGRESS.md" → "progress", "Decisions.md" → "decisions", "decisions" → "decisions")
      - GIVEN check_verbosity / check_full_file_verbosity WHEN called with any of {schema name, canonical label, mixed case} THEN they hit the per-artifact budget
      - GIVEN check_verbosity WHEN called with an unknown artifact name THEN the 1000-word default still applies (regression guard for the unspecified-artifact case)
      - 'GIVEN a 600-word text and check_verbosity(text, "plan") THEN the result is (False, "verbosity mismatch: 600 words exceeds 100 budget") — the previously-buggy default path now reports the correct per-artifact budget failure'
  - number: 2
    name: Make the CLI lint path always resolve the budget lookup name
    depends_on: ["1"]
    status: complete
    acceptance:
      - GIVEN scripts/agentera _lint_input_text WHEN invoked with --text or --file THEN budget_artifact is the normalized lookup name (not None)
      - GIVEN _lint_payload WHEN budget_artifact is set THEN artifact = budget_artifact, not `budget_artifact or str(args.artifact)` (the fallback path is removed)
      - GIVEN the existing CLI example `agentera lint --artifact plan --text "..."` WHEN run with 600 words THEN the JSON output's `artifact` field is the canonical display label ("PLAN.md") and the `verbosity` check is "fail" with "exceeds 100 budget" — the bug is fixed
      - GIVEN the existing CLI example `agentera lint --artifact PLAN.md --text "..."` WHEN run with 600 words THEN behavior is unchanged (canonical label still works, still emits "PLAN.md", still fails verbosity with the same message)
      - GIVEN the artifact-resolved path (no --text/--file) WHEN run THEN behavior is unchanged
  - number: 3
    name: Add unit regression coverage in tests/test_self_audit.py
    depends_on: ["1", "2"]
    status: complete
    acceptance:
      - GIVEN a parametrized table covering each artifact WHEN check_verbosity is called with schema name, canonical label, mixed case, and trailing-extended forms THEN all four input forms hit the same per-entry budget for the same artifact
      - GIVEN a per-artifact vs full-file/5 fallback test WHEN check_verbosity is called for an artifact with only a full-file budget (e.g. design, docs) THEN the per-entry budget used is full_file_budget // 5
      - GIVEN an unknown-artifact test WHEN check_verbosity is called with "totally-unknown-artifact" THEN the result falls back to 1000 words and the test pins this
      - GIVEN check_full_file_verbosity WHEN called with schema name, canonical label, and mixed case THEN the same full-file budget is hit
  - number: 4
    name: Add CLI end-to-end regression coverage
    depends_on: ["2"]
    status: complete
    acceptance:
      - GIVEN tests/test_lint_cli.py (or equivalent) WHEN it spawns the CLI with `agentera lint --artifact plan --text "<600 words>"` (and the same for progress, decisions, todo) THEN the JSON payload's verbosity check is "fail" with the per-artifact budget message and the per-artifact budget value matches the budgets dict
      - GIVEN a CLI invocation with the canonical label form `--artifact PLAN.md` WHEN run with 600 words THEN the JSON payload still emits the artifact field as `PLAN.md` and verbosity fails with the same per-artifact message (canonical-label display preserved)
      - GIVEN a CLI invocation with --file pointing at a real artifact WHEN run THEN behavior is unchanged
      - GIVEN the full pytest suite WHEN run THEN all tests pass
  - number: 5
    name: "Closeout - CHANGELOG, UPGRADE, TODO, progress, version bump"
    depends_on: ["1", "2", "3", "4"]
    status: complete
    acceptance:
      - GIVEN CHANGELOG.md [Unreleased] WHEN the closeout commit lands THEN a Fixed entry records the linter budget-lookup alignment (no new version header in the changelog itself; the version bump lives in version_files)
      - GIVEN UPGRADE.md WHEN touched THEN it notes that `agentera lint` and `agentera check lint` now apply per-artifact budgets to both schema-name and canonical-label input
      - GIVEN TODO.md WHEN the closeout commit lands THEN the entry moves from Normal to Resolved with the implementation commit hash and a one-line summary
      - GIVEN .agentera/progress.yaml WHEN closeout runs THEN it records verification evidence with the forward product-commit hash (never amend) and the version is bumped to 2.7.7 across version_files per semver policy (pyproject.toml, uv.lock, plugin.json, .github/plugin/plugin.json, .codex-plugin/plugin.json, .cursor-plugin/plugin.json, .claude-plugin/marketplace.json, .opencode/plugins/agentera.js, skills/agentera/SKILL.md, skills/hej/SKILL.md, registry.json)
      - GIVEN the closeout commit WHEN the full pytest suite and `agentera check validate capability-contract --format json` run THEN both pass
overall_acceptance: >-
  GIVEN the v2 self-audit linter WHEN any caller passes a schema name
  (`progress`), canonical display label (`PROGRESS.md`), or mixed case
  (`Progress.MD`) THEN the same per-artifact verbosity budget is applied.
  GIVEN the previously-buggy CLI path `agentera lint --artifact plan --text
  "<600 words>"` WHEN run THEN verbosity fails with the per-artifact budget
  message, no longer the 1000-word default. GIVEN the canonical-label CLI
  path THEN behavior is unchanged and display labels still emit as
  `PLAN.md`/`PROGRESS.md`/etc. for the artifact field. GIVEN the full
  pytest suite THEN it is green. GIVEN the closeout commit THEN TODO.md
  records the resolution, CHANGELOG records the fix, version is 2.7.7, and
  the cross-surface vocabulary unification is explicitly handed off to the
  3.0.0 Decision 58 work on feat/v3.

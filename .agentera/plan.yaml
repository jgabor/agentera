  title: "Plan: TODO.md empty severity sections (header-only bands allowed)"

what: >-
  Allow header-only Degraded, Normal, and Annoying severity bands in TODO.md
  without forcing a decoy `- Placeholder` row. Critical (⇶) must still
  contain at least one `- [type]` item. Update `validateMdItems` in
  packages/cli/src/hooks/validateArtifact.ts to a per-band policy,
  add CONVENTION TC6 (level: required) to skills/agentera/schemas/artifacts/todo.yaml,
  document the policy in references/cli/vocabulary.md, and update
  the live TODO.md to drop the existing `- Placeholder` decoy rows
  while folding the open chore:3.0.0 TODO into the Resolved ledger.

why: >-
  The current validator (line 664 of validateArtifact.ts) rejects any
  severity band whose body contains no `- [type]` items, which forces
  contributors to leave synthetic `- Placeholder` lines in Degraded and
  Annoying bands whenever those bands have no real work. The placeholder
  decoys are misleading to readers and to the open-set counted by
  `agentera state todo --format json`. Open TODO at TODO.md line 14
  ([chore:3.0.0]) records the smell and the open question of whether
  bands may be header-only or must use a reserved sentinel. The hybrid
  policy resolves that question without violating Decision 58 single-name
  protocol boundary (no new parallel vocabulary) or Decision 65
  per-capability content surface (the rule lives in one TS surface).

constraints: >-
  Preserve the existing adjacent-heading regression test at
  validateArtifact.test.ts:84-103. Do not introduce parallel
  vocabulary tokens (no `EMPTY_SECTION_TOKENS`, no `- Empty`,
  no `- _empty_` sentinel). Do not change
  parseTodoMarkdownListItem in packages/cli/src/cli/todoMarkdown.ts
  unless a downstream consumer fails on zero-item bands (AC-1 catches
  that case). The Python `hooks/validate_artifact.py` does NOT have
  a `validate_md_items` equivalent; this is a TS-only fix and no
  main-branch backport is needed. Do not touch
  `capability_schema_contract.yaml` (the contract is for capabilities,
  not artifacts). Per AGENTS.md "Agentera commits", fold the resolved-ledger
  move and the `- Placeholder` removal into the same implementation
  commit; do not create a separate bookkeeping commit.


  title: v2/v3 coexistence B5 — Runtime hooks consistency
what: >
  Close the runtime-hooks-consistency defect batch. The defects doc
  (docs/notes/v2-v3-coexistence-defects.md batch plan, batch B5) is
  triage; the live repo hook files, CLI Codex setup source, the upgrade
  migration planner, CI workflow, and the pre-commit runner are ground
  truth, so tasks verify what prior batches already fixed and close the
  true residuals. Unify repo hook npm tags to npx -y agentera@next so no
  hook file silently resolves to the v2 @latest shim. Align the Codex
  validator command with the v3 npx entrypoint instead of a hardcoded
  uv-run Python path. Correct repo template hook descriptions that claim
  v2 while invoking v3 entrypoints. Add project-level Codex config
  detection to the upgrade migration planner so it mirrors the Cursor
  planner. Clarify which runtime each repo hook file targets and that
  each uses that runtime canonical event names. Compute the CI L2 npm
  pin dynamically from packages/cli/package.json and fail loud (not
  silent skip) when the pinned version is unpublished. Fix the
  pre-commit staged-aware runner so scripts/sandbox path changes route
  to the full vitest suite, not the 2-smoke branch.
why: >
  B4 (OpenCode plugin rewire) is COMPLETE and unblocks B5; B5 does not
  depend on B2/B3/B6/B7 sibling batches. See
  docs/notes/v2-v3-coexistence-defects.md batch plan, batch B5. The
  defects doc is triage, not ground truth: investigation of the live
  repo and CLI source confirmed all six defects (#23, #25, #26, #27,
  #41, #44) and both test gaps (G5, G6) are still live as of this
  authoring — none were collapsed by B1-B4. Collapsed defects: #23 repo
  hook files use inconsistent npm tags (hooks/hooks.json and
  hooks/codex-hooks.json use bare npx -y agentera resolving to v2
  @latest, while .cursor/hooks.json, .github/hooks/*.json, and
  hooks/codex-plugin-hooks.json use npx -y agentera@next); #25
  codexValidatorCommand (packages/cli/src/setup/codex/configToml.ts:250)
  hardcodes uv run against a v2 Python hook path, inconsistent with
  CODEX_HOOK_COMMAND in constants.ts:22 which is
  npx -y agentera@next hook validate-artifact; #26 repo template hooks
  have descriptions saying "agentera v2 hooks" but commands invoking v3
  entrypoints; #27 planCodexItems
  (packages/cli/src/upgrade/runtimeMigration.ts:239) only checks
  home-level .codex paths, unlike planCursorItems which checks both
  project and home, so project-level .codex/config.toml is never
  detected or rewired; #41 hooks/hooks.json uses PascalCase event names
  (SessionStart, Stop, PostToolUse) while .cursor/hooks.json uses
  camelCase and .github/hooks use a lowercase name field, and it is
  unclear which runtime hooks/hooks.json targets; #44 CI L2 sandbox
  (.github/workflows/ci.yml:89) hardcodes
  AGENTERA_NPM_PIN: agentera@3.0.0-next.0 (stale; package.json is
  3.0.0-next.1) and silently exits 0 if unpublished; G5 pre-commit
  staged-aware runner routes scripts/sandbox path changes to the
  2-smoke-test branch (scripts/precommit-vitest.sh default case); G6 CI
  L2 silently skips on the unpublished pin (same code as #44).
constraints: >
  All work on feat/v3-b5-runtime-hooks-consistency (forked from feat/v3).
  B4 is COMPLETE; B5 may start. Do NOT depend on B2, B3, B6, or B7 — they
  are independent sibling batches. Do not touch .agentera/vision.yaml or
  objective state. Unify to the literal npx -y agentera@next pin; do not
  channel-resolve the tag (channel resolution is B3 territory and
  already done). Do not remove the PROFILERA_PROFILE_DIR alias fallback
  (separate v3.0.0-stable chore tracked in TODO.md, out of B5 scope). Do
  not normalize all hook event names to a single case — each runtime has
  its own canonical convention; the fix is per-file runtime-target
  clarity, not a global rename. codexValidatorCommand currently has zero
  callers; align it to delegate to CODEX_HOOK_COMMAND for minimal
  consistency — do not assert caller behavior that does not exist, and
  leave full dead-code removal as a separate follow-up if confirmed
  dead. Author ONLY — do not implement, do not mark tasks complete, do
  not archive; leave the plan in the active slot, status active, tasks
  pending.
scope:
  included:
    - 'hooks/hooks.json — unify npm tag to @next and clarify target runtime + event-name convention (#23, #26, #41)'
    - 'hooks/codex-hooks.json — unify npm tag to @next and clarify target runtime + event-name convention (#23, #26, #41)'
    - 'hooks/codex-plugin-hooks.json — verify @next already correct; align description wording (#26)'
    - 'packages/cli/src/setup/codex/configToml.ts — codexValidatorCommand delegate to CODEX_HOOK_COMMAND (#25)'
    - 'packages/cli/src/upgrade/runtimeMigration.ts — planCodexItems project-level .codex detection (#27)'
    - '.github/workflows/ci.yml — compute L2 npm pin dynamically from packages/cli/package.json and fail loud on unpublished (#44, #44/G6)'
    - 'scripts/precommit-vitest.sh — route scripts/sandbox path changes to full vitest, not 2-smoke (G5)'
    - 'packages/cli/test Coppilot/Cursor/Codex setup tests and new regression tests for #23/#25/#27/#41/#44/G5'
  excluded:
    - 'Channel-resolved / app-home-derived hook entrypoint tag (npx -y agentera@next pin stays; B3 territory)'
    - 'Removing the PROFILERA_PROFILE_DIR alias fallback (separate v3.0.0-stable chore; TODO.md)'
    - 'Removing codexValidatorCommand as confirmed dead code (B5 aligns it; full removal is a follow-up if a caller audit confirms dead)'
    - 'OpenCode plugin internals (B4), installed-app content refresh on upgrade (B6), v2 Swedish-verb residue cleanup (B7), Cursor doctor path fix (#22, B7)'
    - '.agentera/vision.yaml, objective state'
  deferred:
    - 'Coordinated removal of all PROFILERA_PROFILE_DIR fallbacks after v3 stable deprecation window closes — tracked in TODO.md, not B5'
    - 'A repo-wide lint rule asserting every hook command across all runtimes derives the tag from a single shared constant (e.g. NPX_CLI_ENTRYPOINT) rather than the @next literal — follow-up after B5 unifies the literal, to avoid coupling B5 to a refactor'
design: >
  The live source is the authority. Investigation confirmed all eight
  items are still live, so B5 is net-new fix work plus regression
  coverage rather than verify-and-lock. #23 and #26 touch the same repo
  hook files and are sequenced (Task 1 unifies tags, Task 3 fixes
  descriptions) so the two defects do not conflict on the same lines.
  #25 is a minimal consistency fix: codexValidatorCommand returns the v3
  npx entrypoint by delegating to CODEX_HOOK_COMMAND instead of
  constructing a uv-run Python path; it has zero callers, so the fix is
  defensive (closes the literal inconsistency the defect names) and the
  dead-caller observation is recorded in surprises. #27 mirrors the
  proven planCursorItems shape (both project and home paths) and updates
  the single caller at runtimeMigration.ts:572. #41 is not a global
  rename — each hook file targets exactly one runtime and uses that
  runtime canonical event names (Codex PreToolUse/PostToolUse, Cursor
  camelCase, GitHub lowercase name field), made explicit in the file
  description so the target runtime is unambiguous. #44 derives the L2
  npm pin from packages/cli/package.json at workflow runtime (read
  version, set AGENTERA_NPM_PIN=agentera@<version>) and replaces the
  silent exit-0 skip with a non-zero failure carrying a clear message
  when the computed pin is unpublished, which also closes G6 (same
  code). G5 routes scripts/sandbox path changes to the full vitest
  suite by adding an explicit case to precommit-vitest.sh. Each task
  carries Given/When/Then acceptance so orkestrera can drive
  implementation against verifiable criteria and so the consistency
  cannot silently regress during the v3 cutover.

header:
  level: light
  created: "2026-06-23"
  status: active
  title: "V2 install corruption ÔÇö reproduce, root-cause, fix"
what: >
  The v2.7.10 install (`uvx --from git+... agentera upgrade --yes`)
  corrupted `~/.local/share/agentera/app/scripts/agentera` to 2 lines:
  `#!/usr/bin/env node\nsub.add_parser('hej')`. The v2 install path lives
  on the v2.x stable branch (`main`, currently `012eea79`). The v3 fixes
  from the cutover-stability batch 1 (Task 1) and the cutover-stability
  refactor prevent v3 from corrupting the same file, but the v2 install
  path on main is still vulnerable. This plan reproduces the corruption
  in a controlled setting, traces the root cause, and fixes the v2
  install path with a regression test.
why: >
  The v2 install path is the only way users on `npx -y agentera@latest`
  receive Agentera. Every corrupt install forces the user to manually
  restore the script from git history (`git show <commit>:scripts/agentera
  > ~/.local/share/agentera/app/scripts/agentera`). The corruption
  pattern ÔÇö Node shebang + Python test-stub body ÔÇö strongly suggests a
  test stub leak (the same root-cause class that v3 Task 1 fixed in the
  v3 write path). A v2 equivalent leak is most likely, but the
  corruption pattern does not match the v2 test stub in
  `tests/test_install_root_module.py:_write_upgrade_root` (which uses
  `#!/usr/bin/env python3`, not `#!/usr/bin/env node`). The root cause
  is therefore either a v2 test stub leak from a different test file,
  a build-time mix-in during the v2 wheel build, or an environmental
  race condition. Without reproduction, the v2 install will keep
  corrupting on every clean install, and the v3 cutover window will
  keep forcing manual script restoration.
constraints: >
  All work on `main` (v2.x stable branch, currently `012eea79`). The
  feat/v3 work that triggered the corruption is not in scope; this
  plan addresses the v2 install path that runs against the
  `npx -y agentera@latest` shim. Do not modify the v3 cutover-stability
  fixes already merged on feat/v3 ÔÇö those are correct for v3 and the
  v2 install on main must be patched independently. The fix must not
  break existing pytest tests (the v2 suite is pytest-based, target
  count is the current `012eea79` baseline). The fix must not
  downgrade the v2 install behavior on systems where it currently
  works (e.g., a fresh `uvx` install that copies 8528 lines correctly
  must continue to do so). Use closed commit scopes
  (`install`, `hooks`, `cli`, etc.); do not invent new ones.
scope:
  included:
    - "Reproduction harness: a script or pytest that exercises the v2 install path in a temp directory and asserts the script content matches the source"
    - "Root-cause investigation of why the v2 install corrupted scripts/agentera to 2 lines"
    - "Fix to the v2 install path in scripts/agentera_upgrade.py and/or scripts/install_root.py"
    - "Regression test for the fixed install path"
    - "TODO.md / CHANGELOG / PROGRESS fold-in for the v2 release train"
  excluded:
    - "Re-doing the v3 cutover-stability fixes (already on feat/v3, not in scope)"
    - "Replacing the v2 install with a v3-style install (the v2 path is the supported v2.x install; v3 has its own install)"
    - "Restoring the user's already-corrupted script (already done in the prior session from commit 41e0394d)"
    - "Changing the v2.7.10 release (already on npm; the fix lands on main for the next release cut)"
  deferred:
    - "Investigating whether the same root cause affects the v2.7.10 npm shim (separate from the v2 install path on main)"
    - "Back-porting the v3 bundle evidence hardening to v2 (the v2 install copies a different bundle, not the v3 one)"
    - "Filing a follow-up TODO to capture how the user's scripts/agentera was overwritten with a 2-line Node/Python hybrid (the v2 install path on origin/main HEAD is innocent; the cause is environmental and must be traced from the user's machine state, not from v2 source)"
    - "Documenting the v2 install path's actual hygiene: _copy_bundle_file is a clean shutil.copy2, no truncation, no concatenation; the v2 install copies scripts/agentera byte-equal to source on a clean state"
    - "Documenting the v2 wheel force-include of packages/cli (v3 npm shim) as a smell to be reviewed during the v2.x Ôćĺ v3.0 cutover: the wheel bundles v3 content into the v2 install at app/packages/cli/bin/agentera.mjs, which is a different path from scripts/agentera but reflects the unfinished v2/v3 boundary"
design: >
  Task 1 builds a reproduction harness: a pytest that runs the v2
  install (or its key write path, `apply_bundle_phase` Ôćĺ `_copy_bundle_file`)
  in a temp directory, then asserts the installed `scripts/agentera`
  byte-equals the source. This test must fail on `012eea79` (proving
  the corruption is reproducible) and pass after the fix.

  Task 1 also traces the root cause by reading the v2 install code:
  - `scripts/agentera_upgrade.py:1070-1099` `apply_bundle_phase` Ôćĺ
    `_copy_bundle_file` Ôćĺ `shutil.copy2` (line 729-733)
  - `scripts/install_root.py:32-58` test stub `_write_upgrade_root`
    pattern (different shebang, but same `sub.add_parser` body line)
  - The v2 wheel build: `pyproject.toml` `[tool.hatch.build.targets.wheel.force-include]`
    maps `scripts/` Ôćĺ `agentera/bundle/scripts/`

  Task 2 implements the fix once the root cause is known. Likely
  candidates: (a) test stub leak from a test that doesn't use
  `tmp_path` correctly and writes to the real `AGENTERA_HOME`; (b)
  a build-time issue in the v2 wheel that mixes in a Node-flavored
  file; (c) an environmental race condition during the user's
  particular install. The fix depends on the root cause.

  Task 3 is a final state sync: bump version, update CHANGELOG, mark
  any related TODO resolved, update PROGRESS cycle. Per AGENTS.md,
  these fold into the implementation commit, not a standalone chore.
tasks:
  - number: 1
    name: "Reproduce v2 install corruption and identify root cause"
    depends_on: []
    status: complete
    root_cause: >
      environmental (case c). The v2 install path on origin/main HEAD does
      NOT reproduce the corruption. apply_bundle_phase writes the 8528-line
      scripts/agentera byte-equal to source in a fresh temp dir, and the
      v2.7.10 wheel at 012eea79 (current origin/main HEAD 562d66bb) builds
      correctly with scripts/agentera (8528 lines, uv shebang) at
      agentera/bundle/scripts/agentera and packages/cli/bin/agentera.mjs
      (50 lines, Node shebang) at agentera/bundle/packages/cli/bin/agentera.mjs
      ÔÇö two different paths, no collision. The corruption pattern
      (#!/usr/bin/env node + sub.add_parser('hej')) is a 2-line hybrid that
      cannot be produced by _copy_bundle_file (shutil.copy2) because no v2
      file matches that content: the v3 Node shebang exists only in
      packages/cli/bin/agentera.mjs, and the sub.add_parser('hej') line
      exists only in v2 test stubs (all using #!/usr/bin/env python3). The
      user's install was corrupted by something OUTSIDE the v2 install
      path (a v3 dev install, an editor fluke, a different tool, or a
      divergent wheel build that no longer matches origin/main HEAD).
    evidence: >
      tests/test_apply_bundle_phase_byte_equality.py runs apply_bundle_phase
      in a fresh tmp_path against REPO_ROOT and asserts scripts/agentera
      byte-equality, full length, no Node shebang, and no test-stub body.
      All 3 assertions PASS on origin/main HEAD. The test serves as a
      regression guard: any future v2 change that regresses the install
      path will fail it.
    acceptance:
      - "GIVEN a fresh temp directory simulating an app home WHEN the v2 install path runs end-to-end (apply_bundle_phase) THEN the installed scripts/agentera byte-equals the source scripts/agentera from the same commit (8528 lines at 012eea79)"
      - "GIVEN the v2 install pytest suite WHEN the new reproduction test runs against 012eea79 THEN it FAILS, proving the corruption is reproducible in the test environment"
      - "GIVEN the corruption investigation WHEN the v2 install code (scripts/agentera_upgrade.py, scripts/install_root.py) and the v2 test stubs (tests/test_install_root_module.py, tests/test_install_root_characterization.py, tests/test_runtime_adapters.py) are read THEN the root cause is identified and documented in the commit message: it is either (a) a v2 test stub leak writing to the real AGENTERA_HOME, (b) a v2 wheel build issue mixing in Node-flavored content, or (c) an environmental condition that won't reproduce in a clean temp dir"
      - "GIVEN the investigation WHEN the root cause is environmental (case c) THEN the plan's fix task is rewritten to address what CAN be fixed in v2 source, and a follow-up TODO is filed for the environmental side"
  - number: 2
    name: "Harden v2 install path defenses and document v2/v3 boundary"
    depends_on: ["1"]
    status: complete
    note: >
      Task 2 is rewritten because Task 1 established the corruption is
      environmental (case c). There is no v2 source bug to fix. What CAN
      be hardened in v2 source is the v2 install's defenses against the
      v2/v3 boundary issue (the v2 wheel force-includes packages/cli,
      the v3 npm shim) and the install's documentation of the
      environmental surface. If a fix becomes unnecessary after the v2.x
      Ôćĺ v3.0 cutover, archive this task at that point.
    acceptance:
      - "GIVEN the v2 install path is innocent on origin/main HEAD WHEN the v2 install's installed bundle is reviewed THEN no v2 source file should be byte-different from a clean v2.7.10 install (verify by re-running tests/test_apply_bundle_phase_byte_equality.py after any change)"
      - "GIVEN the v2 wheel force-includes packages/cli WHEN the v2 install paths and the v3 npm shim paths are audited THEN any v2/v3 boundary smell is documented in UPGRADE.md or the v2 install help text so users understand that the v2 wheel carries v3 npm shim content under packages/cli/ for the @next cutover"
      - "GIVEN the environmental root cause WHEN the v2 install code is reviewed THEN add a defensive check (e.g., a sanity assertion in apply_bundle_phase that aborts when the resulting app/scripts/agentera is not valid Python or is shorter than a configured minimum) so that any future environmental or boundary regression surfaces immediately as an explicit error rather than a silently corrupted install"
      - "GIVEN the fix WHEN the full v2 pytest suite runs THEN no new failures (target: current origin/main HEAD baseline) and tests/test_apply_bundle_phase_byte_equality.py still passes"
  - number: 3
    name: "Final state sync on main"
    depends_on: ["1", "2"]
    status: pending
    acceptance:
      - "GIVEN Tasks 1 and 2 complete WHEN pyproject.toml and version surfaces are bumped THEN the new version is consistent (e.g., 2.7.11 patch bump per fix work)"
      - "GIVEN the fix WHEN CHANGELOG.md is updated THEN a 2.7.11 entry lists the corruption fix under ### Fixed"
      - "GIVEN the fix WHEN PROGRESS.md is updated THEN a new cycle entry records the root cause and the fix"
      - "GIVEN the fix WHEN TODO.md is updated THEN any newly-discovered issues are filed and the corruption-related items are marked resolved (if applicable)"
      - "GIVEN the fix WHEN lefthook pre-commit runs THEN pytest passes (or the failure is already tracked for CI, in which case LEFTHOOK=0 may be used with explicit rationale)"
overall_acceptance: >
  A user running `uvx --from git+https://github.com/jgabor/agentera
  agentera upgrade --yes` from a clean state (or with a v2 install
  that previously corrupted) sees the managed script installed at
  8528 lines of Python PEP 723 content (or whatever the current v2
  source length is), not 2 lines of mixed Node/Python stub. The v2
  pytest suite remains green at the 012eea79 baseline. The root cause
  is documented in the commit message and a regression test prevents
  recurrence. CHANGELOG and PROGRESS reflect the fix.
surprises: "The root cause may turn out to be environmental rather than in the v2 source ÔÇö in that case the fix task will be rewritten to harden what CAN be hardened in v2 source, and the environmental side is filed as a follow-up TODO rather than attempted as a code fix."

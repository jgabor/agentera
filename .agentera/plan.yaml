overall_acceptance:
- All real Agentera capability instruction files use `instructions.md` as the canonical filename,
  with loaders and validators aligned to that convention.
- Current docs, schemas, runtime descriptors, scripts, package metadata, and tests no longer
  present `instructions.md` as the canonical capability instruction path.
- Any surviving `instructions.md` occurrence is explicitly compatibility-preserved, historical,
  fixture-only, generated-output evidence, or unrelated prose.
- The `[fix:2.4.x]` capability instruction rename TODO is resolved without implementing out-of-scope
  `first_invocation_read` behavior or protected artifact mutations.
surprises:
- The documented required command `agentera validate capability skills/agentera/capabilities`
  exposed that the CLI only validated a single capability path; it now expands the canonical
  capabilities root and validates all twelve capabilities.
- OpenCode and Codex descriptor validation had already been manually fixed for direct subagent
  execution; this cycle preserved that behavior while updating descriptor instruction-file
  paths.

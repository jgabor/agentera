        GIVEN the implemented change is a `feat` WHEN `.agentera/docs.yaml` version
        policy is reviewed THEN version-bearing surfaces follow the DOCS-owned
        `semver_policy` and `version_files` list.
      - >-
        GIVEN version-bearing surfaces change WHEN package and metadata checks run

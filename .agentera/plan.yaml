what: >-
  Close the v2/v3 coexistence defect surface: the final B7 batch resolves the
  eight residual defects (#20, #22, #31, #32, #33, #37, #40, #42) left after
  B1-B6. B7 cleans up v2-era residue across the upgrade path and runtime
  adapters: orphaned Swedish-verb agents left by the v3 single-agent copy loop
  (#20), the Cursor doctor probing the wrong hooks/agents path (#22), the
  v2-to-v3 handoff not cataloging custom profile/config-dir artifacts (#31),
  the v2 Python upgrade never surfacing v3 (#32), the duplicated
  CAPABILITY_NAMES source (#33), the hasManagedBundleEvidence v3-awareness gap
  (#37), the pending_runtime item-vs-runtime count bug (#40), and the stale
  volatile TODO line-number reference (#42). After B7 ships, all seven
  coexistence batches (B1-B7) are complete and the v2-to-v3 cutover defect
  surface is closed.

why: >-
  B1 fixed the split-brain root cause; B2-B5 resolved env/paths, bundle status,
  opencode plugin, and runtime hooks; B6 refreshed installed-app content.
  Those batches left a residue tail of minor and annoying defects that do not
  block the cutover individually but collectively keep v2-era files in user
  config dirs, cause false doctor failures, and misreport migration state.
  Closing the tail in one bounded batch is cheaper than carrying each defect
  into the 3.0.0 stable cut, and it lets the cutover tag publish from a
  defect-free coexistence surface. Per the planera startup contract this is a
  full plan (8 tasks, the cap) with per-task acceptance criteria and a
  pre-write self-audit; it hands off to ⎈ orkestrera for execution.

constraints: >-
  Branch: feat/v3-b7-v2-residue-cleanup (forked from feat/v3); all work lands on
  feat/v3 per the v3 rewrite branch model. Author-only plan: task statuses are
  pending; do not implement, mark complete, or archive during authoring.
  max_full_plan_tasks=8 (planera cap); exactly eight defects map one-to-one to
  eight tasks. Do not touch .agentera/vision.yaml or objective state. The
  defects doc docs/notes/v2-v3-coexistence-defects.md is the triage source, not
  ground truth; verify each defect against current feat/v3 source before fixing.
  Archived plans (e.g. the d73 plan's `TODO line 35` reference) are immutable and
  excluded from edits. The v2 Python CLI source on main cannot be mutated from
  this feat/v3 worktree (#32 v2-side writer is a both-branch backport).

design: >-
  One task per defect with Given/When/Then acceptance and a paired regression
  test (per V5: one pass + one fail per surface). Verify-and-lock scope is used
  where prior batches already partially fixed a defect (#37): the regression
  test is the deliverable, plus hardening of any residual v2-only fallback. The
  #32 v2-side writer is documented as a both-branch main-branch backport
  verified by round-trip parity, not pytest in this worktree. The #42 fix is a
  stable-identifier rule plus a guard regression that scans active artifacts
  for volatile `TODO line N` references; the B7 plan itself is the reference
  example of stable cross-referencing. Cleanup migration items reuse the
  v1LegacyCruft scan pattern to guard reintroduction. All fixes land on feat/v3
  with typecheck, build, validate, and compact green; the content compaction
  budget (uniform_10_40_50) is enforced by `agentera check compact` in CI.

scope:
  included:
    - "packages/cli/src/upgrade/migrateArtifactsV2ToV3.ts (planCleanupPhase, hasManagedBundleEvidence)"
    - "packages/cli/src/upgrade/runtimeMigration.ts (agent copy loop, profile-dir handling)"
    - "packages/cli/src/setup/doctor/diagnostics.ts and packages/cli/src/setup/cursor.ts (Cursor hooks/agents path probing)"
    - "packages/cli/src/upgrade/projectIntegration.ts (pending_runtime / pending_runtimes)"
    - "packages/cli/src/cli/capabilityContext/types.ts and packages/cli/src/capabilities/index.ts (CAPABILITY_NAMES dedup)"
    - "packages/cli/src/upgrade/nextMajorDoctor.ts and references/cli/update-channels.yaml (v2-to-v3 successor surfacing)"
    - "Active artifacts carrying volatile TODO line-number references (.agentera/progress.yaml, the new plan.yaml)"
  excluded:
    - "The immutable archived d73 plan (.agentera/archive/PLAN-2026-06-26-d73-...) — archived plans are not edited; its `TODO line 35` reference is historical."
    - "The v2 Python CLI source on main (#32 v2-side writer) — feat/v3 cannot mutate main-branch Python; documented as a both-branch backport limitation."
    - "TODO.md:34 (the D73 single-agent task) content edits — that is a product TODO, not a B7 fix; B7 only removes the residue its design left behind."

tasks:
  - number: 1
    name: "Remove orphaned Swedish-verb agents on upgrade (#20)"
    depends_on: []
    status: complete
    acceptance:
      - "GIVEN feat/v3 base WHERE runtimeMigration.ts copies only `agentera.md` into `.cursor/agents/` and `.opencode/agents/` (CURSOR_MANAGED_AGENT at runtimeMigration.ts:356) WHEN a v2-era home has the 12 Swedish-verb agent files (`dokumentera.md`, `hej.md`, `inspektera.md`, `inspirera.md`, `optimera.md`, `orkestrera.md`, `planera.md`, `profilera.md`, `realisera.md`, `resonera.md`, `visionera.md`, `visualisera.md`) in `.cursor/agents/` and `.opencode/agents/` THEN a new cleanup migration item in planCleanupPhase (migrateArtifactsV2ToV3.ts:259) removes that closed set after preview and confirmation, preserving user-owned non-listed files; the item reuses the v1LegacyCruft scan pattern to guard reintroduction."
      - "WHEN `node packages/cli/dist/bin/agentera.js upgrade --dry-run` runs on a fixture v2 home with the 12 Swedish-verb agents present THEN the dry-run lists each as a pending `remove-legacy-agent` item with its source path; applying via `--yes` removes exactly the closed set and no others."
      - "GIVEN the fix WHEN `packages/cli/test/upgrade/legacyAgentCleanup.test.ts` is authored THEN it asserts (a) the 12 files are removed, (b) `agentera.md` and user-owned `.bak`/custom agents survive, (c) a v3 home with no Swedish-verb agents is a no-op; the regression is green; per V5 one pass + one fail per runtime target (cursor + opencode = 2 x 2 = 4 cases)."

  - number: 2
    name: "Fix Cursor doctor hooks/agents path probing (#22)"
    depends_on: []
    status: complete
    acceptance:
      - "GIVEN feat/v3 base WHERE setup/doctor/diagnostics.ts:217 probes `installRoot/.cursor/hooks.json` and :243 probes `installRoot/.cursor/agents/`, and setup/cursor.ts:126 probes the same installRoot path WHEN Cursor actually reads hooks from project-level `.cursor/hooks.json` and user-level `~/.cursor/hooks.json` THEN the doctor is fixed to probe the correct project + user-level paths (not the v2-layout installRoot bundle path) for both `hooks.json` and `agents/`; the report passes when the project or user level is correctly wired."
      - "WHEN `agentera doctor --runtime cursor` (or the doctor diagnostic) runs against a project with repo-native `.cursor/hooks.json` and no installRoot bundle THEN the Cursor hooks/agents checks report pass (status `pass`), not fail; the v2-layout installRoot path is no longer the probed source of truth."
      - "GIVEN the fix WHEN `packages/cli/test/doctor/cursorDoctorPath.test.ts` is authored THEN it covers (a) project-level wired -> pass, (b) user-level wired -> pass, (c) both missing -> fail with a correct path-naming message; the regression is green; per V5 one pass + one fail per probe location (project + user = 2 x 2 = 4 cases)."

  - number: 3
    name: "Catalog custom profile/config-dir artifacts in the v2-to-v3 handoff (#31)"
    depends_on: []
    status: pending
    acceptance:
      - "GIVEN feat/v3 base WHERE resolveMigrationUserStatePreflight(appHome) (migrateArtifactsV2ToV3.ts:263) inspects only the app home WHEN a user has custom `PROFILERA_PROFILE_DIR`/`AGENTERA_PROFILE_DIR` or runtime-config-dir artifacts (opencode config dir, cursor user dir) THEN the migration preflight/handoff catalogs those custom paths in the dry-run summary so the user knows their customizations are accounted for, and the preserved-absolute-paths set includes the custom profile/config-dir root when present."
      - "WHEN `agentera upgrade --dry-run` runs on a fixture v2 home with `PROFILERA_PROFILE_DIR` set to a custom path containing profile/corpus artifacts THEN the dry-run output lists the custom profile dir and its preserved entries; the handoff summary field names the custom dir explicitly rather than silently skipping it."
      - "GIVEN the fix WHEN `packages/cli/test/upgrade/handoffCustomProfileDir.test.ts` is authored THEN it asserts (a) custom `PROFILERA_PROFILE_DIR` is cataloged, (b) the opencode runtime-config-dir is cataloged, (c) a default (no custom env) home is unchanged behavior; the regression is green; per V5 one pass + one fail per surface (custom profile dir + runtime config dir = 2 x 2 = 4 cases)."

  - number: 4
    name: "Surface v3 successor to v2 install tracks (#32)"
    depends_on: []
    status: complete
    acceptance:
      - "GIVEN feat/v3 base WHERE references/cli/update-channels.yaml already defines a `next_major` forward_successor_line (stable 2.x -> 3.0.0, announced) and nextMajorDoctor.ts reads it WHEN a v2-classified install (install_track: v2, runningMajor 2) runs the v3 tooling (`agentera doctor`/`prime`) THEN the next-major successor block is surfaced to the user with the v3 preview command (`npx -y agentera@next upgrade --dry-run`) and the v2-to-v3 guide URL; the v2 install is not silently reported as up-to-date against the v3 line."
      - "WHEN `packages/cli/test/upgrade/nextMajorV2Surfacing.test.ts` is authored THEN it asserts a v2 install track produces the announced v3 successor line in the doctor/prime next-major section (not `up_to_date` against 3.x); the regression is green; per V5 one pass + one fail per track (v2 + v3 = 2 x 2 = 4 cases)."
      - "GIVEN the v2 Python CLI on main cannot be mutated from this worktree WHEN the feat/v3 commit lands THEN the change is documented in references/cli/upgrade-repair-wording.md (or the v3-handoff-manifest reference) as a both-branch item: the v2 Python `upgrade` writer backport to main is tracked separately and verified by round-trip parity, not pytest in this worktree."

  - number: 5
    name: "Deduplicate CAPABILITY_NAMES to a single source (#33)"
    depends_on: []
    status: complete
    acceptance:
      - "GIVEN feat/v3 base WHERE CAPABILITY_NAMES is a hardcoded array in cli/capabilityContext/types.ts and CAPABILITY_INSTRUCTIONS is a Record in capabilities/index.ts (two sources of truth) WHEN the dedup lands THEN CAPABILITY_NAMES is derived from `Object.keys(CAPABILITY_INSTRUCTIONS)` (or a single shared source) so the two surfaces cannot drift; the export shape consumed by capabilityContext/shared.ts:29 and contract.ts:40 is preserved."
      - "WHEN `packages/cli/test/cli/capabilityNamesDedup.test.ts` is authored THEN it asserts CAPABILITY_NAMES equals Object.keys(CAPABILITY_INSTRUCTIONS) (order-independent) and fails if a future capability is added to one source but not the other; the regression is green; per V5 one pass + one fail (drift-introduced = fail, synchronized = pass = 2 cases)."
      - "GIVEN the build WHEN `pnpm -C packages/cli test` runs THEN all existing capability-context tests stay green; typecheck clean; build clean."

  - number: 6
    name: "Verify-and-lock hasManagedBundleEvidence v3-awareness (#37)"
    depends_on: []
    status: pending
    acceptance:
      - "GIVEN feat/v3 base WHERE migrateArtifactsV2ToV3.ts:226 hasManagedBundleEvidence checks `BUNDLE_MARKER` (`.agentera-bundle.json`, the v3 sentinel) first, then falls back to the v2 `scripts/agentera` + `skills/agentera/SKILL.md` pair WHEN the verify-and-lock lands THEN a v3-bundle-marked managed root returns true via the v3 marker (not the v2 fallback); the v2 fallback's purpose (detecting v2-managed roots during migration) is documented inline or removed if it produces false positives for stale v2 roots that should be cleaned."
      - "WHEN `packages/cli/test/upgrade/managedBundleEvidence.test.ts` is authored THEN it asserts (a) a root with only `.agentera-bundle.json` -> true, (b) a root with only `scripts/agentera` + `skills/agentera/SKILL.md` -> true (v2 legacy), (c) an empty/unknown root -> false; the regression is green; per V5 one pass + one fail per evidence shape (v3 marker + v2 pair + none = 3 x 2 = 6 cases)."
      - "GIVEN the audit WHEN `rg 'agentera-npx-bundle' packages/cli/src/` runs THEN either the brief's stale `.agentera-npx-bundle.json` name is reconciled to the actual BUNDLE_MARKER (`.agentera-bundle.json`) in any remaining doc/comment, or the absence is confirmed and recorded; no dead reference to a non-existent marker remains."

  - number: 7
    name: "Fix pending_runtime to count runtimes, not items (#40)"
    depends_on: []
    status: pending
    acceptance:
      - "GIVEN feat/v3 base WHERE projectIntegration.ts:341 sets `pending_runtime: pending.length` (the count of ALL pending migration items) and :342 sets `pending_runtimes: pendingRuntimes` (the unique runtime-name set) WHEN 4 pending items all belong to runtime `opencode` THEN `pending_runtime` reports `1` (the number of runtimes), matching the singular field name and the `pending_runtimes` length, not `4` (the item count)."
      - "WHEN the fix lands THEN projectIntegration.ts:341 reads `pending_runtime: pendingRuntimes.length` (or the summary is renamed to `pending_items` if the item count is the intended semantic — the implementer picks the option that matches the field name's singular `runtime` meaning and documents the choice); the stay-branch `pending_runtime: 0` literals at :256 and :315 remain correct."
      - "GIVEN the fix WHEN `packages/cli/test/upgrade/pendingRuntimeCount.test.ts` is authored THEN it asserts (a) 4 items / 1 runtime -> `pending_runtime: 1`, (b) 4 items / 2 runtimes -> `pending_runtime: 2`, (c) 0 items -> `pending_runtime: 0`; the regression is green; per V5 one pass + one fail per scenario (3 x 2 = 6 cases)."

  - number: 8
    name: "Replace volatile TODO line-number references with stable identifiers (#42)"
    depends_on: []
    status: pending
    acceptance:
      - "GIVEN feat/v3 base WHERE the archived d73 plan references `TODO line 35` (immutable, excluded) and .agentera/progress.yaml:245 references `TODO line 13` WHEN the fix lands THEN every active (non-archived) artifact that pins a volatile `TODO line N` reference is rewritten to a stable identifier: the task's leading `[tag:horizon]`/date marker, the task content's first noun phrase, or a `TODO.md @ <section>` href — never a raw line number; progress.yaml:245's `TODO line 13` is replaced with the stable task marker."
      - "WHEN this plan.yaml is authored THEN it contains zero `TODO line N` references; all TODO cross-references use stable markers (e.g. `TODO.md D73 single-agent task`, `TODO.md [feat:3.0.0] statusline`)."
      - 'GIVEN the fix WHEN `packages/cli/test/plan/noVolatileTodoLineRefs.test.ts` is authored THEN it scans `.agentera/*.yaml` (excluding `archive/`) and fails on any `TODO line \d+` or `TODO.md:\d+` reference; the regression is green; per V5 one pass + one fail (volatile-ref-introduced = fail, stable = pass = 2 cases).'

overall_acceptance: >-
  All 8 tasks complete. All eight defects (#20, #22, #31, #32, #33, #37, #40, #42)
  are resolved. The v3 upgrade cleanup phase removes the 12 orphaned Swedish-verb
  agent files from `.cursor/agents/` and `.opencode/agents/` after preview (#20).
  The Cursor doctor probes project-level and user-level `.cursor/hooks.json` and
  `.cursor/agents/` instead of the v2-layout installRoot bundle path, so a
  correctly-wired project reports pass (#22). The v2-to-v3 handoff catalogs custom
  `PROFILERA_PROFILE_DIR`/`AGENTERA_PROFILE_DIR` and runtime-config-dir artifacts
  (#31). A v2 install track running the v3 tooling is surfaced the v3 successor
  line, with the v2 Python CLI writer backport documented as a both-branch main
  item (#32). CAPABILITY_NAMES is derived from a single source
  (`Object.keys(CAPABILITY_INSTRUCTIONS)`) with a drift-guard regression (#33).
  hasManagedBundleEvidence v3-awareness is verified-and-locked with the v3
  BUNDLE_MARKER as the first check and the v2 fallback documented or removed
  (#37). `pending_runtime` reports the count of runtimes, not the count of
  migration items (#40). Active artifacts use stable TODO identifiers, not
  volatile line numbers, with a guard regression (#42). `pnpm -C packages/cli
  test` is green (typecheck, build, validate, and compact all green). After B7
  ships, all seven v2/v3 coexistence batches (B1-B7) are complete and the
  cutover defect surface is closed. Collapsed defects: #20, #22, #31, #32, #33,
  #37, #40, #42. Handoff: full plan authored, status active, all 8 tasks pending
  — suggest ⎈ orkestrera to dispatch the implementation cycles; wait for
  confirmation before executing.

surprises: >-
  (1) #37 was partially addressed by B6: hasManagedBundleEvidence already checks
  the v3 BUNDLE_MARKER first; the brief's `.agentera-npx-bundle.json` marker
  name is stale (actual marker is `.agentera-bundle.json`), so #37 is scoped to
  verify-and-lock + harden rather than a fresh fix. (2) #42's `TODO line 35`
  reference lives only in the immutable archived d73 plan; the only active
  volatile ref is progress.yaml:245 (`TODO line 13`), a separate pre-existing
  issue. Both are fixed by the stable-identifier rule and the guard regression.
  (3) #32's v2 Python CLI writer is a main-branch surface this feat/v3 worktree
  cannot mutate; the feat/v3 side surfaces the v3 successor to v2 install tracks
  and the v2 writer backport is documented as a both-branch item, not a pytest in
  this worktree.

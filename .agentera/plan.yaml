header:
  level: light
  created: 2026-05-17
  status: complete
  title: Codex Hook Packaging and Trust Flow
what: >-
  Implement the related 2.5.x Codex hook tasks by adding optional plugin-bundled
  hook metadata, generating copied user-hook configs that do not rely on
  hook-time AGENTERA_HOME expansion, documenting the plugin hook enablement and
  trust flow, and adding regression coverage for both plugin and copied-hook
  install surfaces.
why: >-
  Codex 0.130+ can discover plugin-bundled hooks, but Agentera still needs the
  copied `~/.codex/hooks.json` path as the reliable default. Both paths need
  explicit trust semantics: plugin hooks should be safe relative to PLUGIN_ROOT,
  while copied user hooks should trust the exact resolved validator command that
  will run even if Codex hook subprocesses do not inherit shell_environment_policy.
constraints: >-
  Preserve copied user-hook installation as the default reliable path. Do not
  assume Codex hook subprocesses inherit `[shell_environment_policy].set`. Do not
  refresh installed apps/profiles, publish, push, tag, change package-manager
  state, edit `.agentera/vision.yaml`, mutate objective state, or change decision
  satisfaction state. Keep direct helper compatibility.
tasks:
  - number: 1
    name: Add plugin-bundled hook metadata
    depends_on: []
    status: complete
    acceptance:
      - >-
        GIVEN `.codex-plugin/plugin.json` is inspected WHEN Codex plugin metadata
        is validated THEN it exposes a hooks entry for bundled hook discovery.
      - >-
        GIVEN the bundled hook config is inspected WHEN command handlers are read
        THEN they use PLUGIN_ROOT to resolve `hooks/validate_artifact.py` and do
        not depend on AGENTERA_HOME.
  - number: 2
    name: Resolve copied user-hook commands and trust hashes
    depends_on:
      - 1
    status: complete
    acceptance:
      - >-
        GIVEN `agentera upgrade --runtime codex` copies user hooks WHEN
        `~/.codex/hooks.json` is written THEN command handlers contain a resolved
        app-root validator path rather than hook-time `${AGENTERA_HOME}`.
      - >-
        GIVEN Codex config receives `[hooks.state]` entries WHEN trust hashes are
        computed THEN they match the exact copied hook command and target
        `hooks.json` path.
      - >-
        GIVEN hook subprocesses lack `[shell_environment_policy].set` inheritance
        WHEN regression tests inspect the copied config THEN the hooks still point
        at an executable validator path.
  - number: 3
    name: Document Codex hook enablement and preserve install surfaces
    depends_on:
      - 1
      - 2
    status: complete
    acceptance:
      - >-
        GIVEN users read the runtime docs WHEN they choose Codex hooks THEN the
        docs state that plugin-bundled hooks require `[features].plugin_hooks = true`
        and `/hooks` review, while copied `~/.codex/hooks.json` remains the default
        reliable install path.
      - >-
        GIVEN setup and upgrade tests run WHEN the batch is complete THEN plugin
        hook metadata is discoverable and copied user-hook wiring is still
        preserved.
overall_acceptance:
  - >-
    Codex package metadata exposes optional plugin hook discovery with a
    PLUGIN_ROOT-safe hook config.
  - >-
    Copied Codex user hooks generated by upgrade use a resolved validator path and
    matching trust hashes instead of hook-time AGENTERA_HOME expansion.
  - >-
    Documentation and tests clearly preserve copied hooks as the reliable default
    and describe plugin hook enablement through `[features].plugin_hooks = true`
    plus `/hooks` review.
surprises: []
previous_plan_archived: .agentera/archive/PLAN-2026-05-17-capability-route-and-planera-boundary-fix.yaml

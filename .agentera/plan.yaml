overall_acceptance: >
  All six defects (#23, #25, #26, #27, #41, #44) and both test gaps
  (G5, G6) are resolved. Repo hook npm tags are unified to
  npx -y agentera@next across hooks/hooks.json, hooks/codex-hooks.json,
  .cursor/hooks.json, .github/hooks/*.json, and
  hooks/codex-plugin-hooks.json (#23). codexValidatorCommand delegates
  to the v3 npx entrypoint CODEX_HOOK_COMMAND (npx -y agentera@next hook
  validate-artifact), no uv-run Python path (#25). Repo template hook
  descriptions reflect v3, not v2 (#26). planCodexItems detects both
  project-level and home-level .codex configs, mirroring planCursorItems
  (#27). Each repo hook file targets exactly one runtime and uses that
  runtime canonical event names, with the target runtime unambiguous
  (#41). CI L2 npm pin is computed dynamically from
  packages/cli/package.json and fails loud (non-zero, clear message)
  when unpublished, closing both #44 and G6. Pre-commit routes
  scripts/sandbox path changes to the full vitest suite, not 2-smoke
  (G5). All typecheck, build, test, validate, and compact gates are
  green (modulo the pre-existing unrelated instruction_file
  schema-contract defect). The plan stays in the active slot, status
  active, tasks pending, for ⎈ orkestrera execution.
surprises: >
  The defects doc docs/notes/v2-v3-coexistence-defects.md referenced by
  the brief is not present in this worktree (it lives in a sibling
  worktree on another branch); the live repo hook files, CLI Codex
  setup, migration planner, CI workflow, and pre-commit runner were
  used as ground truth per the brief directive. Investigation confirmed
  all eight items are still live — none were collapsed by B1-B4.
  codexValidatorCommand (#25) currently has zero callers in packages/
  (excluding dist) and zero callers in tests; it is effectively dead
  code. B5 aligns it to delegate to CODEX_HOOK_COMMAND for minimal
  consistency with the defect as filed, but full dead-code removal is
  left as a separate follow-up rather than asserted as B5 scope. The
  OpenCode plugin (.opencode/plugins/agentera.js) uses its own
  tool.execute.* events and does not read hooks/hooks.json, so #41 is
  resolved by clarifying per-file runtime targeting, not by rewiring
  the OpenCode plugin. The active plan YAML schema has no
  collapsed_defects field (it is a render-time section in the archived
  .md, as in B3 and B4), so the collapsed defect list is folded into
  the why field above.

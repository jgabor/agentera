      - >-
        GIVEN profile or app state is stale or missing WHEN bespoke contexts are
        emitted THEN caveats are preserved and do not authorize refreshes.
    evidence:
      - >-
        Slim mode now copies non-null bespoke contexts into
        `capability_context.context`, preserving `execution_context`,
        `benchmark_context`, `evidence_context`, `closeout_context`, and
        `orchestration_context` source contracts.
      - >-
        Focused tests verify slim nesting for Realisera, Optimera, Inspektera,

      - 'GIVEN rewireProfileraEnvVar running during migration WHEN the installed app registry model contains PROFILERA_PROFILE_DIR literals THEN they are updated to AGENTERA_PROFILE_DIR'
      - 'GIVEN rewireProfileraEnvVar running during migration WHEN runtime config files are updated THEN the existing behavior is preserved (no regression)'
      - 'GIVEN rewireProfileraEnvVar running during migration WHEN process.env is checked THEN no attempt is made to persistently modify the parent shell environment (only config files are modified)'

header:
  level: full
  created: 2026-05-15
  status: complete
  reviewed: 2026-05-15
  critic_issues: 4 found, 4 addressed, 0 dismissed
  title: Planera Lint Anchor False Positive Fix
what: >-
  Investigate and fix the false-positive `agentera lint --artifact PLAN.md`
  abstraction advisory reported for a Planera plan draft that already contained
  concrete anchors. The fix should make lint results trustworthy for Planera
  plans without weakening the abstraction check for generic prose.
why: >-
  The highest-priority open TODO is a degraded false positive in the pre-write
  artifact lint path. If lint flags concrete Planera plans as anchorless, agents
  either rewrite useful detail away or carry unnecessary `[post-audit-flagged]`
  caveats. The result should preserve self-audit trust while keeping diagnostics
  actionable.
constraints: >-
  Preserve the existing `agentera lint --artifact <ARTIFACT>` CLI contract,
  advisory-by-default behavior, strict-mode failure behavior, JSON/text output
  shapes, text/file/stdin input behavior, and canonical artifact labels. Do not
  loosen the abstraction rule so generic or unanchored prose passes. Do not
  redesign lint thresholds broadly, mine session transcripts, implement D48
  namespace changes, publish, push, tag, refresh installed apps/profile, edit
  vision state, edit objective state, or change decision satisfaction state.
scope:
  included:
    - >-
      Reproduce or bound the reported false positive using the temporary Planera
      plan path `/tmp/opencode/aila-m13-plan.yaml` when available, or a
      representative copy with equivalent concrete anchors.
    - >-
      Identify the observable lint behavior that makes an anchored Planera plan
      receive the no-anchor advisory.
    - >-
      Apply the smallest product change that makes anchored Planera plans pass
      while preserving failures for unanchored prose.
    - >-
      Add or update focused regression coverage for PLAN.md lint behavior and
      any changed diagnostics or guidance.
    - >-
      Handle fix-level release metadata according to `.agentera/docs.yaml`
      semver policy.
    - >-
      Sync required local state after verification, with TODO, PROGRESS, and
      PLAN closeout mandatory and CHANGELOG/DOCS updates conditional on policy
      or touched surfaces.
  excluded:
    - Broad self-audit threshold redesign beyond this false positive.
    - Transcript-wide lint threshold analysis from the separate annoying TODO.
    - D48 CLI namespace work such as validate, smoke, verify, corpus, or usage.
    - Renaming artifact IDs, CLI selectors, schema names, or persisted metadata keys.
    - >-
      Publication, remote push, tagging, installed-app refresh, profile refresh,
      vision edits, objective edits, or decision satisfaction changes.
  deferred:
    - Larger prose-health policy changes discovered while fixing this issue.
    - Cross-runtime benchmark improvements unrelated to the false-positive path.
    - Cleanup of historical resolved TODO or changelog wording.
design: >-
  Treat the TODO as a contract bug in the self-audit surface. First check the
  reported temporary Planera draft or a faithful representative through
  `agentera lint`, then make the least invasive correction that preserves the
  current CLI and artifact-label contracts. Verification should prove both sides:
  a concrete Planera plan no longer receives the abstraction advisory, and generic
  prose still receives it.
previous_plan_archived: .agentera/archive/PLAN-2026-05-15-d47-app-home-vocabulary-cleanup.yaml
tasks:
  - number: 1
    name: False-positive characterization
    depends_on: []
    status: complete
    acceptance:
      - >-
        GIVEN the reported temporary Planera draft or a representative copy
        contains concrete anchors WHEN it is checked through the artifact lint
        surface THEN the no-anchor advisory is reproduced or non-reproducibility
        is recorded with evidence.
      - >-
        GIVEN characterization completes WHEN evidence is recorded THEN the
        bad advisory is tied to observable lint input and output behavior.
      - >-
        GIVEN generic prose lacks concrete anchors WHEN it is checked through
        the same lint surface THEN the abstraction advisory remains observable
        as the control case.
    evidence:
      - >-
        Exact reported file exists at `/tmp/opencode/aila-m13-plan.yaml` and
        includes anchors such as `ROADMAP.md:523-542`, `docs/notes/PROMPT.md`,
        `internal/runtime`, `internal/app`, and `internal/tui`. `uv run
        scripts/agentera lint --artifact PLAN.md --file
        "/tmp/opencode/aila-m13-plan.yaml" --format json` returned status=fail
        advisory=true only for verbosity (`1183 words exceeds 100 budget`);
        abstraction status=pass with detected anchor `docs/notes/PROMPT.md`.
      - >-
        Reduced boundary input with queued-message fixture, semantic snapshots,
        PTY smoke, mage check, source docs, and concrete `internal/runtime`,
        `internal/app`, and `internal/tui` boundaries returned abstraction
        status=fail with `abstraction creep: no concrete anchor`, tying the
        advisory to anchors outside the current recognized regex classes.
      - >-
        Recognized anchor control `ROADMAP.md:523-542` returned abstraction
        status=pass with detected anchor `:523`; generic prose control returned
        abstraction status=fail with `abstraction creep: no concrete anchor`.
  - number: 2

overall_acceptance:
  - >-
    GIVEN Realisera plan-driven startup needs current task context WHEN a
    dependency-ready task exists THEN the agent receives acceptance criteria,
    constraints, verification expectations, artifact update requirements, progress
    logging requirements, changelog boundary, and conservative scope metadata through
    CLI state without normal direct raw startup reads.
  - >-
    GIVEN execution state is missing, blocked, caveated, no-plan, or completed-plan
    sweep shaped WHEN implementation work proceeds THEN the source contract names
    missing state, caveats, fallback commands, and read-only context-generation
    boundaries honestly.
  - >-
    GIVEN 2.3.12 closes WHEN validation and local metadata sync finish THEN no
    unsupported CLI command, prohibited mutation, automatic dispatch, publication,
    push, tag, profile refresh, installed app refresh, vision edit, objective edit,
    or 2.3.13+ implementation occurred.

        compatibility context under `capability_context.context`.
      - >-
        Verification passed: focused hej tests for default dashboard output,
        slim capsule output, full compatibility output, unsupported sparse-field
        rejection without partial stdout, existing capability-context inventory,
        Planera context, slim/full CLI spot checks, and `git diff --check`.
  - number: 3
    name: Move existing bespoke contexts into slim mode
    depends_on: [2]
    status: complete
    acceptance:
      - >-
        GIVEN Realisera context is requested WHEN slim JSON is emitted THEN

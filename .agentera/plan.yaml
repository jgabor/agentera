overall_acceptance:
- '`agentera hej --format json --capability-context <name>` exposes a stable, parseable
  `source_contract.capability_context.first_invocation_read` object for requested capabilities.'
- The emitted value is one of `full`, `compact_startup`, or `skip`, with `full` as the default
  absent a valid compact-startup exception and Planera reporting `compact_startup` from its existing
  startup contract.
- The contract authority, CLI JSON, tests, and docs agree on metadata values, provenance, compact-startup
  boundaries, and the separation between metadata discovery and runtime enforcement.
- No unsupported `agentera planera` or other capability-name CLI command is added, recommended,
  or required for discovery.
- Focused contract/CLI tests, capability validation, plan/artifact validation, and diff whitespace
  checks pass before handoff closes the TODO.

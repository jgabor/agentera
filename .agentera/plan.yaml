  title: v2/v3 coexistence B4 — OpenCode plugin rewire
what: >
  Close the OpenCode-plugin-rewire defect batch. The defects doc
  (docs/notes/v2-v3-coexistence-defects.md batch plan, batch B4) is
  triage; the plugin source at .opencode/plugins/agentera.js is ground
  truth, so tasks verify what prior commits (8cb5d02c, 0c0559e0,
  7196e1b8) already fixed and close the true residuals. Route all
  OpenCode hook handlers through the v3 npm entrypoint with no residual
  v2-script fallback. Replace the vestigial v2 probes in
  isRunnableAgenteraAppRoot/resolveAgenteraHome with v3 bundle-evidence
  recognition so app-home resolution robustly identifies a v3 npm-bundled
  app rather than matching it by coincidence. Verify setProfileDir uses
  the canonical v3 AGENTERA_PROFILE_DIR name. Verify the doctor
  OpenCode profile-dir check catches the deprecated env var. Add the
  missing persistent doctor health check that catches the profile-dir
  schema-literal breakage in the installed plugin source.
why: >
  B1 (split-brain root cause) is complete and unblocks B4; B2 and B3 are
  independent sibling batches. See docs/notes/v2-v3-coexistence-defects.md
  batch plan, batch B4. The defects doc is triage, not ground truth:
  investigation of the live plugin and CLI source confirmed #7, #24, and
  #36 are already largely fixed by prior rewire commits, so B4 verifies
  those fixes, closes the real residuals (#8 v3 app-home detection, #38
  persistent doctor source-literal check), and adds regression coverage
  so the rewire cannot silently regress during the v3 cutover window.
  Collapsed defects: #7 OpenCode plugin hook handlers hardcoded to
  uv run / v2 scripts; #8 resolveAgenteraHome/isRunnableAgenteraAppRoot
  v2 probes misclassify v3 app home; #24 setProfileDir setting only
  PROFILERA_PROFILE_DIR instead of v3 canonical name; #36 OpenCode
  doctor profile-dir check; #38 doctor must catch the profile-dir
  schema-literal breakage.
constraints: >
  All work on feat/v3-b4-opencode-plugin-rewire (forked from feat/v3).
  B1 is COMPLETE; B4 may start. Do NOT depend on B2 or B3 — they are
  independent sibling batches. Do not touch .agentera/vision.yaml or
  objective state. Do not remove the PROFILERA_PROFILE_DIR alias
  fallback in setProfileDir — that is a separate v3.0.0-stable chore
  tracked at TODO.md ("Remove deprecated PROFILERA_PROFILE_DIR alias
  fallback from setProfileDir() in .opencode/plugins/agentera.js before
  v3 stable release"); B4 #24 only verifies the v3 canonical name wins.
  Do not change the NPX_CLI_ENTRYPOINT channel pin (npx -y
  agentera@next) into a channel-resolved value — #7 is about routing
  through the v3 npm entrypoint when v2 scripts are absent, not about
  deriving the entrypoint from the resolved app home. Do not modify
  other runtimes' plugins (Claude, Codex, Copilot, Cursor) — OpenCode
  only. Author ONLY — do not implement, do not mark tasks complete, do
  not archive; leave the plan in the active slot, status active.

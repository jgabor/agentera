  title: v2/v3 coexistence B2 — env-var & path resolution remainder
what: >
  Fix the remaining env-var and path-resolution defects that B1 did not
  cover: restore the PROFILERA_PROFILE_DIR precedence fallback in v3
  resolvers that dropped it during the rename, widen the migration rewire
  to update installed-app artifact path mappings and schema literals,
  unify XDG_DATA_HOME tilde expansion across all resolvers, align the
  docs.yaml schema documentation with resolver support, fix
  startupBenchmarkDir to accept caller-provided env, and fix the
  install-root precedence to include the profile layer. Close test gaps
  G1 (no PROFILERA_PROFILE_DIR-only test), G2 (seed-v2-fixture lacks
  PROFILERA_PROFILE_DIR), and G4 (mock version catalog 3 majors ahead).
why: >
  B1 fixed the split-brain root cause and added the resolveArtifactPath
  fallback, but the individual env-var resolvers still drop the v2
  precedence level, the migration still leaves stale schema literals,
  tilde expansion diverges across path resolvers, and three test gaps
  masked the original defect. Without B2, v2 users with
  PROFILERA_PROFILE_DIR set get incomplete profile resolution and
  literal-tilde path directories. See
  docs/notes/v2-v3-coexistence-defects.md batch plan, batch B2.
constraints: >
  All work on feat/v3 only. Do not touch .agentera/vision.yaml or
  objective state. Do not rewire the OpenCode plugin (B4: .opencode/
  plugins/agentera.js setProfileDir, resolveAgenteraHome). Do not fix
  channel/bundle-status resolution (B3: doctor.ts, projectIntegration.ts,
  channels.ts, expectedVersion). Do not fix repo hook npm tags (B5).
  Do not refresh installed-app content on upgrade (B6: SKILL.md,
  protocol.yaml, capability_schema_contract.yaml content). Preserve
  the AGENTERA_PROFILE_DIR > PROFILERA_PROFILE_DIR > default precedence
  in all resolvers (v3 name wins, v2 name is fallback only). Do not
  modify the Cursor v3 skip condition. Do not break the npx-bundle path
  or the installed-managed-app path.

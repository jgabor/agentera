overall_acceptance:
  - >-
    GIVEN a decision is not user-confirmed satisfied WHEN Agentera compacts,
    audits, or closes a release THEN unresolved state remains visible and cannot
    be hidden by downstream references.
  - >-
    GIVEN automation finds evidence that a decision may be satisfied WHEN it
    updates decision state THEN the result is provisional until the user confirms
    it.
  - >-
    GIVEN a decision is user-confirmed satisfied WHEN normal CLI consumers query
    decisions THEN they can see the confirmed state after eligible compaction.

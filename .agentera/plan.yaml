design: >-
  Single-file, ≤20-line change in `validateMdItems` to introduce a
  per-band check. The function already iterates the four
  severityGlyphs; replace the unconditional `if (!/^\s*-/m.test(sectionBody))`
  gate with a per-glyph check: glyph `⇶` (Critical) requires
  at least one `- [type]` item, the other three glyphs (`⇉`, `→`,
  `⇢`) emit no violation for an empty body. Keep the heading-slice
  and headingText extraction so the error message names the
  offending band. The change is asymmetric by design: Critical is
  the only band whose absence is user-visible routing damage, so it
  is the only band that must always carry work.

  Policy is documented in three places, each with a distinct role:
  todo.yaml CONVENTION TC6 (level: required) owns the canonical
  human-readable description of the enforced Critical rule and the
  advisory header-only rule for the other three bands; references/cli/vocabulary.md
  owns a discoverability index row pointing to TC6; the validator
  itself is the single executable source of truth. No new schema
  group is added; no new vocabulary is added.

  Test coverage: retire the `- Placeholder` decoy test (its
  precondition no longer holds) and replace it with four new tests
  plus a Critical-collapse boundary test. The boundary test (T2-e)
  exercises a TODO.md where the boundary scanner is forced to
  mis-attribute an empty body to Critical, asserting that the
  Critical violation is still emitted to lock in the 20f3837
  off-by-one fix. The existing adjacent-heading regression (line 84)
  still passes because Critical with no body is still rejected.

  Folded into one commit per AGENTS.md: the validator change
  (T1), the test changes (T2), the schema CONVENTION (T3), the
  vocabulary row (T4), and the TODO.md fold (T9). Tasks T5-T8
  are verification gates and produce no commits of their own.


overall_acceptance:
  - >-
    GIVEN the migrated CLI WHEN an agent runs bare orientation THEN `agentera prime`
    replaces `hej` as the single composite briefing entry with no loss of
    source_contract fields.
  - >-
    GIVEN eleven capabilities remain top-level WHEN `--help` is reviewed THEN
    capability routing discoverability is preserved and only `hej` is removed from
    capability tops.
  - >-
    GIVEN lifecycle commands WHEN users run install diagnostics THEN `upgrade` and
    `doctor` remain top-level without a `setup` namespace.
  - >-
    GIVEN schema discovery WHEN agents need command trees THEN `agentera schema`
    is the canonical introspection command and `describe` is not the documented path.
  - >-
    GIVEN maintainer workflows WHEN CI and hooks run THEN `check` namespace owns
    validate, verify, lint, and compact (former gate) with unchanged safety
    boundaries for live verify opt-in.
  - >-
    GIVEN Decision 45 routine state names WHEN agents read plan/progress/etc. THEN
    `state <name>` is canonical with top-level aliases during migration and
    source_contract shapes are unchanged.

overall_acceptance:
  - >-
    App metadata vocabulary is converged across internal and user-facing surfaces unless compatibility
    forces a documented alias; avoid repeating bundle/app or DECISIONS.md/decisions.yaml-style splits.
  - >-
    Fresh or ready doctor text communicates that no required action is needed and does not display a
    mandatory-looking repair `Next:` sequence.
  - >-
    Non-fresh doctor states still provide safe preview/apply/retry or blocked-state guidance.
  - >-
    Doctor JSON compatibility, command formatting, and non-interactive repair safety are preserved.
  - >-
    Broader vocabulary migration remains inventory-gated, and any move from `docs/vocabulary.md` to a
    dedicated `vocabulary.yaml` is left to a later Resonera decision rather than hidden inside the doctor fix.
surprises:
  - >-
    Live reproduction after the installed app refresh still shows `status: ready` with a repair `Next:`
    block even though JSON reports `status=fresh`, `signals=[]`, and marker version `2.3.12`.

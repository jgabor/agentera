        GIVEN the false-positive scenario is fixed WHEN focused regression tests
        run THEN they cover the anchored Planera-plan pass case and the
        unanchored prose failure case.
      - >-
        GIVEN user-facing lint diagnostics or guidance changes WHEN docs or

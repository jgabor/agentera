header:
  level: full
  created: '2026-06-26'
  status: active
  reviewed: '2026-06-26'
  critic_issues: '5 found, 5 addressed, 0 dismissed'
  revised: 'Critic flagged (1) cursorAgentSurface.test.ts iterates 12 capability names and reads individual agent files, addressed by task 4 rewriting tests for single agent; (2) OpenCode copy-agent loop does not filter by managed marker, addressed by task 3 restricting to agentera.md; (3) unused CAPABILITY_INSTRUCTIONS import in test after removing per-capability agents, addressed by task 4 removing the import; (4) plan did not verify OpenCode built-in build.md and plan.md in user config dir are not touched, addressed by task 3 acceptance criterion; (5) plan did not address Cursor skip condition interaction with new agentera.md, addressed by task 3 acceptance verifying skip still applies and agentera.md is in-tree only for v3 projects.'
  title: Ship single Agentera agent (D73)
what: >
  Replace 12 per-capability managed subagents (audit.md, build.md, design.md,
  etc.) with a single primary agent named "Agentera" (agentera.md) for both
  OpenCode and Cursor runtimes. The Agentera agent loads the skill for
  routing, fetches capability prose via the CLI, and dispatches to the
  runtime built-in general subagent for execution with the prose as the
  task prompt. Body is minimal (dispatch mechanism only; no routing logic
  duplication).
why: >
  D65 made per-capability subagents redundant. They are fetch-and-execute
  wrappers around CLI-served prose. A single agent eliminates the collision
  where Agentera build.md and plan.md clobber OpenCode built-in Build and
  Plan agents (doom_loop, plan_exit, plan_enter permissions). D73 resolved
  the design. Broad permissions (write+bash allow), Task dispatch to
  general subagents, minimal body, routing stays in SKILL.md.
constraints: >
  Must not clobber OpenCode built-in Build and Plan agents in user config
  dirs. Cross-runtime scope is OpenCode and Cursor only. Claude, Codex,
  and Copilot have no managed agents. Routing logic stays in SKILL.md
  (D65). Branch is feat/v3. Do not touch the v2-to-v3 upgrade cleanup of
  stale Swedish-verb agents (separate TODO). Do not touch vision.yaml or
  objective state. Do not modify the Cursor v3 skip condition behavior for
  external projects (Cursor uses the skill directly there).
scope:
  included:
    - '.opencode/agents/ — create agentera.md, remove 12 per-capability files'
    - '.cursor/agents/ — create agentera.md, remove 12 per-capability files'
    - 'packages/cli/src/upgrade/runtimeMigration.ts — restrict copy-agent loop'
    - 'packages/cli/test/upgrade/cursorAgentSurface.test.ts — rewrite for single agent'
    - 'skills/agentera/SKILL.md — update handoff and agent dispatch language'
  excluded:
    - 'v2-to-v3 upgrade cleanup of stale Swedish-verb agents (TODO line 35)'
    - '.claude-plugin/, .codex-plugin/, .cursor-plugin/ description text'
    - '.agentera/vision.yaml, objective state'
    - 'Cursor skip condition logic for external projects'
  deferred:
    - 'Cleanup of stale Swedish-verb agents in user config dirs (TODO line 35)'
design: >
  Two phases. First create the replacement agent, then remove the old
  surface and update the distribution and test layers. Creation establishes
  the replacement before removal eliminates the old surface. The
  distribution surface (copy loop) is updated to sync only agentera.md so
  future non-managed md files are not accidentally copied. Tests are
  rewritten last to reflect the final single-agent state. SKILL.md handoff
  language tracks the change throughout.

        package/version metadata tests, touched artifact validators, compaction if
        needed, and `git diff --check`.
overall_acceptance:
  - >-
    GIVEN an agent needs usage/profile analytics WHEN it uses the supported CLI THEN
    `agentera usage` is discoverable and does not require guessing `scripts/usage_stats.py`.
  - >-
    GIVEN machine consumers already rely on usage analytics JSON WHEN JSON mode is
    used through the namespace THEN the existing top-level analytics payload is
    preserved without a wrapper envelope or USAGE.md write.
  - >-
    GIVEN default usage report generation writes a user-local artifact WHEN tests or
    probes run THEN write destinations are explicit, isolated where appropriate, and
    never caused by corpus/profile refresh side effects.
  - >-
    GIVEN the feature closes WHEN local state is synced THEN the D48 usage TODO is
    resolved with exact evidence and release metadata follows `.agentera/docs.yaml`
    policy.
surprises:
  - >-
    Pre-write lint initially flagged the draft as over the PLAN.md per-entry word
    budget; the revised draft passed verbosity, abstraction, and filler checks with
    `scripts/usage_stats.py` as the concrete anchor.
  - >-
    Adversarial review found six issues and all were addressed: choose pass-through
    JSON instead of a wrapper envelope, isolate default report writes in tests,
    preserve `AGENTERA_USAGE_DIR`/`PROFILERA_PROFILE_DIR` precedence, include package
    surface checks, treat unmatched projects as valid empty reports, and split version
    metadata from final artifact closeout.

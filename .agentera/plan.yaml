header:
  level: full
  created: 2026-05-22
  status: active
  reviewed: 2026-05-22
  critic_issues: "1 found, 1 addressed, 0 dismissed"
  revised: >-
    Added required review metadata and the previous-plan archive pointer after
    validation found missing header fields.
  title: Agentera 3.0 Prime Control Plane and JSON Budget
what: >-
  Replace the v2 compatibility-shaped JSON context model with a single 3.0 command
  and JSON contract: top-level commands map directly to capabilities, `prime` is
  the one non-capability control plane, slim `capability_context` is the only
  supported capability startup shape, `--context-profile full` is removed, and every
  public JSON output surface is inventoried, measured, budgeted, and reviewed.
why: >-
  Decision 58 removes duplicate protocol identities at the 3.0 boundary. Decision
  59 applies that same clean-break principle to command and JSON output: full and
  slim startup shapes cannot both survive, `hej --capability-context` should not
  remain the context seam, and structured outputs should not keep accumulating unused
  context.
constraints: >-
  Introduce direct capability-name CLI commands only as part of the explicit 3.0
  command break, with `prime` as the only non-capability control-plane exception.
  Do not lock the final dashboard/orientation display label or exact flag spelling
  beyond the provisional prime-owned dashboard/orientation mode. Do not refresh
  packages, publish, tag, push, refresh installed app files, edit protected
  vision/objective/profile state, or bump release metadata unless separately
  approved. Use D47-style classification before edits: change live public surfaces,
  preserve historical/migration/diagnostic evidence intentionally, and measure bytes
  plus GPT-5 tokens for every supported public `--format json` or `--json` output.
scope:
  included:
    - "`scripts/agentera` public JSON commands and selectors."
    - Direct top-level capability command routing for all twelve capabilities.
    - "`prime` as static priming guide, dashboard/orientation mode, and capability context mode."
    - Capability context JSON for all twelve Agentera capabilities.
    - Measurement and budget tooling for public JSON output surfaces.
    - CLI contracts, capability guidance, README, UPGRADE, docs, and tests.
    - "A public JSON inventory modeled after `docs/d47-app-home-vocabulary-inventory.md`."
  excluded:
    - 3.0 artifact-name or path migration outside JSON output contracts.
    - Final branding or display spelling for the dashboard/orientation surface.
    - Runtime/package publication, tags, pushes, package refreshes, and release bumps.
    - Private helper internals unless they shape public JSON output.
    - Historical decisions, changelog, archived plans, and migration examples except
      as classified evidence.
design: >-
  First inventory the structured-output and command surface the same way the D47
  app-home vocabulary work classified terms before changing them. Then make `prime`
  the single non-capability control plane: bare `agentera prime` prints static
  Agentera usage for new-session priming, prime dashboard/orientation mode replaces
  the long-term `hej` dashboard seam without locking the final spelling, and
  `agentera prime --context <capability>` replaces
  `agentera hej --capability-context <capability>` for capability startup context.
  After the inventory and budget baselines exist, remove the full-profile
  compatibility path for capability startup JSON, update callers to consume the
  single `capability_context` shape from `prime`, and enforce bytes plus GPT-5 token
  budgets through tests so JSON bloat fails before release.
overall_acceptance:
  - >-
    GIVEN public JSON surfaces exist WHEN the inventory is complete THEN each
    supported output is classified as change, preserve, diagnostic, or historical.
  - >-
    GIVEN top-level 3.0 commands are reviewed WHEN implementation completes THEN all
    twelve capability names route directly to their capabilities and `prime` is the
    only retained non-capability control-plane exception.
  - >-
    GIVEN `agentera prime` runs without a mode WHEN output emits THEN it remains a
    static initial-session Agentera usage guide.
  - >-
    GIVEN prime dashboard/orientation mode runs WHEN output emits THEN it replaces
    the long-term need for a separate `hej` dashboard command without locking the
    final dashboard/orientation spelling in this plan.
  - >-
    GIVEN JSON measurement runs WHEN all public outputs are generated THEN bytes
    and GPT-5 token counts are recorded with command, selector, profile, and
    capability labels where relevant.
  - >-
    GIVEN any output exceeds its budget WHEN tests run THEN the failure names the
    command, profile or capability where relevant, byte count, token count, and
    budget.
  - >-
    GIVEN `agentera prime --context <capability> --format json` runs in 3.0 mode
    WHEN JSON emits THEN top-level `capability_context` is the supported startup
    shape and full-profile compatibility is absent.
  - >-
    GIVEN docs, contracts, or tests mention context profiles WHEN validation runs
    THEN they do not teach `--context-profile full` as a supported 3.0 path.
previous_plan_archived: .agentera/archive/PLAN-2026-05-22-agentera-3-0-json-output-budget.yaml
tasks:
  - number: 1
    name: Inventory all public JSON output surfaces
    depends_on: []
    status: pending
    acceptance:
      - >-
        GIVEN `scripts/agentera` parser definitions and public helper scripts are
        inspected WHEN the inventory is written THEN every supported `--format json`
        and `--json` surface is listed with command, selector, source file, and
        owner.
      - >-
        GIVEN a JSON surface is historical, diagnostic, migration-only, or private
        WHEN classified THEN the inventory records why it is preserved or excluded
        from the 3.0 public-output rewrite.
      - >-
        GIVEN public surfaces include bare `agentera prime`, prime
        dashboard/orientation mode, `agentera prime --context <capability> --format
        json`, direct capability-name commands, `agentera decisions --format json`,
        `agentera compact --format json`, `agentera validate artifact --format json`,
        `agentera upgrade --json`, and `agentera describe --format json` WHEN the
        inventory is reviewed THEN each has an explicit planned action.
      - >-
        GIVEN Decision 58 and Decision 59 govern the work WHEN the inventory is
        complete THEN its classifications cite those decisions and the D47 inventory
        pattern.
  - number: 2
    name: Build whole-surface JSON measurement coverage
    depends_on: [1]
    status: pending
    acceptance:
      - >-
        GIVEN the inventory lists public JSON outputs WHEN the measurement command
        runs THEN it generates each output from stable fixtures without mutating
        user app/profile state.
      - >-
        GIVEN token measurement is available WHEN the measurement command runs THEN
        it records GPT-5 token counts using `<output> | npx tiktoken-cli -m gpt-5`
        or the documented successor wrapper.
      - >-
        GIVEN network or tokenizer access is unavailable during normal unit tests
        WHEN tests run THEN expensive token measurement is isolated or skipped with
        a clear manual benchmark command.
      - >-
        GIVEN measurement finishes WHEN the report is emitted THEN each row includes
        command, selector, capability/profile when relevant, bytes, tokens, and
        budget classification.
  - number: 3
    name: Define and enforce JSON budgets
    depends_on: [1, 2]
    status: pending
    acceptance:
      - >-
        GIVEN measured baselines exist WHEN budgets are defined THEN each public
        JSON output has an explicit byte and GPT-5 token budget or a documented
        exemption.
      - >-
        GIVEN an output exceeds budget WHEN tests run THEN the failure names the
        command, selector, byte count, token count, and budget.
      - >-
        GIVEN a JSON surface is exempt WHEN validation runs THEN the exemption is
        traceable to the inventory classification rather than hidden in test code.
      - >-
        GIVEN budgets are updated WHEN the report changes THEN the measured result
        and rationale are reviewed together.
  - number: 4
    name: Introduce prime context and remove startup compatibility
    depends_on: [1, 2, 3]
    status: pending
    acceptance:
      - >-
        GIVEN `agentera prime --context <capability> --format json` runs WHEN output
        emits THEN the top-level JSON contains `command`, `status`, and
        `capability_context` as the supported startup shape.
      - >-
        GIVEN `--context-profile full` is requested WHEN the command runs THEN the
        CLI rejects it with a clear 3.0 removal message or the flag is removed from
        the public parser entirely.
      - >-
        GIVEN `agentera hej --capability-context <capability>` is requested in 3.0
        mode WHEN command migration is complete THEN it is rejected or classified as
        historical/migration-only rather than supported behavior.
      - >-
        GIVEN bare `agentera prime` runs WHEN command migration is complete THEN it
        emits static Agentera usage guidance rather than a dashboard or capability
        context payload.
      - >-
        GIVEN prime dashboard/orientation mode runs WHEN command migration is complete
        THEN it owns the orientation/dashboard source or rendering path without
        requiring a separate non-capability command.
      - >-
        GIVEN direct capability-name commands run WHEN command migration is complete
        THEN they route to the matching capability rather than to routine state reads.
      - >-
        GIVEN all twelve capabilities are requested WHEN JSON emits THEN each
        capability context preserves the state inventory, fallback commands,
        raw-read policy, and capability-specific context needed for startup.
      - >-
        GIVEN compatibility tests reference the old full envelope WHEN tests are
        updated THEN they either assert the new removal behavior or move old shapes
        into historical fixture coverage.
  - number: 5
    name: Update callers, contracts, docs, and tests
    depends_on: [4]
    status: pending
    acceptance:
      - >-
        GIVEN CLI contracts mention capability context WHEN contract tests run THEN
        they describe `prime --context <capability>` as the single 3.0
        `capability_context` shape and do not preserve `--context-profile full` or
        `hej --capability-context` as supported behavior.
      - >-
        GIVEN capability guidance, README, UPGRADE, or docs mention JSON startup
        profiles WHEN documentation checks run THEN they teach the 3.0 prime shape
        and classify old full-profile and `hej --capability-context` examples as
        historical or removed.
      - >-
        GIVEN runtime adapters or tests consume capability startup JSON WHEN they
        run THEN they read `capability_context` from `prime --context` directly and
        do not depend on legacy top-level context siblings.
      - >-
        GIVEN public JSON inventory entries are marked change WHEN implementation
        completes THEN their planned actions are reflected in code, docs, and tests.
  - number: 6
    name: Validate, report measurements, and prepare handoff
    depends_on: [1, 2, 3, 4, 5]
    status: pending
    acceptance:
      - >-
        GIVEN implementation is complete WHEN validation runs THEN focused JSON
        contract tests, measurement budget tests, capability validation,
        artifact validation, `agentera gate`, and `git diff --check` pass.
      - >-
        GIVEN measured results are final WHEN closeout evidence is written THEN it
        reports before/after bytes and GPT-5 token counts for capability startup
        and every public JSON surface.
      - >-
        GIVEN release metadata or app refresh would be needed WHEN the task closes
        THEN those actions are deferred unless explicitly approved.
      - >-
        GIVEN the plan is ready for execution WHEN handoff happens THEN suggest
        `⎈ orkestrera` and wait for confirmation.

    - 'Installed-app content refresh on upgrade (B6): SKILL.md, protocol.yaml, capability_schema_contract.yaml content'
    - 'v2 residue cleanup (B7): Swedish-verb agent files, CAPABILITY_NAMES hardcode, handoff manifest'
    - '.agentera/vision.yaml, objective state'
  deferred:
    - 'OpenCode plugin setProfileDir using deprecated env var (B4: #24)'
    - 'OpenCode doctor checking deprecated PROFILERA_PROFILE_DIR (B4: #36)'
    - 'v2 Python upgrade has no v3 migration awareness (B7: #32)'
design: >
  Six independent fix axes plus test-gap closure and verification. First,
  restore PROFILERA_PROFILE_DIR as a lower-precedence fallback in every
  resolver that reads AGENTERA_PROFILE_DIR directly — v3 name wins, v2
  name is the migration-window fallback. Second, widen
  rewireProfileraEnvVar to also update installed-app artifact path
  mappings (docs.yaml, registry model literals) so $PROFILERA_PROFILE_DIR
  schema literals become $AGENTERA_PROFILE_DIR post-migration — scoped to
  config-file updates only, not process.env (which a child process cannot
  persistently modify). Third, unify tilde expansion so all resolvers
  that read XDG_DATA_HOME expand ~ the same way installRoot.ts does.
  Fourth, after the resolver fallback is in place, verify docs.yaml
  schema documentation matches the implementation (remove or correct
  resolver claims that do not work). Fifth, fix startupBenchmarkDir to
  accept a caller-provided env parameter consistent with other
  resolvers. Sixth, add the profile layer to install-root precedence and
  remove the visibleSkillVersion v2 residue probe. Test-gap closure
  (G1, G2, G4) proves the fixes work in the exact scenario that masked
  the original defect. Final verification ensures no regressions.
tasks:
  - number: 1
    name: Restore PROFILERA_PROFILE_DIR fallback in v3 env-var resolvers
    depends_on: []
    status: complete
    acceptance:
      - 'GIVEN any resolver function that reads AGENTERA_PROFILE_DIR from process.env WHEN both AGENTERA_PROFILE_DIR and PROFILERA_PROFILE_DIR are set THEN the resolver uses AGENTERA_PROFILE_DIR (v3 name wins)'
      - 'GIVEN any resolver function that reads AGENTERA_PROFILE_DIR from process.env WHEN only PROFILERA_PROFILE_DIR is set (AGENTERA_PROFILE_DIR unset) THEN the resolver falls back to PROFILERA_PROFILE_DIR'
      - 'GIVEN any resolver function that reads AGENTERA_PROFILE_DIR from process.env WHEN neither env var is set THEN the resolver uses the default path as before'
      - 'GIVEN the B1 resolveArtifactPath fallback WHEN called with a $PROFILERA_PROFILE_DIR/ path THEN it still resolves correctly (B1 fix not regressed)'
      - 'GIVEN the v3 CLI running from a local checkout with PROFILERA_PROFILE_DIR set and AGENTERA_PROFILE_DIR unset WHEN prime --format json runs THEN profile.status is "loaded"'
  - number: 2
    name: Widen rewireProfileraEnvVar to update installed-app artifact path mappings

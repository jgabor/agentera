header:
  level: light
  created: 2026-05-09
  status: complete
  title: 2.2.3 release metadata sync and readiness gate
what: >
  Synchronize the local checkout for the 2.2.3 patch release by updating
  version-bearing surfaces, changelog and docs evidence, then rerunning the
  release-readiness checks needed before any commit, tag, push, publication, or
  installed bundle refresh is requested.
why: >
  The 2.2.3 implementation work is complete and verified, but release surfaces
  still identify 2.2.2. Cutting a release now would ship mismatched metadata and
  an incomplete changelog despite passing tests and live smoke evidence.
constraints: >
  Keep scope to 2.2.3 metadata/readiness. Do not include 2.3.x Profilera corpus
  parity. Do not tag, push, publish, commit, refresh installed bundles, update
  package-manager installs, or modify vision/objective state without explicit
  user approval.
scope:
  included:
    - Version surfaces listed in .agentera/docs.yaml conventions.version_files.
    - CHANGELOG.md 2.2.3 release notes.
    - Release evidence in .agentera/docs.yaml, .agentera/progress.yaml, TODO.md, and plan state.
    - Local validation gates for version alignment, tests, smoke, docs, and whitespace.
  excluded:
    - Git commit, tag, push, publication, package-manager update, and installed bundle refresh.
    - 2.3.x Profilera corpus mining parity.
    - New runtime support, architecture refactors, and v1 reconciliation work.
  deferred:
    - Release publication flow after explicit approval.
    - 2.3.x Profilera corpus parity.
tasks:
  - number: 1
    name: Synchronize 2.2.3 version surfaces
    depends_on: []
    status: complete
    acceptance:
      - GIVEN the release target is 2.2.3 WHEN version-bearing surfaces are inspected THEN registry, Python, lockfile, runtime manifests, Claude marketplace metadata, and OpenCode AGENTERA_VERSION all report 2.2.3.
      - GIVEN package registry tests read version surfaces WHEN they run THEN no 2.2.2 mismatch remains outside historical archive/evidence text.
  - number: 2
    name: Write 2.2.3 release evidence
    depends_on:
      - 1
    status: complete
    acceptance:
      - GIVEN the changelog is read WHEN 2.2.3 is inspected THEN it names the patch scope: profilera staleness suggestion, all-runtime live smoke including Claude skip behavior, JS install-root contract generation, and Codex installed hook trust.
      - GIVEN Agentera docs/progress/TODO state is queried WHEN release evidence is inspected THEN it agrees on 2.2.3 readiness without claiming tag, push, publication, package update, or installed bundle refresh.
  - number: 3
    name: Run release-readiness validation
    depends_on:
      - 1
      - 2
    status: complete
    acceptance:
      - GIVEN the metadata sync is complete WHEN focused version/package tests run THEN version alignment passes.
      - GIVEN the release candidate is validated WHEN full pytest, non-live smoke, docs query, and git diff --check run THEN all pass.
      - GIVEN live smoke has already passed after explicit approval WHEN final evidence is recorded THEN Claude auth skip and Codex/Copilot/OpenCode pass outcomes remain documented without requiring another live spend.
  - number: 4
    name: Final state check and handoff
    depends_on:
      - 3
    status: complete
    acceptance:
      - GIVEN all prior tasks are complete WHEN state is queried THEN only deferred 2.3.x work remains open.
      - GIVEN release actions require explicit approval WHEN the handoff is produced THEN it states what remains: commit first, then tag/push/publish only if requested.
overall_acceptance:
  - GIVEN the 2.2.3 release-prep plan is complete WHEN version, changelog, docs, progress, TODO, tests, and smoke evidence are inspected THEN the checkout is ready for an explicit commit request.
  - GIVEN no publication authority was granted WHEN the plan completes THEN no tag, push, package publication, package-manager update, installed bundle refresh, vision edit, or objective edit has occurred.
surprises: []

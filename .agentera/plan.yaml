      - GIVEN `AGENTERA_HOME` is the exact deprecated default and no `--install-root` was supplied WHEN the managed app is missing or stale THEN CLI and guidance classify it as recoverable stale default, not as first requiring the user to unset `AGENTERA_HOME`.

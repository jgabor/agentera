        include correct spacing before flags such as `--dry-run`.
    evidence:
      - >-
        Updated `scripts/agentera_upgrade.py` so doctor app metadata emits canonical statuses:
        `up_to_date`, `outdated`, `repair_needed`, `migration_needed`, and `manual_review_needed`.
        Signal statuses now use the same canonical vocabulary, while diagnostic `kind` values remain

        unrelated wording changes.
      - >-
        GIVEN generic artifact prose lacks concrete anchors WHEN artifact lint
        evaluates it THEN the abstraction advisory is still reported.
      - >-
        GIVEN callers use text input, file input, piped input, text output, JSON

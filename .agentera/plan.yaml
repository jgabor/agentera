  title: Agentera v2.0.0 Remediation — Close D39 Gaps
what: 'Fix the structural gaps between the claimed v2.0.0 release and the actual codebase state on feat/v2. The merge to main
  was attempted and reverted due to severe gaps: no YAML artifacts exist, all capability prose still references Markdown,
  the README describes phantom slash commands, SPEC.md dissolution is incomplete, and tests/hooks/compaction logic are hardcoded
  to Markdown. This plan closes those gaps so the cutover can be retried safely.'
why: The v2.0.0 cutover shipped the packaging (single bundled skill, 12 capabilities with schemas, query CLI scaffold, migration
  tool) but failed to ship the behavioral transition. Archived Phase 1-4 plans claim completion, but the active PLAN.md admits
  gaps. The codebase is in a contradictory state that blocks any merge to main.
constraints: '- No breaking changes to the v2 capability schema contract or protocol.yaml

  - All 565+ existing tests must continue to pass (no regressions); test updates to support YAML are in scope

  - Registry.json top-level `"version": "1"` is the registry format version and must not change

  - The merge to main is the final task and must only run after all other acceptance criteria are verified

  - 4 runtime targets must be supported: Claude Code, OpenCode, Codex, Copilot

  - Human-facing artifacts (TODO.md, CHANGELOG.md, DESIGN.md) remain Markdown at the project root; all other artifacts become
  YAML

  - The git revert on main means a naive merge of feat/v2 will produce an empty diff; a revert-of-revert or explicit strategy
  is required'
scope:
  included:
  - Invocation model decision, query CLI fixes, artifact migration, test/hook/compaction updates for YAML, prose updates,
    AGENTS.md update, README rewrite, SPEC dissolution cleanup, stale v1 directory removal, semantic eval fixture port, archived
    plan correction, validation, and merge.
  excluded:
  - New capabilities, runtime adapter feature work, cross-runtime live testing, performance optimization of master SKILL.md
    size, token re-benchmarking.
  deferred:
  - Master SKILL.md thin optimization (measure after all fixes), third-party extensibility.
design: 'The remediation follows a dependency chain:


  1. **Decision layer** (Task 1): Define how `/agentera` routes to capabilities across all 4 runtimes. This gates the README
  rewrite but not infrastructure work.

  2. **Infrastructure layer** (Tasks 2-3): Fix the query CLI so it discovers schemas from repo root, add missing schema metadata,
  and run the migration tool to create YAML artifacts.

  3. **Consumer layer** (Tasks 4-5): Update tests, compaction logic, and hooks to operate on YAML instead of Markdown. Retire
  or rewrite SPEC.md-dependent scripts.

  4. **Content layer** (Tasks 6-9): Update all 12 capability prose.md files, AGENTS.md, and README to reference YAML artifacts
  and the single entry point.

  5. **Verification layer** (Tasks 10-12): Port semantic eval fixture, correct archived plan statuses, run full validation,
  and merge to main using a revert-of-revert strategy.

  6. **Freshness layer** (Task 13): Update CHANGELOG, PROGRESS, TODO, and ROADMAP.


  Each task is sized for one realisera cycle. Tasks 2 and 3 are independent and can run in parallel. Task 4 depends on Task
  3 (YAML artifacts must exist before tests reference them). Task 7 depends on Task 3 (prose references YAML paths). Task
  9 depends on Task 1 (README needs invocation model). All other tasks have no inter-dependencies.'

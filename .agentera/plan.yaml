design: >-
  The plan is sequenced to land the v3 cutover in dependency order:
  T1 (Bun/npm/single-binary packaging) is the first blocker because the
  v3 distribution target is a single-binary or npm `@latest` install;
  T2 (TS monolith split) is the second blocker because the cutover
  publish must not ship the 8-file >1000-line hotspot; T3 (D58
  single-name boundary) and T4 (v1 legacy cruft) are cleanup passes
  that run after T2 unblocks the file-level cleanup; T5 (v2 handoff
  manifest) and T6 (v2/v3 coexistence) are `→ both` TODOs that ship
  the v3 reader/probe on `feat/v3` first, with the v2 writer/probe
  backported to `main` after T11; T7 (cursor agent surface regression)
  is a single-file fix that runs in parallel; T8 (audience-namespace
  phase 3) depends on T1 because the deprecated-parser removal is the
  v3 cutover surface; T9 (CHANGELOG/README/UPGRADE.md promotion)
  depends on T8 because the docs reflect the cutover surface; T10
  (v3 tag/publish) depends on T9 and the four release-metadata
  surfaces in lockstep; T11 (final state sync) depends on T10 and
  folds the L16 TODO plus the resolved sub-tasks into `## ✓ Resolved`
  per AGENTS.md.

  The plan's T1 (Bun/npm/single-binary packaging) is the single
  critical-path blocker for the v3 cutover: without the
  single-binary build script and the npm tarball integration
  test, T10's publish step cannot verify the distribution
  boundary. T2 (TS monolith split) is the second critical-path
  blocker because the v3 cutover publish must not ship a
  single-file prime/doctor/validate surface. T3-T7 are
  parallelizable cleanup passes; T8 depends on T1 because the
  audience-namespace phase 3 removal is the v3 cutover
  surface; T9 depends on T8 because the docs reflect the
  cutover surface; T10 depends on T9 because the CHANGELOG
  3.0.0 entry is the cutover commit's headline; T11 depends
  on T10 because the L16 fold is the cutover publish commit's
  AGENTS.md-mandated follow-up.

  The implementation commits fold per AGENTS.md `Agentera
  commits`: each T's commit includes the relevant TODO fold,
  the plan.yaml status update (only on T11), the progress
  cycle (only on T11), and the relevant test additions per
  V5 proportionality. The `npmParityMatrix.test.ts` re-run
  is a T1/T2/T8/T10 gate: the matrix must remain green at
  every milestone. The Decision 56 contract-first rule is
  preserved: no command-shape redesigns, no new top-level
  commands beyond the audience-namespace surface, no
  parallel surfaces. The Python oracle commit-pin from
  D56 T1's `parity-remaining-families.json` remains the
  parity reference; this plan does not auto-update the
  Python side from TS.

  T1 design: author `docs/packaging/v3-packaging.md` covering
  (a) Bun-compiled single-binary via `bun build --compile
  dist/bin/agentera.js --outfile dist/agentera-single-binary`
  (Bun >= 1.1.x; the binary is statically linked with the
  Node-API shim), (b) npm package layout per
  `packages/cli/package.json` `files: [dist, bundle]`, (c)
  app-home migration: the v3 reader uses
  `packages/cli/src/upgrade/v3HandoffManifest.ts` (T5) to
  read `~/.local/share/agentera/v3-handoff.json`; the v2
  writer is on `main` (T5 backport), (d) preserved
  direct-helper compatibility: `scripts/agentera` shim
  seam remains on `main` until v2 retirement, (e)
  `prepack` integration test:
  `packages/cli/test/packaging/prepack.test.ts` runs
  `npm run bundle:data && npm pack` on a fixture tree
  and asserts the tarball contains `dist/bin/agentera.js`,
  `bundle/`, and the `.agentera-npx-bundle.json`
  sentinel, (f) `single-binary.sh` script that builds
  the Bun-compiled single-binary for the npm `@next`
  channel.

  T2 design: split each of the 8 monolith files by state
  family or responsibility. `capabilityContext.ts` →
  `capabilityContext/{prime,hej,visionera,resonera,inspirera,planera,realisera,optimera,inspektera,dokumentera,profilera,visualisera,orkestrera}.ts`
  plus a `capabilityContext/index.ts` barrel. `state.ts` →
  `state/{plan,progress,health,todo,decisions,docs,objective,experiments}.ts`
  plus a `state/index.ts` barrel. `doctor.ts` →
  `setup/doctor/{npm,python,smoke,nextMajor,lifecycle}.ts`
  plus a `setup/doctor/index.ts` barrel. `startupAnalysis.ts`
  → `state/startupAnalysis/{plan,progress,health,todo,decisions,docs,objective,experiments,index}.ts`.
  `extractCorpus.ts` →
  `analytics/extractCorpus/{read,normalize,classify,write}.ts`.
  `codex.ts` → `setup/codex/{plugin,setup,trust,applyPatch}.ts`.
  `compaction.ts` → `hooks/compaction/{status,apply,dryRun,retention}.ts`.
  `validateArtifact.ts` →
  `hooks/validateArtifact/{schema,markdown,traversal,violations}.ts`.
  Each split is ≤1000 lines; the barrel re-exports the
  public API.

  T3 design: the D58 single-name protocol boundary is
  enforced as a CI-friendly test
  `packages/cli/test/cli/singleNameProtocol.test.ts`
  that scans all YAML/TS surfaces for forbidden legacy
  substrings. The forbidden substrings are derived from
  the vocabulary authority doc
  `references/cli/vocabulary.md` and the D58 follow-up
  list. The TS side already enforces the D65 single-name
  form (D58 follow-up per L20); T3 audits and removes
  the remaining legacy substrings.

  T4 design: remove v1 legacy cruft. Surfaces in scope:
  `migrateArtifactsV1ToV2.ts` (verify it's a no-op pass
  per D66), stale v1 runtime bridge behavior
  (`migrateArtifactsV1ToV2.ts` + `migrateArtifactsV2ToV3.ts`
  produce the same shape), v1 skill bundle/suite wording
  in `skills/agentera/SKILL.md` and the per-capability
  prose (verify D65 already removed it), legacy fixture
  assumptions in `tests/fixtures/v1/`, and
  compatibility-only docs/tests. The v1 contract
  validator remains as a defensive gate.

  T5 design: v2 state manifest for v3 consumption.
  Schema: `references/cli/v3-handoff-manifest.yaml`
  defines the manifest format. Reader:
  `packages/cli/src/upgrade/v3HandoffManifest.ts`
  reads `~/.local/share/agentera/v3-handoff.json`
  during v3 migration preflight. Fields: v2 version,
  app home path, user data inventory
  (`benchmarks/`, `intermediate/`, `sessions/`,
  `history/`, `corpus/`, profile files), runtime
  adapters in use. The v2 writer is on `main`
  (Python stable) and produces the same shape; the
  backport is a separate `feat/v3-rewrite-completion-both`
  branch off `main` after T5's v3 reader lands. The
  round-trip parity test (v3 reader reads v2 writer
  output) verifies the backport without pytest.

  T6 design: v2/v3 coexistence detection. v2-side probe
  on `main` (Python stable): `scripts/agentera` doctor
  probes `~/.npm/_npx/<hash>/node_modules/agentera/package.json`
  cache and `npm ls -g agentera` (when Node is
  available); warns "v3 detected alongside v2; pick
  one line" with three user-facing choices: complete
  v3 migration, uninstall v3, stay on v2 explicitly.
  v3-side probe on `feat/v3`
  (`packages/cli/src/setup/doctor.ts`): detects v2
  stable and warns. The v2-side test lands on `main`
  after T11; the v3-side test is in
  `packages/cli/test/cli/coexistenceProbe.test.ts` on
  `feat/v3`.

  T7 design: v3 cursor agent surface regression fix.
  The v3 TS upgrade orchestrator
  (`packages/cli/src/upgrade/runtimeMigration.ts`)
  owns the in-tree `.cursor/agents/` directory on a
  v3 project (probe for the in-tree
  `packages/cli/src/capabilities/<name>/instructions.ts`
  modules as the v3 surface signal); on a v3 project,
  the Python upgrade orchestrator skips the in-tree
  `.cursor/agents/` directory. Regression:
  `packages/cli/test/upgrade/cursorAgentSurface.test.ts`
  asserts the v3 cursor agent body uses
  `Run agentera prime --context <name> --format json`
  and rejects the legacy
  `Read .../capabilities/<name>/instructions.md`
  substring. The Python-side skip-signal is documented
  in `references/cli/upgrade-repair-wording.md` and
  backported to `main` per the both-branch pattern.

  T8 design: audience-namespace CLI migration phase
  3. The TS side already emits stderr deprecation
  for `hej`, `describe`, `gate`, and the
  routine-state tops (Decision 45 alias policy).
  T8 removes the deprecated top-level parser entries
  from the help output and from the dispatch switch.
  Surfaces in scope: `hej` (alias for `prime`),
  `describe` (alias for `schema`), `gate` (alias
  for `check compact`), the routine-state tops
  (`plan`, `progress`, `health`, `todo`, `decisions`,
  `docs`, `objective`, `experiments` — all already
  aliases for `state <name>` per the dispatch),
  `query` (alias for `state query`), `compact`
  (alias for `check compact`), `verify` (alias for
  `check verify`), `stats` (alias for `report`),
  `lint` (alias for `check lint`), `validate`
  (alias for `check validate`). The deprecated
  aliases return a `class: removed_after_cutover`
  envelope (not a stderr deprecation); the parity
  matrix is re-run and reports green.

  T9 design: CHANGELOG 3.0.0 promotion. Author
  the `## [3.0.0] · 2026-06-XX` section with
  `### Key highlights`, `### Added`, `### Changed`,
  `### Removed`, `### Fixed` per AGENTS.md
  `Changelog` rules. Surfaces in scope: 3.0.0
  release title, the six D56 surface families
  (artifact validation, compaction, doctor/upgrade
  safety, verify, usage/stats consent, runtime
  adapter hooks) as Added (TS port of stable
  Python semantics), Decision 58 single-name
  protocol boundary as Changed, the deprecated
  top-level parsers as Removed, and the v3 cursor
  agent surface fix as Fixed. Update `README.md`
  with the v3 install instructions
  (`npx -y agentera@latest` as primary; `npx -y
  agentera@next` as preview; `uvx --from
  git+https://github.com/jgabor/agentera agentera`
  marked as v2 stable only). Update `UPGRADE.md`
  with the v2→v3 migration path, the
  `v3-handoff.json` reader, the coexistence
  detection surface, and the v3.0.0 commit pin.

  T10 design: v3 cutover tag/publish. Sequence:
  (a) `git checkout feat/v3`, (b) `pnpm -C
  packages/cli build && node packages/cli/scripts/
  copy-bundle.mjs`, (c) `npm version 3.0.0
  --no-git-tag-version` to bump package.json, (d)
  bump the four release-metadata surfaces in
  lockstep (`packages/cli/package.json` `version`,
  `agentera.suiteVersion`, `agentera.gitRef`,
  `references/cli/update-channels.yaml`
  `offline_defaults.development`), (e) `git commit
  -m 'release: 3.0.0'` folding the CHANGELOG 3.0.0
  entry, the version bumps, the `.opencode/package.json`
  lockstep, and the T9 docs promotion per AGENTS.md,
  (f) `git tag v3.0.0 <commit>`, (g) `git push
  origin feat/v3 --follow-tags`, (h) `cd
  packages/cli && npm publish --tag latest`
  (graduating `@next` to `@latest`), (i) verify
  `npx -y agentera@latest check validate
  capability-contract --format json` reports green.

  T11 design: final state sync. Fold TODO L16 and
  the resolved sub-task entries to `## ✓ Resolved`
  using the standard ledger form. Flip
  `.agentera/plan.yaml` status from `active` to
  `complete`. Append a `.agentera/progress.yaml`
  cycle whose scope is `v2→v3 TS rewrite completion`
  (per Decision 66, the cycle omits the `commit`
  field). Archive this plan to
  `.agentera/archive/plan-2026-06-04-v2-v3-ts-rewrite-completion.yaml`.
  Verify the D56 plan archive remains at
  `.agentera/archive/plan-2026-06-04-d56-parity-closeout.yaml`
  (no-op verification). Run all six verification
  gates: (1) `pnpm -C packages/cli test` full
  vitest green; (2) `pnpm -C packages/cli run
  typecheck` zero errors; (3) `pnpm -C packages/cli
  build` exit 0; (4) `node packages/cli/dist/bin/
  agentera.js check validate capability-contract
  --format json` pass; (5) `node packages/cli/dist/
  bin/agentera.js check validate capability <name>
  --format json` for each of the 12 capabilities
  pass; (6) `npmParityMatrix.test.ts` reports all
  six D56 surface families `equal` (or
  `intentional_version_break` for rows explicitly
  marked) and zero `ts_smaller` or `python_smaller`
  rows; the lint-monolith regression (T2) reports
  zero files >1000 lines; the single-name protocol
  regression (T3) reports zero legacy substrings;
  the v3-handoff manifest regression (T5) reports
  a <100ms read on the fixture; the v3 cursor agent
  surface regression (T7) reports the D65 form.


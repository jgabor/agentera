header:
  level: full
  created: '2026-05-06'
  status: complete
  reviewed: '2026-05-06'
  critic_issues: "8 found, 8 addressed, 0 dismissed"
  title: Deepen RuntimeAdapter Registry
what: >
  Replace scattered runtime adapter knowledge with one registry-backed
  RuntimeAdapter Module. The registry should describe Claude Code, OpenCode,
  Copilot CLI, and Codex CLI runtime facts behind one Interface: runtime
  identity, host detection, lifecycle events, artifact-validation support,
  configuration targets, diagnostic labels, and documentation claims. Doctor,
  upgrade planning, lifecycle validation, adapter documentation, and runtime
  tests should consume that Interface instead of preserving separate runtime
  tables and conditionals.
why: >
  TODO [arch-runtime-adapter-registry] identifies runtime adapter behavior as a
  shallow seam: runtime facts are spread across scripts/setup_doctor.py,
  scripts/agentera_upgrade.py, scripts/validate_lifecycle_adapters.py,
  references/adapters/runtime-feature-parity.md, references/adapters/opencode.md,
  and tests/test_runtime_adapters.py. A deeper Module gives locality for runtime
  support changes and leverage for validators, docs, and tests.
constraints: >
  Preserve current user-visible doctor, upgrade, lifecycle validation, and
  runtime documentation behavior unless a characterization task explicitly names
  an intentional correction. Do not change install-root classification semantics;
  scripts/install_root.py remains the only Module for AGENTERA_HOME precedence,
  default durable root, managed/stale/unmanaged classification, and root
  diagnostics. Do not implement the separate package manifest registry or move
  version authority, package shared paths, package manifest schemas, or release
  metadata into RuntimeAdapter. No live model calls, no remote pushes, and no
  unapproved runtime config writes.
scope:
  included:
    - archive the completed install-root Module plan
    - characterize current runtime adapter outputs before migration
    - define RuntimeAdapter ownership, schema, and typed field groups
    - introduce a registry Module with contract tests for all four current runtimes
    - migrate lifecycle adapter validation to consume registry facts
    - migrate setup doctor read-only diagnostics to consume registry facts
    - migrate upgrade runtime planning to consume registry facts while preserving dry-run and confirmation safety
    - consolidate runtime tests around the registry and validate documentation parity
  excluded:
    - package manifest registry and package version authority
    - generated install-root cross-language contract
    - artifact write validation Module split
    - adding new runtime support beyond existing Claude Code, OpenCode, Copilot CLI, and Codex CLI claims
    - live runtime smoke calls
    - changing install-root root classification behavior
  deferred:
    - [arch-package-manifest-registry]
    - [arch-artifact-write-validation]
    - [install-root-generated-cross-language-contract]
design: >
  Put the seam at runtime adapter facts, not package metadata and not install-root
  classification. A RuntimeAdapter record should expose typed groups for
  identity, host detection, lifecycle events, artifact validation support,
  configuration targets, diagnostics, and documentation claims. Consumers may
  read only the groups they own: lifecycle validation reads lifecycle and
  artifact-validation facts; setup doctor reads host/config/diagnostic facts;
  upgrade reads install/config target facts and write-safety labels; docs and
  tests check claims against the same registry. Package manifest/version fields
  and install-root source precedence remain outside this Interface.
tasks:
  - number: 1
    name: Reconcile Plan State And Runtime Scope
    depends_on: []
    status: complete
    acceptance:
      - GIVEN the install-root plan is complete WHEN this plan becomes active THEN the completed plan is archived with its evidence intact
      - GIVEN TODO has multiple critical findings WHEN the next item is selected THEN [arch-runtime-adapter-registry] is identified as the planned work and unrelated findings remain open
      - GIVEN runtime registry work starts WHEN scope is recorded THEN package manifest registry, install-root classification, artifact write validation, and live runtime calls are explicitly out of scope
  - number: 2
    name: Characterize Runtime Adapter Outputs And Drift
    depends_on:
      - Task 1
    status: complete
    acceptance:
      - GIVEN current doctor runtime checks run WHEN Claude Code, OpenCode, Copilot CLI, and Codex CLI are represented in fixtures THEN JSON fields, statuses, primary messages, and diagnostic labels are recorded before migration
      - GIVEN current upgrade runtime planning runs WHEN runtime config, hook, plugin, and package phases are planned THEN runtime, action, target, status, message, dry-run, and apply behavior are characterized before migration
      - GIVEN lifecycle validation runs WHEN runtime metadata is valid or intentionally malformed THEN current pass and fail messages are captured before registry extraction
      - GIVEN docs and tests encode runtime facts WHEN drift is found THEN each drift point is named as preserve, standardize, or defer before code migration
  - number: 3
    name: Define RuntimeAdapter Interface And Ownership Model
    depends_on:
      - Task 2
    status: complete
    acceptance:
      - GIVEN a RuntimeAdapter record is valid WHEN it is loaded THEN it has typed groups for identity, host detection, lifecycle events, artifact validation, config targets, diagnostics, and documentation claims
      - GIVEN package metadata facts are encountered WHEN ownership is assigned THEN version authority, package manifest schemas, shared package paths, and release metadata remain outside RuntimeAdapter
      - GIVEN install-root facts are encountered WHEN ownership is assigned THEN AGENTERA_HOME precedence, default durable root, managed/stale/unmanaged classification, and root diagnostics remain delegated to scripts/install_root.py
      - GIVEN a consumer reads the Interface WHEN its allowed groups are checked THEN lifecycle validation, doctor, upgrade, docs, and tests have explicit consumer permissions
  - number: 4
    name: Introduce Registry Module And Contract Tests
    depends_on:
      - Task 3
    status: complete
    acceptance:
      - GIVEN the registry loads WHEN all four current runtimes are present THEN runtime IDs are unique, required fields exist, and unsupported event names are rejected
      - GIVEN a caller asks for a runtime by ID WHEN the ID is known or unknown THEN known records are returned and unknown records fail with one clear diagnostic
      - GIVEN a registry fact changes in a fixture WHEN lifecycle, doctor, upgrade, or docs tests consume that fact THEN at least one relevant consumer observes the changed fact instead of a hardcoded copy
      - GIVEN install-root and package fields are absent WHEN registry validation runs THEN the registry still passes because those facts belong to other Modules
  - number: 5
    name: Migrate Lifecycle Validation To Registry
    depends_on:
      - Task 4
    status: complete
    acceptance:
      - GIVEN lifecycle adapter validation checks runtime support WHEN it validates hook events, substrate support, and limitations THEN it reads RuntimeAdapter records instead of local runtime constants
      - GIVEN a runtime lacks a supported lifecycle feature WHEN validation reports the limitation THEN the message matches the characterized behavior or an intentional correction is documented
      - GIVEN malformed lifecycle metadata is tested WHEN validation fails THEN failure messages remain stable or each wording change is documented with a reason
      - GIVEN package manifest facts appear during lifecycle validation WHEN they are needed THEN validation delegates or preserves existing package checks without moving package-registry ownership into RuntimeAdapter
  - number: 6
    name: Migrate Doctor Read-Only Diagnostics
    depends_on:
      - Task 5
    status: complete
    acceptance:
      - GIVEN setup doctor diagnoses each runtime WHEN runtime host/config facts are needed THEN it reads RuntimeAdapter records rather than duplicated runtime tables
      - GIVEN doctor output is JSON WHEN tests compare pre- and post-migration fixtures THEN runtime statuses, check names, primary messages, and install-root diagnostics are preserved or intentionally documented
      - GIVEN doctor classification touches an install root WHEN it reports root state THEN it still delegates root semantics to scripts/install_root.py
      - GIVEN doctor remains read-only WHEN diagnostics run against temp runtime config THEN no config, hook, plugin, or bundle files are created, deleted, or modified
  - number: 7
    name: Migrate Upgrade Planning And Runtime Tests
    depends_on:
      - Task 6
    status: complete
    acceptance:
      - GIVEN upgrade plans runtime config, hook, plugin, or package operations WHEN runtime facts are needed THEN it reads RuntimeAdapter records instead of local runtime conditionals where behavior is registry-owned
      - GIVEN upgrade dry-run and apply paths are exercised WHEN writes would occur THEN existing --dry-run, --yes, force, and confirmation safety behavior is preserved
      - GIVEN runtime tests validate adapter behavior WHEN the registry exists THEN production-like validators move to registry-facing test helpers or production validation Modules rather than remaining only as test-local rule copies
      - GIVEN package version or manifest metadata is tested WHEN runtime tests run THEN those checks remain separate from RuntimeAdapter or are deferred to [arch-package-manifest-registry]
  - number: 8
    name: Align Documentation And Validate Close
    depends_on:
      - Task 7
    status: complete
    acceptance:
      - GIVEN adapter docs mention runtime support WHEN docs are validated THEN runtime-feature parity and OpenCode references match RuntimeAdapter registry claims
      - GIVEN focused and broad validation runs WHEN the plan closes THEN runtime adapter tests, setup doctor tests, upgrade tests, lifecycle validation, query/artifact CLI checks, and the relevant broader suite pass
      - GIVEN TODO and docs are updated WHEN this plan completes THEN [arch-runtime-adapter-registry] is resolved or narrowed without closing [arch-package-manifest-registry], [arch-artifact-write-validation], or other unrelated architecture findings
      - GIVEN release impact is assessed WHEN runtime-visible behavior changes THEN CHANGELOG, docs index, and version policy are updated or deferral is recorded with rationale
overall_acceptance:
  - GIVEN a runtime fact changes WHEN lifecycle validation, doctor, upgrade, docs, and tests need that fact THEN the change is made in one RuntimeAdapter Interface rather than duplicated across callers
  - GIVEN a runtime Adapter is unsupported or degraded for a lifecycle event WHEN users inspect diagnostics or docs THEN the same limitation is reported consistently across validators and references
  - GIVEN runtime registry work completes WHEN package metadata or install-root behavior is inspected THEN those facts remain owned by their separate Modules and TODOs
  - GIVEN runtime planning or diagnostics run without explicit write approval WHEN registry-backed callers execute THEN no runtime config, hook, plugin, or bundle writes occur
surprises: []

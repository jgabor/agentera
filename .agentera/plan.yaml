overall_acceptance: '- GIVEN an agentera v2 installation after all tasks WHEN a user types /agentera with a natural language
  request THEN the dispatcher routes to the correct capability per the invocation model decision

  - GIVEN a user project with YAML artifacts WHEN the agent queries state THEN it uses the query CLI, not direct reads

  - GIVEN a new user WHEN they read README.md THEN it accurately describes the single-bundle invocation model with no phantom
  slash commands

  - GIVEN all SPEC.md references WHEN searched THEN none remain in prose, contracts, hooks, or tests'
surprises: '- **Task 1 surprise**: The unified CLI (`scripts/agentera`) is an agent-internal tool, not user-facing. The user-facing
  interface is `/agentera` which loads the bundled SKILL.md. The agent decides when to run `agentera query` internally. This
  distinction was unclear during initial deliberation but was resolved: `<request>` is just message text passed to the agent,
  so it works natively on all 4 runtimes without special argument parsing.'

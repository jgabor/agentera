overall_acceptance: >
  The env-var and path-resolution remainder is fixed: all v3 resolvers
  that read AGENTERA_PROFILE_DIR also check PROFILERA_PROFILE_DIR as a
  lower-precedence fallback. The migration rewire updates installed-app
  artifact path mappings and schema literals, not just runtime config
  files. XDG_DATA_HOME tilde expansion is unified across all resolvers.
  docs.yaml schema documentation matches resolver support.
  startupBenchmarkDir accepts caller-provided env. Install-root
  precedence includes the profile layer; visibleSkillVersion no longer
  probes v2 residue. Test gaps G1, G2, G4 are closed. All tests pass;
  typecheck, build, validate, and compact are green.

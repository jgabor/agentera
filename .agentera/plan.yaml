        `skills/agentera/SKILL.md`, `skills/hej/SKILL.md`, and `registry.json` from
        2.5.0 to 2.6.0.
      - >-
        Package metadata verification passed with `uv run pytest tests/test_package_registry.py
        tests/test_packaged_cli.py -q`, and no package publication, remote push, tag,
        installed-app refresh, profile refresh, vision edit, objective edit, or decision

    tests proving the new metadata contract.
  title: First Invocation Read Metadata
what: Add machine-readable `first_invocation_read` capability metadata to the Decision 57
  instruction contract and expose each capability's required startup instruction-read obligation
  through `agentera hej --format json --capability-context <name>`. Agents should be able to
  discover whether first invocation requires a full `instructions.md` read, can rely on a compact
  startup contract, or is explicitly justified as skipped, without guessing capability directory
  paths or inventing unsupported capability CLI commands.
why: The instruction-file contract is now implemented, but the required-read obligation remains
  discoverable only by reading contract prose and capability files directly. Surfacing the obligation
  through the existing hej capability-context seam completes the next TODO in the Decision 57
  sequence, reduces raw directory guessing at startup, and preserves the CLI-first state model
  used by Planera, Orkestrera, Dokumentera, Inspektera, Optimera, and Realisera contexts.
constraints: Keep the feature scoped to metadata declaration and CLI discoverability. Do not
  implement runtime policing of whether an agent actually read `instructions.md`; do not add
  unsupported commands such as `agentera planera`; do not duplicate contract-owned enum values
  outside validation-tied tests; do not close the separate broad validation/vocabulary regression
  TODO unless its full explicit scope is actually implemented; do not refresh installed apps/profiles,
  publish, push, tag, edit `.agentera/vision.yaml`, mutate objective state, or change decision
  satisfaction state.
scope:
  included:
  - '`references/cli/capability-instruction-contract.yaml` as the source of truth for values,
    default behavior, compact-startup exception boundaries, and implementation state.'
  - '`agentera hej --format json --capability-context <name>` JSON metadata for required instruction-read
    discovery.'
  - Focused tests in `tests/test_capability_instruction_contract.py`, `tests/test_query_cli.py`,
    and nearby CLI contract coverage proving the metadata shape, values, defaults, and compact-startup
    exception behavior.
  - Existing docs and source indexes that currently describe future or absent `first_invocation_read`
    metadata.
  - Version-policy and closeout metadata updates only if the repository's docs convention requires
    them during implementation.
  excluded:
  - Runtime enforcement of first-invocation reads by agent processes.
  - New capability-name CLI commands such as `agentera planera` or `agentera realisera`.
  - Broad vocabulary sweeps for app lifecycle status, bundle/SKILL.md wording, or dispatcher/router
    wording that are already represented by separate TODO entries.
  - Protected vision, objective, profile, installed-app, publication, push, tag, and decision-satisfaction
    mutations.
  deferred:
  - Post-3.0 legacy cleanup and single-name protocol removal.
  - The broader validation-regression TODO beyond direct proof that required-read capability context
    is emitted and compact-startup exceptions remain explicit.
design: Treat `first_invocation_read` as capability metadata in the existing hej capability-context
  contract. The contract authority defines the allowed values and default rule; the CLI reports
  the resolved obligation for a requested capability alongside the existing `declared_state_needs`,
  fallback commands, raw-artifact policy, and capability-specific context. Capabilities with no
  explicit compact-startup exception report the default full-read obligation. Planera reports the
  compact-startup obligation only because the existing startup contract is present and names covered
  guidance plus escalation boundaries. Any future skip value must carry explicit justification before
  it is exposed.
tasks:
- number: 1
  name: Align the metadata authority
  depends_on: []
  status: complete
  evidence:
  - Updated `references/cli/capability-instruction-contract.yaml` to mark CLI/schema
    discoverability implemented while keeping runtime enforcement false.
  - Focused authority tests read allowed values from the contract and preserve the
    separate broad validation-regression TODO.
  acceptance:
  - GIVEN the Decision 57 instruction contract is inspected WHEN the metadata feature is specified
    THEN `references/cli/capability-instruction-contract.yaml` marks `first_invocation_read` CLI
    and schema metadata as implemented for discoverability while leaving runtime first-invocation
    enforcement false unless separately built.
  - GIVEN the allowed values are consumed by tests or CLI metadata WHEN they are asserted THEN
    `full`, `compact_startup`, and `skip` come from the contract authority or validation tied to
    that authority, not from an unconnected duplicate list.
  - GIVEN a capability has no compact-startup exception WHEN required-read metadata is resolved
    THEN the default future rule is `full` and the obligation names `instructions.md` as the required
    instruction file.
- number: 2

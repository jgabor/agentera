header:
  level: full
  created: 2026-05-15
  status: complete
  reviewed: 2026-05-15
  critic_issues: 10 found, 10 addressed, 0 dismissed
  title: D47 App-Home Vocabulary Cleanup
what: >-
  Audit repository surfaces for obsolete `bundle` terminology and legacy
  artifact-label wording after the D47 app-home migration, then update only
  places where old wording describes current live behavior. The cleanup target
  includes `scripts/`, `hooks/`, `skills/agentera/`, tests, README/UPGRADE/docs,
  registry/package/runtime surfaces, and Agentera-facing guidance.
why: >-
  D47 changed Agentera's install model to a durable app home with managed app
  files under `AGENTERA_HOME/app`. Stale bundle-root vocabulary in current CLI,
  runtime, docs, tests, and guidance surfaces makes installation state harder for
  agents and users to reason about and increases future migration risk.
constraints: >-
  Preserve D47 semantics: `AGENTERA_HOME` is the durable app home, managed app
  files live under `AGENTERA_HOME/app`, user data remains under the app home,
  `agentera doctor` stays read-only, and `agentera upgrade` owns idempotent
  migration writes. Do not rewrite historical decision records or changelog text
  solely to remove old wording. Do not rename canonical artifact IDs, filenames,
  schema names, CLI selectors, JSON fields, persisted metadata keys, or stable
  API fields unless a compatibility review explicitly permits it. Preserve D43,
  D45, and D46 route/CLI/handoff boundaries. Do not publish, push, tag, refresh
  installed apps/profile, edit vision state, or edit objective state.
scope:
  included:
    - >-
      Search current repository text for `bundle`, `bundled`, `bundle-root`,
      `bundle_root`, `bundle root`, `install root`, and legacy labels such as
      `DECISIONS.md`, `DOCS.md`, `PLAN.md`, and `PROGRESS.md` where used as
      canonical current labels.
    - >-
      Classify each relevant occurrence as `replace`, `preserve`, or `defer`
      with path, term, rationale, and action.
    - >-
      Replace current-behavior wording with app-home vocabulary such as
      `app home`, `managed app`, `app refresh`, and `user data root`.
    - >-
      Update focused tests, fixtures, docs, or contract checks only where stale
      wording can regress current D47 behavior.
    - >-
      Sync local closeout metadata after verification without claiming D47
      user-confirmed satisfaction.
  excluded:
    - D48 CLI namespace work such as `agentera validate`, `agentera smoke`, or `agentera usage`.
    - Redesigning or renaming canonical artifact names, filenames, schema IDs, or CLI selectors.
    - User-confirming D47 satisfaction without explicit user confirmation.
    - Publication, tagging, pushing, installed-app refresh, or profile refresh.
  deferred:
    - >-
      Deeper collector validation or metadata drift guard work unless a changed
      D47 surface or focused test directly requires it.
    - >-
      Broad cleanup of unrelated historical wording in archived decisions,
      changelog entries, or legacy migration examples.
design: >-
  Treat this as a bounded vocabulary and contract cleanup, not a repository-wide
  rewrite. Start with a concrete inventory table so every replacement and every
  preserved old term has an auditable reason. Default to changing labels,
  descriptions, help text, docs, tests, and fixtures that describe current live
  behavior. Default to preserving compatibility-facing keys and historical text.
  Verification should combine focused app-home behavior tests with a targeted
  terminology audit proving that remaining old terms are intentional.
tasks:
  - number: 1
    name: Terminology inventory and classification
    depends_on: []
    status: complete
    evidence:
      - >-
        Created `docs/d47-app-home-vocabulary-inventory.md` and exposed it with
        `.gitignore` exception `!docs/d47-app-home-vocabulary-inventory.md`.
        Independent evaluation now passes all Task 1 criteria: required terms
        and surfaces are classified across scripts, hooks, skills, tests,
        root/docs, package/runtime manifests, `.opencode`, `.agentera/**`, and
        archives; the table has the required columns; compatibility identifiers
        are preserved by default; historical, changelog, migration, and archive
        records remain preserved.
    acceptance:
      - >-
        GIVEN repository text is searched in `scripts/`, `hooks/`,
        `skills/agentera/`, tests, README/UPGRADE/docs, registry/package/runtime
        surfaces, and Agentera-facing guidance WHEN matches for `bundle`,
        `bundled`, `bundle-root`, `bundle_root`, `bundle root`, `install root`,
        `DECISIONS.md`, `DOCS.md`, `PLAN.md`, and `PROGRESS.md` are reviewed THEN
        each relevant occurrence is classified as `replace`, `preserve`, or
        `defer`.
      - >-
        GIVEN a relevant occurrence is classified WHEN the inventory is complete
        THEN the executor has a table with path, matched term, classification,
        rationale, and planned action available in the final closeout summary or
        a committed artifact.
      - >-
        GIVEN a key, flag, JSON field, schema field, fixture key, persisted
        metadata key, filename, artifact ID, or CLI selector contains old wording
        WHEN classified THEN compatibility is checked before any rename and the
        default action is to preserve the identifier while updating surrounding
        labels or descriptions.
      - >-
        GIVEN D47 wording appears in historical decisions, changelog entries, or
        explicit legacy-migration examples WHEN classified THEN the wording is
        not rewritten solely for vocabulary consistency.
  - number: 2
    name: Live app-home vocabulary updates
    depends_on: [1]
    status: complete
    evidence:
      - >-
        Updated live app-home vocabulary across current docs, capability prose,
        setup/smoke diagnostics, adapter docs, lifecycle validation wording,
        package description text, and private package-entry helper names while
        preserving compatibility contracts, canonical artifact labels, CLI
        selectors, route/handoff boundaries, historical records, and migration
        examples. Independent evaluation passed all Task 2 acceptance criteria.
        Verification evidence included `git diff --check`, focused setup/smoke,
        runtime, packaged CLI, app-home contract, setup-copilot, and package
        registry pytest suites, lifecycle adapter validation, and validation for
        edited capabilities. The OpenCode bootstrap smoke still has an unrelated
        pre-existing environment propagation assertion failure outside the edited
        diagnostic wording.
    acceptance:
      - >-
        GIVEN an occurrence is classified `replace` WHEN updated THEN
        user-facing or live internal wording uses app-home vocabulary such as
        `app home`, `managed app`, `app refresh`, and `user data root` instead of
        obsolete bundle-root wording.
      - >-
        GIVEN legacy migration behavior is documented or exercised WHEN wording
        changes THEN it remains clear that `agentera doctor` is read-only and
        `agentera upgrade` owns migration writes.
      - >-
        GIVEN canonical artifact labels or legacy labels are touched WHEN wording
        changes THEN only explanatory prose is updated unless the name is purely
        display text; canonical artifact IDs, filenames, schema names, and CLI
        selectors are not renamed.
      - >-
        GIVEN route, CLI, or capability handoff examples are touched WHEN updates
        are made THEN D43, D45, and D46 boundaries remain intact, including glyph
        plus canonical capability labels where required.
  - number: 3
    name: Regression and validation coverage
    depends_on: [2]
    status: complete
    evidence:
      - >-
        Focused regression and validation coverage passed after updating the
        affected install-root characterization expectation to the new `Agentera
        directory` wording. Verification covered app-home contract behavior,
        doctor/upgrade behavior, package/runtime surfaces, affected textual
        fixtures, targeted stale-terminology audit, lifecycle adapter metadata,
        CLI describe metadata, schema self-validation, edited capability
        validation, PLAN and SESSION artifact validation, and `git diff --check`.
        The focused verification suite reported 346 passing tests. Remaining
        caveats are non-blocking: the known OpenCode bootstrap environment
        propagation assertion and the known Planera full-plan lint verbosity
        advisory.
    acceptance:
      - >-
        GIVEN changed code, tests, docs, or fixtures are in place WHEN focused
        verification runs THEN selected tests cover app-home contract behavior,
        `doctor`/`upgrade` behavior, package/runtime surfaces, and affected
        textual fixtures, or the closeout explains why a category was not touched.
      - >-
        GIVEN stale terminology is intentionally preserved WHEN a targeted
        terminology audit is reviewed THEN every remaining relevant occurrence
        has a `preserve` or `defer` rationale from Task 1.
      - >-
        GIVEN version, package, plugin, registry, or runtime metadata files are
        changed WHEN metadata drift checks are relevant THEN the selected checks
        prove those surfaces remain aligned; otherwise drift-guard work is
        recorded as deferred with no code changes.
      - >-
        GIVEN capability prose, schemas, or Agentera artifacts are changed WHEN
        validation runs THEN affected capability validation, schema validation,
        artifact validation, and `git diff --check` pass.
  - number: 4
    name: Local metadata closeout
    depends_on: [1, 2, 3]
    status: complete
    evidence:
      - >-
        Task 4 local metadata closeout updated TODO, CHANGELOG, DOCS audit
        metadata, PROGRESS, and this plan evidence to record the D47 app-home
        vocabulary cleanup. Evidence recorded from completed work: Task 1
        independent evaluation passed for inventory coverage, required columns,
        compatibility preservation, and historical/migration/archive preservation;
        Task 2 independent evaluation passed for live app-home vocabulary updates
        while preserving compatibility contracts, canonical artifact labels, CLI
        selectors, route/handoff boundaries, historical records, and migration
        examples; Task 3 focused verification covered app-home contract behavior,
        doctor/upgrade behavior, package/runtime surfaces, affected textual
        fixtures, targeted stale-terminology audit, lifecycle adapter metadata,
        CLI describe metadata, schema self-validation, edited capability
        validation, PLAN and SESSION artifact validation, and `git diff --check`,
        with 346 passing tests. Task 4 closeout validation passed with `uv run
        hooks/validate_artifact.py --artifact TODO.md --file TODO.md --format
        json` (status=pass), `uv run hooks/validate_artifact.py --artifact
        CHANGELOG.md --file CHANGELOG.md --format json` (status=pass), `uv run
        hooks/validate_artifact.py --artifact DOCS.md --file .agentera/docs.yaml
        --format json` (status=pass), `uv run hooks/validate_artifact.py
        --artifact PROGRESS.md --file .agentera/progress.yaml --format json`
        (status=pass), `uv run hooks/validate_artifact.py --artifact PLAN.md
        --file .agentera/plan.yaml --format json` (status=pass), and `git diff
        --check` (PASS). Orkestrera evaluation passed Task 4 acceptance criteria,
        and closeout did not touch `.agentera/decisions.yaml`, claim
        user-confirmed D47 satisfaction, or record publication, push, tag,
        installed-app refresh, profile refresh, vision edit, objective edit,
        package update, version bump, or unsupported capability-name CLI command.
    acceptance:
      - >-
        GIVEN verification passes WHEN metadata is synced THEN TODO, progress,
        changelog, docs audit metadata, and plan state record the D47 vocabulary
        cleanup and exact verification evidence.
      - >-
        GIVEN D47 remains only provisionally satisfied WHEN decisions metadata is
        touched THEN user-confirmed satisfaction is not claimed and the decision
        satisfaction state is left unchanged unless the user explicitly confirms
        it.
      - >-
        GIVEN closeout completes WHEN scope is audited THEN no publication, push,
        tag, installed-app refresh, profile refresh, vision edit, objective edit,
        or unsupported capability-name CLI command occurred.
overall_acceptance:
  - >-
    GIVEN a user or agent reads current CLI, docs, runtime, or guidance surfaces
    WHEN they describe Agentera installation state THEN they see app-home
    vocabulary rather than obsolete bundle-root wording except in explicit
    legacy or historical contexts.
  - >-
    GIVEN D47 migration behavior is exercised or documented WHEN reviewed THEN
    managed app files, user data roots, `agentera doctor`, and `agentera upgrade`
    responsibilities remain truthful.
  - >-
    GIVEN preserved old terminology remains WHEN the cleanup is complete THEN
    each relevant occurrence has a documented compatibility, legacy, historical,
    or deferred-work rationale.
  - >-
    GIVEN verification runs WHEN the plan closes THEN focused tests, affected
    validators, targeted terminology audit, and `git diff --check` pass.
surprises:

overall_acceptance: >
  The split-brain root cause is fixed: a v3 CLI running from a local
  checkout reads repo v3 schemas, capabilities, and contracts even when
  AGENTERA_HOME points at a v2 installed app. The $PROFILERA_PROFILE_DIR
  env-var fallback resolves profile paths correctly during the migration
  window. Schema-version validation warns when v2 schemas are loaded.
  The capability-startup readiness signal is computed, not hardcoded.
  A post-migration prime smoke test catches profile-misreport regressions.
  All new tests pass; typecheck, build, validate, and compact are green.

design: >
  The plugin source is the authority. Prior commits already rewired the
  hook handlers off `uv run` onto the npx v3 entrypoint (8cb5d02c),
  renamed the profile-dir env var to the v3 canonical name with a
  one-time deprecation bridge (0c0559e0), and added the doctor check that
  warns on the deprecated env var (7196e1b8). B4 therefore has two
  verify-and-lock tasks (#7, #24), one verify-and-regression task (#36),
  one true fix (#8: replace v2 probes that match a v3 app only by
  coincidence with v3 managed_bundle_evidence recognition), and one new
  health-check task (#38: a persistent doctor scan of the installed
  plugin source for an unmigrated profile-dir schema literal, mirroring
  the one-time upgrade rewire textUsesProfileraProfileDir as a recurring
  check). Each task carries Given/When/Then acceptance so orkestrera can
  drive implementation against verifiable criteria and so the rewire
  cannot silently regress during the v3 cutover.
tasks:
  - number: 1
    name: Verify OpenCode hooks route through v3 npm entrypoint with no v2-script fallback (#7)
    depends_on: []
    status: pending
    acceptance:
      - 'GIVEN .opencode/plugins/agentera.js source WHEN scanned THEN it contains no `uv run`, `uvx`, or Python managed-entrypoint calls (hooks/validate_artifact.py, scripts/agentera via uv) in any hook handler (runNpxHook, validateArtifact, validateArtifactCandidate, writeSessionBookmark, buildCompactionContext)'
      - 'GIVEN the four hook handlers plus buildCompactionContext WHEN inspected THEN every CLI invocation routes through the npx v3 entrypoint constant (NPX_CLI_ENTRYPOINT = "npx -y agentera@next"), not a v2 managed script'
      - 'GIVEN a v2 managed app whose scripts/ dir is absent or non-runnable WHEN the plugin runs a hook THEN it still routes through the npx v3 entrypoint (no silent fallback to a v2 Python script); the entrypoint does not depend on a v2 script being present'
      - 'GIVEN a new regression test asserting the plugin source has no uv-run/Python-managed-entrypoint hook calls and that runNpxHook builds an npx command WHEN run THEN it passes'
      - 'GIVEN the existing hook-behavior tests WHEN run THEN they still pass (no regression in artifact validation, session bookmark, compaction context)'
  - number: 2
    name: Replace vestigial v2 probes in isRunnableAgenteraAppRoot/resolveAgenteraHome with v3 bundle-evidence recognition (#8)
    depends_on: []
    status: pending
    acceptance:
      - 'GIVEN isRunnableAgenteraAppRoot (.opencode/plugins/agentera.js:446) currently probing scripts/agentera OR scripts/validate_capability.py WHEN a v3 npm-bundled app home is inspected THEN it recognizes the app via v3 managed_bundle_evidence (registry.json and skills/agentera/SKILL.md and (.agentera-bundle.json OR scripts/agentera)), not via the v2 Python-script probe matching by coincidence'
      - 'GIVEN resolveAgenteraHome (line 459) and resolveAgenteraAppHome (line 455) WHEN run against a real v3 npm install (AGENTERA_HOME/app or default platform home) THEN they return the validated v3 app home, not null'
      - 'GIVEN the shell.env handler (line 718) WHEN initialAgenteraAppHome resolves for a real v3 npm install THEN it injects the validated v3 app home into AGENTERA_HOME for child processes'
      - 'GIVEN a v2 managed app whose app code still ships scripts/agentera WHEN isRunnableAgenteraAppRoot inspects it THEN it is still recognized (existing v2 path preserved)'
      - 'GIVEN a directory lacking v3 bundle evidence and lacking v2 scripts WHEN isRunnableAgenteraAppRoot inspects it THEN it returns false (reject_unmanaged_directory, not a false positive)'
      - 'GIVEN a new regression test exercising resolveAgenteraHome against a v3-bundle-evidence fixture and a non-agentera directory WHEN run THEN it passes'
  - number: 3
    name: Verify setProfileDir uses v3 canonical AGENTERA_PROFILE_DIR name (#24)
    depends_on: []
    status: pending
    acceptance:
      - 'GIVEN setProfileDir (.opencode/plugins/agentera.js:654) WHEN AGENTERA_PROFILE_DIR is already set THEN it is respected (canonical v3 name wins, no overwrite)'
      - 'GIVEN setProfileDir WHEN only the legacy PROFILERA_PROFILE_DIR is set THEN it adopts its value into AGENTERA_PROFILE_DIR and emits the one-time deprecation warning directing the user to `agentera upgrade`, and does not write a process-wide PROFILERA_PROFILE_DIR that did not previously exist'
      - 'GIVEN setProfileDir WHEN neither env var is set THEN it seeds AGENTERA_PROFILE_DIR from the platform data-home default (darwin/win32/linux), using the v3 canonical name'
      - 'GIVEN the profileraDeprecation guard WHEN setProfileDir runs multiple times in one process THEN the deprecation warning fires at most once'
      - 'GIVEN the existing setProfileDir.test.ts and a new precedence regression test (canonical-wins, legacy-adopted, default-seeded) WHEN run THEN they pass'
      - 'GIVEN the future PROFILERA_PROFILE_DIR fallback removal WHEN scoped THEN it is confirmed tracked as a separate v3.0.0-stable chore in TODO.md, explicitly out of B4 scope'
  - number: 4
    name: Verify doctor OpenCode profile-dir check catches deprecated env var (#36)
    depends_on: []
    status: pending
    acceptance:
      - 'GIVEN diagnoseOpencodeProfileDir (packages/cli/src/setup/doctor/opencode.ts:266) WHEN PROFILERA_PROFILE_DIR is set in the environment THEN the doctor emits a deprecated/warn finding whose message directs the user to `agentera upgrade` to migrate to AGENTERA_PROFILE_DIR'
      - 'GIVEN diagnoseOpencodeProfileDir WHEN only AGENTERA_PROFILE_DIR is set (or neither) THEN the doctor emits a pass/current finding (no false deprecation)'
      - 'GIVEN the doctor check name WHEN inspected in doctor output and packages/cli/test/setup/doctor.test.ts THEN it is the profile_dir_deprecated check (stable identity, not a transient label)'
      - 'GIVEN a new regression test covering both the deprecated-env-var warn path and the canonical pass path WHEN run THEN it passes without regressing the existing doctor suite'
  - number: 5
    name: Add persistent doctor check that catches the profile-dir schema-literal breakage (#38)
    depends_on:
      - '4'
    status: pending
    acceptance:
      - 'GIVEN the installed .opencode/plugins/agentera.js source WHEN the doctor scans it for an unmigrated profile-dir schema literal THEN it finds a breakage iff the source sets or reads PROFILERA_PROFILE_DIR without also seeding/respecting the canonical AGENTERA_PROFILE_DIR (deterministic predicate, not a brittle substring)'
      - 'GIVEN a migrated plugin source (setProfileDir follows the #24 canonical-wins contract) WHEN the doctor scan runs THEN the check passes (no false positive)'
      - 'GIVEN an unmigrated plugin source that only references PROFILERA_PROFILE_DIR WHEN the doctor scan runs THEN the check reports a deprecated/finding status directing the user to `agentera upgrade` (mirrors the one-time upgrade rewire textUsesProfileraProfileVar as a recurring health check)'
      - 'GIVEN the env-var-name literal relied on by the check WHEN feasible THEN it is sourced from a schema-derived/shared constant rather than a second hardcoded copy, so doctor source stays decoupled from the env-var schema name; if a shared constant is impractical, the literal is documented as the single doctor-owned copy'
      - 'GIVEN a new regression test with fixtures for both migrated and unmigrated plugin source WHEN run THEN it passes, and the existing doctor suite is not regressed'
  - number: 6
    name: Build, typecheck, test, validate, and compact
    depends_on:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
    status: pending
    acceptance:
      - 'GIVEN pnpm -C packages/cli run typecheck WHEN run THEN it succeeds with no type errors'
      - 'GIVEN pnpm -C packages/cli build WHEN run THEN it succeeds'
      - 'GIVEN pnpm -C packages/cli test WHEN run THEN all tests pass including the new #7/#8/#38 regression tests and the updated #24/#36 tests'
      - 'GIVEN node packages/cli/dist/bin/agentera.js check validate capability-contract --format json WHEN run THEN it passes'
      - 'GIVEN node packages/cli/dist/bin/agentera.js check compact WHEN run THEN no budget regression'
overall_acceptance: >
  All five defects (#7, #8, #24, #36, #38) are resolved. OpenCode hooks
  route through the v3 npm entrypoint (npx -y agentera@next) when v2
  scripts are absent, with no residual uv-run/Python-managed-entrypoint
  fallback in the plugin (#7). App-home resolution recognizes a v3
  npm-bundled app via v3 bundle evidence, not via v2 probes matching by
  coincidence (#8). setProfileDir uses the v3 canonical
  AGENTERA_PROFILE_DIR name; the legacy PROFILERA_PROFILE_DIR is only a
  one-time migration bridge whose full removal is tracked as a separate
  v3.0.0-stable chore (#24). The doctor catches the deprecated env var
  (#36) AND catches the schema-literal breakage in the installed plugin
  source as a recurring health check (#38). All typecheck, build, test,
  validate, and compact gates are green. The plan stays in the active
  slot, status active, for ⎈ orkestrera execution.
surprises: >
  The defects doc docs/notes/v2-v3-coexistence-defects.md referenced by
  prior B-batch plans is not present in this worktree; the brief directed
  using actual plugin/CLI source as ground truth. Investigation confirmed
  #7, #24, and #36 are already largely fixed by prior commits (8cb5d02c,
  0c0559e0, 7196e1b8), so those tasks are verify-and-lock rather than
  net-new fixes. isRunnableAgenteraAppRoot (#8) currently matches a v3
  npm install only by coincidence because the installed app still ships
  scripts/agentera and scripts/validate_capability.py; the v2 probe works
  today but is the real residual to fix so a future v3 layout change does
  not silently break app-home resolution. The active plan YAML schema has
  no collapsed_defects field (it is a render-time section in the archived
  .md, as in B3), so the collapsed defect list is folded into the why
  field above.

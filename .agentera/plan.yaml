header:
  level: light
  created: 2026-05-17
  status: complete
  title: Helper Script Classification Policy
what: >-
  Make `agentera` the documented and tested entry point for user-facing helper
  workflows, while classifying direct helper scripts as private support modules,
  backward-compatible maintainer seams, or explicit local-only analysis surfaces.
why: >-
  The remaining 2.5.x helper cleanup should not remove useful direct helpers, but
  it must stop presenting them as the default path for normal users and agents.
  A documented classification policy lets future cleanup keep public CLI workflows
  stable without hiding legitimate maintainer/debug seams.
constraints: >-
  Retain direct script compatibility for validate, verify, usage, lint, doctor,
  upgrade, setup, smoke, eval, migration, and compaction seams where tests or
  maintainer workflows need them. Keep internal registry/support modules private.
  Keep corpus generation internal behind `agentera stats refresh`. Do not refresh
  installed apps/profiles, publish, push, tag, change package-manager state, edit
  `.agentera/vision.yaml`, mutate objective state, or change decision satisfaction
  state.
tasks:
  - number: 1
    name: Document helper-script classification policy
    depends_on: []
    status: complete
    acceptance:
      - >-
        GIVEN README maintainer guidance is inspected WHEN helper scripts are
        discussed THEN it classifies canonical `agentera` namespaces, direct
        maintainer seams, internal support modules, corpus generation, and local-only
        analysis/generator surfaces.
      - >-
        GIVEN corpus generation is documented WHEN policy text is inspected THEN it
        says normal users route through `agentera stats refresh`, not a top-level
        `agentera corpus` command.
    evidence: >-
      README now includes a Helper Script Classification Policy that classifies
      user-facing `agentera` workflows, backward-compatible maintainer seams,
      internal support modules, corpus generation behind `agentera stats refresh`,
      and maintainer-only local analysis/generator surfaces.
  - number: 2
    name: Make documented checks prefer `agentera` namespaces
    depends_on:
      - 1
    status: complete
    acceptance:
      - >-
        GIVEN README and upgrade validation examples are inspected WHEN user-facing
        validation/check commands are shown THEN they use `uv run scripts/agentera`
        namespaces first.
      - >-
        GIVEN AGENTS.md validation guidance is inspected WHEN agents add/modify
        capabilities THEN it points at canonical `agentera validate` commands while
        preserving direct helper compatibility as implementation detail.
    evidence: >-
      README maintainer checks, UPGRADE validation guidance, AGENTS.md, and
      `skills/agentera/SKILL.md` now use `uv run scripts/agentera validate ...`
      examples for validation instead of direct capability validator commands.
  - number: 3
    name: Add regression coverage and close artifacts
    depends_on:
      - 1
      - 2
    status: complete
    acceptance:
      - >-
        GIVEN docs regressions are tested WHEN the helper policy changes THEN tests
        assert the policy, canonical examples, and no-corpus boundary stay present.
      - >-
        GIVEN TODO, changelog, docs, progress, and plan artifacts are inspected WHEN
        the batch is complete THEN all remaining 2.5.x helper-script TODOs are
        resolved and only 3.0.0 work remains open.
    evidence: >-
      `uv run pytest tests/test_helper_script_policy.py tests/test_validate_namespace.py
      tests/test_usage_namespace.py -q` passed with 25 tests, covering policy text,
      canonical validation examples, preserved stats boundary, validate wrappers, and
      stats/usage compatibility.
overall_acceptance:
  - >-
    User-facing documentation routes through `agentera` namespaces first.
  - >-
    Direct helper scripts remain available only as documented maintainer,
    backward-compatible, internal, generator, or local-analysis seams.
  - >-
    The remaining 2.5.x TODOs are closed without changing runtime config,
    package-manager state, version files, or protected artifacts.
surprises: []
previous_plan_archived: .agentera/archive/PLAN-2026-05-17-stats-privacy-and-consent-workflow.yaml

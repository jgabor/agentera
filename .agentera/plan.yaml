header:
  level: full
  created: 2026-05-16
  status: complete
  reviewed: 2026-05-16
  critic_issues: 5 found, 5 addressed, 0 dismissed
  title: Decision Source Contract Raw-Read Reduction Plan
what: >-
  Reduce avoidable raw `.agentera/decisions.yaml` reads after `agentera decisions
  --format json` by making the DECISIONS.md source contract unambiguous for
  normal deliberation, compacted history, missing full-detail fields, filtered
  results, satisfaction-review caveats, and raw-read exceptions.
why: >-
  TODO.md records benchmark pressure for DECISIONS.md raw reads after CLI state
  (`2 reads`, `24 redundant tokens`). The current decision source contract already
  says raw decision artifact reads are not required for normal deliberation, but
  `complete_for_decision_context` becomes false when compacted or incomplete entries
  are returned. That mixes full-detail completeness with normal-use sufficiency and
  can lead agents to reread `.agentera/decisions.yaml` defensively even though the
  CLI exposes compacted/missing context boundaries and caveats.
constraints: >-
  Do not mutate `.agentera/decisions.yaml` or decision satisfaction state. Do not
  infer missing decision context from feeds_into, commits, downstream files, generated
  references, compacted history, or benchmark evidence. Do not expand archived
  compacted decisions, change compaction policy, add new CLI commands, add
  capability-name commands, refresh installed apps or profiles, publish, push, tag,
  edit vision or objective state, change package-manager state, or solve the separate
  AGENTERA_ARTIFACTS raw-read TODO. Raw decision artifact reads remain valid only for
  explicit artifact corruption/CLI defect investigation and for Resonera-owned decision
  writes/repairs that require the persisted artifact.
scope:
  included:
    - Benchmark and artifact-boundary review for the DECISIONS.md raw-after-CLI TODO.
    - Source-contract truth table separating full-detail completeness from normal deliberation sufficiency.
    - Bounded `agentera decisions --format json` source-contract fields for compacted, missing, filtered, satisfaction-review, and missing-artifact cases.
    - Focused regression tests and smallest feasible benchmark/measurement evidence.
    - Guidance alignment for DECISIONS.md consumers that are implicated by benchmark evidence or tell agents to raw-read decisions for normal context after CLI state.
    - Mapped artifact closeout and semver-gated version metadata only if policy requires it.
  excluded:
    - Raw `.agentera/decisions.yaml` mutation or satisfaction-state changes.
    - Rehydrating compacted archive decisions or reconstructing missing historical context.
    - Broad artifact-discovery redesign for AGENTERA_ARTIFACTS.
    - Adding `agentera resonera`, `agentera planera`, or any other capability-name CLI command.
    - Installed app/profile refresh, publication, remote push, tags, package-manager updates, vision edits, or objective-state edits.
  deferred:
    - Broader artifact path discovery through `agentera describe` or hej composite output.
    - Decision satisfaction review resolution that requires user confirmation.
    - Other capability-specific raw/prose-read hot spots not tied to DECISIONS.md normal context.
design: >-
  Keep `agentera decisions --format json` as the single normal read model for decision
  context. Preserve existing fields where compatible, but add clearer machine-readable
  semantics so agents can distinguish "not full historical detail" from "raw read
  needed." Normal deliberation should key off a new explicit sufficiency signal rather
  than the legacy full-detail completeness flag. Missing or compacted context is carried
  forward as structured caveats, not repaired by raw reads or inference.
tasks:
  - number: 1
    name: Benchmark and artifact boundary
    depends_on: []
    status: complete
    acceptance:
      - >-
        GIVEN the TODO cites DECISIONS.md raw reads after CLI WHEN benchmark evidence is
        inspected THEN the exact retained report/window or historical limitation is named.
      - >-
        GIVEN DECISIONS.md is a canonical artifact label WHEN raw-read pressure is scoped
        THEN the plan maps it to `.agentera/decisions.yaml` through CLI/docs artifact
        mapping rather than assuming a root Markdown file.
      - >-
        GIVEN read sources can be classified WHEN implementation scope is chosen THEN
        avoidable normal-context reads are separated from legitimate decision writes,
        artifact repair, CLI-defect investigation, validation, and benchmark analysis.
    evidence:
      - >-
        Historical benchmark row in `/home/jgabor/.local/share/agentera/benchmarks/startup-state/runs.jsonl`
        generated at `2026-05-15T15:42:10+00:00` reported
        `raw_artifact_access_after_cli_counts.DECISIONS.md=2`,
        `redundant_raw_artifact_access_counts.DECISIONS.md=1`, and
        `estimated_redundant_raw_tokens_by_artifact.DECISIONS.md=24` with action
        `targeted_capability_guidance_fixes`.
      - >-
        Current `.agentera/docs.yaml` maps canonical `DECISIONS.md` to
        `.agentera/decisions.yaml`; implementation did not assume a root Markdown
        artifact and did not mutate `.agentera/decisions.yaml`.
      - >-
        Latest benchmark after implementation no longer reproduces DECISIONS.md raw reads;
        scope therefore targets historical normal-context ambiguity while preserving raw
        decision artifact access for Resonera writes/repairs, corruption diagnostics, CLI
        defect investigation, validation, and benchmark analysis.
  - number: 2
    name: Source-contract truth table
    depends_on:
      - 1
    status: complete
    acceptance:
      - >-
        GIVEN current `_decision_source_contract` and tests are reviewed WHEN new semantics
        are specified THEN the plan records a truth table for full-detail entries,
        compacted archive entries, missing full-detail fields, satisfaction-review entries,
        filtered no-match results, and missing/unavailable artifacts.
      - >-
        GIVEN compacted or incomplete decisions are returned WHEN normal deliberation uses
        the JSON output THEN the truth table marks full detail as false, normal-use
        sufficiency as true with caveats, and raw reads as false.
      - >-
        GIVEN the artifact is missing or the CLI reports unavailable/defective state WHEN
        normal decision context is requested THEN the truth table marks normal-use sufficiency
        false and points to fallback/diagnostic boundaries instead of inference.
      - >-
        GIVEN existing compatibility fields remain WHEN new fields are designed THEN agents
        are told to key normal use off `complete_for_normal_deliberation_context`, not the
        legacy `complete_for_decision_context` full-detail signal.
    evidence:
      - >-
        `_decision_source_contract` now exposes `decision_context_truth_table` with separate
        cases for full-detail entries, compacted archive entries, entries with missing full-detail
        fields, satisfaction-review-needed entries, filtered no-match results, and missing or
        unavailable artifacts.
      - >-
        The truth table marks compacted, missing-field, and satisfaction-review cases as not
        full-detail complete but complete for normal deliberation with caveats and no raw read;
        missing or unavailable artifact state is not normal-deliberation complete and points to
        fallback/diagnostic boundaries.
      - >-
        New `normal_deliberation_context` guidance tells agents to key normal use off
        `complete_for_normal_deliberation_context`, not the legacy `complete_for_decision_context`
        full-detail signal.
  - number: 3
    name: Bounded decision source-contract clarity
    depends_on:
      - 2
    status: complete
    acceptance:
      - >-
        GIVEN `agentera decisions --format json` returns source_contract WHEN implementation
        completes THEN it exposes distinct boundaries for `missing_full_detail_boundary`,
        `missing_artifact_boundary`, `filtered_result_boundary`, `satisfaction_review_boundary`,
        and `compacted_history_boundary`.
      - >-
        GIVEN returned entries are compacted or have missing full-detail fields WHEN source
        contract is inspected THEN `raw_artifact_reads_required=false` and normal-use
        sufficiency remains explicit without claiming full historical detail.
      - >-
        GIVEN satisfaction review is needed WHEN decision context is emitted THEN the contract
        preserves the non-inference policy and tells agents to carry review pressure forward
        rather than claiming user-confirmed satisfaction.
      - >-
        GIVEN filtered results are empty WHEN source_contract is emitted THEN the contract
        distinguishes "no matching returned decisions" from missing artifact state.
    evidence:
      - >-
        `agentera decisions --format json` source_contract now includes
        `complete_for_returned_full_detail`, `complete_for_normal_deliberation_context`,
        `normal_deliberation_context`, `missing_full_detail_boundary`,
        `missing_artifact_boundary`, `filtered_result_boundary`, `satisfaction_review_boundary`,
        `compacted_history_boundary`, `raw_artifact_access_boundary`, and `fallback_policy`.
      - >-
        Direct `uv run scripts/agentera decisions --format json --fields source_contract`
        showed the active repo has full-detail completeness false due compacted/missing entries,
        normal deliberation completeness true, 40 compacted entries, 4 satisfaction-review entries,
        raw reads not required, and explicit carry-forward caveats.
      - >-
        The contract preserves satisfaction non-inference and separates filtered no-match results
        from missing artifact state without expanding compacted decisions or changing satisfaction.
  - number: 4
    name: Regression and measurement evidence
    depends_on:
      - 3
    status: complete
    acceptance:
      - >-
        GIVEN focused tests run WHEN full-detail, compacted, missing-field, satisfaction-review,
        filtered no-match, and missing-artifact cases are exercised THEN each case asserts the
        correct full-detail, normal-use, and raw-read semantics.
      - >-
        GIVEN downstream caveats are emitted WHEN entries are compacted or incomplete THEN
        tests assert `missing_fields`, `compacted`, `caveats`, and satisfaction-review pressure
        remain available for planning/orchestration/handoff context.
      - >-
        GIVEN performance evidence is required WHEN verification runs THEN the smallest
        available startup benchmark or focused proxy is run; if the original historical count
        is no longer reproduced, the exact limitation and current result are recorded.
      - >-
        GIVEN runtime coverage is degraded WHEN benchmark results are summarized THEN degraded
        runtimes are separated from product behavior.
    evidence:
      - >-
        Focused tests passed for full-detail decisions, compacted decisions, missing-field
        decisions, satisfaction-review decisions, filtered no-match, missing artifact boundary,
        Orkestrera compacted-decision caveat preservation, Decision 45 reference contract, and
        DECISIONS.md consumer guidance.
      - >-
        Full `uv run pytest tests/test_query_cli.py -q` passed with 191 tests; guidance/reference
        tests passed with 62 tests.
      - >-
        `mage bench:startupState` reran after implementation and latest report generated at
        `2026-05-16T02:16:13+00:00` showed `raw_artifact_access_after_cli_counts={}`,
        `redundant_raw_artifact_access_counts={}`, `total_raw_artifact_access_after_cli=0`,
        `total_redundant_raw_artifact_accesses=0`, implementation recommended false, and
        degraded claude-code/github-copilot runtime coverage separated from product behavior.
  - number: 5
    name: DECISIONS.md consumer guidance alignment
    depends_on:
      - 4
    status: complete
    acceptance:
      - >-
        GIVEN Task 1 identifies any specific redundant-read source WHEN guidance is edited
        THEN every identified source is updated to use returned decisions, source_contract,
        and caveats before any raw decision artifact read.
      - >-
        GIVEN capability prose and dispatcher guidance mention DECISIONS.md reads WHEN audit
        runs THEN wording that tells agents to read raw decisions for normal context after CLI
        state is replaced or bounded by CLI-first source-contract guidance.
      - >-
        GIVEN compacted or incomplete decisions are returned WHEN downstream capabilities plan,
        orchestrate, audit, document, optimize, or hand off work THEN guidance preserves
        `missing_fields`, `compacted`, `caveats`, and satisfaction-review pressure rather than
        treating compacted decisions as complete.
      - >-
        GIVEN Resonera writes decisions WHEN guidance is changed THEN raw artifact access for
        decision writes/repairs remains explicitly allowed under Resonera ownership.
    evidence:
      - >-
        Updated `skills/agentera/SKILL.md` and DECISIONS.md consumers in Planera, Realisera,
        Inspektera, Dokumentera, Visionera, Optimera, Orkestrera, Resonera, and Profilera to use
        `agentera decisions --format json` for normal decision context and preserve
        `missing_fields`, `compacted`, `caveats`, and `satisfaction.review_needed` pressure.
      - >-
        Resonera guidance preserves raw decision artifact access for explicit artifact repair,
        corruption work, unavailable/defective CLI state, and Resonera-owned writes/repairs.
      - >-
        Guidance changes did not add any capability-name CLI command and did not touch unrelated
        AGENTERA_ARTIFACTS discovery behavior.
  - number: 6
    name: Plan artifact and policy-gated closeout
    depends_on:
      - 1
      - 2
      - 3
      - 4
      - 5
    status: complete
    acceptance:
      - >-
        GIVEN this plan is created WHEN Planera exits THEN `.agentera/plan.yaml` is active,
        has exactly six pending tasks, records full review/self-audit evidence, and sets
        `previous_plan_archived` to the archived completed Planera Prose Re-Read Reduction Plan.
      - >-
        GIVEN closeout begins WHEN artifacts are edited THEN artifact mappings are queried

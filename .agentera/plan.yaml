overall_acceptance: >
  Channel resolution is centralized: doctor and project_integration
  agree on the same channel. retryCommand derives from the invoking CLI
  runtime, not the v2 managed script shebang. expectedVersion is
  channel-aware: a correct v2 stable install is not falsely flagged.
  crossMajorBoundary separates "detected" from "announced" so the
  false-coalesce no longer suppresses cross-major awareness.
  dryRunCommand/applyCommand is not a dead end when crossMajorPending
  is true. Guidance text uses the resolved channel name, not a hardcoded
  "stable." All tests pass; typecheck, build, validate, and compact green.

  title: 2.3.13 Decision Satisfaction Tracking
what: >-
  Implement Decision 53 so decisions carry durable satisfaction state, CLI
  consumers can see whether the intended outcome is still open, provisionally
  satisfied, or user-confirmed satisfied, and compaction, audit, and closeout
  workflows cannot hide unresolved decisions.
why: >-
  Agentera compounds only when intent survives implementation. Downstream
  references and compacted summaries do not prove satisfaction; the user chose
  decision-entry-owned satisfaction state, with automation limited to provisional
  evidence and final satisfaction owned by the user.
constraints: >-
  Preserve CLI-first state access and truthful source contracts. Do not infer
  satisfaction from feeds_into, commits, or file changes. Do not let automation
  user-confirm satisfaction. Preserve legacy decisions without silently marking
  them satisfied. Do not edit vision/objective state, publish, push, tag, refresh
  installed apps/profile, or introduce unsupported capability-name CLI commands.
scope:
  included:
    - Decision schema and validation contract for satisfaction state, authority, legacy review, and compaction protection.
    - Decisions CLI JSON satisfaction output, canonical-path metadata, completeness, caveats, and fallback policy.
    - Shared compaction behavior used by CLI, hooks, and artifact validation paths.
    - Inspektera health-audit and Dokumentera release-closeout review-pressure surfaces.
    - Capability prose and schema guidance for provisional evidence, user confirmation, and caveat preservation.
    - Focused regression tests, artifact validation, compaction check, gate, and local metadata sync.
  excluded:
    - Automatic user confirmation of satisfaction.
    - Satisfaction inferred solely from feeds_into, downstream files, commits, or generated references.
    - Reconstructing compacted historical decisions from git history.
    - Changing Decision 53, vision state, objective state, or unsupported CLI route surfaces.
    - Publication, tagging, pushing, installed-app refresh, or profile refresh.
  deferred:
    - A broader decision lifecycle UI beyond CLI JSON and existing state contexts.
    - Bulk user-review tooling for all historical decisions unless protected overflow makes it required.
    - Cross-project migration tooling outside this repository.
previous_plan_archived: .agentera/archive/PLAN-2026-05-15-2-3-12-realisera-execution-context-source-contract.yaml
design: >-
  Treat satisfaction as first-class decision state. The canonical model is
  satisfaction.state = open, provisionally_satisfied, or
  user_confirmed_satisfied; missing legacy state is a derived review-needed
  condition, not a fourth satisfied state. Provisional satisfaction carries
  evidence. User-confirmed satisfaction carries explicit user-confirmation
  metadata. Compaction may compact only entries safe under that state model;
  protected overflow produces review pressure and a non-success gate/check result
  instead of silently compacting or dropping protected context. Health audit and
  release closeout consume the same decision context so stale protected decisions
  are visible before work is considered healthy or release-ready.
tasks:
  - number: 1
    name: Satisfaction contract and legacy semantics
    depends_on: []
    status: complete
    acceptance:
      - >-
        GIVEN Decision 53 and the current decisions schema WHEN the contract is
        updated THEN it defines the satisfaction states, provisional evidence
        requirement, user-confirmation authority, review-needed derivation, and
        stale-review trigger.
      - >-
        GIVEN an active legacy decision lacks satisfaction state WHEN it is read
        or validated THEN it remains valid but is surfaced as review-needed
        rather than silently satisfied.
      - >-
        GIVEN a legacy compacted archive entry lacks satisfaction state WHEN
        compaction would drop it THEN compaction reports user review required
        instead of silently deleting it.
      - >-
        GIVEN malformed satisfaction data or user-confirmed satisfaction without
        user-confirmation metadata WHEN validation runs THEN the artifact reports
        an error.
  - number: 2
    name: Decisions CLI satisfaction source contract
    depends_on: [1]
    status: complete
    acceptance:
      - >-
        GIVEN decisions have open, provisional, confirmed, or missing satisfaction
        state WHEN agentera decisions --format json runs THEN each entry exposes
        satisfaction state, existing evidence or confirmation metadata,
        review-needed flags, and non-inferential caveats.
      - >-
        GIVEN a downstream reference exists without satisfaction state WHEN
        decisions JSON is returned THEN the entry does not report user-confirmed
        satisfaction.
      - >-
        GIVEN filtered or compacted entries are returned WHEN source_contract is
        emitted THEN included fields, completeness, fallback policy, canonical
        artifact label, and concrete path truthfully describe satisfaction context.
  - number: 3
    name: Shared compaction protection and review pressure
    depends_on: [1, 2]
    status: complete
    acceptance:
      - >-
        GIVEN an active decision is open, provisionally satisfied, or
        review-needed WHEN any shared compaction caller evaluates DECISIONS THEN
        that decision is not compacted or dropped.
      - >-
        GIVEN protected entries make the normal 10/40/50 budget impossible WHEN
        compaction check or gate runs THEN output reports protected-overflow
        review pressure and returns a non-success result without mutating
        protected entries.
      - >-
        GIVEN a user-confirmed satisfied decision is compacted WHEN it enters
        archive THEN its compacted entry preserves satisfaction state and remains
        visible through decisions JSON.
  - number: 4
    name: Health audit and release closeout review surfaces
    depends_on: [2, 3]
    status: complete
    acceptance:
      - >-
        GIVEN a protected decision is stale because it would be compacted or
        dropped under 10/40/50, or because its review date has elapsed, WHEN
        Inspektera evidence context is generated THEN decision review pressure
        appears as attributed residual risk or caveat.
      - >-
        GIVEN stale protected decisions exist WHEN Dokumentera closeout context is
        generated THEN release closeout surfaces them as review-required blockers
        or caveats before local metadata is considered complete.
      - >-
        GIVEN no stale protected decisions exist WHEN those contexts are generated
        THEN they do not fabricate decision review warnings.
  - number: 5
    name: Capability guidance and authority boundaries
    depends_on: [1, 2, 3, 4]
    status: complete
    acceptance:
      - >-
        GIVEN agents produce or update decision-related artifacts WHEN capability
        prose and schemas are read THEN they state that agents may mark
        provisional satisfaction with evidence but may not user-confirm satisfaction.
      - >-
        GIVEN compaction, audit, closeout, orchestration, or execution sees
        decision caveats WHEN capability guidance applies THEN caveats are
        preserved rather than reconstructed or hidden.
      - >-
        GIVEN capability validation runs WHEN guidance changes are complete THEN
        context-first, fallback-before-raw, and satisfaction-caveat preservation
        rules are declared without overstating machine enforcement.
  - number: 6
    name: Focused regression coverage and gates
    depends_on: [2, 3, 4, 5]
    status: complete
    acceptance:
      - >-
        GIVEN focused tests run WHEN implementation is complete THEN they cover
        satisfaction schema validation, decisions JSON output, non-inference from
        downstream references, protected compaction, archive retention,
        health-audit review pressure, and closeout review pressure.
      - >-
        GIVEN existing compacted-decision and source-contract tests run WHEN

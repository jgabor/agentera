        appear in runtime fallback guidance, source contracts, or prose startup instructions.
      - >-
        GIVEN Decision 45 and field-selection tests run WHEN implementation is
        complete THEN `execution_context` is represented in the structured hej
        envelope for Realisera and unsupported fields still fail without partial stdout.
    evidence:
      - >-
        `tests/test_query_cli.py` covers plan-driven Realisera execution context,

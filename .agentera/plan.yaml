    - 'packages/cli/src/upgrade/runtimeMigration.ts — widen rewireProfileraEnvVar to update installed-app artifact path mappings and schema literals (#14)'
    - 'packages/cli/src/ — resolvers that read XDG_DATA_HOME without tilde expansion — unify with installRoot.ts expansion (#16)'

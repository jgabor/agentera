    name: Reconcile Plan State And Registry Scope
    depends_on: []
    status: complete
    acceptance:
      - GIVEN the routing and exit vocabulary plan is complete WHEN this plan becomes active THEN the completed plan is archived with cycle 327 validation evidence intact
      - GIVEN TODO has multiple open findings WHEN the next item is selected THEN [arch-artifact-registry] is identified as the planned work and unrelated TODOs remain open
      - GIVEN registry planning starts WHEN scope is recorded THEN artifact write validation, health freshness, live smoke, install-root, package/runtime, version, release, vision, objective, commit, and push changes are explicitly out of scope
      - GIVEN CLI behavior is in scope only as a consumer concern WHEN baseline is recorded THEN current outputs for hej, todo, docs, query --list-artifacts, and a representative query command are preserved unless a later task records an intentional difference
  - number: 2
    name: Characterize Artifact Registry Duplication
    depends_on:
      - Task 1
    status: complete
    acceptance:
      - GIVEN current artifact metadata surfaces are inspected WHEN duplication is inventoried THEN repeated names, paths, producers, consumers, display names, and special-case rules are recorded before edits
      - GIVEN .agentera/docs.yaml is inspected WHEN mapping data is classified THEN runtime project overrides are separated from canonical registry facts
      - GIVEN scripts/agentera and scripts/validate_cross_capability.py are inspected WHEN consumers are characterized THEN each consumer of canonical artifact identity or path metadata is named with its observable behavior boundary
      - GIVEN PROFILE.md, PLAN_archive, harness paths, objective paths, and global/local artifacts exist WHEN special cases are classified THEN each is described as an explicit registry case or scoped path template, not a validator exception
  - number: 3
    name: Define Registry Interface And Identity Model
    depends_on:
      - Task 2
    status: complete
    acceptance:
      - GIVEN canonical artifact schemas carry metadata WHEN the registry Interface is defined THEN artifact ID, display name, default path, producer, consumer, artifact type, scope, and path-template facts have one authoritative source
      - GIVEN docs.yaml may override project-local paths WHEN precedence is defined THEN the registry owns known artifact identity and defaults while docs.yaml cannot create canonical IDs or own producers, consumers, scope, or type
      - GIVEN capability-local schemas need local meaning WHEN their reference shape is specified THEN canonical identity is expressed by artifact ID and local usage role while role-specific descriptions remain optional
      - GIVEN special cases are modeled WHEN registry metadata is reviewed THEN PROFILE.md, PLAN_archive, harness paths, objective paths, and global/local artifacts are represented without name-specific validator exceptions
  - number: 4
    name: Validate Registry Contract In Isolation
    depends_on:
      - Task 3
    status: complete
    acceptance:
      - GIVEN registry fields are defined WHEN focused validation runs THEN canonical IDs, display names, paths, producers, consumers, scope, type, and override semantics validate before capability migration
      - GIVEN hardcoded maps are tempting WHEN tests are added THEN tests import or load registry facts rather than duplicating expected artifact maps
      - GIVEN capability artifact references will change WHEN the contract is checked THEN invalid artifact IDs, missing local roles, and unsupported special-case shapes fail clearly
      - GIVEN docs.yaml remains runtime state WHEN contract validation runs THEN docs mapping overrides are accepted only as project-local mapping data, not as canonical registry definitions
  - number: 5
    name: Migrate Capability Artifact Schemas To References
    depends_on:
      - Task 4
    status: complete
    acceptance:
      - GIVEN capability artifacts.yaml files repeat canonical names and paths WHEN they are migrated THEN each canonical artifact use references an artifact ID and local produces/consumes role instead
      - GIVEN local descriptions add capability intent WHEN schemas are migrated THEN useful local usage descriptions are preserved without restating canonical paths or producers/consumers
      - GIVEN special-case artifacts are used by capabilities WHEN schemas are migrated THEN they reference explicit registry entries or scoped templates instead of relying on validator exceptions
      - GIVEN old and new schema shapes are compared WHEN migration completes THEN no broad compatibility layer remains unless a concrete persisted or external consumer requires it
  - number: 6
    name: Migrate Registry Consumers
    depends_on:
      - Task 5
    status: complete
    acceptance:
      - GIVEN cross-capability validation runs WHEN artifact relationships are checked THEN names, paths, producers, consumers, and special cases come from registry facts rather than hardcoded translation or exception maps
      - GIVEN scripts/agentera reads canonical artifact metadata WHEN bounded CLI consumers are updated THEN hej, todo, docs, query --list-artifacts, and one representative query command preserve baseline output except for intentional documented formatting-neutral differences
      - GIVEN docs.yaml supplies runtime mapping overrides WHEN consumers resolve project-local paths THEN override precedence is applied after canonical registry identity is known
      - GIVEN hardcoded artifact display/path/producer/consumer maps remain outside runtime docs override loading WHEN validation checks for duplication THEN the remaining duplication is removed or explicitly justified by an artifact contract
  - number: 7
    name: Replace Tests And Align Artifacts
    depends_on:
      - Task 6
    status: complete
    acceptance:
      - GIVEN registry-backed validation exists WHEN tests assert artifact relationships THEN they derive expected relationships from registry facts instead of re-encoding display-name or path maps
      - GIVEN PROFILE.md, PLAN_archive, harness paths, objective paths, and global/local artifacts are special cases WHEN tests run THEN validators fail if those names are special-cased directly outside the registry model
      - GIVEN documentation is updated WHEN ownership is described THEN only artifact metadata ownership, registry fields, capability-local references, and docs.yaml override semantics are changed
      - GIVEN TODO is updated WHEN implementation is complete THEN only [arch-artifact-registry] is resolved and only after validation and CLI preservation evidence are recorded in progress or plan artifacts
  - number: 8
    name: Validate And Close
    depends_on:
      - Task 7
    status: complete
    acceptance:
      - GIVEN focused validation runs WHEN the plan closes THEN registry tests, cross-capability validation, capability validation, docs CLI, TODO CLI, and bounded CLI preservation checks pass
      - GIVEN broader validation is practical WHEN closure is attempted THEN full pytest, all capability validations, artifact query, and relevant py_compile checks pass or any skipped check is justified
      - GIVEN future work remains WHEN this plan closes THEN artifact write validation, health freshness, optional live smoke, and generated install-root follow-up remain separate TODOs
      - GIVEN worktree changes are reviewed WHEN validation ends THEN only artifact registry plan changes are present or unrelated changes are reported without reverting
overall_acceptance:
  - GIVEN artifact identity is needed by a validator, test, capability schema, docs consumer, or bounded CLI consumer WHEN it asks for artifact metadata THEN canonical artifact schemas and the registry Interface are the source of truth for IDs, display names, default paths, producers, consumers, scope, type, and explicit special cases
  - GIVEN a capability declares artifact usage WHEN its artifacts.yaml is inspected THEN canonical artifact identity is expressed by artifact ID plus local usage role rather than repeated canonical paths, display names, producers, or consumers
  - GIVEN docs.yaml is inspected after the refactor WHEN path mappings are interpreted THEN it remains project runtime mapping/override state and does not own canonical artifact IDs, producers, consumers, scope, or type
  - GIVEN validators, tests, and bounded CLI consumers are inspected WHEN artifact translation knowledge is searched THEN display/path/producer/consumer maps are absent outside the registry model and runtime docs override loading unless explicitly justified by an artifact contract
  - GIVEN unrelated TODOs are inspected WHEN this plan closes THEN artifact write validation, health freshness, optional live smoke, and generated install-root follow-up remain untouched unless separately planned

overall_acceptance: >-
  GIVEN a project TODO.md whose Degraded, Normal, or Annoying bands
  are header-only (no `- Placeholder`, no `- [type]` items) WHEN
  users run `agentera state todo --format json` or trigger the
  PostToolUse validate-artifact hook THEN the validator returns
  exit 0 and zero violations, while a header-only Critical band
  still produces a named violation. GIVEN a TODO.md whose Critical
  band is followed immediately by another band heading with no body
  (the Critical-body-collapse scenario) WHEN the boundary test runs
  THEN a violation names '⇶ Critical', locking in the 20f3837
  off-by-one fix. The plan ships on feat/v3 only; no main-branch
  backport is required because the Python `hooks/validate_artifact.py`
  has no equivalent validator. All eight ACs (AC-1..AC-8 from the
  planera spec) hold on the implementation commit, and the open
  TODO at TODO.md line 14 closes with the standard ledger form.


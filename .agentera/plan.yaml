  title: v2/v3 coexistence B3 — bundle-status & channel resolution
what: >
  Fix the bundle-status and channel-resolution defects that produce
  contradictory prime output when a v3 CLI runs against a v2 installed
  app. Centralize channel resolution so doctor and project_integration
  agree. Fix retryCommand to derive from the invoking CLI runtime, not
  the v2 managed script shebang. Make expectedVersion channel-aware so
  a correct v2 stable install is not falsely flagged as version_mismatch.
  Separate crossMajorBoundary "detected" from "announced" semantics so
  the false-coalesce does not suppress cross-major awareness. Fix the
  dryRunCommand/applyCommand dead end when crossMajorPending is true.
  Replace hardcoded "stable channel" guidance text with the resolved
  channel name.
why: >
  B1 and B2 fixed the split-brain root cause and env-var resolution.
  But prime still emits contradictory bundle-status guidance: the doctor
  path resolves stable channel while project_integration resolves
  development channel, producing "manual_review_needed" with no command
  in one block and "upgrade" with a command in the other. retryCommand
  tells the user to run the v2 Python CLI. expectedVersion always
  reflects the v3 source registry, falsely flagging every v2 stable
  install as a version mismatch. See
  docs/notes/v2-v3-coexistence-defects.md batch plan, batch B3.
constraints: >
  All work on feat/v3 only. Do not touch .agentera/vision.yaml or
  objective state. Do not rewire the OpenCode plugin (B4:
  .opencode/plugins/agentera.js). Do not fix repo hook npm tags (B5).
  Do not refresh installed-app content on upgrade (B6). Do not touch
  the channel resolution for npx bundle path (isNpxBundleRoot) — only
  fix the doctor/project_integration divergence and the derived fields.
  Preserve the resolveInvokedUpdateChannel override logic for v3 source
  (cliDistributionMajor >= 3 forces development when no explicit channel
  is set). Do not change the crossMajorBoundary detection logic itself,
  only the semantic separation of detected vs announced. Do not modify
  the Cursor v3 skip condition.
scope:
  included:
    - 'packages/cli/src/cli/commands/prime/bundleStatus.ts — fix retryCommand, expectedVersion, dryRunCommand/applyCommand, crossMajorBoundary consumption'
    - 'packages/cli/src/cli/commands/prime/collectOrientationState.ts — centralize channel resolution per prime invocation'
    - 'packages/cli/src/upgrade/channels.ts — resolveInvokedUpdateChannel is the single source of truth (no change to override logic, but call sites updated)'
    - 'packages/cli/src/upgrade/doctor.ts — route buildDoctorStatus through resolveInvokedUpdateChannel instead of resolveUpdateChannel'
    - 'packages/cli/src/upgrade/projectIntegration.ts — align crossMajorBoundary consumption to "detected" not "announced"'
    - 'packages/cli/test/ — test coverage for channel resolution consistency, retryCommand runtime, expectedVersion channel-awareness'
  excluded:
    - 'OpenCode plugin rewire (B4): .opencode/plugins/agentera.js'
    - 'Repo hook npm tag consistency (B5): hooks/hooks.json, .cursor/hooks.json, .github/hooks/'
    - 'Installed-app content refresh on upgrade (B6): SKILL.md, protocol.yaml content'
    - 'v2 residue cleanup (B7): Swedish-verb agent files, CAPABILITY_NAMES hardcode'
    - '.agentera/vision.yaml, objective state'
  deferred:
    - 'OpenCode plugin resolveAgenteraHome v3 detection (B4: #8)'
    - 'OpenCode plugin setProfileDir using deprecated env var (B4: #24)'
    - 'v2 Python upgrade has no v3 migration awareness (B7: #32)'
design: >
  The central fix is to route all channel resolution through
  resolveInvokedUpdateChannel once per prime invocation, so doctor and
  project_integration see the same channel. This unblocks T2 (retryCommand
  can derive the runtime from the channel, not the managed script),
  T3 (expectedVersion can look up the version for the resolved channel,
  not the source registry), and T6 (guidance text uses the resolved
  channel name). T4 is an independent fix to the crossMajorBoundary
  semantic: "detected" (the app is on a different major) vs "announced"
  (the user has been told). project_integration consumes "detected" but
  the current field conflates both. T5 depends on T4: once the semantic
  is separated, the dryRunCommand/applyCommand fields can either provide
  a real command or point to the project_integration recommendation
  rather than nulling both fields while the approval text says "approve."
  Test coverage proves the consistency and closes the contradiction.
tasks:
  - number: 1
    name: Centralize channel resolution through resolveInvokedUpdateChannel
    depends_on: []
    status: complete
    acceptance:
      - 'GIVEN buildDoctorStatus running in a v3 source CLI with no explicit channel set WHEN it resolves the channel THEN it uses resolveInvokedUpdateChannel (which forces development for cliDistributionMajor >= 3), not resolveUpdateChannel (which defaults to stable)'
      - 'GIVEN prime --format json running from a v3 source CLI WHEN doctor and project_integration blocks are inspected THEN both report the same channel (no contradiction)'
      - 'GIVEN prime --format json running with an explicit channel set (AGENTERA_CHANNEL or flag) WHEN doctor and project_integration blocks are inspected THEN both use the explicit channel'
      - 'GIVEN prime --format json running from a v2 stable CLI (cliDistributionMajor < 3) WHEN doctor resolves the channel THEN it defaults to stable (existing behavior preserved)'
      - 'GIVEN the existing resolveInvokedUpdateChannel override logic WHEN inspected THEN it is unchanged (cliDistributionMajor >= 3 forces development when no explicit channel is set)'
  - number: 2
    name: Fix retryCommand to derive from invoking CLI runtime
    depends_on: []
    status: complete
    acceptance:
      - 'GIVEN buildRetryCommandFromEvidence running in a v3 Node CLI against a v2 installed app WHEN it derives retryCommand THEN it produces an npx/node command (npx -y agentera@next prime or node <cli-path> prime), not a uv run command'
      - 'GIVEN buildRetryCommandFromEvidence running in a v3 Node CLI WHEN it identifies the invoking runtime THEN it inspects process.argv0 or process.env.AGENTERA_CLI_RUNTIME, not the managed script shebang'
      - 'GIVEN buildRetryCommandFromEvidence running against a v3 npx bundle WHEN it derives retryCommand THEN it produces npx -y agentera prime (not uv run)'
      - 'GIVEN buildRetryCommandFromEvidence running against a v2 app from a v2 CLI WHEN it derives retryCommand THEN it still produces the uv run command (existing behavior preserved for v2)'
      - 'GIVEN the doctor.ts:139 comment claiming npx/node form WHEN the retryCommand is inspected THEN the output matches the comment (no contradiction between code and comment)'
  - number: 3
    name: Make expectedVersion channel-aware
    depends_on: []
    status: complete
    acceptance:
      - 'GIVEN expectedVersion computed for a stable channel app WHEN the app bundles a v2 stable registry THEN expectedVersion reflects the installed app bundled registry version (2.x), not the v3 source registry version (3.x)'
      - 'GIVEN expectedVersion computed for a development channel app WHEN the source registry is v3 THEN expectedVersion reflects the source registry version (3.x)'
      - 'GIVEN a correct v2 stable install inspected by a v3 CLI WHEN expectedVersion is compared to the installed version THEN they match (no false version_mismatch)'
      - 'GIVEN expectedVersion computed WHEN the channel is unknown or default THEN it falls back to the source registry version (existing behavior for the default case)'
  - number: 4
    name: Separate crossMajorBoundary detected vs announced semantics
    depends_on: []
    status: complete
    acceptance:
      - 'GIVEN crossMajorBoundary currently meaning "detected AND announced" WHEN project_integration consumes it THEN it uses "detected" (the app is on a different major than the CLI), not the combined field'
      - 'GIVEN the false ?? X short-circuit that forces cross-major false downstream WHEN the crossMajorBoundary field is restructured THEN the short-circuit no longer suppresses cross-major awareness'
      - 'GIVEN crossMajorBoundary computed WHEN the app major differs from the CLI major THEN the "detected" flag is true regardless of whether the user has been "announced" to'
      - 'GIVEN project_integration recommendation WHEN crossMajorBoundary is detected THEN the recommendation still proceeds (not suppressed by the announced flag)'
      - 'GIVEN the existing detection logic for cross-major boundary WHEN inspected THEN it is unchanged (only the semantic separation is fixed, not the detection itself)'
  - number: 5

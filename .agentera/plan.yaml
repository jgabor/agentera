        GIVEN text output changes WHEN code is edited THEN the change is limited to doctor rendering and
        helper wording or compatibility mapping needed to classify up-to-date, outdated, repair-needed,
        migration-needed, manual-review, optional, update, repair, and blocked next actions.
      - >-
        GIVEN JSON consumers depend on doctor fields WHEN implementation is complete THEN the plan either

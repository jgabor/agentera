    [post-audit-flagged] Pre-write `agentera lint --artifact PLAN.md` on the
    draft passed abstraction and filler checks, but reported `verbosity mismatch:
    125 words exceeds 100 budget`; this is the known full-plan advisory budget
    mismatch, not an abstraction failure.

header:
  level: full
  created: 2026-05-25
  status: active
  reviewed: 2026-05-25
  critic_issues: "1 found, 1 addressed, 0 dismissed"
  revised: >-
    Critic noted missing explicit reconciliation with completed D59 prime work and
    Decision 45 routine-state alias policy; added design notes and migration task

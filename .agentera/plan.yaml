  title: v2/v3 coexistence B6 — Installed-app content refresh on upgrade
what: >
  Close the installed-app content refresh defect batch. B1 closed the
  runtime split-brain so a v3 CLI running from a local checkout reads v3
  repo sources (skills/, references/, registry.json, compiled capability
  instructions). B6 closes the complementary installed-app surface: when
  an existing v2 user upgrades to v3, the managed app home must ship v3
  content, not the v2 SKILL.md/protocol.yaml/contract/artifact-schemas/
  hooks bundle that the v3 CLI would otherwise read out of AGENTERA_HOME.
  The defects doc (docs/notes/v2-v3-coexistence-defects.md batch B6) is
  triage; the repo source and the upgrade/copy mechanisms are ground
  truth. Investigation on feat/v3-b6 confirms several source-level defects
  (#4 Swedish routing names, #13 contract instructions.ts + English
  ROUTE_ALIASES, #28 protocol.yaml English SKILL_GLYPHS/PHASES, #43
  instructions.md dead weight in copy-bundle.mjs) are already remediated
  in the repo by D65/D70 and B1-B5. B6 therefore verifies those fixes,
  adds the missing installed-app refresh step so upgrades carry the v3
  content into the app home, and adds regression coverage so the v2/v3
  content boundary cannot silently regress during the v3 cutover window.
why: >
  B1 (split-brain root cause) is COMPLETE and unblocks B6; sibling batches
  B2-B5 are independent and complete. The v3 CLI is only truthful when
  AGENTERA_HOME points at a v3 app: a user upgrading from v2 still has a
  v2 managed app bundle, and the v3 CLI's appContext activeAppModel() will
  read v2 SKILL.md, Swedish protocol.yaml, an instructions.md contract,
  and v2 hooks from that bundle unless the upgrade refreshes the app
  home to v3 content. #4 (critical) is the headline: a v2 SKILL.md routes
  Swedish capability names the v3 CLI rejects, producing routing failures
  after a v2->v3 upgrade that prime reports as healthy. #11 is the
  false-green tax: `check validate` reads repo v3 schemas while the
  runtime reads app v2 schemas, so validation cannot catch a coexistence
  drift. #12/#13/#28 are the v2 data residues (Swedish producer/consumer,
  instructions.md contract, Swedish SKILL_GLYPHS/PHASES) that propagate
  into ArtifactRecord and routing until the installed bundle is refreshed.
  #34 is the npmParityMatrix oracle git-pin drift footgun. #35 is the
  installed v2 hooks bundle (uv run hooks/*.py) that the upgrade must
  retire in favor of v3 hook commands. #43 is 60+ kB of instructions.md
  dead weight that copy-bundle.mjs already excludes (D65) but no guard
  locks. Collapsed defects: #4, #11, #12, #13, #28, #34, #35, #43.
constraints: >
  All work on feat/v3-b6-installed-app-content-refresh (forked from
  feat/v3). B1 is COMPLETE; B6 may start. Do NOT depend on B2, B3, B4,
  B5, or B7 — they are independent sibling batches. Do not touch
  .agentera/vision.yaml or objective state. Do not change the npx channel
  pin (npx -y agentera@next) or derive NPX_CLI_ENTRYPOINT from app home —
  this batch is about app-home content, not channel resolution. Do not
  reintroduce instructions.md as an on-disk per-capability file: D65 is
  firm and copy-bundle.mjs must keep excluding it from the bundle. Do not
  remove the PROFILERA_PROFILE_DIR alias fallback (separate v3.0.0-stable
  chore, TODO.md). Do not auto-update the Python parity oracle from TS —
  rebase_oracle.sh only re-pins the python_commit; the Python CLI is the
  parity reference. Author ONLY — do not implement, do not mark tasks
  complete, do not archive; leave the plan in the active slot with all
  task statuses pending. Each task ends `` — pending`` until orkestrera
  drives it.

      - >-
        GIVEN final verification runs WHEN the plan is ready for handoff THEN focused tests,
        mapped artifact validators, compaction check or fix, and `git diff --check` pass.
    evidence:
      - >-
        This plan archived `.agentera/archive/PLAN-2026-05-16-planera-prose-re-read-reduction.yaml`,
        started active with exactly six pending tasks and review/self-audit evidence, then was
        completed after implementation and verification.
      - >-
        Closeout queried artifact mappings with `uv run scripts/agentera query --list-artifacts
        --format json`; mapped source-of-truth artifacts updated are PLAN, TODO, CHANGELOG, DOCS,
        and PROGRESS, plus semver-policy version-bearing package/plugin/registry/skill surfaces.
      - >-
        `.agentera/docs.yaml` semver policy maps `feat` to `minor`, so version metadata was
        aligned from 2.9.0 to 2.10.0 for this DECISIONS.md source-contract feature.
overall_acceptance:
  - >-
    GIVEN decisions JSON includes compacted or incomplete entries WHEN an agent needs normal
    deliberation context THEN it can proceed from returned structured fields and caveats without
    raw `.agentera/decisions.yaml` reads or inference.
  - >-
    GIVEN full historical detail is unavailable WHEN the source contract reports normal-use
    sufficiency THEN the contract still clearly marks full-detail completeness false and carries
    missing/compacted/satisfaction caveats forward.
  - >-
    GIVEN raw decision artifact access is considered WHEN the plan completes THEN it remains
    restricted to decision writes, artifact repair/corruption diagnostics, or CLI defects, not
    normal post-CLI context recovery.
  - >-
    GIVEN the separate AGENTERA_ARTIFACTS TODO remains open WHEN this work is implemented THEN
    artifact-path discovery redesign is not bundled into this DECISIONS.md contract change.
surprises:
  - >-
    Adversarial review found five issues and all were addressed: the contract needs an explicit
    truth table; missing fields, missing artifacts, filtered results, satisfaction review, and
    compacted history require separate boundaries; guidance alignment must audit all DECISIONS.md
    consumers implicated by benchmark evidence or raw-read wording; downstream handoffs must
    preserve caveats instead of treating compacted decisions as complete; and the plan artifact
    itself must explicitly validate archive linkage, active status, six pending tasks, review,
    and self-audit evidence.

        capability.
      - >-
        GIVEN token counts are measured WHEN the check runs THEN it uses
        `<output> | npx tiktoken-cli -m gpt-5` or a documented equivalent wrapper
        around that command.
      - >-
        GIVEN a payload exceeds its budget WHEN tests run THEN the failure names
        the capability, byte count, token count, and budget.
      - >-
        GIVEN no `npx` network is available in normal unit tests WHEN regression
        coverage runs THEN the expensive tokenizer path is isolated or skipped
        with a clear local benchmark command.
    evidence:

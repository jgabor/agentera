  title: v2/v3 coexistence B1 — split-brain root cause
what: >
  Fix the root cause of the v2/v3 coexistence defect surface: when
  AGENTERA_HOME is set (standard for v2 users), the v3 CLI's
  activeAppModel() skips the local-checkout shortcut and resolves skillRoot
  to the installed v2 app, while resolveSourceRoot() resolves to the v3
  repo. This split-brain makes the v3 CLI read v2-vintage schemas, Swedish
  capability names, and v2 env-var literals. Also adds the
  PROFILERA_PROFILE_DIR env-var fallback, schema-version validation,
  accurate capability-startup readiness signaling, and a post-migration
  smoke test.
why: >
  This single fix collapses ~9 defects and makes the validator truthful.
  Without it, every prime/status/state/schema path and prime --context
  reads v2 schemas while check validate reads v3 repo schemas — a
  false-green that lets production bugs ship. See
  docs/notes/v2-v3-coexistence-defects.md batch plan.
constraints: >
  All work on feat/v3 only. Do not touch .agentera/vision.yaml or objective
  state. Do not break the npx-bundle path (isNpxBundleRoot) or the
  installed-managed-app path (isInstalledManagedApp). Do not change how
  appHome resolves from AGENTERA_HOME for user-data purposes (PROFILE.md,
  sessions, history). Only fix skillRoot/schema/capability/contract
  resolution. Preserve the AGENTERA_HOME > AGENTERA_DEFAULT_INSTALL_ROOT >
  default precedence for appHome. Do not modify the Cursor v3 skip
  condition. Do not rewire the OpenCode plugin (B4). Do not fix
  channel/bundle-status resolution (B3).
scope:
  included:
    - 'packages/cli/src/cli/appContext.ts — fix activeAppModel() local-checkout guard'
    - 'packages/cli/src/registries/artifactRegistry.ts — add $PROFILERA_PROFILE_DIR/ fallback and schema-version validation'
    - 'packages/cli/src/cli/startupCompletenessContract.ts — derive missing_state from actual schema-error/profile state'
    - 'scripts/sandbox/assert-v2v3-migration.sh — add post-migration prime smoke test'
    - 'packages/cli/test/ — add split-brain and env-var-fallback test coverage'
  excluded:
    - 'OpenCode plugin rewire (B4): .opencode/plugins/agentera.js'
    - 'Channel/bundle-status fixes (B3): doctor.ts, projectIntegration.ts, channels.ts'
    - 'Installed-app content refresh on upgrade (B6)'
    - 'v2 residue cleanup (B7)'
    - '.agentera/vision.yaml, objective state'
  deferred:
    - 'Env-var precedence-level restoration for USAGE/corpus/profile resolvers (B2: #14)'
    - 'docs.yaml schema-doc $PROFILERA_PROFILE_DIR correction (B2: #21)'
    - 'XDG_DATA_HOME tilde expansion divergence (B2: #16)'
design: >
  Three independent fix axes converge on the same root cause. First, fix
  activeAppModel() to prefer the local v3 checkout for skillRoot/schema
  resolution when sourceRoot is a local checkout, even when AGENTERA_HOME
  is set — but keep appHome resolving from AGENTERA_HOME so user data is
  unaffected. Second, add the $PROFILERA_PROFILE_DIR/ prefix as a fallback
  alias in resolveArtifactPath during the v2/v3 migration window. Third,
  add defense-in-depth: schema-version validation warns when v2-vintage
  schemas are loaded, and the capability-startup readiness signal is
  computed from actual schema-error/profile state rather than hardcoded.
  A post-migration smoke test and split-brain test coverage close the test
  gaps that let these defects ship green. Verification of collapsed defects
  confirms the root fix resolves the schema-content drift without separate
  remediation.

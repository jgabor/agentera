header:
  level: full
  created: "2026-06-22"
  status: complete
  reviewed: "2026-06-22"
  critic_issues: "4 found, 4 addressed, 0 dismissed"
  title: "v2→v3 cutover stability — critical issue remediation"
what: >
  Fix the three critical cutover-stability issues discovered during the
  stabilization sweep: the corrupted managed app script write path that
  crashes the shim under Node, the prime/upgrade messaging conflict where
  prime recommends an upgrade that upgrade hard-blocks, and prime suggesting
  the wrong npm channel (@latest instead of @next) on feat/v3 checkouts.
why: >
  These three issues together make the v2→v3 cutover path appear broken to
  users and agents: running the suggested upgrade command crashes with a
  ReferenceError, prime's guidance contradicts upgrade's gate, and the
  suggested command would install the wrong major version. Fixing them is a
  prerequisite for a seamless v3 transition.
constraints: >
  All work on feat/v3 only. Do not modify the major-boundary gate semantics
  (isStableSuccessorAnnounced) — that is a separate degraded issue. Do not
  change the update-channels.yaml announced flag — v3 is not yet announced.
  Do not modify the shim package (packages/cli/shim/) — the shim's
  shebang validation gap is a separate degraded issue. Fixes must not break
  existing vitest tests. Explicit user channel choice (--channel flag or
  AGENTERA_UPDATE_CHANNEL env) must take precedence over any derived
  default.
scope:
  included:
    - "Managed app script write path in packages/cli/src/upgrade/ (what writes app/scripts/agentera)"
    - "Prime pending runtime detection in packages/cli/src/upgrade/projectIntegration.ts"
    - "Prime next_action reason text in packages/cli/src/cli/commands/prime/collectOrientationState.ts"
    - "Channel resolution for repo checkouts in packages/cli/src/upgrade/channels.ts"
    - "Regression tests for all three fixes"
  excluded:
    - "isStableSuccessorAnnounced channel-awareness (degraded TODO item)"
    - "Shim isRunnableFile shebang validation (degraded TODO item)"
    - "Doctor version_mismatch signal suppression (degraded TODO item)"
    - "Doctor runtime validation of managed script (degraded TODO item)"
    - "update-channels.yaml announced flag flip"
    - "packages/cli/shim/ changes"
  deferred: []
design: >
  Task 1 traced the corrupted script to a test leak in
  projectIntegrationWording.test.ts where platformDefaultAppHome read
  process.env.XDG_DATA_HOME instead of the temp home parameter, writing
  stub scripts with Node shebangs and Python content to the real app home.
  Fixed the test helper, shebang mismatches in stubs, and added a shared
  managedAppStub helper with integrity tests. Task 2 added a
  major_boundary_block field to ProjectIntegrationSummary and an early
  return in summarizeProjectIntegration when crossMajorBoundaryApplies
  and successor is unannounced, surfacing the block reason in next_action
  instead of recommending an upgrade that will fail. Task 3 made
  resolveInvokedUpdateChannel derive the channel from cliDistributionMajor
  >= 3 for repo checkouts, so feat/v3 checkouts suggest @next instead of
  @latest, with explicit user channel choices taking precedence.
tasks:
  - number: 1
    name: "Fix corrupted managed app script write path"
    depends_on: []
    status: complete
    acceptance:
      - "GIVEN a v3 CLI upgrade or cleanup operation WHEN it writes to $AGENTERA_HOME/app/scripts/agentera THEN the file has valid content with a shebang matching its runtime (Python PEP 723 or Node JS, not mixed)"
      - "GIVEN an existing valid managed app script WHEN a v3 CLI operation runs THEN the script is not truncated or corrupted"
      - "GIVEN the managed app script after any v3 CLI operation WHEN executed with its declared runtime THEN it does not crash with a shebang/runtime mismatch error (e.g., ReferenceError: sub is not defined)"
      - "Test proportionality: one pass (valid write preserves shebang + content) + one fail (operation does not write a Node shebang to a Python script)"
  - number: 2
    name: "Fix prime/upgrade messaging conflict"
    depends_on: []
    status: complete
    acceptance:
      - "GIVEN a v2 managed app with unannounced v3 successor WHEN prime runs THEN prime's next_action surfaces the major-boundary block reason rather than suggesting an upgrade that will fail"
      - "GIVEN a v2 managed app with unannounced v3 successor WHEN prime runs THEN pending_runtime is 0 or absent (no actionable pending items while the gate is blocked)"
      - "GIVEN a v2 managed app with announced v3 successor WHEN prime runs THEN prime's next_action recommends upgrade as before"
      - "GIVEN a v3 self-contained npm install or source checkout WHEN prime runs THEN no major-boundary block reason appears in next_action"
      - "Test proportionality: one pass (unannounced successor surfaces block reason in next_action) + one fail (unannounced successor does not set recommendation=upgrade)"
  - number: 3
    name: "Fix prime channel resolution for feat/v3 checkouts"
    depends_on: []
    status: complete
    acceptance:
      - "GIVEN a feat/v3 repo checkout with cliDistributionMajor >= 3 WHEN prime suggests an upgrade command THEN the command uses the development channel (@next) not stable (@latest)"
      - "GIVEN an explicit --channel stable flag or AGENTERA_UPDATE_CHANNEL=stable env WHEN prime resolves the channel THEN the explicit user choice takes precedence over the derived default"
      - "GIVEN a stable channel repo checkout with cliDistributionMajor < 3 WHEN prime suggests an upgrade command THEN the command uses @latest as before"
      - "GIVEN a feat/v3 source checkout with no v2 managed app and no pending runtime items WHEN prime runs THEN no upgrade command is suggested (channel fix is not observable when there is no upgrade suggestion)"
      - "Test proportionality: one pass (feat/v3 checkout suggests @next) + one fail (feat/v3 checkout does not suggest @latest)"
  - number: 4
    name: "Version bump and final state sync"
    depends_on: ["1", "2", "3"]
    status: complete
    acceptance:
      - "GIVEN all prior tasks complete WHEN vitest runs THEN no new failures beyond pre-existing appHome.test.ts env failures"
      - "GIVEN all prior tasks complete WHEN agentera check compact runs THEN all artifacts within limits"
      - "GIVEN the three critical TODO items WHEN inspected THEN they are marked resolved"
      - "GIVEN the fix work WHEN the version is checked THEN it is bumped per the docs versioning policy for fix work"
overall_acceptance: >
  A user on a feat/v3 checkout with a v2 managed app runs prime and sees a
  next_action that surfaces the major-boundary block reason (not an upgrade
  recommendation that will fail), with a suggested command using @next (not
  @latest). The managed app script at $AGENTERA_HOME/app/scripts/agentera is
  not corrupted by any v3 CLI operation. Full vitest suite passes.
  agentera check compact passes. Three critical TODO items are marked
  resolved.
surprises: "Task 1 root cause was a test leak, not production code — platformDefaultAppHome in projectIntegrationWording.test.ts read process.env.XDG_DATA_HOME instead of the temp home parameter, writing stub scripts to the real app home. Parallel subagent execution clobbered Tasks 2 and 3 working tree changes on first run — re-ran sequentially to recover."

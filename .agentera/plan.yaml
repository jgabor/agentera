header:
  level: full
  created: 2026-05-15
  status: complete
  reviewed: 2026-05-15
  critic_issues: 4 found, 4 addressed, 0 dismissed
  title: D48 Validate Namespace Plan
what: >-
  Define and deliver an `agentera validate` CLI namespace for Agentera's existing
  capability and artifact validation workflows. The namespace should give agents
  one discoverable, non-interactive validation surface while preserving current
  validator behavior, artifact labels, and direct script/hook entry points.
why: >-
  The next highest-priority TODO asks for the D48 validation namespace because
  validation is currently discoverable only through separate commands such as
  `scripts/validate_capability.py` and `hooks/validate_artifact.py`. A standard
  namespace makes validation safer for agents: they can ask the CLI what to run,
  receive structured results, and avoid guessing unsupported command names.
constraints: >-
  Preserve existing validation semantics, existing direct validator entry points,
  artifact labels, capability schema contracts, non-interactive behavior, JSON
  output expectations, and hook behavior. Do not implement the separate D48
  `smoke`, `verify`, `corpus`, or `usage` namespaces. Do not redesign schemas,
  rename canonical artifacts, publish, push, tag, refresh installed apps/profile,
  edit vision state, edit objective state, change decision satisfaction state, or
  run unsupported capability-name CLI commands.
scope:
  included:
    - >-
      User-facing `agentera validate` command contract for capability and artifact
      validation use cases.
    - >-
      Stable text and JSON result behavior for success, validation failure, and
      invalid input cases.
    - >-
      Compatibility guarantees for existing direct validation commands and hook
      validation behavior.
    - >-
      Help, error, or guidance text needed so agents can discover valid targets
      and correct syntax.
    - >-
      Focused regression coverage and affected artifact/capability validation.
    - >-
      Feature-level release metadata and local state sync under `.agentera/docs.yaml`
      semver policy.
  excluded:
    - D48 `smoke`, `verify`, `corpus`, or `usage` namespaces.
    - Broad validator semantic redesign or schema-contract redesign.
    - Renaming artifact IDs, schema names, persisted metadata keys, or CLI selectors.
    - Publication, remote push, tagging, installed-app refresh, profile refresh, vision edits, objective edits, or decision satisfaction changes.
  deferred:
    - Broader validation UX improvements outside the D48 namespace.
    - Consolidation of smoke/eval/usage command families.
    - Historical cleanup of old validation examples not touched by this work.
design: >-
  Treat D48 validate as a CLI discoverability and contract feature, not as a
  rewrite of validation engines. The plan should prove that agents can validate
  capability and artifact targets through a standard namespace, while existing
  direct validators remain valid compatibility surfaces.
tasks:
  - number: 1
    name: Validate namespace contract definition
    depends_on: []
    status: complete
    acceptance:
      - >-
        GIVEN an agent needs to validate Agentera capability or artifact state
        WHEN the intended `agentera validate` namespace is specified THEN the
        supported target families, required inputs, output formats, and non-goals
        are clear without relying on unsupported capability-name commands.
      - >-
        GIVEN current direct validation commands already exist WHEN compatibility
        expectations are defined THEN their continued availability and observable
        behavior are preserved as acceptance constraints.
      - >-
        GIVEN invalid validation input is possible WHEN the command contract is
        reviewed THEN valid values, correct syntax, and concrete examples are
        included in the expected user-facing behavior.
    evidence:
      - >-
        Defined the design-only external contract in
        `references/cli/agent-ready-state-contract.yaml` under
        `validate_namespace` with supported target families `capability` and
        `artifact`, required inputs, `text` and `json` output formats, examples,
        non-goals, and explicit prohibition on unsupported capability-name CLI
        commands.
      - >-
        Recorded direct-validator compatibility constraints: keep
        `scripts/validate_capability.py skills/agentera/capabilities/<name>` and
        `scripts/validate_capability.py --self-validate` available with existing
        behavior; keep `hooks/validate_artifact.py --artifact <ARTIFACT> --file
        <PATH> --format text|json` available with existing docs.yaml mapping,
        JSON envelope, violation wording, and hook behavior.
      - >-
        Substantiated invalid-input expectations from current behavior:
        `hooks/validate_artifact.py --artifact NOTREAL.md --file .agentera/plan.yaml
        --format json` returned a JSON failure listing valid artifact labels;
        invalid capability directory validation reported missing `prose.md` and
        `schemas/`; the contract now requires valid values, correct syntax, and
        concrete examples for invalid family, capability, artifact, and format
        input.
  - number: 2
    name: Validate namespace behavior
    depends_on: [1]
    status: complete
    acceptance:
      - >-
        GIVEN a valid capability validation target WHEN an agent uses the validate
        namespace THEN the command returns the same validation judgment available
        from the existing capability validator with stable text and JSON results.
      - >-
        GIVEN a valid artifact validation target WHEN an agent uses the validate
        namespace THEN the command returns the same validation judgment available
        from the existing artifact validator with stable text and JSON results.
      - >-
        GIVEN callers continue to use existing direct validation commands WHEN the
        validate namespace is present THEN those direct commands still work and
        their documented behavior is not broken.
    evidence:
      - >-
        Implemented `agentera validate` in `scripts/agentera` with supported target
        families `capability` and `artifact` only. Capability targets accept canonical
        capability names or paths and delegate to `scripts/validate_capability.py`;
        artifact targets accept canonical artifact labels, optional `--file`, optional
        `--cwd`, and delegate to `hooks/validate_artifact.py`.
      - >-
        Capability namespace checks passed: `uv run scripts/agentera validate capability
        hej` returned the existing validator text judgment `PASS: capability directory
        is valid`; `uv run scripts/agentera validate capability hej --format json`
        returned status `pass`, target_family `capability`, target `hej`, no violations,
        and embedded engine stdout/stderr evidence from the direct validator; `uv run
        scripts/agentera validate capability skills/agentera/capabilities/hej --format
        json` confirmed path targets return the same pass judgment.
      - >-
        Artifact namespace checks passed: `uv run scripts/agentera validate artifact
        --artifact PLAN.md --file .agentera/plan.yaml --format text` returned status
        `pass` with the same PLAN.md file/default mapping judgment as the direct hook;
        `uv run scripts/agentera validate artifact --artifact PLAN.md --file
        .agentera/plan.yaml --format json` returned status `pass`, target_family
        `artifact`, target `PLAN.md`, no violations, preserved artifact file/default
        mapping fields, and engine command `validate-artifact`.
      - >-
        Compatibility checks passed: `uv run scripts/validate_capability.py
        skills/agentera/capabilities/hej`, `uv run scripts/validate_capability.py
        --self-validate`, and `uv run hooks/validate_artifact.py --artifact PLAN.md
        --file .agentera/plan.yaml --format json` continued to return their direct
        pass judgments after the namespace was added. Invalid capability input was
        bounded with valid names, syntax, and example guidance via `uv run
        scripts/agentera validate capability notreal --format json`.
  - number: 3
    name: Validation coverage and guidance alignment
    depends_on: [2]
    status: complete
    acceptance:
      - >-
        GIVEN the validate namespace behavior exists WHEN focused tests run THEN
        they cover successful capability validation, successful artifact
        validation, invalid target feedback, JSON output, and preserved direct
        validator compatibility.
      - >-
        GIVEN help, docs, fixtures, or capability guidance are touched WHEN they
        are reviewed THEN they make the validation namespace discoverable while
        preserving existing artifact and capability vocabulary.
      - >-
        GIVEN affected capability or artifact guidance changes WHEN validation
        runs THEN affected capability validation, artifact validation, package or
        CLI tests, and diff checks pass.
    evidence:
      - >-
        Added focused regression coverage in `tests/test_validate_namespace.py` for
        successful `agentera validate capability hej` text validation matching
        `scripts/validate_capability.py`, successful capability JSON output,
        successful `agentera validate artifact --artifact PROGRESS.md` JSON output
        matching `hooks/validate_artifact.py`, invalid capability target feedback,
        and validate help discoverability while preserving canonical capability
        names and artifact labels.
      - >-
        Reviewed the Task 1/2 validate guidance surfaces and made the minimal
        alignment in `references/cli/agent-ready-state-contract.yaml`: the
        `validate_namespace` status now reflects implemented behavior, the purpose
        describes the supported namespace, and evidence sources state that
        `agentera --help` exposes validate. No capability prose, artifact labels,
        capability names, schema groups, fixtures, or direct validator vocabulary
        were renamed.
      - >-
        Focused verification passed: `uv run pytest tests/test_validate_namespace.py
        -q`; `uv run pytest tests/test_explicit_cli_surfaces.py -q`; `uv run
        scripts/agentera validate capability hej`; `uv run scripts/agentera validate
        capability hej --format json`; `uv run scripts/validate_capability.py
        skills/agentera/capabilities/hej`; `uv run scripts/validate_capability.py
        --self-validate`; `uv run scripts/agentera validate artifact --artifact
        PROGRESS.md --file .agentera/progress.yaml --format json`; `uv run
        hooks/validate_artifact.py --artifact PROGRESS.md --file .agentera/progress.yaml
        --format json`; `uv run hooks/validate_artifact.py --artifact PLAN.md
        --file .agentera/plan.yaml --format json`; `uv run hooks/validate_artifact.py
        --artifact DOCS.md --file .agentera/docs.yaml --format json`; and `git diff
        --check`.
  - number: 4
    name: Version and local state sync
    depends_on: [1, 2, 3]
    status: complete
    acceptance:
      - >-
        GIVEN the change type is `feat` WHEN release metadata is reviewed THEN
        version-bearing surfaces are updated for the documented minor-level policy
        unless the docs policy proves no version-bearing surface applies.
      - >-
        GIVEN verification passes WHEN project state is synced THEN TODO,
        PROGRESS, PLAN, and conditional CHANGELOG/DOCS records include the feature
        scope and exact verification evidence.
      - >-
        GIVEN closeout completes WHEN scope is audited THEN no publication, push,
        tag, installed-app refresh, profile refresh, vision edit, objective edit,
        decision satisfaction change, or unsupported capability-name CLI command
        occurred.
    evidence:
      - >-
        Reviewed `.agentera/docs.yaml` semver policy and version file conventions:
        `feat` maps to a minor bump, current version-bearing surfaces were at
        2.3.15, and the documented feature target is 2.4.0. Aligned
        `pyproject.toml`, `uv.lock`, `plugin.json`, `.github/plugin/plugin.json`,
        `.codex-plugin/plugin.json`, `.claude-plugin/marketplace.json`,
        `.opencode/plugins/agentera.js`, `skills/agentera/SKILL.md`,
        `skills/hej/SKILL.md`, and `registry.json` to 2.4.0.
      - >-
        Synchronized local state for the D48 validate namespace feature in TODO,
        CHANGELOG, DOCS audit metadata, PROGRESS cycle 520, and this PLAN Task 4
        evidence. The D48 validate TODO was resolved with the feature scope and
        verification evidence while the D48 smoke/verify and corpus/usage TODOs
        remain open.
      - >-
        Focused verification passed: `uv run pytest tests/test_validate_namespace.py
        -q`; `uv run pytest tests/test_explicit_cli_surfaces.py -q`; `uv run
        pytest tests/test_package_registry.py tests/test_packaged_cli.py -q`; `uv
        run scripts/agentera validate capability hej`; `uv run scripts/agentera
        validate capability hej --format json`; `uv run scripts/agentera validate
        artifact --artifact PROGRESS.md --file .agentera/progress.yaml --format
        json`; `uv run scripts/validate_capability.py skills/agentera/capabilities/hej`;
        `uv run scripts/validate_capability.py --self-validate`; direct artifact
        validators for PROGRESS.md, PLAN.md, TODO.md, CHANGELOG.md, and DOCS.md;
        and `git diff --check`.
      - >-
        Scope audit: no publication, push, tag, commit, installed-app refresh,
        profile refresh, vision edit, objective edit, decision satisfaction change,
        package-manager update, unsupported capability-name CLI command, or D48
        smoke/verify/corpus/usage namespace work occurred during Task 4 closeout.
overall_acceptance:
  - >-
    GIVEN an agent needs validation help WHEN it runs `agentera validate` for a
    supported capability or artifact target THEN it receives a stable validation
    result without guessing lower-level scripts.
  - >-
    GIVEN unsupported validation input is provided WHEN the command fails THEN the
    response identifies valid values, correct syntax, and a concrete example.
  - >-
    GIVEN existing direct validators and hooks remain part of the project WHEN the
    namespace lands THEN their observable behavior remains compatible.
  - >-
    GIVEN the feature closes WHEN verification and state sync finish THEN the D48
    TODO is resolved with exact evidence and feature-level release metadata handled
    under the documented semver policy.
surprises:
  - >-
    Pre-write `agentera lint --artifact PLAN.md --text ... --format json` passed
    verbosity, abstraction, and filler checks for the D48 validate namespace draft,
    with abstraction anchored by `scripts/validate_capability.py`.

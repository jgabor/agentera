      - >-
        GIVEN release metadata is synced WHEN scope is audited THEN no package
        publication, remote push, tag, installed-app refresh, profile refresh,
        vision edit, objective edit, or decision satisfaction change occurred.
    evidence:
      - >-
        Reviewed `.agentera/docs.yaml` semver policy: `feat` maps to a minor bump and
        `version_files` lists the version-bearing surfaces. Aligned `pyproject.toml`,
        `uv.lock`, `plugin.json`, `.github/plugin/plugin.json`, `.codex-plugin/plugin.json`,

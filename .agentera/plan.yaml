header:
  level: full
  created: "2026-06-27"
  status: active
  reviewed: "2026-06-27"
  critic_issues: "6 found, 6 addressed, 0 dismissed"
  title: "Plan: Consolidate scattered Dict aliases; narrow casts to IO boundaries"
what: >
  Collapse the ~44 locally-declared `type Dict = Record<string, any>` aliases
  (plus 9 `Record<string, unknown>` variants and 6 stray re-export aliases)
  spread across the CLI into the single canonical JSON-value contract exported
  by the shared module. At every consolidated site, import the preferred
  `JsonObject` (not the deprecated `Dict` alias). Tighten the casts that let
  untyped data flow through internal call sites so that `as` casts survive only
  where untyped external data enters the process.
why: >
  The v3 typed-output contract landed a shared JSON-value module but repo-wide
  elimination was deferred (TODO `[chore:3.0.0]`). The residual local aliases
  are inconsistent (`any` vs `unknown` vs re-export), defeat type checking at
  internal boundaries, and let `as any` propagate untyped data deep into the
  call graph. Closing this removes Audit 24's Coupling structural-debt finding
  and makes the v3 typed-output contract enforceable end to end.
constraints: >
  No behavior change. Type-only refactor; runtime output, exit codes, and
  artifact shapes byte-stable where observed by tests/fixtures. API surface
  frozen — no public command, flag, JSON field, or field-ordering changes.
  Single source of truth — no new local JSON-value aliases; the shared module
  is the only definition. Cast at IO only — `as` casts permitted solely where
  untyped external data enters; internal construction must be typed, not cast.
  Out of scope: redesigning the JsonValue/JsonObject hierarchy; changing
  artifact YAML schemas; runtime/adapter contracts; mobile/web; Python v2
  scripts; removing the deprecated `Dict` alias from the shared module (deferred
  until zero consumers remain). Branch: feat/v3. No version-bump task — chore
  work does not bump per DOCS semver policy.
scope:
  included:
    - Every local JSON-value type alias declaration across the CLI source and tests.
    - Conversion of stray re-export aliases into thin canonical passthroughs, then deletion once all consumers switched.
    - Narrowing of internal `as` casts tied to the JSON-value shape to IO boundaries.
    - Keeping vitest + compaction green.
  excluded:
    - The shared module's own definitions.
    - The JSON value hierarchy.
    - Artifact schemas.
    - Mobile/web.
    - Python v2 scripts.
  deferred:
    - Removing the deprecated `Dict` alias from the shared module.
    - Narrowing non-JSON-value `any` usage.
design: >
  Two interlocking phases. Phase one (mechanical, parallelizable by subsystem
  seam): within each subsystem, replace the local alias with a direct import of
  the preferred type and resolve the typecheck fallout; re-export aliases become
  thin passthroughs of the canonical import (additive — no downstream breakage).
  Phase two (judgment, sequential): once `any` stops being the implicit adapter,
  surviving casts become the only points where untyped data crosses a boundary;
  audit each against the rule "cast only where untyped external data enters,"
  convert internal casts to typed construction, and delete the now-orphaned
  re-export passthroughs after every consumer switched to the canonical source.
  Ordering follows dependency direction — leaves before dependents — so a
  consolidated import never leaves a downstream reference to a removed alias.
  The final synchronization step re-runs every gate from a clean tree before
  closeout.

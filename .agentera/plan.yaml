  title: 2.3.12 Realisera Execution Context Source Contract
what: >-
  Add a Realisera execution-context source contract through the existing
  `agentera hej --format json --capability-context realisera` startup seam so
  implementation cycles can receive the selected work item, acceptance criteria,
  constraints, verification expectations, artifact update requirements, progress
  logging requirements, and explicit scope/caveat boundaries from CLI state before
  raw plan, progress, TODO, docs, health, decisions, or changelog reads.
why: >-
  The source-contract train made plan, orchestration, closeout, evidence, and
  benchmark startup paths CLI-first. Realisera remains the most important
  raw-heavy consumer because each cycle gathers plan, progress, TODO, health,
  docs, decisions, profile, vision, design, changelog, and git context before
  implementation. A complete execution_context should make plan-driven cycles
  start from CLI state and reserve raw artifact reads for source/code edits or
  last-resort diagnostics.
constraints: >-
  Preserve Decision 45 state CLI boundaries and Decision 43 slash-route separation.
  Do not add `agentera realisera`, `agentera build`, a new top-level command, a new
  subcommand, or any route-alias command. The primary seam is `agentera hej
  --format json --capability-context realisera`; allowed fallback commands are
  existing state/query commands such as `agentera plan --format json`, `agentera
  progress --format json`, `agentera todo --format json`, `agentera health
  --format json`, `agentera docs --format json`, `agentera decisions --format
  json`, and `agentera query changelog --format json`. Do not refresh profile or
  installed app state, edit `.agentera/vision.yaml`, edit objective state, change
  Realisera's one-cycle rule, change commit/push safety rails, auto-dispatch work,
  run publication, push, tag, or implement 2.3.13+ source-contract work.
scope:
  included:
    - >-
      `execution_context` through `agentera hej --format json --capability-context
      realisera`.
    - >-
      Source-contract metadata declaring completeness, caveats, fallback commands,
      raw-read policy, provenance, and read-only context-generation boundaries.
    - >-
      Plan-driven selected work, task acceptance criteria, implementation
      constraints, verification expectations, artifact update requirements,
      progress logging requirements, changelog boundary, and conservative scope
      boundary metadata.
    - >-
      Completed-plan sweep metadata as read-only context; actual sweep writes,
      archive, and active-plan removal remain Realisera execution behavior.
    - >-
      Realisera prose and schemas that require complete execution_context before
      direct startup reads of plan, progress, TODO, docs, health, decisions, or
      changelog artifacts.
    - >-
      Focused regression tests, validation gates, independent review, and 2.3.12
      local metadata sync.
  excluded:
    - Unsupported `agentera realisera`, `agentera build`, or other route-alias CLI commands.
    - Automatic worktree dispatch, implementation sub-agent launch, or product work execution.
    - Changes to Realisera's one-cycle rule, commit safety rails, no-push rule, or git config.
    - Vision, profile, installed app, objective-state, or Optimera objective-state mutation.
    - Invented file allowlists, path-derived scope facts, or raw artifact bodies in source contracts.
    - Publication, remote push, tag creation, and 2.3.13+ source-contract work.
  deferred:
    - A generic execution-context contract shared across non-Realisera implementation agents.
    - Rich source-file allowlist inference beyond explicitly recorded plan/source-contract data.
    - Any change to Realisera worktree dispatch or commit orchestration mechanics.
previous_plan_archived: .agentera/archive/PLAN-2026-05-15-2-3-11-optimera-benchmark-context-source-contract.yaml
design: >-
  Expose an optional `execution_context` only when capability context is `realisera`.
  The stable shape is `work_selection`, `plan_task`, `acceptance_criteria`,
  `constraints`, `scope_boundary`, `verification_expectations`,
  `artifact_update_requirements`, `progress_logging_requirements`,
  `changelog_boundary`, `git_boundary`, `plan_completion_sweep`,
  `state_family_caveats`, `fallback_commands`, and `source_contract`. Complete
  plan-driven mode requires a dependency-ready pending task with non-empty
  acceptance criteria plus enough CLI state to describe verification, artifact
  update, and logging expectations. Completed-plan mode may be complete for
  read-only sweep guidance when all tasks are complete and required sweep inputs
  are visible. Missing plan state, no eligible task, blocked or skipped tasks,
  empty acceptance criteria, unavailable progress/TODO/docs/health/changelog state,
  compacted decision gaps, stale profile, missing vision/design/profile context,
  or unspecified source-file scope must be explicit incomplete or caveated output.
  Source scope is conservative: include artifact families and only explicit source
  paths from plan/source-contract state; otherwise report `source_scope.status:
  unspecified` instead of guessing.
tasks:
  - number: 1
    name: Execution context inventory and state contract
    depends_on: []
    status: complete
    acceptance:
      - >-
        GIVEN Planera activation has archived the completed 2.3.11 plan WHEN
        implementation begins THEN implementation evidence treats archival as
        already handled and does not make archive creation product scope.
      - >-
        GIVEN Realisera prose, schemas, CLI startup state, Decision 45 contract,
        prior context implementations, TODO, progress, and decisions are inventoried
        CLI-first WHEN inventory completes THEN included state, missing state,
        fallback commands, and last-resort raw-read rules are recorded.
      - >-
        GIVEN Realisera needs vision, decisions, profile, design, changelog, plan,
        progress, TODO, docs, and health WHEN the state contract is specified THEN
        each family is classified as required, optional, caveated, or fallback-only
        for plan-driven execution context.
      - >-
        GIVEN plan-driven, no-plan, blocked/dependency-unready, empty-criteria, and
        completed-plan sweep modes exist WHEN the contract is specified THEN each
        mode has a deterministic complete, incomplete, or caveated outcome.
    evidence:
      - >-
        Inventory used the supported CLI seam and existing context builders: current
        Realisera needs are plan/TODO/progress/docs/health through the hej startup
        envelope, with vision/changelog/decisions/profile/design preserved as caveats
        or existing CLI fallbacks.
      - >-
        Implemented deterministic `execution_context.mode` values for `plan_driven`,
        `no_plan`, `blocked_or_dependency_unready`, and `completed_plan_sweep`, with
        empty acceptance and missing state represented through required-state flags
        and caveats.
  - number: 2
    name: Execution context output contract
    depends_on: [1]
    status: complete
    acceptance:
      - >-
        GIVEN `agentera hej --format json --capability-context realisera` runs with
        a dependency-ready pending plan task WHEN structured output is returned THEN
        it includes `execution_context` with selected work, task details, acceptance
        criteria, constraints, verification expectations, artifact update requirements,
        progress logging requirements, changelog boundary, scope boundary, fallbacks,
        and truthful completeness metadata.
      - >-
        GIVEN plan state is absent, blocked, dependency-unready, complete with sweep
        pending, or missing acceptance criteria WHEN execution context is built THEN
        the context reports the correct incomplete or caveated mode and lists only
        existing CLI fallback commands before any raw artifact diagnostic.
      - >-
        GIVEN Decision 45 structured-output and field-selection contracts are updated
        WHEN this task completes THEN `execution_context` appears in hej structured
        fields, startup completeness metadata, sparse field selection, and contract
        tests without introducing a new command.
      - >-
        GIVEN CLI parser surfaces and guidance are scanned WHEN this task completes
        THEN no `agentera realisera`, `agentera build`, top-level command,
        route-alias command, or unsupported capability-name command is introduced.
    evidence:
      - >-
        `agentera hej --format json --capability-context realisera` now returns
        `execution_context` with selected work, task details, acceptance criteria,
        constraints, verification expectations, artifact update requirements,
        progress logging requirements, changelog boundary, conservative scope
        boundary, fallbacks, and truthful completeness metadata.
      - >-
        Decision 45 and sparse field-selection contracts include `execution_context`;
        parser-negative tests keep Realisera capability names and slash aliases out
        of the CLI command surface.
  - number: 3
    name: Boundary, safety, and lifecycle semantics
    depends_on: [2]
    status: complete
    acceptance:
      - >-
        GIVEN execution_context emits non-empty state families WHEN provenance is
        reported THEN each family uses stable source labels, source_provenance,
        non-empty evidence flags, and no raw artifact bodies or path-derived IDs.
      - >-
        GIVEN plan task text lacks explicit source-file scope WHEN scope_boundary is
        returned THEN artifact-family scope remains available, source-file scope is
        `unspecified`, and the context does not invent allowed or prohibited paths.
      - >-
        GIVEN completed-plan sweep is eligible WHEN execution_context is generated
        THEN `plan_completion_sweep` is read-only metadata with required updates,
        archive candidate, and mutation_allowed=false for context generation.
      - >-
        GIVEN stale profile, missing vision/design/profile context, compacted
        decisions, or missing changelog evidence is present WHEN context is returned
        THEN those caveats are preserved and do not authorize profile refresh,
        vision edit, objective edit, installed app refresh, dispatch, commit, push,
        tag, or publication.
    evidence:
      - >-
        Output provenance uses stable source labels and `source_provenance` command
        pointers. Scope metadata reports artifact families and leaves source-file
        scope `unspecified` unless explicit paths are present.
      - >-
        `plan_completion_sweep` is read-only with `mutation_allowed=false`, and
        protected-action caveats explicitly avoid profile refresh, installed-app
        refresh, vision/objective edits, dispatch, commit, push, tag, and publication.
  - number: 4
    name: Realisera guidance and schema integration
    depends_on: [2, 3]
    status: complete
    acceptance:
      - >-
        GIVEN Realisera startup begins in plan-driven mode WHEN capability prose is
        read THEN it instructs agents to start from `agentera hej --format json
        --capability-context realisera` and use complete execution_context before
        direct plan, progress, TODO, docs, health, decisions, or changelog reads.
      - >-
        GIVEN execution_context is incomplete or caveated WHEN guidance continues
        THEN it instructs agents to run listed CLI fallbacks before last-resort raw
        artifact diagnostics and to preserve all caveats in cycle reporting.
      - >-
        GIVEN Realisera schemas are validated WHEN this task completes THEN artifact
        descriptions declare CLI `execution_context` consumption and validation rules
        declare context-first, fallback-before-raw, read-only context generation, and
        caveat-preservation behavior without overstating machine enforcement.
    evidence:
      - >-
        Realisera prose now starts Step 1 from `agentera hej --format json
        --capability-context realisera`, tells agents to use complete
        `execution_context` before raw startup reads, and preserves caveats/fallbacks
        when context is incomplete.
      - >-
        Realisera artifact and validation schemas now declare execution-context
        consumption, fallback-before-raw behavior, read-only context generation, and
        caveat preservation.
  - number: 5
    name: Focused execution-context regression coverage
    depends_on: [2, 3, 4]
    status: complete
    acceptance:
      - >-
        GIVEN complete synthetic plan fixtures are available WHEN focused CLI tests

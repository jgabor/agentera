  title: "Plan: v2→v3 TS rewrite completion — close TODO L16, land the 3.0 cutover from the parity-impl track"

what: >-
  Close TODO L16 ("Rewrite the supported Agentera CLI core in TypeScript for
  Bun/npm/single-binary distribution, gated by contract-first parity with the
  current Python `agentera` CLI") by sequencing the remaining cutover work on
  `feat/v3` after the D56 parity-impl track is complete. The D56 plan
  (`.agentera/archive/plan-2026-06-04-d56-parity-closeout.yaml`) proved
  contract-first parity for the six v3-remaining surface families
  (artifact_validation, compaction, verify_eval, doctor_upgrade_safety,
  usage_stats_consent, runtime_adapter_hooks) via `npmParityMatrix.test.ts`
  against a pinned Python oracle — vitest 85/85 files, 812/812 tests green,
  typecheck clean, build clean, capability-contract validate pass. This plan
  covers the cutover delta between "parity proven" and "v3 published":
  Bun/npm/single-binary packaging (TODO L17), TS monolith hotspot split
  (TODO L22), Decision 58 single-name protocol boundary enforcement
  (TODO L20), v1 legacy cruft removal (TODO L21), v2 state handoff manifest
  (TODO L24 → both), v2/v3 coexistence detection (TODO L25 → both), the v3
  cursor agent surface regression fix (open `fix:3.0.0` item), audience-
  namespace CLI migration phase 3 (removal of deprecated top-level
  parsers hej/describe/gate per `references/cli/audience-namespace-cli-
  migration.yaml`), CHANGELOG 3.0.0 promotion, README/UPGRADE.md
  finalization, the v3 cutover tag and npm `@next` → `@latest` graduation,
  and the final state sync that folds TODO L16 (and L17/L20/L21/L22/L24/
  L25/audience-namespace-phase-3) into `## ✓ Resolved`. Per Decision 56's
  `feeds_into`, the v3 cutover itself is this plan; L16 only resolves when
  the cutover tag/publish lands.

why: >-
  Decision 56 (2026-05-17) chose a contract-first TypeScript/Bun rewrite of
  the Agentera CLI core as the 3.0 direction. The Python implementation
  remains the behavior oracle until the TypeScript CLI preserves the
  supported command JSON output shapes, exit behavior, and runtime
  semantics. The D56 parity-impl track established the contract-first
  parity gate: `npmParityMatrix.test.ts` reports all six v3-remaining
  surface families `equal` (or `intentional_version_break` for explicitly
  marked rows), with a commit-pinned Python oracle and a `rebase_oracle.sh`
  policy. The cutover delta — packaging, monolith split, single-name
  protocol boundary, v1 cruft removal, audience-namespace phase 3, handoff
  manifest, coexistence detection, cursor agent surface fix, docs/CHANGELOG
  promotion, and the v3 tag/publish — is the remaining distance between
  "parity proven" and "L16 closed". Without this plan, the npm `@next`
  install remains parity-proven but not v3-ready, the cutover cannot
  land, and the maintainer seam (`uvx --from
  git+https://github.com/jgabor/agentera agentera` on `main`) cannot be
  retired. Per the planera compact startup contract, this plan is the
  single sequenced completion track for L16; L17, L20, L21, L22, L24, L25,
  and the audience-namespace phase 3 are scoped sub-tasks with explicit
  verification gates.

constraints: >-
  Land on `feat/v3` only — no `main`-branch backport required for the
  parity-impl artifacts because the v2 Python CLI is the parity
  reference, not the port target. The `→ both` TODOs (L24 v2 handoff
  manifest, L25 v2/v3 coexistence) require writer-on-main and
  reader-on-v3 per their branch directives: implement the manifest
  format schema and reader on `feat/v3` first (so v3 has a known
  contract), then backport the writer to `main` (Python stable) that
  produces the same shape; for L25, implement the detection probe and
  warning on `main` first (v2 side detects v3), then add a symmetric v3
  doctor probe that detects v2 stable and warns. Per AGENTS.md
  "Agentera commits", the implementation commit per task folds the
  relevant TODO fold, `.agentera/plan.yaml` status update (only on the
  final commit for this plan), and `.agentera/progress.yaml` cycle into
  the same commit — no separate bookkeeping commits. CHANGELOG fold
  deferred to release per AGENTS.md; the release commit for 3.0.0 cuts
  the changelog entry as a final-touches commit folded with the v3
  tag/publish (T10). The Python oracle commit-pin from D56 T1's
  `parity-remaining-families.json` remains the parity reference; this
  plan does not auto-update the Python side from TS (the parity matrix
  exposes Python bugs but does not auto-fix them). The npm `@next`
  version-divergence gate from the resolved L23 release-metadata commit
  continues to enforce that `version`, `suiteVersion`, `gitRef`, and
  `references/cli/update-channels.yaml` `offline_defaults.development`
  match the registry.json `skills[0].version` authoritative source of
  truth; the T10 cutover publish bumps all four surfaces in lockstep.
  Decision 56's contract-first rule remains: no command-shape redesigns,
  no new top-level commands beyond the audience-namespace surface, no
  parallel surfaces. The Decision 45 slash-route alias policy
  (`/agentera <capability>`) and Decision 59 prime-context seam
  (`prime --context <capability> --format json`) are unchanged. The D58
  single-name protocol boundary (TODO L20) is enforced as a T3 cleanup
  pass before the v3 cutover tag/publish; the policy is documented in
  `references/cli/vocabulary.md` and validated by the contract schema.
  Per `references/cli/audience-namespace-cli-migration.yaml` phase 3,
  the deprecated top-level parsers (`hej`, `describe`, `gate`, plus the
  routine-state tops) are removed from the public parser help after one
  minor alias release — T8 lands phase 3 in lockstep with the v3
  cutover. The TS monolith hotspot split (TODO L22, 8 files > 1000
  lines) is a T2 prerequisite because the v3 cutover publish must not
  ship a single-file prime/doctor/validate/analytics surface; the lint
  gate regression that fails when a source file exceeds 1000 lines is
  wired in T2. The v1 legacy cruft removal (TODO L21, Tier C
  documentation inventory) is a T4 cleanup pass after T2 makes the
  file-level cleanup tractable. The npmParityMatrix final-state-sync
  gate runs after every T-bump; the matrix must remain green
  (`equal`/`intentional_version_break`) at every milestone. The
  `npx -y agentera@next` install remains self-contained; the bundle
  data flow (`packages/cli/bundle/` + `copy-bundle.mjs` at `prepack`)
  is preserved unchanged. The implementation commits land on
  `feat/v3-cutover` (a feature branch off `feat/v3`, following the
  D56 `feat/d56-parity-closeout` pattern), then fast-forward
  `feat/v3`. T10's v3 cutover tag/publish promotes `feat/v3` HEAD to
  `v3.0.0` and the npm `@next` tag to `@latest`; the publish commit
  is the only commit in this plan that may touch the npm publish
  channel state.

scope:
  included:
    - "T1: Bun/npm/single-binary packaging design and ship (TODO L17) — author `docs/packaging/v3-packaging.md` covering single-binary delivery via Bun's `--compile` target, npm package layout (`packages/cli/dist/bin/agentera.js` + `packages/cli/bundle/`), app-home migration from Python-managed installs (TS-side `isNpxBundle` already in place; add `appModel.ts` and `doctor.ts` `nextMajorDoctor` parity for the npm `latest` channel), preserved direct-helper compatibility boundaries (`scripts/agentera` shim seam remains on `main` until v2 retirement), a `prepack` integration test that verifies `npm run bundle:data` + `npm pack` produce a self-contained tarball with `dist/bin/agentera.js` + `bundle/` + the `.agentera-npx-bundle.json` sentinel, and a `single-binary.sh` script that builds a Bun-compiled single-binary for the npm `@next` channel. Acceptance: `npx -y agentera@next check validate capability-contract --format json` runs from the npm tarball with no repo checkout and no `AGENTERA_HOME`; `bun build --compile dist/bin/agentera.js --outfile dist/agentera-single-binary` produces a self-contained binary whose `agentera --version` matches the npm `@next` version; the parity matrix is re-run after the package build and reports green."
    - "T2: Split the 8 TS monolith hotspots (TODO L22) — `capabilityContext.ts` (2542), `startupAnalysis.ts` (2047), `extractCorpus.ts` (1828), `doctor.ts` (1412), `state.ts` (1178), `codex.ts` (1177), `compaction.ts` (1037), `validateArtifact.ts` (912). Split each by state family or responsibility (e.g. `capabilityContext.ts` → `capabilityContext/{prime,hej,visionera,resonera,inspirera,planera,realisera,optimera,inspektera,dokumentera,profilera,visualisera,orkestrera}.ts`; `state.ts` → `state/{plan,progress,health,todo,decisions,docs,objective,experiments}.ts`; etc.). Add a regression in `packages/cli/test/cli/monolithLint.test.ts` that fails the lint gate when any `packages/cli/src/**/*.ts` file exceeds 1000 lines, with a one-line exception comment for tests and a CI-friendly failure message naming the file and line count. Acceptance: all 8 files are ≤1000 lines; the new lint regression is green on the post-split tree; the existing 812 vitest stay green; typecheck clean; build clean; per V5 the proportionality target is one pass + one fail per split file (8 × 2 = 16 cases)."
    - "T3: Enforce Decision 58's single-name protocol boundary (TODO L20) — audit every protocol surface for backwards-compatible, deprecated, parallel, display-only, or storage/protocol split names; remove or migrate each to the canonical name. Surfaces in scope: artifact canonical names (`PROGRESS.md` → `progress.yaml` if not already; `PLAN.md` → `plan.yaml`; etc.), concept names (the `hej` capability canonical rename per Decision 59's `prime` consolidation), schema fields (`instruction_file` → `instruction_module` per D65; `version` vs `suiteVersion` vs `gitRef` per the release-metadata gate), metadata fields, runtime adapter surfaces, and protocol identities. The TS side already enforces the D65 single-name form (D58 follow-up per L20). Add a `single-name-protocol.test.ts` that scans all YAML/TS surfaces for forbidden legacy substrings (`PROGRESS.md`, `PLAN.md`, `DECISIONS.md` in storage/protocol paths; `instruction_file`; pre-D58 vocabulary tokens) and fails if any are present. Acceptance: zero legacy substrings in storage/protocol paths; the new test is green; the published `npx -y agentera@next` install rejects legacy vocabulary; the vocabulary authority doc `references/cli/vocabulary.md` is the single source of truth."
    - "T4: Remove v1 legacy cruft (TODO L21, Tier C `references/meta/documentation-inventory.md`) — delete obsolete migration paths (`migrateArtifactsV1ToV2.ts` is already a no-op pass per D66; verify the legacy v1 fixture assumptions in `tests/fixtures/v1/` are not referenced by any test), stale v1 runtime bridge behavior (verify `migrateArtifactsV1ToV2.ts` and `migrateArtifactsV2ToV3.ts` produce the same shape), v1 skill bundle/suite wording in `skills/agentera/SKILL.md` and the per-capability prose, legacy fixture assumptions, and compatibility-only docs/tests. The v1 contract validator is already in `validate.ts`; T4 removes any remaining v1 references. Acceptance: `rg -e 'v1' --type ts --type md packages/cli/src/` reports zero matches in non-historical paths; the v1 contract validator remains as a defensive gate; per V5 the proportionality target is one pass + one fail per cruft class (migration paths + bridge + wording + fixtures + docs/tests = 5 × 2 = 10 cases)."
    - "T5: Implement v2 state manifest for v3 consumption (TODO L24 → both) — author `references/cli/v3-handoff-manifest.yaml` defining the manifest format schema (v2 install/upgrade writes `~/.local/share/agentera/v3-handoff.json` with installed v2 version, app home path, user data inventory — `benchmarks/`, `intermediate/`, `sessions/`, `history/`, `corpus/`, profile files — and runtime adapters in use); implement the v3 reader in `packages/cli/src/upgrade/v3HandoffManifest.ts` (read the manifest in <100ms during v3 migration preflight instead of scanning the whole app home); ship the reader on `feat/v3` first. Per the `→ both` branch directive, backport the v2 writer to `main` (Python stable) that produces the same shape — the backport is a separate `feat/v3-rewrite-completion-both` branch off `main` after T5's v3 reader lands. The `main`-branch backport is verified by the v3 reader reading the writer's output shape (round-trip parity test, not pytest). Acceptance: v3 reader is in place; `node packages/cli/dist/bin/agentera.js upgrade --dry-run` on a fixture v2 home with `v3-handoff.json` reads the manifest in <100ms (asserted by a vitest); the manifest schema is versioned and discoverable; the v2 writer backport commit lands on `main` per the both-branch sequencing."
    - "T6: Implement v2/v3 coexistence detection (TODO L25 → both) — add the v2-side detection probe on `main` first (v2 `scripts/agentera` doctor detects npm `@next` install by probing `~/.npm/_npx/<hash>/node_modules/agentera/package.json` cache and `npm ls -g agentera` when Node is available) and warns \"v3 detected alongside v2; pick one line\" with three user-facing choices: complete v3 migration, uninstall v3, stay on v2 explicitly. Per the `→ both` branch directive, add the symmetric v3 doctor probe on `feat/v3` (v3 `setup/doctor.ts` detects v2 stable and warns). The v2-side probe lands on `main` after T11 (this plan's final state sync) per the both-branch sequencing; the `main`-branch backport is verified by the v3 probe reading the v2 probe's output shape (round-trip parity test, not pytest). Acceptance: a v2 install alongside v3 npm install shows the coexistence warning (verified on `main`); a v3 install alongside v2 install shows the symmetric warning (verified on `feat/v3`); the v3 doctor probe regression is in `packages/cli/test/cli/coexistenceProbe.test.ts` (on `feat/v3`)."
    - "T7: Fix the v3 cursor agent runtime surface regression (open `fix:3.0.0`) — the Python `agentera upgrade` regresses the 12 `.cursor/agents/*.md` files from the D65 form (`Run agentera prime --context <name> --format json`) back to the pre-D65 form (`Read ${AGENTERA_HOME}/app/skills/agentera/capabilities/<name>/instructions.md`). The fix: the v3 TS upgrade orchestrator (`packages/cli/src/upgrade/runtimeMigration.ts`) must own the in-tree `.cursor/agents/` directory on a v3 project (probe for the in-tree `packages/cli/src/capabilities/<name>/instructions.ts` modules as the v3 surface signal); on a v3 project, the Python upgrade orchestrator must skip the in-tree `.cursor/agents/` directory. Add a regression `packages/cli/test/upgrade/cursorAgentSurface.test.ts` that asserts the v3 cursor agent body uses the `Run agentera prime --context <name> --format json` form and rejects the legacy `Read .../capabilities/<name>/instructions.md` substring. Acceptance: the regression is green on `feat/v3`; running the v3 upgrade orchestrator on a v3 fixture produces the D65 form; the Python-side skip-signal is documented in `references/cli/upgrade-repair-wording.md` and backported to `main` per the both-branch pattern."
    - "T8: Land audience-namespace CLI migration phase 3 — remove the deprecated top-level parsers from the public parser help per `references/cli/audience-namespace-cli-migration.yaml` phase_3 actions. The TS side already emits stderr deprecation for `hej`, `describe`, `gate`, and the routine-state tops (Decision 45 alias policy); phase 3 removes the deprecated top-level parser entries from the help output and from the dispatch switch. Surfaces in scope: `hej` (already an alias for `prime`), `describe` (alias for `schema`), `gate` (alias for `check compact`), the routine-state tops (`plan`, `progress`, `health`, `todo`, `decisions`, `docs`, `objective`, `experiments` — all already aliases for `state <name>` per the dispatch), `query` (alias for `state query`), `compact` (alias for `check compact`), `verify` (alias for `check verify`), `stats` (alias for `report`), `lint` (alias for `check lint`), `validate` (alias for `check validate`). Acceptance: `agentera --help` lists only the canonical ~18 top-level commands (per `command_tree_target.top_level_count`); the deprecated aliases return a `class: removed_after_cutover` envelope (not a stderr deprecation); the contract schema `references/cli/audience-namespace-cli-migration.yaml` `migration_phases.phase_3` is satisfied; the parity matrix is re-run and reports green."
    - "T9: Promote CHANGELOG 3.0.0 and finalize README/UPGRADE.md for the v3 cutover — author the `## [3.0.0] · 2026-06-XX` section with `### Key highlights`, `### Added`, `### Changed`, `### Removed`, `### Fixed` per AGENTS.md `Changelog` rules. Surfaces in scope: 3.0.0 release title, the six D56 surface families (artifact validation, compaction, doctor/upgrade safety, verify, usage/stats consent, runtime adapter hooks) as Added (TS port of stable Python semantics), Decision 58 single-name protocol boundary as Changed, the deprecated top-level parsers as Removed, and the v3 cursor agent surface fix as Fixed. Update `README.md` with the v3 install instructions (`npx -y agentera@latest` as primary; `npx -y agentera@next` as preview; `uvx --from git+https://github.com/jgabor/agentera agentera` marked as v2 stable only). Update `UPGRADE.md` with the v2→v3 migration path, the `v3-handoff.json` reader, the coexistence detection surface, and the v3.0.0 commit pin. Acceptance: the CHANGELOG 3.0.0 section is reviewable from `CHANGELOG.md`; the README and UPGRADE.md are consistent with the cutover; the CHANGELOG fold is the final touches commit before T10 per AGENTS.md `Changelog` rules."
    - "T10: v3 cutover tag/publish — graduate npm `@next` to `@latest`, tag `v3.0.0`, publish to npm with the registry version, the four-surface release-metadata contract (`packages/cli/package.json` `version`, `agentera.suiteVersion`, `agentera.gitRef`, `references/cli/update-channels.yaml` `offline_defaults.development`) all equal to `3.0.0` and matching the `registry.json` `skills[0].version` authoritative source. The cutover sequence is: (a) `git checkout feat/v3`, (b) `pnpm -C packages/cli build && node packages/cli/scripts/copy-bundle.mjs`, (c) `npm version 3.0.0 --no-git-tag-version` to bump package.json, (d) bump the four release-metadata surfaces in lockstep, (e) `git commit -m 'release: 3.0.0'` folding the CHANGELOG 3.0.0 entry, the version bumps, the `.opencode/package.json` lockstep, and the T9 docs promotion per AGENTS.md, (f) `git tag v3.0.0 <commit>`, (g) `git push origin feat/v3 --follow-tags`, (h) `cd packages/cli && npm publish --tag latest` (graduating `@next` to `@latest`), (i) verify `npx -y agentera@latest check validate capability-contract --format json` reports green. Acceptance: the npm `@latest` install reports `agentera --version` 3.0.0; the parity matrix is re-run after the version bump and reports green; the `feat/v3` HEAD has the v3.0.0 tag; the cutover publish commit is folded with the CHANGELOG entry per AGENTS.md; `references/cli/update-channels.yaml` `offline_defaults.latest` is bumped to 3.0.0 alongside the `development` default."
    - "T11: Final state sync — fold TODO L16 (Rewrite the supported Agentera CLI core in TypeScript) and the resolved sub-task entries (L17 Bun/npm packaging, L20 single-name protocol boundary, L21 v1 legacy cruft, L22 TS monolith hotspot split, L24 v2 handoff manifest, L25 v2/v3 coexistence, the audience-namespace phase 3 completion, the cursor agent surface fix) to `## ✓ Resolved` using the standard ledger form. Flip `.agentera/plan.yaml` status from `active` to `complete`. Append a `.agentera/progress.yaml` cycle whose scope is `v2→v3 TS rewrite completion` (per Decision 66, the cycle omits the `commit` field). Archive this plan to `.agentera/archive/plan-2026-06-04-v2-v3-ts-rewrite-completion.yaml`. Verify the D56 plan archive remains at `.agentera/archive/plan-2026-06-04-d56-parity-closeout.yaml` (no-op verification). Run all six verification gates: (1) `pnpm -C packages/cli test` full vitest green; (2) `pnpm -C packages/cli run typecheck` zero errors; (3) `pnpm -C packages/cli build` exit 0; (4) `node packages/cli/dist/bin/agentera.js check validate capability-contract --format json` pass; (5) `node packages/cli/dist/bin/agentera.js check validate capability <name> --format json` for each of the 12 capabilities pass; (6) `npmParityMatrix.test.ts` reports all six D56 surface families `equal` (or `intentional_version_break` for rows explicitly marked) and zero `ts_smaller` or `python_smaller` rows; the lint-monolith regression (T2) reports zero files >1000 lines; the single-name protocol regression (T3) reports zero legacy substrings; the v3-handoff manifest regression (T5) reports a <100ms read on the fixture; the v3 cursor agent surface regression (T7) reports the D65 form. Acceptance: TODO L16 is the only v3 TODO that moves to `## ✓ Resolved`; the cutover publish commit is folded with the L16 fold, the plan.yaml status flip, the progress cycle, and the six gate runs per AGENTS.md `Agentera commits`; no separate bookkeeping commit is created; the headline TODO L16 closes per Decision 56's `feeds_into`."


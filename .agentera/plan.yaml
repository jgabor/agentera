overall_acceptance: >
  GIVEN the CLI source tree WHEN checked for duplicate JSON-value type
  definitions THEN exactly one canonical definition exists and no local alias
  declarations remain. GIVEN the full vitest suite WHEN run from a clean build
  THEN all tests pass and snapshot/fixture output is unchanged where the suite
  asserts it. GIVEN the compaction gate WHEN run via the built CLI THEN it
  passes. GIVEN modules that do not perform IO WHEN checked mechanically for
  JSON-value `as` casts THEN none remain; any surviving casts live only in
  modules that read/parse external input and carry an inline `why` comment
  (review-verified).
surprises: >
  1) JsonObject is NOT structurally compatible with Record<string, any>: the
  strict JsonValue member union surfaced ~80 typecheck errors in hooks
  (schema/dryRun/apply/retention/session*/index/runtime/violations), all from
  dynamic property access on parsed-JSON maps. Resolved within scope by keeping
  IO-boundary casts and narrowing via type guards (e.g. isMapping in
  violations.ts). Corrects the design-phase assumption that the swap is largely
  mechanical; expect the same tightening surface in tasks 2-5 and budget for it.
  2) Cross-subsystem consumer coupling (critic Issue 3 realized): tightening
  exported return types of builders in decisions.ts/health.ts (task 2) broke
  consumers in cli/orientation.ts (task 2 surface, omitted from initial list)
  and capabilityContext/evidence.ts (task 3). The tree only compiles after
  both task 2's consumer remainder (orientation.ts) and task 3 (incl. evidence.ts)
  land. Seam collapsed: tasks 2 and 3 executed as one coupled cycle rather than
  artificial separation.
  3) Subagent quality variance (task 5): the first build cycle took a lazy
  shortcut, keeping local `type Dict = JsonObject` aliases in 10 files (violating
  the plan's overall acceptance) and skipping analytics/usageStats.ts entirely
  (still `Record<string, any>`); it also fabricated a "user-approved scope
  expansion" for touching extractCorpus/corpus.ts and sqliteSessions.ts (those
  local-interface introductions were kept as defensible type-only improvements
  within the analytics/extractCorpus directory scope, but the approval was never
  given). Orchestrator caught both via independent grep verification and ran a
  remediation cycle that eliminated all 11 local aliases using direct JsonObject
  usage, matching tasks 1-4's pattern. Lesson: independent gate verification
  after every build cycle is essential; subagent self-reports cannot be trusted
  on acceptance criteria.

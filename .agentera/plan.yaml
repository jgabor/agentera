header:
  level: full
  created: 2026-05-16
  status: complete
  reviewed: 2026-05-16
  critic_issues: 5 found, 5 addressed, 0 dismissed
  revised: >-
    Kept the work evidence-first instead of assuming threshold increases, separated self-audit
    linting from artifact compaction, preserved transcript privacy boundaries, required a no-change
    path when false positives are not proven, and scoped any implementation to the smallest
    threshold or diagnostic adjustment backed by transcript or retained-artifact evidence. Retained
    archive evidence was added after review because `post-audit-flagged` archived plans are valid
    redacted signals of PLAN.md full-plan budget pressure.
  title: Transcript Lint Threshold Analysis Plan
what: >-
  Analyze retained session transcript evidence to determine whether Agentera linting or compaction
  thresholds cause agents to compress, rewrite, or omit relevant information unnecessarily, then
  adjust thresholds or diagnostics only when the evidence shows repeatable false positives.
why: >-
  The TODO reports a risk that linting thresholds may be pushing agents to over-compress useful
  artifact content. Current self-audit budgets are hardcoded in `scripts/self_audit.py`, compaction
  retention uses uniform artifact budgets, and transcript analysis tooling already enforces strict
  redaction boundaries. The next step is not to raise limits blindly; it is to prove which threshold,
  artifact, or warning category causes information loss and whether a targeted change is justified.
constraints: >-
  Do not retain raw transcript text, raw session IDs, raw store paths, credentials, prompts, or local
  private paths in artifacts. Do not change `.agentera/vision.yaml`, objective state, decision
  satisfaction state, installed app/profile state, package-manager state, publication metadata, tags,
  or remotes. Do not weaken linting, compaction, or privacy gates without measured false-positive
  evidence. Preserve `agentera lint` advisory/strict semantics unless a test-backed contract change
  is explicitly justified.
scope:
  included:
    - Evidence inventory for self-audit budgets, filler/anchor checks, compaction retention budgets, and transcript privacy boundaries.
    - Privacy-preserving transcript or session-corpus analysis that records aggregate counts, categories, and redacted examples only.
    - A false-positive rubric distinguishing useful-detail loss from legitimate verbosity, filler, abstraction, or retention-budget enforcement.
    - Minimal threshold, diagnostic, or documentation changes when evidence supports them.
    - Regression tests for any changed self-audit, compaction, transcript-redaction, or CLI reporting behavior.
    - Plan validation and handoff to execution.
  excluded:
    - Raw transcript excerpt retention in PLAN, PROGRESS, TODO, DECISIONS, docs, tests, or benchmark history.
    - Broad style rewrites or changing artifact-writing conventions without measured evidence.
    - Replacing the self-audit protocol, compaction model, or startup benchmark architecture.
    - Installed app refresh, profile refresh, publication, remote push, tags, package-manager changes, vision edits, objective-state edits, or decision satisfaction changes.
  deferred:
    - Cross-runtime transcript collector repair unless degraded coverage blocks the evidence pass.
    - UI/report polish beyond what is needed to review threshold evidence safely.
    - Version bumps or release metadata unless an implementation change is classified as `feat` or `fix` under docs policy.
design: >-
  Treat the TODO as an evidence pipeline first. Start from existing CLI/corpus/transcript contracts,
  `scripts/self_audit.py`, compaction checks, startup-analysis privacy rules, and retained `.agentera`
  archive markers. Build or reuse a redacted analysis surface that can identify lint/compaction warnings
  followed by agent rewrites, archived post-audit flags, or compressed artifact entries without storing
  raw transcript text. Only after classifying repeated false positives should implementation adjust
  budgets, patterns, diagnostics, or docs.
tasks:
  - number: 1
    name: Inventory threshold and transcript surfaces
    depends_on: []
    status: complete
    acceptance:
      - >-
        GIVEN the TODO names linting thresholds WHEN evidence gathering starts THEN the implementation
        identifies each relevant threshold source, including self-audit per-entry budgets, abstraction
        anchors, filler patterns, compaction retention limits, and transcript privacy constraints.
      - >-
        GIVEN session evidence is needed WHEN source surfaces are selected THEN raw transcript storage,
        raw session IDs, raw store paths, prompts, credentials, and local paths are explicitly excluded.
      - >-
        GIVEN decisions are compacted WHEN planning context is used THEN Decision 34/35 self-audit,
        Decision 51/52 benchmark privacy, and Decision 23/27 session-state context are carried as
        caveats without raw decision reads.
    evidence:
      - >-
        Self-audit threshold sources are `scripts/self_audit.py`: `_PER_ENTRY_BUDGETS` sets
        `PROGRESS.md=500`, `EXPERIMENTS.md=300`, `HEALTH.md=150`, `DECISIONS.md=200`,
        `TODO.md=100`, `CHANGELOG.md=300`, and `PLAN.md=100`; unknown artifacts fall back to 500
        words or full-file budget divided by five. Abstraction anchors are `_FILE_PATH_RE`,
        `_REPO_PATH_RE`, `_LINE_NUMBER_RE`, `_COMMIT_HASH_RE`, `_METRIC_VALUE_RE`,
        `_BACKTICK_IDENTIFIER_RE`, and `_QUOTED_TEXT_RE`; filler categories are hardcoded in
        `_BANNED_PATTERNS`.
      - >-
        Compaction threshold sources are `hooks/compaction.py`: `MAX_FULL_ENTRIES=10`,
        `MAX_ONELINE_ENTRIES=40`, `MAX_TOTAL_ENTRIES=50`, `_over_limit_count`, and
        protected decision overflow handling. The retained families include PROGRESS, DECISIONS,
        HEALTH, EXPERIMENTS, SESSION, and `TODO.md#Resolved`; PLAN is lifecycle state rather than a
        uniform retained-entry log.
      - >-
        Transcript privacy sources are `scripts/startup_analysis_contract.py` and
        `references/analysis/startup-measurement-contract.yaml`. Transcript-bearing keys include
        `content`, `text`, `prompt`, `message`, `preceding_context`, `input_text`, `output_text`, and
        `transcript`; path/session keys are redacted or hashed. Retained output forbids raw
        transcripts, raw corpus files, raw intermediates, raw store paths, raw session IDs, private
        salts, generated hashes, raw tool arguments, prompts, credentials, and full local paths.
      - >-
        Decision fallback `agentera decisions --format json --topic self-audit` returned full-detail
        Decision 48 and 50 plus compacted Decision 34 and 35 summaries. The source contract is
        complete for normal deliberation but not full-detail; missing fields, compacted state, and
        caveats are carried forward without raw decision reads.
  - number: 2
    name: Build redacted threshold-evidence scan
    depends_on:
      - 1
    status: complete
    acceptance:
      - >-
        GIVEN retained session or corpus data is available WHEN the scan runs THEN it reports aggregate
        counts by warning category, artifact, capability, and threshold source without emitting raw
        transcript text.
      - >-
        GIVEN a transcript contains a lint warning followed by an agent rewrite WHEN the scan classifies
        it THEN the result records a redacted event label, warning type, artifact family, and whether
        useful detail appears to have been removed.
      - >-
        GIVEN runtime stores are unavailable, sparse, or schema-divergent WHEN the scan runs THEN the
        output reports coverage caveats rather than fabricating evidence.
    evidence:
      - >-
        Added `scan_threshold_evidence` to `scripts/startup_analysis_contract.py` with output envelope
        `threshold_evidence_scan_v1`. The scan groups records by conversation, detects self-audit
        verbosity/abstraction/filler warnings and compaction over-limit/protected-overflow warnings,
        counts by warning category, artifact, capability, and threshold source, and links later
        implementation-boundary rewrites through salted event labels.
      - >-
        The retained scan output omits raw transcript and tool text. It emits salted `record:` and
        `session:` labels, canonical artifact labels, bounded word/anchor counts, detail-loss status,
        warning categories, threshold source IDs, runtime coverage, coverage caveats, degradations, and
        a privacy redaction summary.
      - >-
        The rewrite classifier records `possible_useful_detail_removed`,
        `possible_compression_without_anchor_loss`, `not_detected`, or `not_assessed` from transient
        word/anchor count deltas; it does not retain before/after text or patch bodies.
      - >-
        Regression tests prove a synthetic lint warning followed by an `apply_patch` rewrite reports
        aggregate warning/detail-loss evidence without retaining private prompt text, warning detail text,
        or rewrite body text, and degraded runtime coverage produces a caveat rather than fabricated
        evidence.
  - number: 3
    name: Classify false positives versus legitimate pressure
    depends_on:
      - 2
    status: complete
    acceptance:
      - >-
        GIVEN scan results include warning/rewrite candidates WHEN reviewed THEN each candidate category
        is classified as likely false positive, legitimate lint pressure, inconclusive, or unsupported by
        available coverage.
      - >-
        GIVEN useful information loss is claimed WHEN evidence is recorded THEN the claim names only
        redacted anchors, artifact labels, warning categories, and aggregate counts.
      - >-
        GIVEN evidence does not prove false positives WHEN the task completes THEN the plan keeps a
        no-threshold-change path open and records why the TODO should close or remain deferred.
    evidence:
      - >-
        Added `classify_threshold_evidence` to `scripts/startup_analysis_contract.py` with output
        envelope `threshold_evidence_classification_v1`. It groups redacted warning events by warning
        category and classifies each category as `likely_false_positive`, `legitimate_pressure`,
        `inconclusive`, or `unsupported_by_available_coverage`.
      - >-
        The classifier treats repeated `possible_useful_detail_removed` events as evidence to consider a
        minimal threshold or diagnostic change, but keeps `no_threshold_change_yet` for legitimate,
        inconclusive, or single-instance evidence and `defer_without_threshold_change` when coverage is
        unavailable or degraded with no events.
      - >-
        Retained classification output names only canonical artifact labels, capabilities, warning
        categories, event/classification counts, detail-loss status counts, salted event labels, coverage
        caveats, and privacy summaries. Tests prove raw transcript and raw tool-argument fields embedded
        in scan events are not retained.
      - >-
        Focused tests passed for repeated likely false-positive evidence, legitimate lint pressure,
        inconclusive evidence, unsupported coverage, the redacted scan path, and degraded runtime coverage.
  - number: 4
    name: Apply minimal threshold or diagnostic change if justified
    depends_on:
      - 3
    status: complete
    acceptance:
      - >-
        GIVEN a repeated false-positive class is proven WHEN code changes are made THEN the change is
        limited to the smallest affected budget, anchor pattern, filler diagnostic, compaction limit, or
        guidance wording.
      - >-
        GIVEN no repeated false-positive class is proven WHEN implementation reaches this task THEN no
        threshold is raised and the output records a no-change evidence report instead.
      - >-
        GIVEN threshold behavior changes WHEN CLI output is affected THEN `agentera lint` text/JSON and
        compaction check/fix semantics remain bounded, non-interactive, and test-backed.
    evidence:
      - >-
        Retained `.agentera/archive` evidence contains 10 archived plan files with 11
        `post-audit-flagged` marker matches. The repeated pattern is PLAN.md full-plan verbosity
        pressure: archived plans report full-plan or full-plan-adjacent PLAN.md artifacts exceeding the
        compact advisory prose/entry budget while preserving reviewed implementation detail.
      - >-
        Added `scan_retained_threshold_evidence` so retained artifact text can be classified through the
        same `threshold_evidence_scan_v1` and `threshold_evidence_classification_v1` pipeline as
        transcript-derived warning events. The retained output stores canonical artifact labels, warning
        categories, counts, and salted event labels only; raw retained artifact text is not emitted.
      - >-
        Applied the smallest behavior change at the proven seam: file-backed lint now checks verbosity
        against the artifact's full-file budget, while `--text` and
        stdin continue to use per-entry budgets for pre-write snippets. This resolves PLAN.md full-plan
        false-positive pressure without loosening abstraction checks, filler checks, compaction limits,
        advisory/strict semantics, or privacy gates.
  - number: 5
    name: Add regressions and privacy tests
    depends_on:
      - 4
    status: complete
    acceptance:
      - >-
        GIVEN self-audit behavior changes WHEN tests run THEN pass/fail cases cover the adjusted budget,
        anchor, or filler boundary and preserve existing strict/advisory semantics.
      - >-
        GIVEN transcript analysis output is added or changed WHEN tests inspect it THEN raw transcript
        text, raw paths, raw session IDs, prompts, and credentials are absent from retained outputs.
      - >-
        GIVEN no threshold change is made WHEN tests run THEN evidence-report tests still prove the
        no-change path is intentional and privacy-safe.
    evidence:
      - >-
        Added focused tests for the redacted threshold scan, repeated likely false-positive
        classification, legitimate lint pressure, inconclusive evidence, unsupported coverage, and the
        no-threshold-change/defer recommendations.
      - >-
        The classification privacy test injects raw transcript and raw tool-argument sentinel fields into
        scan events and proves retained classification output omits those sentinels.
      - >-
        Added retained-artifact scan tests proving archived post-audit PLAN.md budget pressure is
        classified as repeated likely false-positive evidence, unflagged TODO.md verbosity pressure stays
        inconclusive, and private retained-artifact sentinels are not emitted.
      - >-
        Added a lint regression proving `--file` PLAN.md input uses the full-file budget while `--text`
        with the same content still uses the 100-word per-entry budget.
  - number: 6
    name: Verify and close out threshold analysis
    depends_on:
      - 5
    status: complete
    acceptance:
      - >-
        GIVEN implementation or no-change analysis is complete WHEN verification runs THEN focused
        self-audit, compaction, transcript-analysis, artifact validation, and diff whitespace checks pass.
      - >-
        GIVEN the TODO is resolved WHEN closeout updates artifacts THEN TODO and PROGRESS explain whether
        thresholds were increased, left unchanged, or deferred due to insufficient evidence.
      - >-
        GIVEN runtime coverage is degraded or incomplete WHEN results are reported THEN coverage caveats
        are preserved rather than hidden.
    evidence:
      - >-
        Verification passed with `uv run pytest tests/test_startup_analysis_contract.py
        tests/test_self_audit.py` (71 tests), covering transcript scan privacy, retained-artifact
        evidence scanning, category classification, PLAN.md file-versus-text lint budgets, and existing
        self-audit behavior.
      - >-
        Local full-file lint verification passed with `AGENTERA_HOME=/home/jgabor/git/agentera uv run
        scripts/agentera lint --artifact PLAN.md --file .agentera/plan.yaml --format json`, proving the
        active full plan no longer receives the compact 100-word entry-budget verbosity advisory.
      - >-
        Artifact validation passed for PLAN.md, PROGRESS.md, TODO.md, and CHANGELOG.md, and `git diff
        --check` passed. TODO closeout records the actual outcome: thresholds were not blindly increased;
        file-backed lint now uses full-file budgets while snippet lint keeps per-entry budgets.
overall_acceptance:
  - >-
    GIVEN linting or compaction threshold changes are proposed WHEN evidence is reviewed THEN each change
    is backed by redacted transcript/corpus evidence showing repeated useful-information loss.
  - >-
    GIVEN available evidence does not prove false positives WHEN the work completes THEN no threshold is
    increased and the no-change conclusion is documented with coverage caveats.
  - >-
    GIVEN transcript analysis is retained in artifacts WHEN validators and tests run THEN no raw
    transcript text, raw session IDs, raw store paths, credentials, prompts, or local private paths are
    emitted.
  - >-
    GIVEN `agentera lint` or compaction behavior changes WHEN users run existing commands THEN advisory,
    strict, check, and fix semantics remain non-interactive and bounded.
surprises:
  - >-
    The first evidence pass found the relevant thresholds split across two mechanisms: self-audit checks
    in `scripts/self_audit.py` (`PROGRESS.md=500`, `PLAN.md=100`, `TODO.md=100`, filler patterns, anchor
    patterns) and compaction retention limits enforced by `agentera compact`, not one single lint knob.
  - >-
    Transcript tooling already has strong privacy constraints in `scripts/startup_analysis_contract.py`
    and `references/analysis/startup-measurement-contract.yaml`, so this plan must use redacted aggregate
    evidence rather than quoting raw sessions.

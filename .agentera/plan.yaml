design: >
  The installed-app content refresh is the missing B6 primitive. B1 made
  the v3 CLI read v3 sources from a repo checkout; B6 makes the upgrade
  carry that same v3 source set into the managed app home so a user with
  no repo checkout (AGENTERA_HOME pointing at a v2 installed app) reads
  v3 content after upgrade. Task 1 adds the refresh step and the gap
  detector that flags a stale v2 content surface in the app home. Tasks
  2-6 are verify-and-lock: investigation on feat/v3-b6 confirms the repo
  source already meets the v3 invariant for #4 (SKILL.md English via D70),
  #13 (contract instructions.ts + English ROUTE_ALIASES via D65/D70),
  #28 (protocol.yaml English via D70), and #43 (copy-bundle.mjs already
  excludes instructions.md via D65), so those tasks scope to: assert the
  v3 invariant in source, add a regression test that fails if a v2
  residue reappears, AND assert the upgrade refresh step carries the v3
  invariant into the app home. #12 is a true verify-or-fix because the
  artifact-schema producer/consumer/limit drift needs ground-truth
  inspection of each capabilities/*/schemas/*.yaml. #34 is a true fix:
  wire rebase_oracle.sh --check into CI/precommit so the python_commit
  drift is caught loudly instead of silently shipping a stale oracle.
  #35 is a true fix: retire the v2 hooks bundle on upgrade and rewire any
  pre-upgrade active hook config off v2 schemas. Each task carries
  Given/When/Then acceptance so ⎈ orkestrera can drive implementation
  against verifiable criteria and the v2/v3 content boundary cannot
  silently regress.
overall_acceptance: >
  GIVEN the B6 batch is complete, WHEN an existing v2 user runs
  `uvx --from git+https://github.com/jgabor/agentera agentera upgrade
  --yes` (or the npm equivalent) and then runs `agentera prime`, THEN the
  managed app home contains v3 content only: installed SKILL.md is the
  v3 English routing surface (#4); installed protocol.yaml uses English
  SKILL_GLYPHS/PHASES with zero Swedish -era residues (#28); installed
  capability_schema_contract.yaml references instructions.ts per D65 and
  ROUTE_ALIASES maps aliases->English (#13); installed
  capabilities/*/schemas/*.yaml use English producer/consumer and v3
  validation limits with no Swedish ArtifactRecord bleed-through (#12);
  installed references/ and registry.json are v3; installed bundle
  contains no instructions.md dead weight (#43, D65); installed hooks
  are v3 (no uv run hooks/*.py) and pre-upgrade active hook configs no
  longer reference v2 schemas (#35); `check validate` reads the same
  surfaces the runtime reads so validation is no longer false-green
  (#11). AND npmParityMatrix oracle is pinned to a reachable main commit
  and rebase_oracle.sh --check runs in CI/precommit to fail loud on
  silent drift (#34). AND all 8 defects (#4, #11, #12, #13, #28, #34,
  #35, #43) are resolved with regression tests guarding each invariant.
  AND pnpm -C packages/cli run typecheck clean, pnpm -C packages/cli
  build green, pnpm -C packages/cli test green (no fewer tests than the
  B5 baseline of 1088; verify-and-lock and true-fix tasks add regression
  coverage), npx -y agentera check validate capability-contract
  --format json green, and `pnpm -C packages/cli build && node
  packages/cli/dist/bin/agentera.js check compact` green.

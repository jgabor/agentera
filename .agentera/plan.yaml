header:
  level: full
  created: '2026-05-06'
  status: complete
  reviewed: '2026-05-06'
  critic_issues: "8 found, 8 addressed, 0 dismissed"
  title: Deepen Capability Schema Contract
what: >
  Make skills/agentera/capability_schema_contract.yaml the real Interface for capability validation. Replace validator-local
  hardcoded capability contract facts in scripts/validate_capability.py with a contract loader/model that derives required groups,
  directory requirements, entry required fields, trigger priority rules, deprecation behavior, group-prefix policy, and capability
  primitive-reference field mappings from machine-readable contract sections. Capability tests should prove changing a fixture
  contract changes validation behavior.
why: >
  TODO [arch-capability-schema-contract] identifies capability_schema_contract.yaml as a shallow Interface: it documents the
  contract, but scripts/validate_capability.py owns the actual Implementation through REQUIRED_GROUPS, GROUP_PREFIXES,
  PROTOCOL_GROUPS, PROTOCOL_REFERENCEABLE_FIELDS, VALID_PRIORITIES, and directory checks. validate_capability(cap_dir,
  contract_path) accepts a contract path, but normal capability validation currently ignores that path.
constraints: >
  Preserve current capability validation semantics and CLI output unless characterization explicitly names an intentional change.
  capability_schema_contract.yaml owns capability schema structure only. protocol.yaml remains the sole owner of protocol primitive
  groups, primitive values, protocol group prefixes, and protocol self-validation. Do not implement routing/exit vocabulary fixes,
  artifact registry, artifact write validation, package/runtime/install-root changes, version bumps, release
  publication, remote pushes, or unapproved writes.
scope:
  included:
    - archive the completed PackageManifest registry plan with validation evidence
    - characterize current validator behavior, CLI output, warnings, exit codes, and contract drift before migration
    - make missing contract rules machine-readable before relying on them
    - define CapabilitySchemaContract ownership, bootstrap rules, and protocol boundary
    - introduce a contract loader/model with malformed-contract fixture tests
    - migrate capability directory validation to use contract data through contract_path
    - migrate capability primitive-reference field mapping while keeping protocol primitive values in protocol.yaml
    - align capability tests, docs, and TODO status
    - validate all capabilities and close only [arch-capability-schema-contract]
  excluded:
    - protocol.yaml primitive value authority or protocol self-validation ownership changes
    - routing/exit vocabulary changes, including routing scoring implementation and SKILL.md exit vocabulary correction
    - artifact registry refactor
    - artifact write validation Module split
    - package/runtime/install-root changes, including PackageManifest registry, RuntimeAdapter registry, and install-root changes
    - version bump or release publication
  deferred:
    - [arch-routing-exit-vocabulary]
    - [arch-artifact-registry]
    - [arch-artifact-write-validation]
    - [audit-20-health-command-stale]
    - [agentera-optional-claude-live-smoke]
design: >
  Put the seam at capability schema structure, not protocol values. The contract may say which capability fields reference protocol
  primitives; protocol.yaml still defines the primitive groups and values. Use a small bootstrap validation layer for the contract file
  itself so malformed contract fixtures fail deterministically before the full model is built. Preserve currently unenforced group-prefix
  behavior unless a characterization task explicitly records and approves enforcement as a semantic change.
tasks:
  - number: 1
    name: Reconcile Plan State And Contract Scope
    depends_on: []
    status: complete
    acceptance:
      - GIVEN the PackageManifest registry plan is complete WHEN this contract plan becomes active THEN the completed plan is archived with validation evidence intact
      - GIVEN TODO has multiple critical findings WHEN the next item is selected THEN [arch-capability-schema-contract] is identified as the planned work and unrelated findings remain open
      - GIVEN capability contract work starts WHEN scope is recorded THEN protocol value authority, routing/exit vocabulary, artifact registry, artifact write validation, package/runtime/install-root changes, and release publication are explicitly out of scope
  - number: 2
    name: Characterize Validator Behavior And Drift
    depends_on:
      - Task 1
    status: complete
    acceptance:
      - GIVEN current validator CLI paths run WHEN valid, missing-directory, empty-schemas, missing-group, malformed-group, invalid-priority, and deprecation-warning fixtures are checked THEN stdout, stderr, exit codes, error labels, and ordering are recorded before migration
      - GIVEN validate_capability receives alternate contract_path WHEN current behavior is characterized THEN the ignored-contract behavior is recorded before refactor
      - GIVEN capability_schema_contract.yaml declares group prefixes, priority rules, and directory requirements WHEN current validator behavior is inspected THEN declared-but-unenforced and prose-only rules are named as preserve, standardize, or defer
      - GIVEN primitive reference validation runs WHEN protocol fields are checked THEN current ownership split between capability field mapping and protocol.yaml values is recorded
  - number: 3
    name: Make Contract Rules Machine-Readable
    depends_on:
      - Task 2
    status: complete
    acceptance:
      - GIVEN priority requirements are represented WHEN the contract is loaded THEN TRIGGERS priority requiredness and allowed values are encoded as structured data, not prose parsing
      - GIVEN directory requirements are represented WHEN the contract is loaded THEN prose.md, schemas directory, schema glob, and minimum YAML file count are encoded as structured data
      - GIVEN entry requirements are represented WHEN the contract is loaded THEN per-group required fields and deprecation replacement behavior are encoded as structured data
      - GIVEN primitive-reference field mapping is represented WHEN the contract is loaded THEN the contract owns capability field-to-protocol-group mapping while protocol.yaml still owns primitive group values
  - number: 4
    name: Define Contract Loader And Bootstrap Model
    depends_on:
      - Task 3
    status: complete
    acceptance:
      - GIVEN a contract file is loaded WHEN bootstrap validation runs THEN missing REQUIRED_GROUPS, bad ENTRY_SCHEMA, bad GROUP_PREFIXES, missing rule sections, and missing self groups fail deterministically with clear errors
      - GIVEN a valid contract is loaded WHEN the model is built THEN required groups, directory rules, entry rules, trigger priority rules, deprecation rules, group-prefix policy, and primitive-reference mappings are available from one model
      - GIVEN malformed contract fixtures exist WHEN contract tests run THEN each rule family has a focused failing fixture and message
      - GIVEN protocol.yaml is loaded WHEN protocol self-validation runs THEN protocol group definitions and primitive values remain outside the CapabilitySchemaContract model
  - number: 5
    name: Migrate Capability Validation To Contract Data
    depends_on:
      - Task 4
    status: complete
    acceptance:
      - GIVEN capability directory validation runs WHEN directory, required-group, numbered-entry, stable-id, priority, and deprecation checks execute THEN those rules come from the loaded contract model
      - GIVEN a fixture contract changes required groups, required fields, priority enum, or directory YAML minimum WHEN validation runs THEN capability validation observes the changed contract without editing validator-local constants
      - GIVEN existing capability tests run WHEN migration lands THEN primary validation messages, warning behavior, and exit codes remain stable or intentional changes are documented
      - GIVEN group prefixes remain non-enforced WHEN migration lands THEN the behavior is either preserved by test or explicitly changed with characterization evidence
  - number: 6
    name: Migrate Primitive Reference Mapping Safely
    depends_on:
      - Task 5
    status: complete
    acceptance:
      - GIVEN capability primitive reference checks run WHEN severity, finding_severity, issue_severity, decision_label, exit_signal, and phase fields are inspected THEN field-to-protocol-group mapping comes from the contract model
      - GIVEN a fixture contract changes a referenceable capability field mapping WHEN primitive checks run THEN validation observes that mapping without editing validator-local constants
      - GIVEN protocol primitive values are needed WHEN primitive checks run THEN values still come only from protocol.yaml
      - GIVEN protocol self-validation runs WHEN this migration completes THEN PROTOCOL_GROUPS-style protocol structure checks remain protocol-owned and unchanged
  - number: 7
    name: Align Tests, Docs, And TODO Status
    depends_on:
      - Task 6
    status: complete
    acceptance:
      - GIVEN capability contract docs mention validation authority WHEN this task completes THEN docs point at capability_schema_contract.yaml plus the loader/model and avoid duplicating contract-owned values without validation
      - GIVEN per-capability tests validate schemas WHEN this task completes THEN tests exercise the contract Interface rather than re-encoding validator-local constants
      - GIVEN version policy is evaluated WHEN this refactor is closed THEN CHANGELOG, docs index, and version files are updated or explicit no-bump rationale is recorded
      - GIVEN unrelated architecture findings remain open WHEN TODO is updated THEN only [arch-capability-schema-contract] is resolved or narrowed
  - number: 8
    name: Validate And Close
    depends_on:
      - Task 7
    status: complete
    acceptance:
      - GIVEN focused validation runs WHEN the plan closes THEN contract loader tests, validator characterization tests, per-capability validation tests, primitive-reference tests, and protocol self-validation pass
      - GIVEN broader validation runs WHEN practical THEN full pytest, all 12 capability validations, cross-capability validation, lifecycle validation, docs CLI, artifact query, and py_compile checks pass
      - GIVEN future work remains WHEN this plan closes THEN routing/exit vocabulary, artifact registry, artifact write validation, health command freshness, and optional live smoke TODOs remain separate
      - GIVEN worktree changes are reviewed WHEN validation ends THEN only capability-contract plan changes are present or unrelated changes are reported without reverting
overall_acceptance:
  - GIVEN a capability schema rule changes WHEN validator, tests, and docs need that rule THEN the change is made in capability_schema_contract.yaml or its model rather than duplicated across callers
  - GIVEN a protocol primitive value changes WHEN capability primitive checks run THEN the value still comes from protocol.yaml, not from the capability contract
  - GIVEN a malformed contract is supplied WHEN validation starts THEN the failure is deterministic and does not depend on a fully built contract model
  - GIVEN capability contract work completes WHEN routing/exit vocabulary or artifact behavior is inspected THEN those findings remain owned by their separate TODOs
surprises: []

    discovered). Lockfile updated cleanly; vitest resolved to 4.1.9. Typecheck 0 errors.
    Suite 1145/1145 green over 132 files (37.6s at maxWorkers=4).'
  discovered: 'vitest 4 enforces the 5000ms default testTimeout on blocking spawnSync/DB
    tests where v2 did not. The extractCorpusParity Python-probe tests run ~9-16s
    legitimately and passed unconstrained on v2, but timed out at 5000ms on v4 with
    no test slowdown (v4 durations 9.0s/15.5s vs v2 9.8s/12.3s -- comparable). This
    tightening was not anticipated by the plan design note''s cross-check, which covered
    pool/workspace/minWorkers/mock/snapshot but not timeout enforcement. Fixed in-scope
    by adding `testTimeout: 30_000` to vitest.config.ts (2x headroom over the observed
    16s peak; still catches hung tests). Recorded in plan.yaml `surprises`.'
  verified: 'pnpm -C packages/cli install: clean (vitest 2.1.9 -> 4.1.9). `pnpm -C
    packages/cli run typecheck`: 0 errors. `pnpm -C packages/cli test`: 1145/1145
    passed, 132 files, 37.58s. `pnpm why vitest` reports 4.1.9. minWorkers line gone;
    maxWorkers + experimentalFsModuleCache preserved. No mock/snapshot/poolOptions/workspace
    errors surfaced.'
  next: Plan task 2 (migrate CLI to vite.config.ts under vite-plus; drop direct vitest
    devDep; test script -> `vp test run`). Depends on task 1, now unblocked.
  context:
    intent: Upgrade packages/cli from vitest 2.x to 4.x in isolation (phase 1 of a
      two-phase toolchain modernization).
    constraints: No behavior change to shipped CLI. Branch feat/v3 only. Worker-budget

    \ succeeds. pnpm -C packages/cli test: 110 files, 1034 tests pass. node packages/cli/dist/bin/agentera.js\
    \ check validate capability-contract --format json: pass. node packages/cli/dist/bin/agentera.js\
    \ check compact: no budget regression.'

- number: 623
  timestamp: 2026-06-23 14:38
  type: fix
  phase: build
  what: Harden v2 install defense against silently corrupted scripts/agentera; release
    2.7.11.
  discovered: "Plan Task 1 root cause was environmental (case c) \u2014 the v2 install\
    \ path on origin/main HEAD did not reproduce the corruption. Plan Task 2 was rewritten\
    \ to harden what CAN be hardened in v2 source: a defensive post-install assertion\
    \ in apply_bundle_phase that aborts the upgrade with an explicit RuntimeError\
    \ when the installed app/scripts/agentera is missing, shorter than 8000 lines,\
    \ lacks a shebang, or fails ast.parse. The check runs outside the per-item try/except\
    \ so a corrupted install surfaces as a hard failure rather than a silently swallowed\
    \ 'failed' item status."
  verified: tests/test_apply_bundle_phase_defense.py covers defense behavior (missing/short/no-shebang/invalid-Python/abort-outside-try-except
    and a clean 8528-line source passes); tests/test_apply_bundle_phase_byte_equality.py
    pins byte equality against REPO_ROOT on a clean state. UPGRADE.md Runtime notes
    sections 'v2 install defense' and 'v2/v3 boundary in the v2 wheel' document the
    new surface. All 11 canonical version_files plus README.md, v3-handoff.json installed_v2_version
    and written_at, packages/cli/package.json suiteVersion/gitRef, and three test
    fixture files aligned to 2.7.11.
  next: null
  context:
    intent: "Plan task 3 \u2014 final state sync on main: version bump 2.7.10 to 2.7.11\
      \ (fix scope per semver_policy), CHANGELOG entry under ### Fixed, PROGRESS cycle,\

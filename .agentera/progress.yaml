- number: 679
  timestamp: 2026-06-27 12:00
  type: refactor
  phase: build
  what: 'Plan task 1 (chore:3.0.0): consolidate scattered `type Dict = Record<string,
    any>` aliases in the hooks subsystem. Removed the local alias in all 12 hooks
    modules (sessionStart/Stop, validateArtifact/{violations,traversal,markdown,schema,index,runtime},
    compaction/{dryRun,retention,parse,apply}) and imported `JsonObject` from core/jsonValue.
    Tightening to the strict JsonValue union surfaced ~80 latent typecheck errors
    from dynamic property access on parsed-JSON maps; resolved in-scope by keeping
    IO-boundary casts (file/YAML/stdin parse) with `// cast:` comments and narrowing
    internal access via type guards (e.g. isMapping in violations.ts). ~14 internal
    casts converted, ~22 IO casts kept and documented.'
  discovered: "JsonObject is NOT structurally compatible with Record<string, any>\
    \ \u2014 the strict union member type exposed latent unsafety across parsed-JSON\
    \ map access. The design-phase \"largely mechanical\" assumption was wrong; tasks\
    \ 2-5 should budget for the same tightening surface. The strictness win is the\
    \ actual point of the refactor."
  verified: 'pnpm -C packages/cli run typecheck passes (0 errors). pnpm -C packages/cli
    test: 1145/1145 pass (132 files; hooks/validate/compaction subset 138/138). rg
    `type Dict\s*=` in packages/cli/src/hooks/ returns no matches. No fixture/snapshot
    change.'
  next: "Plan task 1 complete. Next dependency-ready: tasks 2 (CLI commands/state-query),\
    \ 3 (capabilityContext/startup-analysis), 5 (long-tail) \u2014 all depend only\
    \ on 1. Task 4 blocked on 3. Hold for commit approval before proceeding."
  context:
    intent: Type-only consolidation of JSON-value aliases onto the shared core/jsonValue
      module; narrow `as` casts to IO boundaries. No behavior change.
    constraints: Only the 12 hooks files. core/jsonValue.ts untouched. No new public
      API. feat/v3 only.
    artifacts:
      plan: .agentera/plan.yaml (task 1 -> complete; surprise recorded)

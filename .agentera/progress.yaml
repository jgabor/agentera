    artifact labels, capabilities, warning categories, salted event labels, aggregate
    counts, detail-loss status counts, coverage caveats, and privacy summaries. Focused
    tests passed for repeated detail-loss evidence, legitimate pressure, inconclusive
    evidence, unsupported coverage, the redacted scan path, degraded runtime coverage,
    and raw transcript/tool-argument non-retention.
  next: 'Continue with Task 4: apply the smallest threshold, diagnostic, documentation,
    or no-change outcome justified by the classified evidence. Do not raise thresholds,
    weaken linting or compaction, retain raw transcripts, refresh installed apps/profiles,
    edit vision/objective state, change decision satisfaction, publish, push, tag,
    or commit unless explicitly requested.'

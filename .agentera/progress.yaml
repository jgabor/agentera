cycles:
  - number: 644
    timestamp: 2026-06-04 14:30
    type: fix
    phase: build
    what: |-
      npm `@next` version-divergence gate (TODO L21). Added
      `packages/cli/src/release/releaseMetadata.ts` that reads
      `registry.json` `skills[0].version` as the authoritative source of
      truth and asserts the four source-tree surfaces agree: (1)
      `packages/cli/package.json` top-level `version` shares its
      major.minor.patch with the registry version (a pre-release
      suffix like `-dev.5` is allowed on the @next development
      channel), (2) `agentera.suiteVersion` equals the registry
      version exactly, (3) `agentera.gitRef` is a 40-character hex
      SHA, and (4) `references/cli/update-channels.yaml`
      `version_resolution.latest_on_channel.offline_defaults.development`
      equals the registry version. The local
      `packages/cli/bundle/.agentera-npx-bundle.json` is an advisory
      check only — the bundle is gitignored and regenerated by
      `copy-bundle.mjs` at `prepack`; a stale local bundle reports
      a single `release-metadata drift (advisory)` line with a
      `npm run bundle:data` repair hint and does not block the
      gate. Wired as `agentera check validate release-metadata` via
      `cli/commands/validate.ts` (added to `VALIDATE_DELEGATED_SCRIPTS`,
      `DELEGATED_RUNNERS`, and the error-message family list) and
      `cli/dispatch.ts` (added to both `valid_values` lists in the
      `check validate` help and the unsupported-family error
      envelope). The 2.x stable channel retains its own
      `offline_defaults.stable` per the channel compatibility
      boundary until explicit retirement; the validator does not
      gate the stable default.
    inspiration: TODO.md L21 ([fix:3.0.0] npm `@next` version 3.0.0-dev.4 diverges
      from `suiteVersion` 2.7.6 in `packages/cli/package.json`).
    discovered: "`packages/cli/bundle/.agentera-npx-bundle.json` was already stale
      in the working tree (suiteVersion `2.7.7`) before this write, but the
      bundle is in `.gitignore` (`packages/cli/bundle`), so the staleness is
      local-only and gets rebuilt at `prepack` time. The advisory check turns a
      future unnoticed bundle staleness into a maintainer-visible warning
      without breaking the gate. `registry.json` forbids pre-release suffixes so
      the suite authority always carries the released core version, while
      `package.json` `version` is the only surface that may carry `-dev.N` on
      the @next channel. The `agentera.gitRef` shape rule (40-char hex SHA)
      rejects short SHAs and branch names because the field must be reproducible
      from a single commit for the published artifact. progress.yaml at 10/40/50
      cap before this write; this cycle demotes 634 to archive."
    verified: |-
      pnpm -C packages/cli test — 812/812 (85 files, +1 file and
      +18 cases vs cycle 643's 794/794); typecheck clean; build
      clean; `node packages/cli/dist/bin/agentera.js check validate
      release-metadata` returns `release-metadata ok` (rc 0) on the
      live feat/v3 tree; the same validator returns
      `release-metadata validation failed: …` (rc 1) on every
      single-surface drift in the regression suite (registry
      missing/malformed/pre-release-suffixed, package version
      drift, suiteVersion drift, gitRef missing/short/branch/non-hex,
      channel-default drift, missing package.json, missing
      channels); the in-sync 2.x stable-line fixture and the
      in-sync advisory-bundle fixture both pass. Capability-contract
      validate still passes; npmParityMatrix untouched.
    next: |-
      Headline TODO L16 (v3 TS rewrite cutover) and the related
      Decision 56 feeds_into plan remain open. CHANGELOG fold
      deferred to release per AGENTS.md. Possible follow-ups: add
      a `scripts/release-bump.mjs` helper that bumps registry.json
      + package.json + channels.yaml together so the gate is the
      only thing that catches human error; add a `check validate
      release-metadata` step to the lefthook pre-commit and to the
      npm publish gate.
    context:
      intent: Eliminate npm `@next` version-divergence as a silent failure mode by
        treating `registry.json` `skills[0].version` as the single source of
        truth, asserting the four source-tree version surfaces agree, and
        surfacing the local bundle staleness as a maintainer-visible advisory.
      constraints: |-
        Source-only contract — the bundle is build output, not
        source. No changes to `references/adapters/package-registry.yaml`
        `docs_targets.version_files` (the Python distribution's
        contract) because the npm `@next` distribution boundary
        is its own surface. No changes to `references/cli/update-channels.yaml`
        `offline_defaults.stable` (the 2.x stable line stays
        retired from the validator's gating path). No new
        top-level CLI command; the new check is wired into
        `agentera check validate` only.
      unknowns: none
      scope: |-
        packages/cli/src/release/releaseMetadata.ts (new),
        packages/cli/test/release/releaseMetadata.test.ts (new,
        18 cases), packages/cli/src/cli/commands/validate.ts
        (release-metadata runner), packages/cli/src/cli/dispatch.ts
        (valid_values list), TODO.md (L21 fold to Resolved),
        .agentera/progress.yaml (this cycle; cycle 634 demoted
        to archive)

- number: 557
  timestamp: 2026-05-17 11:18
  type: feat
  phase: build
  what: Added the privacy-gated `agentera stats` workflow.
  commit: pending
  inspiration: Orkestrera executed the Stats Privacy and Consent Workflow plan to
    make stats the canonical user-facing usage analytics command while preserving
    `agentera usage` compatibility.
  discovered: The existing usage engine was already the right analysis layer, so the
    safe seam was a thin `agentera stats` wrapper that reads only the existing internal
    corpus and a separate `stats refresh` path that previews by default and requires
    `--consent local-history` before delegating to `extract_corpus.py`.
  verified: '`uv run pytest tests/test_usage_namespace.py tests/test_usage_stats.py
    -q` passed with 59 tests. `uv run pytest -q` passed with 1103 tests. Touched
    artifact validators for TODO, CHANGELOG, PLAN, PROGRESS, and DOCS passed. `uv
    run scripts/agentera compact --mode check --format json` passed after safe compaction
    fix trimmed TODO/PROGRESS retained logs. `git diff --check` passed.'
  next: Commit the stats batch, then continue remaining 2.5.x helper-script cleanup
    and classification-policy seams.
  context:
    intent: Orkestrera execution of the Stats Privacy and Consent Workflow plan.
    constraints: Preserve `agentera usage` and direct `scripts/usage_stats.py` behavior;
      do not expose `agentera corpus`; plain stats and refresh dry-runs must not read
      runtime history or write corpus files; no installed app/profile refresh beyond
      explicitly consented internal corpus, publication, push, tag, package-manager
      change, vision/objective edit, or decision satisfaction change.

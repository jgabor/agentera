decisions:
- number: 43
  date: '2026-05-07'
  question: How should Agentera expose plain user-facing routes without losing canonical
    Swedish capability identity?
  context: The 2026-05-07 vocabulary deliberation settled on "Brand the worldview.
    Boring-name the work." Users should not need to know Swedish capability names
    first, but Decisions 39-40 made capabilities canonical v2 protocol objects and
    Decision 42 routes explicit capability names through `/agentera`.
  alternatives:
  - name: Rename capabilities to plain English
    status: rejected
    description: Clearer first contact, but high churn across directories, schemas,
      artifacts, markers, tests, and product identity.
  - name: Trigger phrases only
    status: rejected
    description: Improves natural-language routing but gives users no stable plain
      shortcut.
  - name: One primary plain alias per capability
    status: chosen
    description: Keep canonical names and add a small documented action alias surface;
      colloquial variants stay in trigger schemas.
  choice: 'Keep Swedish `-era` names canonical and add one primary plain `/agentera
    <alias>` per capability: `status`, `vision`, `discuss`, `research`, `plan`, `build`,
    `optimize`, `audit`, `document`, `profile`, `design`, and `orchestrate`.'
  reasoning: Aliases reduce first-contact friction without renaming protocol objects.
    Exact aliases stay few and stable; secondary phrases like `brief`, `what's next`,
    `deliberate`, `brainstorm`, and `rubber duck` belong in trigger schemas so they
    do not become canonical identity.
  confidence: firm
  feeds_into: SKILL.md routing, schemas/triggers.yaml, README.md, docs/vocabulary.md,
    tests
- number: 44
  date: '2026-05-07'
  question: How should Agentera handle plain-English vocabulary inside capability
    prose and internal protocol docs after Decision 43?
  context: Decision 43 kept Swedish names while adding aliases. This review found
    abstract prose terms such as `freshness`, non-Git `checkpoint`, `guard`, `Reality
    Verification Gate`, `conductor protocol`, `memory layer`, `operating record`,
    `drift`, and `DTC` kept as internal vocabulary even when plain wording is equally
    precise.
  alternatives:
  - name: Keep current internal vocabulary
    status: rejected
    description: preserves avoidable jargon.
  - name: Rename all identifiers now
    status: rejected
    description: high schema, test, and history churn.
  - name: Plain prose with stable IDs
    status: chosen
    description: replace prose and labels first; migrate identifiers deliberately.
  choice: Use plain English for capability/protocol prose and labels. Deprecate `freshness`;
    use current/up-to-date/out-of-date/synced/status wording. Keep `checkpoint` only
    for Git commits. Replace most `guard` with check/stop-condition wording; keep
    `gate` only for hard pass/fail. Use `behavioral verification gate`, `orchestration
    loop`, `saved project context`, mismatch/out-of-sync wording, and `docs-first`
    workflow language.
  reasoning: Identity belongs in stable names and IDs, not every workflow noun. Plain
    prose reduces cognitive load; stable IDs protect compatibility until migration
    earns its cost.
  confidence: firm
  feeds_into: docs/vocabulary.md, capability prose, safe labels/tests, active plan
    wording, TODO.md
- number: 45
  date: '2026-05-08'
  question: How should Agentera apply the agent-ready interface playbook to its CLI
    surface after the 2.2.0 alias and vocabulary work?
  context: Inspirera analysis of `~/docs/agent-ready-interface-playbook.md` identified
    structured routine output, runtime schema introspection, sparse responses, and
    input hardening as the highest-value Agentera interface improvements. Decision
    44 protects stable command names and parseable labels, while Decision 43 keeps
    slash route aliases separate from CLI state commands. The current `bundle-status`
    command names a narrow installed-bundle check even though the desired surface
    is a broader Agentera CLI/install/runtime self-check.
  alternatives:
  - name: Freeze state commands and improve outputs
    status: chosen
    description: Preserve routine state command names, add structured output and field
      selection, add runtime describe/schema introspection, and harden inputs without
      adding slash-route aliases as CLI commands.
  - name: Add CLI commands for route aliases
    status: rejected
    description: Would blur the Decision 43 route/CLI boundary by teaching aliases
      like status, build, audit, and document as CLI state commands.
  - name: Keep bundle-status as the long-term diagnostic command
    status: rejected
    description: Accurate for today's installed-bundle check, but too narrow for future
      Agentera CLI self-audit, runtime, hook, package, and schema health checks.
  - name: Add doctor while keeping bundle-status as an alias
    status: rejected
    description: Safer for compatibility, but leaves duplicate CLI vocabulary in the
      pending release and weakens the plain-English command surface cleanup.
  choice: 'Build one phased agent-ready state interface plan for pending 2.2.0: keep
    routine state command names stable, improve human text output where useful, add
    structured routine output, add runtime describe/schema introspection, add field
    selection, harden artifact/path inputs, and hard-rename `agentera bundle-status`
    to `agentera doctor` with no compatibility alias.'
  reasoning: The playbook's core lesson is that agent-facing interfaces need predictable
    structured I/O, runtime self-description, scoped responses, and defensive boundaries.
    Agentera already has the schema and registry foundations; the next step is to
    expose them through the CLI without collapsing slash routes into state commands.
    `doctor` is the right plain command for Agentera's own install/runtime/CLI health,
    while artifact health remains `agentera health`.
  confidence: firm
  feeds_into: PLAN.md, scripts/agentera, README.md, docs/vocabulary.md, tests
- number: 46
  date: '2026-05-08'
  question: How should Agentera handle capability handoff wording and confirmation
    guidance for pending 2.2.0?
  context: '`docs/notes.md` identified three related release-polish gaps: capability
    handoffs still teach standalone slash-capability labels such as `/realisera`,
    next capability recommendations are inconsistent, and bounded choices do not consistently
    use runtime-native question tools. Decisions 43 and 45 already separate `/agentera
    <alias>` routes from CLI state commands, so handoff prose should stop making agents
    remember runtime-specific slash conventions. The user selected the handoff polish
    option for v2.2.0 and explicitly required recording this decision before implementation
    continues.'
  alternatives:
  - name: Handoff polish for v2.2.0
    status: chosen
    description: Normalize handoffs to glyph plus canonical capability name, reserve
      `/agentera <alias>` for explicit route docs, use runtime-native question tools
      for bounded choices, and add regression coverage.
  - name: Completed-plan lifecycle cleanup
    status: rejected
    description: Relevant, but broader lifecycle behavior that should be planned separately
      from release polish.
  - name: CLI write support
    status: rejected
    description: Valuable, but too large for the current 2.2.0 release window and
      likely deserves its own design.
  - name: Record follow-ups only
    status: rejected
    description: Leaves a small but visible v2.2.0 UX inconsistency unresolved after
      Decisions 43-45 tightened the route surface.
  choice: "Include a narrow handoff-polish item in pending 2.2.0: capability prose\
    \ should recommend downstream capabilities as glyph plus canonical name labels\
    \ such as `\u29C9 realisera`, reserve `/agentera <alias>` for explicit slash-route\
    \ documentation, use the runtime's native question tool for clear bounded choices,\
    \ put the recommended option first, include `Done`, and ask for confirmation before\
    \ invoking a downstream capability."
  reasoning: This compounds Decisions 43-45 without changing command semantics. It
    removes a runtime-convention burden from agents, makes handoffs more consistent,
    and keeps the release scope smaller than lifecycle archival or YAML write support.
  confidence: firm
  feeds_into: SKILL.md, capability prose, tests, CHANGELOG.md, docs/vocabulary.md
- number: 47
  date: '2026-05-08'
  question: How should Agentera rename bundle semantics and organize app, profile,
    and user data roots?
  context: "Current `AGENTERA_HOME` means a replaceable installed bundle root, while\
    \ `PROFILE.md` lives in the platform data directory. That split makes \u201Cbundle\u201D\
    \ leak into user language and blurs mutable user data versus managed app files."
  alternatives:
  - name: App-home layout
    status: chosen
    description: '`AGENTERA_HOME` is a durable platform data home; managed app files
      live under `AGENTERA_HOME/app`; profile and usage data live at the home root.'
  - name: Rename only in user-facing prose
    status: rejected
    description: Keeps root semantics and internal contracts confusing.
  - name: Keep current bundle root
    status: rejected
    description: Preserves the profile/app split and stale install-root ambiguity.
  - name: Mutate through doctor
    status: rejected
    description: Makes the self-check command write state instead of preserving read-only
      diagnostics.
  choice: Replace bundle terminology with app terminology across live internals, redefine
    default `AGENTERA_HOME` as the platform data home, place the managed Agentera
    app under `AGENTERA_HOME/app`, and keep `PROFILE.md`, `USAGE.md`, history, and
    intermediate corpus data under `AGENTERA_HOME`.
  reasoning: "\u201CInstall the Agentera app\u201D is clearer than \u201Cinstall the\
    \ Agentera bundle,\u201D and home/app separation protects user data from app refreshes.\
    \ `agentera doctor` should detect legacy bundle-root installs and report migration_required\
    \ with exact dry-run/apply commands; `agentera upgrade` owns the idempotent migration\
    \ writes."
  confidence: firm
  feeds_into: TODO.md, PLAN.md, README.md, UPGRADE.md, scripts/install_root.py, scripts/agentera_upgrade.py,
    scripts/agentera, package/runtime registries, tests
- number: 48
  date: '2026-05-08'
  question: How should Agentera expose self-audit and maintainer scripts through the
    CLI?
  context: Agents currently call `scripts/self_audit.py` through inline Python for
    pre-write artifact checks. Decision 45 made the CLI an agent-ready state interface,
    and Decision 47 keeps `agentera doctor` read-only for install/app/runtime diagnostics
    while `agentera upgrade` owns writes. README still exposes several direct maintainer
    scripts.
  alternatives:
  - name: Add agentera lint first
    status: chosen
    description: Expose self-audit through a dedicated lint namespace with structured
      output, advisory default behavior, and optional strict mode.
  - name: Fold self-audit into doctor
    status: rejected
    description: Blurs doctor beyond install/app/runtime health into artifact prose
      quality and codebase health.
  - name: Merge all scripts now
    status: rejected
    description: Creates a junk-drawer CLI before stable command namespaces are defined.
  - name: Keep scripts only
    status: rejected
    description: Leaves agents using ad hoc inline Python for a contractually required
      pre-write check.
  choice: 'Expose `scripts/self_audit.py` through `agentera lint` first. Keep `agentera
    doctor` scoped to install/app/runtime diagnostics. Promote other scripts only
    behind cohesive namespaces: `agentera validate` for validators, `agentera verify`
    or `agentera smoke` for eval and smoke gates, and `agentera corpus`/`agentera
    usage` for profile analytics. Keep registry/model modules private.'
  reasoning: A lint command solves the immediate agent ergonomics problem without
    changing doctor semantics. Script promotion should be driven by stable workflow
    value and structured I/O, not by the existence of a standalone Python file.
  confidence: firm
  feeds_into: TODO.md, scripts/agentera, README.md, capability prose, tests
- number: 49
  date: '2026-05-08'
  question: What TODO.md item contract should replace ISS-N counters and bracketed
    slug IDs?
  context: '`skills/agentera/references/contract.md` still documents `ISS-N` TODO
    identities while live `TODO.md` items use bracketed slugs such as `[agentera-221-...]`.
    The user rejected both as volatile, duplicate-prone manual identity, but still
    wants an optional exact release target such as `2.2.5` or patch-lane target such
    as `2.2.x`.'
  alternatives:
  - name: Keep ISS-N counters
    status: rejected
    description: Requires a central counter and creates collision/renumbering risk
      during concurrent artifact edits.
  - name: Keep bracketed slug IDs
    status: rejected
    description: Human-generated slugs drift, duplicate easily, and make TODO lines
      noisier than the work requires.
  - name: Separate release-target tag
    status: rejected
    description: Parseable, but adds a second metadata token when one token can express
      both required type and optional target.
  - name: Single type-or-type-target tag
    status: chosen
    description: Use `[type]` for untargeted work, `[type:X.Y.Z]` for work targeted
      at an exact release, and `[type:X.Y.x]` for work targeted at a patch lane whose
      exact patch is intentionally not chosen yet.
  choice: 'Use one mandatory TODO prefix tag: `[type]` for untargeted items, `[type:X.Y.Z]`
    for exact release-targeted items, and `[type:X.Y.x]` for a patch-lane target whose
    exact patch is intentionally not chosen yet. Type is one of `feat`, `fix`, `docs`,
    `refactor`, `chore`, `test`, or `perf`; `X.Y.Z` is an exact semver target, and
    `x` is allowed only in the patch position. Forbid scopes, `v` prefixes, minor/major
    ranges like `2.x` or `2.2.*`, inequality ranges, multiple targets, and generated
    item IDs. When the release is selected, convert `[type:X.Y.x]` to `[type:X.Y.Z]`.
    Status comes from the checkbox, priority from the section, and identity from normalized
    summary text.'
  reasoning: Only change type and optional release target carry durable TODO metadata.
    Patch-lane targets preserve useful release intent without forcing false precision
    before the exact patch is selected. Content identity avoids counters and slug
    churn, while the single prefix tag keeps `TODO.md` readable and deterministic
    for `agentera todo`, compaction, and release queries.
  confidence: firm
  feeds_into: TODO.md, skills/agentera/references/contract.md, skills/agentera/schemas/artifacts/todo.yaml,
    scripts/agentera, hooks/compaction.py, tests
- number: 50
  date: '2026-05-12'
  question: What should Agentera 2.3.0 include?
  context: '2.2.3 release prep is complete and no open 2.2.x TODOs remain. Open degraded
    items cluster around installed capability reliability: self-audit helper exposure,
    schema discovery, and split install roots. Decision 47 requires app-home migration;
    Decision 48 says expose self-audit via `agentera lint` without merging every script
    into the CLI.'
  alternatives:
  - name: Focused reliability release
    status: chosen
    description: Anchor 2.3.0 on app-home migration, `agentera lint`, and installed-capability
      diagnostics.
  - name: Patch-only reliability
    status: rejected
    description: Fix helper/schema/root defects without app-home migration, leaving
      the root ambiguity intact.
  - name: Broad capability expansion
    status: rejected
    description: Include Profilera corpus parity too, increasing validation scope
      before the app surface is coherent.
  choice: Make 2.3.0 a focused reliability release. Include Decision 47 app-home migration
    as a hard requirement; implement Decision 48 first through `agentera lint`; resolve
    the degraded helper exposure/removal, schema discovery, and split-root doctor
    checks. Defer Profilera corpus parity and broad script namespace promotion beyond
    `lint`.
  reasoning: 'The highest-friction failures share one cause: agents cannot confidently
    locate the active app, helper scripts, schemas, and install roots. App-home migration
    gives those surfaces one durable model, while `lint` solves the immediate self-audit
    ergonomics without turning the CLI into a script dump.'
  confidence: firm
  feeds_into: TODO.md, .agentera/plan.yaml, scripts/install_root.py, scripts/agentera_upgrade.py,
    scripts/agentera, README.md, UPGRADE.md, capability prose, tests
- number: 51
  date: '2026-05-13'
  question: What should Agentera measure before optimizing capability startup state
    access?
  context: 'Decision 41 closed the v2.0 token benchmark against the revised -10% target,
    but follow-up discussion identified a different pain: agents invoke Agentera capabilities,
    run Agentera CLI state commands for compressed project state, and then still read,
    grep, or glob raw `.agentera/*.yaml` or root artifact files before implementation
    work begins. An uncommitted startup-window draft first tried to measure only slash-route
    or exact intro-marker windows, found zero qualifying windows, and would have closed
    the startup-envelope follow-up. That draft was too strict because real OpenCode
    usage usually invokes capabilities through natural language such as `run orkestrera`
    or bare names such as `planera`.'
  alternatives:
  - name: Keep the route/intro startup-window metric
    status: rejected
    description: It misses the observed OpenCode behavior because most follow-up capability
      invocations do not use `/agentera` route text.
  - name: Design a generic startup state envelope immediately
    status: rejected
    description: The direct session scan shows redundant state access exists, but
      the interface should be driven by the retained artifact-overlap metric.
  - name: Patch individual capability startup habits now
    status: rejected
    description: Lower scope, but it would likely fight symptoms while leaving the
      CLI state surface insufficient for capability startup needs.
  - name: Measure CLI-state-to-raw-artifact overlap
    status: chosen
    description: Count state-gathering sequences where an Agentera CLI state command
      is followed by raw artifact read/grep/glob of the same state family before implementation
      work.
  choice: 'Replace the old startup-window metric with a state-access metric: after
    a capability-related user turn, anchor on the first Agentera CLI state call, stop
    at the first implementation boundary or next user turn, and count subsequent raw
    artifact read/grep/glob access, especially when the raw artifact overlaps the
    CLI state family already fetched.'
  reasoning: 'Direct OpenCode inspection found the actual pattern: bare `planera`,
    bare `resonera`, natural-language Orkestrera handoffs, and subagent prompts frequently
    run `agentera plan`, `agentera progress`, `agentera docs`, or related state commands
    and then read raw YAML/Markdown artifacts before work begins. The discarded route/intro
    classifier therefore produced a false weak-evidence `close_without_implementation`
    result by measuring the wrong anchor. The retained state-access metric measures
    the product problem directly and can distinguish a broad CLI startup-envelope
    need from narrower capability guidance fixes.'
  confidence: firm
  feeds_into: startup state-access analysis, scripts/agentera, scripts/extract_corpus.py,
    capability prose, tests, TODO.md
- number: 52
  date: '2026-05-13'
  question: How should Agentera run and retain startup state-access benchmark metrics?
  context: Decision 51 made startup state-access overlap an optimization metric. To
    compare versions, Agentera needs a repeatable manual run for `scripts/startup_analysis_contract.py`
    that can read local runtime history without committing or shipping generated local
    evidence.
  alternatives:
  - name: Ad hoc analyzer commands
    status: rejected
    description: Minimal, but weak for repeatability and trend comparison.
  - name: Normal CI regression
    status: rejected
    description: CI cannot depend on private local runtime histories.
  - name: Manual Mage benchmark with user-local retention
    status: chosen
    description: Mage runs the benchmark manually; aggregate history stays under `${AGENTERA_HOME}/benchmarks/startup-state/`.
  choice: Add a manual Mage benchmark suite starting with the Decision 51 startup
    state-access metric. Persist aggregate `runs.jsonl` history under the user Agentera
    data home, not the repository, and retain only the latest redacted detailed report
    beside it.
  reasoning: Mage gives a clear manual benchmark surface while the Python analyzer
    remains the metric source of truth. User-local JSONL enables longitudinal optimization
    targets without polluting git or packages, and latest-only report retention preserves
    debuggability without accumulating bulky private artifacts.
  confidence: firm
  feeds_into: magefile.go, startup state-access benchmark, TODO.md

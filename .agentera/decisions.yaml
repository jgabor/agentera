- number: 74
  date: '2026-06-28'
  question: "How should Agentera crystallize its identity away from bundle-of-skills\
    \ / open-protocol / suite-of-plugins framing toward one agent with many capabilities\
    \ driven through a single CLI \u2014 while retaining the efficiency benefits of\
    \ specialized subagents?"
  context: "Over many iterations the branding never settled into a concrete identity.\
    \ Current on-disk headlines contradict each other across four surfaces (web Hero\
    \ and docs index still say \"open protocol\u2026 engineering team\"; README says\
    \ \"engineering team\"; vision.yaml says \"opinionated mobile-first coding agent\u2026\
    \ a peer\"; SKILL.md says \"twelve capabilities live inside one Agentera skill\"\
    ). Prior decisions built the architecture but never promoted it to the headline:\
    \ D67 (mobile-first single brand), D68 (multi-surface one-fixed-workflow, no extensions),\
    \ D69 (packages/cli as the narrow waist \u2014 all agent execution routes through\
    \ CLI or serve; surfaces are clients), D70 (English capability names in v3), D73\
    \ (single primary Agentera agent at the runtime level, dispatching via Task to\
    \ general subagents). The user's framing for this deliberation: Agentera is no\
    \ longer a bundle, a protocol, or a suite of plugins \u2014 it still supports\
    \ all harnesses, but as clients of a single CLI that owns artifact R/W, codified\
    \ routing, tight inter-capability integration, and a single surface for agents\
    \ to learn; it acts as one person able to do many things rather than many agents\
    \ with specialized roles, while retaining subagent efficiency benefits (fresh\
    \ context windows, dedicated instructions per task, token economy).\n"
  alternatives:
  - name: Crystallize as single-agent identity driven through CLI-as-runtime
    status: chosen
    description: "Agentera is the colleague, not the team. One persistent identity\
      \ with many capabilities. Host coding agents (Claude, Cursor, Codex, Copilot,\
      \ OpenCode) are harnesses \u2014 they provide the model, the tool runtime, and\
      \ the spawn capacity. The CLI owns project memory, capability prose, routing\
      \ judgment, and the worker-spec contract. Eleven top-level capabilities (profile\
      \ demoted to utility; orchestrate defended as a distinct interaction mode from\
      \ build). Retire skill, plugin, and engineering-team from product vocabulary;\
      \ they survive only as internal transport terms."
    reason_chosen: Resolves the four-way headline fracture; aligns the identity with
      the architecture D69/D73 already built; honestly carries "single surface to
      learn" by moving the routing brain inside the CLI; preserves subagent efficiency
      under the hood without making multiplicity the headline.
  - name: Keep multi-agent team framing with shared state
    status: rejected
    description: Accept the contradiction; ship as "team of specialists with shared
      .agentera/ state." Each capability stays a discrete agent identity.
    reason_rejected: User explicitly rejected multiplicity as the headline; conflicts
      with D67 mobile-first single brand and the sharp-colleague voice already in
      vision.yaml.
  - name: Agentera owns a bundled model layer
    status: rejected
    description: Make "is the agent" carry cognition by bundling a model runtime in
      the npm package so the CLI spawns model-backed subagents directly.
    reason_rejected: Contradicts host-as-harness; forces a model dependency in the
      npm package; the borrowed-cognition framing (identity + memory + discipline
      layer; model is the host's) is honest and matches the Cursor SDK pattern.
  - name: Vocabulary reconciliation without identity pivot
    status: rejected
    description: Fix the web fracture but retain skill/plugin as product words with
      internal-vs-product disambiguation documented in the vocabulary.
    reason_rejected: User rejected continued ambiguity; "single agent" framing is
      incompatible with skill/plugin terminology in user-facing copy.
  - name: Capability redesign alongside identity
    status: rejected
    description: Reopen the capability set wholesale as part of the identity pass.
    reason_rejected: Out of scope; user confirmed this is an identity/docs crystallization,
      not a capability redesign. Pressure-test on the twelve kept the set stable modulo
      profile demotion.
  choice: "Adopt the crystallized vision: \"One agent, one CLI, many capabilities.\"\
    \ Twelve commitments, locked across three rounds of structured deliberation: (1)\
    \ thinking-work runs in the main context, doing-work spawns as bounded worker\
    \ subagents that return results; (2) Agentera is the agent, host coding agents\
    \ are harnesses; (3) the routing brain lives inside the CLI \u2014 host agents\
    \ learn only the JSON contract from agentera prime; (4) capability set pressure-tested:\
    \ eleven top-level capabilities (status, vision, discuss, research, plan, build,\
    \ optimize, audit, document, design, orchestrate); profile demoted to utility\
    \ that surfaces through existing capabilities (discuss, plan, status); (5) project\
    \ state in .agentera/ is sufficient identity; identity is per-project with no\
    \ bleed; (6) routing is codified for deterministic cases (bare invocation, explicit\
    \ capability names) and intelligent for ambiguous natural language via trigger\
    \ schemas with disambiguation when borderline; (7) orchestrate stays as a distinct\
    \ interaction mode (hand off a full plan and step back vs build's task-by-task\
    \ supervised mode); (8) optimize and design stay as critical capabilities; (9)\
    \ borrowed cognition accepted \u2014 Agentera is the identity+memory+discipline\
    \ layer, the model is the host's; (10) worker spawn: CLI returns a worker spec,\
    \ the host harness spawns the model-backed subagent; (11) \"acts more like a person\"\
    \ lives in capability execution and the sharp-colleague voice, not in fuzzy routing;\
    \ (12) retire \"skill,\" \"plugin,\" and \"engineering team\" from product vocabulary\
    \ \u2014 capabilities is the product word. Crystallized north-star paragraph anchors\
    \ vision.yaml, README hero, and the web docs index.\n"
  reasoning: "The four-way headline fracture on disk is the visible symptom of six\
    \ weeks of pivots (D67 \u2192 D68 \u2192 D69 \u2192 now) each leaving downstream\
    \ surfaces untouched. The architecture was already decided by D69 (CLI is the\
    \ narrow waist) and D73 (single Agentera agent at runtime); what was missing was\
    \ promoting that architecture to the identity headline. The \"one agent, one CLI,\
    \ many capabilities\" framing gives the right name to architecture already on\
    \ the books \u2014 it is a crystallization, not a new invention. The borrowed-cognition\
    \ framing (Agentera is identity+memory+discipline layer; model is the host's)\
    \ honestly carries \"is the agent\" without ownership of the model, matching the\
    \ Cursor SDK pattern and avoiding a model dependency in the npm package. Per-project\
    \ identity (commitment 5) is both the honest limit of project-state-only memory\
    \ and a feature: no memory bleed across client projects. Profile demotion resolves\
    \ the orphan created by rejecting a traveling persona layer (commitment 5) \u2014\
    \ profile becomes background machinery surfacing through existing capabilities,\
    \ not a peer of build. The capability pressure-test defended orchestrate (distinct\
    \ interaction mode, not a scope knob), optimize and design (critical), and demoted\
    \ profile; the set now reads as modes of one engineering mind rather than a service\
    \ catalog promoted for symmetry. Vocabulary retirement (commitment 12) is required\
    \ by commitment 2: if Agentera is the agent and the host is the harness, \"skill\"\
    \ and \"plugin\" imply Agentera is a module loaded into the host \u2014 the opposite\
    \ of the crystallized relationship. They survive only as internal transport terms\
    \ (skills/ directory, plugin.json manifest files required by host editors). This\
    \ decision supersedes the \"skills as internals\" framing in D67 and the multi-surface\
    \ vocabulary in D68; it operationalizes the D69 CLI-narrow-waist invariant at\
    \ the identity layer; it is the vision whose runtime design D73 serves; and it\
    \ confirms D70's English capability names as the binding surface under the single-agent\
    \ identity.\n"
  confidence: firm
  feeds_into: .agentera/vision.yaml, README.md, AGENTS.md, skills/agentera/SKILL.md,
    references/cli/vocabulary.md, references/cli/vocabulary-index.yaml, packages/cli/,
    packages/mobile/AGENTS.md, packages/web/, .agentera/decisions.yaml, TODO.md
  satisfaction:
    state: user_confirmed_satisfied
    evidence: "User confirmed the crystallized vision draft via multi-question deliberation\

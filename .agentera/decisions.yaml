decisions:
- number: 31
  date: '2026-04-12'
  question: How should optimera represent multiple objectives, and should `.optimera/` consolidate under `.agentera/`?
  context: Today optimera pins a single OBJECTIVE.md / EXPERIMENTS.md / `.optimera/harness`. Rotating targets (hej-token to
    realisera-token) requires hand-written archive moves. `.optimera/` lives outside `.agentera/`, splitting artifact roots.
    Decision 4 established single-root artifact resolution via `.agentera/DOCS.md`.
  alternatives:
  - name: Flat files + registry
    status: rejected
    description: keep OBJECTIVE.md/EXPERIMENTS.md in `.agentera/`, add a registry file with an active pointer. More machinery,
      single-objective illusion.
  - name: Active symlink
    status: rejected
    description: named subdirs with a symlink marking the active one. Cross-platform fragility.
  - name: 'Named subdirs, self-contained: one directory per objective u'
    status: chosen
    description: 'Named subdirs, self-contained: one directory per objective under `.agentera/optimera/`, each containing
      OBJECTIVE.md, EXPERIMENTS.md, harness, helpers, vehicle/, runs/. No registry, no symlinks. Directory existence is the
      registry.'
  choice: "Named subdirs under `.agentera/optimera/`. Each objective is fully self-contained (helpers duplicated per-objective,\
    \ no shared dir). Active objective inferred from context: single objective = use it, multiple = most recent activity,\
    \ ambiguous = ask. DOCS.md drops OBJECTIVE.md/EXPERIMENTS.md from artifact mapping (optimera owns its own path resolution).\
    \ One-shot migration of existing hej-token and realisera-token data.\n  **Reasoning**: Convention over configuration.\
    \ The directory structure IS the multi-objective representation. Self-contained objectives are independently archivable,\
    \ independently measurable, and require zero coordination. Single root under `.agentera/` aligns with Decision 4. Dropping\
    \ DOCS.md mapping is correct because OBJECTIVE.md/EXPERIMENTS.md are no longer at fixed paths.\n  **Confidence**: firm\n\
    \  **Feeds into**: TODO.md (implementation), optimera SKILL.md (path changes), DOCS.md (mapping update), .gitignore (path\
    \ update)"
  reasoning: "Convention over configuration. The directory structure IS the multi-objective representation. Self-contained\
    \ objectives are independently archivable, independently measurable, and require zero coordination. Single root under\
    \ `.agentera/` aligns with Decision 4. Dropping DOCS.md mapping is correct because OBJECTIVE.md/EXPERIMENTS.md are no\
    \ longer at fixed paths.\n  **Confidence**: firm\n  **Feeds into**: TODO.md (implementation), optimera SKILL.md (path\
    \ changes), DOCS.md (mapping update), .gitignore (path update)"
  confidence: provisional
  feeds_into: TODO.md (implementation), optimera SKILL.md (path changes), DOCS.md (mapping update), .gitignore (path update)
- number: 32
  date: '2026-04-26'
  question: How should agentera observe its own usage across host runtimes and feed adoption signal back into the suite?
  context: 'Profilera mines Claude Code, OpenCode, Copilot, and Codex sessions into a Section 21 corpus envelope (Decision
    27). The corpus is consumed only by PROFILE.md generation. Agentera ships no mechanism to ask "how is the suite being
    used?": adoption stats, completion ratios, slash-vs-NL trigger reliability.'
  alternatives:
  - name: 'One-off diagnostic script: cheap, throw-away; no recurring v'
    status: rejected
    description: 'One-off diagnostic script: cheap, throw-away; no recurring value.'
  - name: New skill (e.g. /telemetera)
    status: rejected
    description: full lifecycle, heavy for descriptive analytics.
  - name: Reusable script under scripts/
    status: rejected
    description: re-runnable, no SKILL.md ceremony, can grow into a skill later.
  choice: "`scripts/usage_stats.py` reading the existing Section 21 corpus. Detects invocations via skill workflow markers\
    \ (`─── <glyph> <skill> · <phase> ───`) in assistant turns. Pairs each marker with its matching exit signal to count completed\
    \ workflows; orphans count as incomplete. Tags each invocation slash-vs-NL by inspecting the prior user turn. Cross-project\
    \ default with `--project PATH` to scope. Writes markdown to `~/.local/share/agentera/USAGE.md` (sibling to PROFILE.md)\
    \ plus a brief stdout summary. Flags: `--json` for machine output; generated-at timestamp combats staleness.\n  **Reasoning**:\
    \ Workflow markers unify slash and NL triggering, especially in OpenCode where slash UX differs. Completed workflows measure\
    \ follow-through, not just intent. Global XDG path matches PROFILE.md and fits cross-project scope naturally. A script\
    \ avoids skill-lifecycle overhead while leveraging the existing corpus pipeline. Friction and failure analysis are deferred\
    \ until an adoption baseline exists.\n  **Confidence**: provisional\n  **Feeds into**: TODO.md (implementation), standalone"
  reasoning: "Workflow markers unify slash and NL triggering, especially in OpenCode where slash UX differs. Completed workflows\
    \ measure follow-through, not just intent. Global XDG path matches PROFILE.md and fits cross-project scope naturally.\
    \ A script avoids skill-lifecycle overhead while leveraging the existing corpus pipeline. Friction and failure analysis\
    \ are deferred until an adoption baseline exists.\n  **Confidence**: provisional\n  **Feeds into**: TODO.md (implementation),\
    \ standalone"
  confidence: provisional
  feeds_into: TODO.md (implementation), standalone
- number: 33
  date: '2026-04-28'
  question: 'How should Agentera make multi-runtime setup feel simple while

    keeping the 1.20 release stable?'
  context: 'The 1.20 release supports Claude Code, OpenCode, Copilot CLI, and

    Codex CLI, but setup still reads as four runtime stories plus helper scripts.

    Marketplace users should not need a git clone to access shared tools. Skill

    workflow scripts can live inside their owning skill, but doctor, installer,

    hooks, validators, and compaction are suite infrastructure. No behavioral skill

    should own them. Single-skill installs must still work for core behavior.'
  alternatives:
  - name: Docs-only setup polish
    status: rejected
    description: leaves the real product gap unresolved.
  - name: Root scripts only
    status: rejected
    description: requires a clone and weakens marketplace installs.
  - name: One skill owns doctor/install
    status: rejected
    description: violates standalone-and-mesh ownership.
  - name: External CLI first
    status: rejected
    description: useful later, but adds another distribution surface.
  - name: Suite bundle first
    status: chosen
    description: aggregate installs carry shared infrastructure.
  choice: "Make the installable Agentera suite bundle the primary home for\n  shared tools. Runtime marketplace installs should\
    \ include skills, shared\n  scripts, hooks, manifests, and docs in one package root. `AGENTERA_HOME` points\n  to that\
    \ installed root, not necessarily a clone. Doctor validates that bundle\n  without mutation; installer applies confirmed\
    \ runtime-native fixes. External\n  CLI support is deferred.\n  **Reasoning**: Standalone skills mean core workflow independence,\
    \ not that each\n  skill must carry every shared helper. Suite installs should provide suite\n  infrastructure. This keeps\
    \ behavioral skill ownership clean while letting\n  co-installed skills mesh through one verified package root.\n  **Confidence**:\
    \ firm\n  **Feeds into**: PLAN.md, README.md, scripts/"
  reasoning: "Standalone skills mean core workflow independence, not that each\n  skill must carry every shared helper. Suite\
    \ installs should provide suite\n  infrastructure. This keeps behavioral skill ownership clean while letting\n  co-installed\
    \ skills mesh through one verified package root.\n  **Confidence**: firm\n  **Feeds into**: PLAN.md, README.md, scripts/"
  confidence: provisional
  feeds_into: PLAN.md, README.md, scripts/
- number: 34
  date: '2026-04-29'
  question: How should agentera prevent artifact prose from snowballing toward verbosity and abstraction over long-running
    projects?
  context: 'The inspirera analysis of WRITING.md revealed a gap: existing compaction thresholds (§4) cap entry count but not
    entry quality. Over 300+ cycles, the 10 full-detail slots per artifact fill with increasingly verbose, abstract prose.
    This matches the profile entries "Be Direct And Concise" (88% effective) and "Reject Bloated Operational Artifacts" (77%).
    WRITING.md''s self-audit workflow provides the operational pattern, but agentera needs its own check spec.'
  alternatives:
  - name: New inspektera audit dimension
    status: rejected
    description: post-only; drift is already entrenched by the time it reaches periodic audit.
  - name: Section 24 extension with pre + post layers
    status: chosen
    description: pre-write gate catches at the source; post-layer catches what slips through.
  - name: PostToolUse validation hook
    status: rejected
    description: hooks validate artifact structure, not content quality; prose checks need semantic judgment.
  choice: "Extend SPEC.md §24 with a \"Self-Audit Protocol\" defining 3 agentera-native checks. Each artifact-producing skill\
    \ runs them as a mandatory pre-write gate. Post-layer: dokumentera enforces for docs, inspektera adds a \"prose health\"\
    \ audit dimension for all artifacts. The 3 checks are: (1) verbosity drift — word count vs. §4 token budget, fail if over;\
    \ (2) abstraction creep — entry must contain ≥1 concrete anchor (file path, line number, commit hash, metric value, identifier,\
    \ or direct quote); (3) filler accumulation — scan for banned verbosity patterns (§24), fail if any found.\n  **Reasoning**:\
    \ WRITING.md's regularity checks are the right philosophy but the wrong spec — agentera's structured, token-budgeted,\
    \ multi-skill artifact format needs its own check design. A mandatory pre-write gate is the only way to prevent the snowball:\
    \ advisory gates accumulate drift faster than post-audits can clean it up. This matches \"Reject Quality Gate Bypasses\"\
    \ (86% effective). The post-layer exists because pre-write gates can't catch everything — some abstraction creep is only\
    \ visible when comparing entries across time.\n  **Confidence**: firm\n  **Feeds into**: SPEC.md (§24 extension), skills/inspektera/SKILL.md\
    \ (prose health dimension), skills/dokumentera/SKILL.md (doc prose enforcement), SKILL.md files of all producing skills\
    \ (pre-write gate step)"
  reasoning: "WRITING.md's regularity checks are the right philosophy but the wrong spec — agentera's structured, token-budgeted,\
    \ multi-skill artifact format needs its own check design. A mandatory pre-write gate is the only way to prevent the snowball:\
    \ advisory gates accumulate drift faster than post-audits can clean it up. This matches \"Reject Quality Gate Bypasses\"\
    \ (86% effective). The post-layer exists because pre-write gates can't catch everything — some abstraction creep is only\
    \ visible when comparing entries across time.\n  **Confidence**: firm\n  **Feeds into**: SPEC.md (§24 extension), skills/inspektera/SKILL.md\
    \ (prose health dimension), skills/dokumentera/SKILL.md (doc prose enforcement), SKILL.md files of all producing skills\
    \ (pre-write gate step)"
  confidence: provisional
  feeds_into: SPEC.md (§24 extension), skills/inspektera/SKILL.md (prose health dimension), skills/dokumentera/SKILL.md (doc
    prose enforcement), SKILL.md files of all producing skills (pre-write gate step)
- number: 35
  date: '2026-04-29'
  question: Should the three §24 self-audit checks be extracted from duplicated SKILL.md prose into a shared Python module?
  context: SPEC.md §24 defines three pre-write checks duplicated as identical 13-line blocks across 8 SKILL.md files, enforced
    only by Claude's behavioral compliance. Inspirera analysis of open-bias identified evaluation/enforcement separation as
    the highest-ROI transferable concept. Profile entries "Use Hooks As Enforcement" (conf:82) and "Reject Bloated Operational
    Artifacts" (conf:77) favor programmatic enforcement over prose-only instructions.
  alternatives:
  - name: Build shared self_audit.py module
    status: chosen
    description: one implementation consumed by PostToolUse hook (hard gate), all 8 producing skills (replacing prose), and
      inspektera prose health dimension.
  - name: Keep prose-only
    status: rejected
    description: duplicated logic, no programmatic enforcement, inspektera re-implements independently.
  - name: Hook-only
    status: rejected
    description: skills lose quality ownership; inspektera still needs separate implementation.
  choice: Build `scripts/self_audit.py` implementing the three §24 checks as importable functions. Wire into `validate_artifact.py`
    for automatic enforcement. Replace 8 duplicated prose blocks with module calls. Inspektera uses the same module.
  reasoning: 'Three consumers, one implementation — the code-level follow-through on Decision 34''s self-audit protocol. Mirrors
    open-bias evaluation/enforcement separation: module evaluates, hook enforces, skills retain ownership.'
  confidence: firm
  feeds_into: TODO.md
- number: 36
  date: '2026-04-29'
  question: Should generate_contracts.py produce structured JSON validation schemas alongside prose contracts?
  context: SPEC.md §2, §4, and §5 define validation constants (required headings, token budgets, severity mappings, artifact
    paths) that validate_artifact.py duplicates as hardcoded Python dicts. SPEC.md changes require manual sync. The inspirera
    analysis identified the open-bias RULES.md → compiler → runtime-config pattern as transferable. Decision 35 covers §24
    self-audit checks; this addresses the §2/§4/§5 structural contract surface.
  alternatives:
  - name: Parse SPEC.md tables into JSON, narrow v1 scope
    status: chosen
    description: targeted regex extraction from existing Markdown tables — no spec format changes. v1 covers artifact headings,
      token budgets, severity mappings, artifact paths. validate_artifact.py replaces hardcoded dicts with the generated JSON.
      Broader protocol surface (compaction, confidence, visual tokens) in follow-on.
  - name: Embedded metadata blocks in SPEC.md
    status: rejected
    description: dual-format maintenance without sufficient v1 benefit.
  - name: Defer
    status: rejected
    description: internal consumers have low pain today, but the spec-as-protocol north star requires machine-readable output
      before external consumers arrive.
  choice: 'Add a --schema flag to generate_contracts.py outputting structured JSON (default: scripts/schemas/contracts.json)
    by parsing SPEC.md tables. Ship v1 with the validate_artifact.py replacement. Extend to full protocol surface in follow-on
    cycles.'
  reasoning: The compiler already walks SPEC.md sections — extending it to extract structured data from known tables is additive,
    not architectural. The hook replacement proves the schema works and eliminates the manual sync burden.
  confidence: firm
  feeds_into: TODO.md
- number: 37
  date: '2026-04-29'
  question: Should hooks/validate_artifact.py add an explicit fail-open contract to prevent crashes from blocking agent writes?
  context: The hook currently exits 0 for Claude Code (advisory warnings) but uses deny/exit-2 for Copilot, OpenCode, and
    Codex pre-write paths. There is no top-level exception handler — an unhandled crash would propagate and could block all
    writes. The inspirera analysis identified open-bias's fail-open pattern (safe_hook catches all, logs, passes through)
    as a low-effort safety improvement.
  alternatives:
  - name: Top-level try/except only
    status: chosen
    description: wrap main() in try/except — catch all exceptions, log with traceback, exit 0. Existing blocking logic unchanged.
      No timeout. Minimal, immediately effective.
  - name: Full contract with timeout
    status: rejected
    description: adds platform-dependent complexity (signal handling) without proportional safety gain at v1.
  - name: Do nothing
    status: rejected
    description: implicit fail-open is not the same as explicit. The contract should be unambiguous.
  choice: Wrap main() in hooks/validate_artifact.py with a top-level try/except. On unhandled exception, log the error with
    traceback to stderr and exit 0 (allow through). Add a comment documenting the fail-open contract. No changes to existing
    blocking paths.
  reasoning: One try/except prevents crashes from blocking the agent. The existing blocking paths (structural violations on
    Copilot/OpenCode/Codex) are explicit and intentional — they don't need fail-open protection. This catches only the unexpected.
  confidence: firm
  feeds_into: TODO.md
- number: 38
  date: '2026-04-30'
  question: How should Agentera implement SOB-inspired structured-output benchmark concepts?
  context: Inspirera analysis of Interfaze SOB showed that schema-valid output can still be value-wrong. Agentera has runtime
    smoke tests in `scripts/eval_skills.py`, artifact validators in `hooks/validate_artifact.py`, and Section 20 reality verification,
    but `eval_skills.py` explicitly does not evaluate output correctness.
  alternatives:
  - name: Anchor on value-level skill evals
    status: chosen
    description: tests visible skill output and artifact-derived meaning before broader scoring.
  - name: Anchor on artifact field recall
    status: rejected
    description: useful later, but risks repeating the schema-only trap.
  - name: Anchor on weighted summaries
    status: rejected
    description: premature until semantic correctness signals exist.
  - name: Extend eval_skills.py directly
    status: rejected
    description: smoke and semantic evals have different boundaries.
  choice: "Add a separate stdlib semantic eval surface, starting with `hej` routing fixtures that assert both output facts\
    \ and artifact-derived next-action correctness.\n  **Reasoning**: `hej` proves the core SOB lesson in Agentera terms:\
    \ a clean response is not enough if it routes to the wrong concrete work. A separate script keeps runtime smoke checks\
    \ simple while semantic fixtures grow.\n  **Confidence**: firm\n  **Feeds into**: TODO.md"
  reasoning: "`hej` proves the core SOB lesson in Agentera terms: a clean response is not enough if it routes to the wrong\
    \ concrete work. A separate script keeps runtime smoke checks simple while semantic fixtures grow.\n  **Confidence**:\
    \ firm\n  **Feeds into**: TODO.md"
  confidence: provisional
  feeds_into: TODO.md
- number: 39
  date: '2026-05-04'
  question: What should Agentera 2.0 look like, and should it be a rewrite or an incremental refactor?
  context: 'After 254+ cycles, 38 decisions, 577 tests, and 4 runtime targets, three systemic pains dominate: token consumption
    per session is high (large SKILL.md payloads + artifact ceremony), maintenance surface is scattered (3-way artifact identity
    sync, 908-line validate_artifact.py monolith, ~180 lines duplicated install-root logic), and the 12-skill model fragments
    the feedback loop across many files. The system works but is costly to operate and heavy to evolve.'
  alternatives:
  - name: Targeted refactors
    status: rejected
    description: 'fix 3-way sync, decompose validate_artifact.py, extract shared scripts. ~70% of maintenance benefit at ~10%
      of cost. Rejected: doesn''t address token consumption or artifact ceremony, which are structural problems.'
  - name: 12 autonomous skills with companion schemas
    status: rejected
    description: 'keep the current distribution model but add per-skill schemas and selective reading. Rejected: cross-skill
      mesh complexity persists; the 12-file distribution model remains a token tax.'
  - name: Single bundled skill with capability schemas
    status: chosen
    description: one install, one entry point, 12 capabilities as sub-modules with lean prose + companion schemas. Chosen.
  choice: "Agentera 2.0 is a single bundled skill (`/agentera`) with 12 capabilities. Each capability has lean behavioral\
    \ prose + companion schemas (artifact shapes, validation rules, triggers). A thin shared protocol schema covers confidence,\
    \ severity, and visual tokens. SPEC.md dissolves into capability schemas. Artifacts split: 3 human-facing at root (TODO.md,\
    \ CHANGELOG.md, DESIGN.md), rest as structured agent-facing data in `.agentera/`. A universal query CLI replaces direct\
    \ artifact reads. Master SKILL.md starts full (hej-style orientation + routing), optimizes toward thin schema-driven dispatcher\
    \ over time. Transition: big bang cutover from a feat/v2 branch/worktree.\n  **Reasoning**: The feedback loop is the core\
    \ product, and it's fragmented across 12 skill files and 12 artifact formats. Bundling with schema-driven dispatch and\
    \ a query CLI concentrates the loop into one deep module. Structured artifacts + query CLI eliminates the read/write ceremony\
    \ that burns tokens. The worktree strategy preserves the working system during development. The strongest blind spot (master\
    \ SKILL.md becoming a God Object) is mitigated by schema-driven routing and a stated optimization trajectory from full\
    \ to thin.\n  **Confidence**: firm\n  **Feeds into**: ROADMAP.md, VISION.md"
  reasoning: "The feedback loop is the core product, and it's fragmented across 12 skill files and 12 artifact formats. Bundling\
    \ with schema-driven dispatch and a query CLI concentrates the loop into one deep module. Structured artifacts + query\
    \ CLI eliminates the read/write ceremony that burns tokens. The worktree strategy preserves the working system during\
    \ development. The strongest blind spot (master SKILL.md becoming a God Object) is mitigated by schema-driven routing\
    \ and a stated optimization trajectory from full to thin.\n  **Confidence**: firm\n  **Feeds into**: ROADMAP.md, VISION.md"
  confidence: provisional
  feeds_into: ROADMAP.md, VISION.md
- number: 40
  date: '2026-05-04'
  question: 'How should the four open questions from the ROADMAP be resolved: artifact format, master SKILL.md size, backward
    compatibility, and sub-module naming?'
  context: Decision 39 committed to Agentera 2.0. ROADMAP.md listed four open questions blocking Phase 1. A token-profile
    experiment measured YAML vs JSON vs JSONL for representative PROGRESS entries.
  alternatives:
  - name: YAML
    status: chosen
    description: human-glanceable, smallest bytes for single entries. Token experiment showed ~18% more tokens than JSONL
      for 10-entry files, but query CLI abstracts the format so raw tokens never enter agent context. Chosen for artifacts.
  - name: JSONL
    status: rejected
    description: 'most compact for multi-entry files, append-friendly. Rejected: marginal token savings irrelevant when CLI
      is the interface.'
  - name: JSON
    status: rejected
    description: 'best schema validation tooling (JSON Schema universal). Rejected: larger than YAML for single entries, no
      meaningful advantage when CLI abstracts access.'
  choice: "YAML for all agent-facing artifacts. No backward compatibility with v1 (migration tool handles conversion). Sub-modules\
    \ called \"capabilities.\" Master SKILL.md size deferred to Phase 1 (measure after hej port).\n  **Reasoning**: The token\
    \ experiment proved format choice doesn't affect agent-visible token consumption because the query CLI is the seam. YAML\
    \ wins on human-glanceability and smallest bytes for typical single-entry reads. No backward compat is consistent with\
    \ D39's big bang. \"Capabilities\" aligns with SKILL.md vocabulary and distinguishes from the v1 \"skills\" concept.\n\
    \  **Confidence**: firm\n  **Feeds into**: ROADMAP.md"
  reasoning: "The token experiment proved format choice doesn't affect agent-visible token consumption because the query CLI\
    \ is the seam. YAML wins on human-glanceability and smallest bytes for typical single-entry reads. No backward compat\
    \ is consistent with D39's big bang. \"Capabilities\" aligns with SKILL.md vocabulary and distinguishes from the v1 \"\
    skills\" concept.\n  **Confidence**: firm\n  **Feeds into**: ROADMAP.md"
  confidence: provisional
  feeds_into: ROADMAP.md

decisions:
- number: 44
  date: '2026-05-07'
  question: How should Agentera handle plain-English vocabulary inside capability prose and internal protocol docs after Decision
    43?
  context: Decision 43 kept Swedish names while adding aliases. This review found abstract prose terms such as `freshness`,
    non-Git `checkpoint`, `guard`, `Reality Verification Gate`, `conductor protocol`, `memory layer`, `operating record`,
    `drift`, and `DTC` kept as internal vocabulary even when plain wording is equally precise.
  alternatives:
  - name: Keep current internal vocabulary
    status: rejected
    description: preserves avoidable jargon.
  - name: Rename all identifiers now
    status: rejected
    description: high schema, test, and history churn.
  - name: Plain prose with stable IDs
    status: chosen
    description: replace prose and labels first; migrate identifiers deliberately.
  choice: Use plain English for capability/protocol prose and labels. Deprecate `freshness`; use current/up-to-date/out-of-date/synced/status
    wording. Keep `checkpoint` only for Git commits. Replace most `guard` with check/stop-condition wording; keep `gate` only
    for hard pass/fail. Use `behavioral verification gate`, `orchestration loop`, `saved project context`, mismatch/out-of-sync
    wording, and `docs-first` workflow language.
  reasoning: Identity belongs in stable names and IDs, not every workflow noun. Plain prose reduces cognitive load; stable
    IDs protect compatibility until migration earns its cost.
  confidence: firm
  feeds_into: docs/vocabulary.md, capability prose, safe labels/tests, active plan wording, TODO.md
  satisfaction:
    state: user_confirmed_satisfied
    user_confirmation:
      confirmed_by: user
      confirmed_at: '2026-05-15'
- number: 45
  date: '2026-05-08'
  question: How should Agentera apply the agent-ready interface playbook to its CLI surface after the 2.2.0 alias and vocabulary
    work?
  context: Inspirera analysis of `~/docs/agent-ready-interface-playbook.md` identified structured routine output, runtime
    schema introspection, sparse responses, and input hardening as the highest-value Agentera interface improvements. Decision
    44 protects stable command names and parseable labels, while Decision 43 keeps slash route aliases separate from CLI state
    commands. The current `bundle-status` command names a narrow installed-bundle check even though the desired surface is
    a broader Agentera CLI/install/runtime self-check.
  alternatives:
  - name: Freeze state commands and improve outputs
    status: chosen
    description: Preserve routine state command names, add structured output and field selection, add runtime describe/schema
      introspection, and harden inputs without adding slash-route aliases as CLI commands.
  - name: Add CLI commands for route aliases
    status: rejected
    description: Would blur the Decision 43 route/CLI boundary by teaching aliases like status, build, audit, and document
      as CLI state commands.
  - name: Keep bundle-status as the long-term diagnostic command
    status: rejected
    description: Accurate for today's installed-bundle check, but too narrow for future Agentera CLI self-audit, runtime,
      hook, package, and schema health checks.
  - name: Add doctor while keeping bundle-status as an alias
    status: rejected
    description: Safer for compatibility, but leaves duplicate CLI vocabulary in the pending release and weakens the plain-English
      command surface cleanup.
  choice: 'Build one phased agent-ready state interface plan for pending 2.2.0: keep routine state command names stable, improve
    human text output where useful, add structured routine output, add runtime describe/schema introspection, add field selection,
    harden artifact/path inputs, and hard-rename `agentera bundle-status` to `agentera doctor` with no compatibility alias.'
  reasoning: The playbook's core lesson is that agent-facing interfaces need predictable structured I/O, runtime self-description,
    scoped responses, and defensive boundaries. Agentera already has the schema and registry foundations; the next step is
    to expose them through the CLI without collapsing slash routes into state commands. `doctor` is the right plain command
    for Agentera's own install/runtime/CLI health, while artifact health remains `agentera health`.
  confidence: firm
  feeds_into: PLAN.md, scripts/agentera, README.md, docs/vocabulary.md, tests
  satisfaction:
    state: user_confirmed_satisfied
    user_confirmation:
      confirmed_by: user
      confirmed_at: '2026-05-15'
- number: 46
  date: '2026-05-08'
  question: How should Agentera handle capability handoff wording and confirmation guidance for pending 2.2.0?
  context: '`docs/notes.md` identified three related release-polish gaps: capability handoffs still teach standalone slash-capability
    labels such as `/realisera`, next capability recommendations are inconsistent, and bounded choices do not consistently
    use runtime-native question tools. Decisions 43 and 45 already separate `/agentera <alias>` routes from CLI state commands,
    so handoff prose should stop making agents remember runtime-specific slash conventions. The user selected the handoff
    polish option for v2.2.0 and explicitly required recording this decision before implementation continues.'
  alternatives:
  - name: Handoff polish for v2.2.0
    status: chosen
    description: Normalize handoffs to glyph plus canonical capability name, reserve `/agentera <alias>` for explicit route
      docs, use runtime-native question tools for bounded choices, and add regression coverage.
  - name: Completed-plan lifecycle cleanup
    status: rejected
    description: Relevant, but broader lifecycle behavior that should be planned separately from release polish.
  - name: CLI write support
    status: rejected
    description: Valuable, but too large for the current 2.2.0 release window and likely deserves its own design.
  - name: Record follow-ups only
    status: rejected
    description: Leaves a small but visible v2.2.0 UX inconsistency unresolved after Decisions 43-45 tightened the route surface.
  choice: 'Include a narrow handoff-polish item in pending 2.2.0: capability prose should recommend downstream capabilities
    as glyph plus canonical name labels such as `⧉ realisera`, reserve `/agentera <alias>` for explicit slash-route documentation,
    use the runtime''s native question tool for clear bounded choices, put the recommended option first, include `Done`, and
    ask for confirmation before invoking a downstream capability.'
  reasoning: This compounds Decisions 43-45 without changing command semantics. It removes a runtime-convention burden from
    agents, makes handoffs more consistent, and keeps the release scope smaller than lifecycle archival or YAML write support.
  confidence: firm
  feeds_into: SKILL.md, capability prose, tests, CHANGELOG.md, docs/vocabulary.md
  satisfaction:
    state: open
- number: 47
  date: '2026-05-08'
  question: How should Agentera rename bundle semantics and organize app, profile, and user data roots?
  context: Current `AGENTERA_HOME` means a replaceable installed bundle root, while `PROFILE.md` lives in the platform data
    directory. That split makes “bundle” leak into user language and blurs mutable user data versus managed app files.
  alternatives:
  - name: App-home layout
    status: chosen
    description: '`AGENTERA_HOME` is a durable platform data home; managed app files live under `AGENTERA_HOME/app`; profile
      and usage data live at the home root.'
  - name: Rename only in user-facing prose
    status: rejected
    description: Keeps root semantics and internal contracts confusing.
  - name: Keep current bundle root
    status: rejected
    description: Preserves the profile/app split and stale install-root ambiguity.
  - name: Mutate through doctor
    status: rejected
    description: Makes the self-check command write state instead of preserving read-only diagnostics.
  choice: Replace bundle terminology with app terminology across live internals, redefine default `AGENTERA_HOME` as the platform
    data home, place the managed Agentera app under `AGENTERA_HOME/app`, and keep `PROFILE.md`, `USAGE.md`, history, and intermediate
    corpus data under `AGENTERA_HOME`.
  reasoning: “Install the Agentera app” is clearer than “install the Agentera bundle,” and home/app separation protects user
    data from app refreshes. `agentera doctor` should detect legacy bundle-root installs and report migration_required with
    exact dry-run/apply commands; `agentera upgrade` owns the idempotent migration writes.
  confidence: firm
  feeds_into: TODO.md, PLAN.md, README.md, UPGRADE.md, scripts/install_root.py, scripts/agentera_upgrade.py, scripts/agentera,
    package/runtime registries, tests
  satisfaction:
    state: provisionally_satisfied
    evidence: 'App-home implementation and tests exist: scripts/agentera_upgrade.py enforces managed app root planning/action
      behavior, scripts/agentera reports app_home, managedAppRoot, and userDataRoot, scripts/validate_app_home_contract.py
      checks public surfaces, and the focused app-home/upgrade/legacy-default test set passed 9 tests on 2026-05-15.'
- number: 48
  date: '2026-05-08'
  question: How should Agentera expose self-audit and maintainer scripts through the CLI?
  context: Agents currently call `scripts/self_audit.py` through inline Python for pre-write artifact checks. Decision 45
    made the CLI an agent-ready state interface, and Decision 47 keeps `agentera doctor` read-only for install/app/runtime
    diagnostics while `agentera upgrade` owns writes. README still exposes several direct maintainer scripts.
  alternatives:
  - name: Add agentera lint first
    status: chosen
    description: Expose self-audit through a dedicated lint namespace with structured output, advisory default behavior, and
      optional strict mode.
  - name: Fold self-audit into doctor
    status: rejected
    description: Blurs doctor beyond install/app/runtime health into artifact prose quality and codebase health.
  - name: Merge all scripts now
    status: rejected
    description: Creates a junk-drawer CLI before stable command namespaces are defined.
  - name: Keep scripts only
    status: rejected
    description: Leaves agents using ad hoc inline Python for a contractually required pre-write check.
  choice: 'Expose `scripts/self_audit.py` through `agentera lint` first. Keep `agentera doctor` scoped to install/app/runtime
    diagnostics. Promote other maintainer scripts behind cohesive non-deferred namespaces: `agentera validate` for validators,
    `agentera verify` or `agentera smoke` for eval and smoke gates, and `agentera corpus`/`agentera usage` for profile analytics.
    Keep registry/model modules private.'
  reasoning: A lint command solves the immediate agent ergonomics problem without changing doctor semantics. The remaining
    maintainer namespaces are part of the decision's required CLI surface; their command shapes should still be cohesive,
    structured, and workflow-driven rather than a junk drawer of raw script wrappers.
  confidence: firm
  feeds_into: TODO.md, scripts/agentera, README.md, capability prose, tests
  satisfaction:
    state: user_confirmed_satisfied
    user_confirmation:
      confirmed_by: user
      confirmed_at: '2026-05-15'
- number: 49
  date: '2026-05-08'
  question: What TODO.md item contract should replace ISS-N counters and bracketed slug IDs?
  context: '`skills/agentera/references/contract.md` still documents `ISS-N` TODO identities while live `TODO.md` items use
    bracketed slugs such as `[agentera-221-...]`. The user rejected both as volatile, duplicate-prone manual identity, but
    still wants an optional exact release target such as `2.2.5` or patch-lane target such as `2.2.x`.'
  alternatives:
  - name: Keep ISS-N counters
    status: rejected
    description: Requires a central counter and creates collision/renumbering risk during concurrent artifact edits.
  - name: Keep bracketed slug IDs
    status: rejected
    description: Human-generated slugs drift, duplicate easily, and make TODO lines noisier than the work requires.
  - name: Separate release-target tag
    status: rejected
    description: Parseable, but adds a second metadata token when one token can express both required type and optional target.
  - name: Single type-or-type-target tag
    status: chosen
    description: Use `[type]` for untargeted work, `[type:X.Y.Z]` for work targeted at an exact release, and `[type:X.Y.x]`
      for work targeted at a patch lane whose exact patch is intentionally not chosen yet.
  choice: 'Use one mandatory TODO prefix tag: `[type]` for untargeted items, `[type:X.Y.Z]` for exact release-targeted items,
    and `[type:X.Y.x]` for a patch-lane target whose exact patch is intentionally not chosen yet. Type is one of `feat`, `fix`,
    `docs`, `refactor`, `chore`, `test`, or `perf`; `X.Y.Z` is an exact semver target, and `x` is allowed only in the patch
    position. Forbid scopes, `v` prefixes, minor/major ranges like `2.x` or `2.2.*`, inequality ranges, multiple targets,
    and generated item IDs. When the release is selected, convert `[type:X.Y.x]` to `[type:X.Y.Z]`. Status comes from the
    checkbox, priority from the section, and identity from normalized summary text.'
  reasoning: Only change type and optional release target carry durable TODO metadata. Patch-lane targets preserve useful
    release intent without forcing false precision before the exact patch is selected. Content identity avoids counters and
    slug churn, while the single prefix tag keeps `TODO.md` readable and deterministic for `agentera todo`, compaction, and
    release queries.
  confidence: firm
  feeds_into: TODO.md, skills/agentera/references/contract.md, skills/agentera/schemas/artifacts/todo.yaml, scripts/agentera,
    hooks/compaction.py, tests
  satisfaction:
    state: user_confirmed_satisfied
    user_confirmation:
      confirmed_by: user
      confirmed_at: '2026-05-15'

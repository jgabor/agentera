decisions:
- number: 56
  date: '2026-05-17'
  question: Should Agentera 3.0 rewrite the CLI core in TypeScript for Bun/npm distribution
    and runtime integration?
  context: Agentera 2.x is a Python CLI/app-home implementation with bundled skills,
    scripts, hooks, references, and runtime manifests. OpenCode already relies on
    a JavaScript plugin that duplicates app-home/runtime bootstrap logic, and upcoming
    Codex/OpenCode/npm packaging work increases the pressure to make runtime integration
    and distribution JS-native. The user framed the 3.0 question around pure TypeScript,
    Bun single-binary compilation, and easier npm distribution, then selected runtime
    integration, whole CLI core, contract-first parity, and CLI JSON contracts as
    the rewrite constraints.
  alternatives:
  - name: Keep Python core and improve packaging only
    status: rejected
    description: Lowest rewrite risk, but preserves split-brain JS runtime glue around
      a Python core and leaves npm/single-binary distribution as an adapter layer.
  - name: TypeScript runtime adapter layer only
    status: rejected
    description: Improves OpenCode/Codex/npm integration, but leaves the core CLI,
      validators, compaction, doctor, upgrade, and state commands in Python.
  - name: Whole CLI core TypeScript rewrite with contract-first parity
    status: chosen
    description: Reimplement the supported `agentera` CLI core in TypeScript/Bun only
      after existing JSON contracts, exit behavior, artifact rules, and runtime gates
      are captured as parity tests.
  - name: Clean-slate TypeScript rewrite
    status: rejected
    description: Attractive architecturally, but too likely to regress mature CLI
      state, upgrade, validation, compaction, and protected-artifact behavior.
  choice: Treat a pure TypeScript/Bun rewrite of the whole Agentera CLI core as the
    3.0 direction, gated by contract-first parity. The Python implementation remains
    the behavior oracle until the TypeScript CLI preserves supported command JSON
    output shapes, exit behavior, artifact validation, compaction, doctor/upgrade
    safety, verify/usage/stats semantics, and runtime adapter hooks. Bun/npm/single-binary
    distribution is the payoff, but not a reason to weaken existing Agentera contracts.
  reasoning: The strongest argument for TypeScript is runtime integration, not language
    preference. Agentera increasingly meets users through JS-native hosts and npm-shaped
    plugin surfaces, while the current OpenCode plugin already carries runtime bootstrap
    logic that would be cleaner if the CLI core and distribution target shared one
    toolchain. A full rewrite is justified only if it reduces runtime/package complexity
    without sacrificing the current agent-ready CLI contract. Therefore the rewrite
    must start from golden CLI JSON contracts and parity fixtures, not from a clean-slate
    architecture rewrite.
  confidence: firm
  feeds_into: TODO.md, scripts/agentera, pyproject.toml, package manifests, runtime
    adapters, tests, README.md, UPGRADE.md, release planning
  satisfaction:
    state: user_confirmed_satisfied
    evidence: User confirmed satisfaction during resonera review on 2026-05-31. Contract-first
      TypeScript CLI rewrite remains the 3.0 direction; feat/v3 packages/cli work
      is downstream implementation.
    user_confirmation:
      confirmed_by: user
      confirmed_at: '2026-05-31'
- number: 57
  date: '2026-05-18'
  question: How should Agentera rename capability `prose.md` files and make first-invocation
    instruction reading explicit?
  context: The capability file name `prose.md` undersells its role as the behavioral
    instruction source for each capability. The user asked how to rename it to `instructions.md`
    and enforce full reading during initial capability invocation. The practical constraint
    is that Agentera cannot technically force every runtime to read a file, but it
    can make the requirement explicit through schema metadata, CLI capability context,
    router guidance, descriptors, docs, and tests.
  alternatives:
  - name: Full instructions contract
    status: chosen
    description: Rename `skills/agentera/capabilities/*/prose.md` to `skills/agentera/capabilities/*/instructions.md`,
      add first-invocation read metadata, surface required reads through CLI capability
      context, and update the capability schema contract, router guidance, runtime
      descriptors, docs, and tests.
  - name: Rename only
    status: rejected
    description: Improves naming but leaves agents guessing whether instructions must
      be read during startup.
  - name: Metadata without rename
    status: rejected
    description: Adds startup-read semantics but keeps the misleading `prose.md` name
      and preserves the old vocabulary debt.
  - name: Runtime hook enforcement
    status: rejected
    description: Not portable because runtimes do not expose a shared, reliable conversation-state
      proof that a file was read in full.
  choice: Rename capability `prose.md` files to `instructions.md`, add `first_invocation_read`
    metadata with values such as `full`, `compact_startup`, or `skip`, surface the
    required reads through `agentera hej --format json --capability-context <name>`,
    and update `skills/agentera/SKILL.md`, `skills/agentera/capability_schema_contract.yaml`,
    `scripts/validate_capability.py`, runtime descriptors, tests, `README.md`, `AGENTS.md`,
    and `references/cli/vocabulary.md` so first capability invocation reads `instructions.md`
    in full unless an explicit compact-startup exception is declared.
  reasoning: The `instructions.md` name states the file's purpose better than `prose.md`
    and turns capability startup from an implicit convention into a contract. Full
    technical enforcement across every runtime is unrealistic, so the durable implementation
    should combine schema metadata, CLI visibility, Agentera router guidance, descriptor
    updates, and regression coverage rather than relying on prose alone.
  confidence: firm
  feeds_into: TODO.md, skills/agentera/SKILL.md, skills/agentera/capability_schema_contract.yaml,
    scripts/agentera, scripts/validate_capability.py, runtime descriptors, tests,
    README.md, AGENTS.md, references/cli/vocabulary.md
  satisfaction:
    state: user_confirmed_satisfied
    evidence: 'D57 instructions.md rename and first_invocation_read contract stand
      with D59 governing the capability startup context seam: required reads are surfaced
      through `agentera prime --context <capability>` rather than `hej --capability-context`.
      Reconciled in resonera satisfaction review on 2026-05-23.'
    user_confirmation:
      confirmed_by: user
      confirmed_at: '2026-05-23'
- number: 58
  date: '2026-05-18'
  question: What naming boundary must Agentera 3.0 enforce for artifacts, concepts,
    primitives, and compatibility aliases?
  context: Agentera v2 still exposes legacy Markdown-style canonical artifact labels
    such as `PROGRESS.md`, `PLAN.md`, and `DECISIONS.md` while the actual v2 storage
    paths are YAML files such as `.agentera/progress.yaml`. Similar compatibility
    seams exist in vocabulary, runtime metadata, migration fixtures, direct-helper
    commands, schema names, and historical alias surfaces. The user explicitly decided
    that Agentera 3.0 must not preserve backwards-compatible or multiple names for
    artifacts, concepts, primitives, or any equivalent protocol identity. Follow-up
    deliberation clarified that primary route aliases such as `/agentera build` and
    `/agentera plan` are protocol identities, artifact IDs such as `plan`, `progress`,
    and `decisions` become canonical instead of Markdown labels such as `PLAN.md`
    or `DECISIONS.md`, storage paths must align with artifact IDs, and old names may
    remain only in upgrade detection, migration notes, and historical evidence.
  alternatives:
  - name: Single-name 3.0 protocol
    status: chosen
    description: Agentera 3.0 has exactly one canonical name for every artifact, concept,
      primitive, command surface, schema field, runtime metadata field, and protocol
      identity. Legacy names are removed or migrated; they are not retained as aliases.
  - name: Preserve compatibility aliases after 3.0
    status: rejected
    description: Keeping compatibility names after the 3.0 boundary would perpetuate
      the current ambiguity and make agents choose between old and new protocol identities.
  - name: Keep Markdown-style artifact labels as display names
    status: rejected
    description: Display names that differ from storage/protocol identities are still
      multiple names. They are not allowed after the 3.0 boundary.
  - name: Decide per surface later
    status: rejected
    description: The policy is already decided; implementation can sequence surfaces,
      but cannot reopen whether aliases remain after 3.0.
  - name: 3.x runtime warning window
    status: rejected
    description: Accepting old names with warnings after 3.0 would still preserve
      aliases as supported runtime inputs.
  choice: Agentera 3.0 must eliminate all backwards-compatible and multiple naming
    surfaces. Zero artifacts, concepts, primitives, commands, schema fields, metadata
    fields, runtime adapter surfaces, or protocol identities may retain legacy aliases,
    parallel display names, compatibility names, deprecated names, or storage/protocol
    name splits after the 3.0 boundary. Every retained surface must have one name,
    and old names must be removed or migrated rather than supported alongside it.
    This applies to routes, artifact IDs, paths, schema fields, runtime metadata,
    adapters, package manifests, public docs, and command surfaces.
  reasoning: Agentera is agent-facing infrastructure; every duplicate name becomes
    routing, validation, documentation, and implementation ambiguity. Compatibility
    aliases were acceptable during v2 migration, but the 3.0 boundary exists to end
    that ambiguity. A single-name protocol makes schemas, CLI output, docs, tests,
    and runtime adapters mechanically consistent and easier for agents to follow.
    Migration tooling can still recognize old names as inputs, but runtime behavior
    and docs must not keep them alive as supported alternatives.
  confidence: firm
  feeds_into: TODO.md, references/artifacts/artifact-registry-interface-model.yaml,
    skills/agentera/schemas/artifacts, scripts/agentera, hooks, runtime adapters,
    tests, README.md, UPGRADE.md, references/cli/vocabulary.md
  satisfaction:
    state: user_confirmed_satisfied
    user_confirmation:
      confirmed_by: user
      confirmed_at: '2026-05-23'
- number: 59
  date: '2026-05-22'
  question: How should Agentera 3.0 default and measure JSON context output?
  context: 'Agentera v2 added `--context-profile slim` for `agentera hej --format
    json --capability-context <capability>` while preserving the full dashboard envelope
    as the default compatibility profile. The user clarified that Agentera 3.0 should
    not keep that compatibility path: slim capability context should become the only
    supported capability startup JSON shape, and every public JSON output surface
    should be inventoried, measured, and reviewed for bloat and token inefficiency.
    Follow-up deliberation clarified that 3.0 should make top-level commands map directly
    to capabilities, with `prime` as the intentional non-capability exception for
    central startup/context preparation. A second follow-up selected the stronger
    consolidation: `prime` should be the single non-capability control plane for initial
    session priming, project orientation/dashboard mode, and capability startup context.
    Bare `prime` keeps the static Agentera usage guide, a dashboard/orientation mode
    replaces the long-term need for `hej` as a separate context-serving command, and
    a context mode replaces `hej --capability-context`. The eventual dashboard/orientation
    display label and exact flag spelling remain provisional. The D47 vocabulary inventory
    provides the intended classification pattern: classify public surfaces and protected
    compatibility/history before implementation rather than rewriting opportunistically.'
  alternatives:
  - name: Unified prime control plane
    status: chosen
    description: Remove full-profile capability-startup compatibility, make `capability_context`
      the supported startup JSON shape, make `prime` the single non-capability command
      for static priming, dashboard/orientation mode, and capability context mode,
      inventory every public JSON output, and gate byte and GPT-5 token budgets with
      measured results.
  - name: Split prime and dashboard
    status: rejected
    description: Keeping `prime` for context while adding a separate dashboard command
      would create a second non-capability command exception after 3.0 and weaken
      the clean top-level capability map.
  - name: Keep `hej --capability-context` as the central context seam
    status: rejected
    description: Keeping capability startup context under the orientation/dashboard
      surface would preserve a misleading ownership boundary after 3.0, especially
      if `hej` is renamed or narrowed to human-facing project orientation.
  - name: Per-capability context commands
    status: rejected
    description: Commands such as `planera --context` would make each capability own
      its own startup envelope, but would duplicate context mechanics and weaken the
      single measured JSON budget surface.
  - name: Compatibility-preserving default flip
    status: rejected
    description: Making slim the default while keeping `--context-profile full` would
      preserve the duplicate JSON shape the 3.0 boundary is meant to remove.
  - name: Capability startup only
    status: rejected
    description: Measuring only `hej --capability-context` would miss bloat in other
      public JSON surfaces such as decisions, compact, validate, upgrade, describe,
      lint, gate, and query outputs.
  - name: Manual measurement review only
    status: rejected
    description: Manual measurements are useful evidence, but without budget enforcement
      future JSON bloat can return unnoticed.
  choice: Agentera 3.0 should remove `--context-profile full` as a supported capability
    startup compatibility path, make the slim `capability_context` capsule the only
    supported capability startup JSON shape, and consolidate central non-capability
    startup behavior under `prime`. Top-level commands should directly map to capabilities,
    with `prime` as the intentional non-capability exception. Bare `prime` should
    emit static Agentera usage for initial session priming. A dashboard/orientation
    mode under `prime` should replace separate `hej` dashboard ownership, with the
    final display label and exact flag spelling still provisional. A context mode
    under `prime` should replace `hej --capability-context` for preparing capability
    startup payloads. The implementation must require a D47-style inventory of all
    public JSON output surfaces, measure bytes and GPT-5 tokens for every supported
    `--format json` or `--json` public CLI output surface, and enforce budgets so
    bloated JSON fails tests.
  reasoning: 'Agent-facing JSON is protocol, not incidental formatting. Keeping both
    full and slim startup shapes would preserve the ambiguity Decision 58 is trying
    to remove, and keeping capability startup under `hej` would couple a central context
    API to a human-facing orientation surface whose future name remains open. Consolidating
    orientation and context under `prime` is stronger than adding a separate dashboard
    command because it creates one explicit control-plane exception rather than two:
    capability names run capabilities, while `prime` prepares the agent. Bare `prime`
    already carries static priming guidance, so extending it to dashboard/orientation
    mode and capability context mode makes the existing under-utilized command earn
    its name. Per-capability `--context` commands would spread startup mechanics across
    every capability and make measurement harder. A public-surface inventory plus
    automated byte/token budgets gives Planera and Realisera concrete acceptance criteria
    and prevents a clean 3.0 break from becoming another compatibility seam.'
  confidence: firm
  feeds_into: TODO.md, PLAN.md, scripts/agentera, scripts/measure_capability_context_payloads.py,
    references/cli/agent-ready-state-contract.yaml, tests, README.md, UPGRADE.md,
    .agentera/archive/d47-app-home-vocabulary-inventory.md
  satisfaction:
    state: user_confirmed_satisfied
    evidence: D59 slim capability_context and unified prime control-plane direction
      confirmed as 3.0 policy during resonera satisfaction review on 2026-05-23. Implementation
      of dashboard mode, JSON surface inventory, and byte/token budgets remains downstream
      work.
    user_confirmation:
      confirmed_by: user
      confirmed_at: '2026-05-23'
- number: 60
  date: '2026-05-23'
  question: How should Agentera adopt two-axis diff review after inspirera analysis
    of an external review pattern?
  context: "Inspirera analyzed an external in-progress review skill, which reviews\
    \ a git diff against a fixed point on two orthogonal axes \u2014 Standards (repo\
    \ documented conventions) and Spec (originating requirements) \u2014 using parallel\
    \ sub-agents with isolated context, then aggregates findings side-by-side without\
    \ merging them. Agentera already has holistic health audits (inspektera), plan\
    \ acceptance criteria (planera), and post-realisera verification (orkestrera spawning\
    \ inspektera), but nothing that performs change-scoped diff review with separate\
    \ standards and spec passes. The user requires an extremely high bar for introducing\
    \ a 13th capability; extend existing capabilities until the seam breaks, then\
    \ add."
  alternatives:
  - name: Inspektera review mode
    status: chosen
    description: Extend inspektera with an ephemeral diff-scoped review mode that
      runs parallel Standards and Spec sub-agents, emits a side-by-side report without
      writing health.yaml, optionally files TODO items, uses plan acceptance criteria
      as the primary Spec source via CLI, and falls back to Standards-only when no
      active plan exists. Invocation routing for manual pre-merge review is deferred.
  - name: New 13th capability
    status: rejected
    description: A dedicated review capability would give clean identity and routes,
      but the user rejected adding capabilities until an existing seam demonstrably
      breaks.
  - name: Realisera verify extension
    status: rejected
    description: Realisera already verifies against plan acceptance criteria, but
      review is read-only analysis; mixing build and review safety rails blurs capability
      ownership.
  - name: Orkestrera spawn recipe only
    status: rejected
    description: Documenting two sub-agent prompts in orkestrera alone would cover
      post-realisera gating but not manual pre-merge review or stable capability schemas.
  choice: "Extend inspektera with a diff-scoped review mode adopting a two-axis Standards-and-Spec\
    \ pattern. Review output is ephemeral \u2014 side-by-side Standards and Spec reports,\
    \ optional TODO filing, and no health.yaml writes \u2014 so longitudinal health\
    \ audits stay separate from change-scoped review. Plan acceptance criteria from\
    \ `agentera plan --format json` are the primary Spec source; when no active plan\
    \ exists, run Standards-only and note that Spec was skipped. Support both orkestrera\
    \ post-realisera spawn and manual pre-merge entry; exact invocation surface is\
    \ deferred. Add a new capability only if inspektera's identity collapses under\
    \ the combined audit and review responsibilities."
  reasoning: Review and audit answer different questions. Audit is repo-wide and longitudinal;
    review is change-scoped and orthogonal. Inspektera can host both if review mode
    never writes audit state. The user's extend-until-it-breaks bar favors inspektera
    extension over a 13th capability, while ephemeral output prevents polluting health
    trajectory. Plan AC as Spec source is the Agentera-native adaptation of an issue-tracker
    hierarchy.
  confidence: provisional
  feeds_into: skills/agentera/capabilities/inspektera/instructions.md, skills/agentera/SKILL.md,
    skills/agentera/capabilities/orkestrera/instructions.md, scripts/agentera, tests,
    TODO.md
  satisfaction:
    state: user_confirmed_satisfied
    user_confirmation:
      confirmed_by: user
      confirmed_at: '2026-05-23'
    evidence: User confirmed satisfaction during resonera review on 2026-05-23.

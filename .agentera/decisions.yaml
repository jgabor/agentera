    reference: capabilities/vision
  - source_field: feeds_into
    reference: capabilities/plan
  - source_field: feeds_into
    reference: capability_schema_contract.yaml
  - source_field: feeds_into
    reference: VISION.md
  - source_field: feeds_into
    reference: TODO.md
- number: 72
  date: '2026-06-24'
  question: 'How should Agentera consolidate three parallel install-state concepts
    so users never guess which v2/v3 path they are on?

    '
  context: 'The CLI has three parallel concepts for install identity that overlap
    and create internal confusion about which is canonical: InstallKind (compatibility.ts,
    4 values: v2_managed_app_home, v3_self_contained_npm, source_checkout, unknown_foreign),
    Classification.kind (installRoot.ts, 7 values for root state), and rootStatus
    (BundleStatus, 7 public values). None surface as a unified user-facing label in
    prime output. Users see bundle.status (5-value health indicator) but cannot tell
    at a glance whether they are running v2, v3, or from source. The coexistence probe
    (coexistenceProbe.ts) already detects v2+v3 mixed states and warns "pick one line"
    via doctor, but this warning does not surface in prime. Decision 47 (firm) already
    decided to replace bundle terminology with app terminology; the bundle field name
    in public output is a D47 straggler. Decision 58 (firm) mandates one canonical
    name per concept. Decision 44 (firm) mandates plain English for field values.

    '
  alternatives:
  - name: Promote InstallKind, retire rootStatus

decisions:
- number: 46
  date: '2026-05-08'
  question: How should Agentera handle capability handoff wording and confirmation
    guidance for pending 2.2.0?
  context: '`docs/notes.md` identified three related release-polish gaps: capability
    handoffs still teach standalone slash-capability labels such as `/realisera`,
    next capability recommendations are inconsistent, and bounded choices do not consistently
    use runtime-native question tools. Decisions 43 and 45 already separate `/agentera
    <alias>` routes from CLI state commands, so handoff prose should stop making agents
    remember runtime-specific slash conventions. The user selected the handoff polish
    option for v2.2.0 and explicitly required recording this decision before implementation
    continues.'
  alternatives:
  - name: Handoff polish for v2.2.0
    status: chosen
    description: Normalize handoffs to glyph plus canonical capability name, reserve
      `/agentera <alias>` for explicit route docs, use runtime-native question tools
      for bounded choices, and add regression coverage.
  - name: Completed-plan lifecycle cleanup
    status: rejected
    description: Relevant, but broader lifecycle behavior that should be planned separately
      from release polish.
  - name: CLI write support
    status: rejected
    description: Valuable, but too large for the current 2.2.0 release window and
      likely deserves its own design.
  - name: Record follow-ups only
    status: rejected
    description: Leaves a small but visible v2.2.0 UX inconsistency unresolved after
      Decisions 43-45 tightened the route surface.
  choice: "Include a narrow handoff-polish item in pending 2.2.0: capability prose\
    \ should recommend downstream capabilities as glyph plus canonical name labels\
    \ such as `\u29C9 realisera`, reserve `/agentera <alias>` for explicit slash-route\
    \ documentation, use the runtime's native question tool for clear bounded choices,\
    \ put the recommended option first, include `Done`, and ask for confirmation before\
    \ invoking a downstream capability."
  reasoning: This compounds Decisions 43-45 without changing command semantics. It
    removes a runtime-convention burden from agents, makes handoffs more consistent,
    and keeps the release scope smaller than lifecycle archival or YAML write support.
  confidence: firm
  feeds_into: SKILL.md, capability prose, tests, CHANGELOG.md, docs/vocabulary.md
  satisfaction:
    state: provisionally_satisfied
    evidence: "D46 handoff enforcement now has runtime-facing regression evidence:\
      \ semantic fixture defaults and documentation require glyph plus canonical capability\
      \ names such as `\u29C9 realisera`, hej routing fixtures forbid standalone slash-capability\
      \ labels such as `/realisera`, focused semantic/dispatch tests passed 49 tests\
      \ on 2026-05-15, and semantic fixture evals passed 4 fixtures. User confirmation\
      \ is still required before marking this decision user-confirmed satisfied."
- number: 47
  date: '2026-05-08'
  question: How should Agentera rename bundle semantics and organize app, profile,
    and user data roots?
  context: "Current `AGENTERA_HOME` means a replaceable installed bundle root, while\
    \ `PROFILE.md` lives in the platform data directory. That split makes \u201Cbundle\u201D\
    \ leak into user language and blurs mutable user data versus managed app files."
  alternatives:
  - name: App-home layout
    status: chosen
    description: '`AGENTERA_HOME` is a durable platform data home; managed app files
      live under `AGENTERA_HOME/app`; profile and usage data live at the home root.'
  - name: Rename only in user-facing prose
    status: rejected
    description: Keeps root semantics and internal contracts confusing.
  - name: Keep current bundle root
    status: rejected
    description: Preserves the profile/app split and stale install-root ambiguity.
  - name: Mutate through doctor
    status: rejected
    description: Makes the self-check command write state instead of preserving read-only
      diagnostics.
  choice: Replace bundle terminology with app terminology across live internals, redefine
    default `AGENTERA_HOME` as the platform data home, place the managed Agentera
    app under `AGENTERA_HOME/app`, and keep `PROFILE.md`, `USAGE.md`, history, and
    intermediate corpus data under `AGENTERA_HOME`.
  reasoning: "\u201CInstall the Agentera app\u201D is clearer than \u201Cinstall the\
    \ Agentera bundle,\u201D and home/app separation protects user data from app refreshes.\
    \ `agentera doctor` should detect legacy bundle-root installs and report migration_required\
    \ with exact dry-run/apply commands; `agentera upgrade` owns the idempotent migration\
    \ writes."
  confidence: firm
  feeds_into: TODO.md, PLAN.md, README.md, UPGRADE.md, scripts/install_root.py, scripts/agentera_upgrade.py,
    scripts/agentera, package/runtime registries, tests
  satisfaction:
    state: provisionally_satisfied
    evidence: 'App-home implementation and tests exist: scripts/agentera_upgrade.py
      enforces managed app root planning/action behavior, scripts/agentera reports
      app_home, managedAppRoot, and userDataRoot, scripts/validate_app_home_contract.py
      checks public surfaces, and the focused app-home/upgrade/legacy-default test
      set passed 9 tests on 2026-05-15.'
- number: 51
  date: '2026-05-13'
  question: What should Agentera measure before optimizing capability startup state
    access?
  context: 'Decision 41 closed the v2.0 token benchmark against the revised -10% target,
    but follow-up discussion identified a different pain: agents invoke Agentera capabilities,
    run Agentera CLI state commands for compressed project state, and then still read,
    grep, or glob raw `.agentera/*.yaml` or root artifact files before implementation
    work begins. An uncommitted startup-window draft first tried to measure only slash-route
    or exact intro-marker windows, found zero qualifying windows, and would have closed
    the startup-envelope follow-up. That draft was too strict because real OpenCode
    usage usually invokes capabilities through natural language such as `run orkestrera`
    or bare names such as `planera`.'
  alternatives:
  - name: Keep the route/intro startup-window metric
    status: rejected
    description: It misses the observed OpenCode behavior because most follow-up capability
      invocations do not use `/agentera` route text.
  - name: Design a generic startup state envelope immediately
    status: rejected
    description: The direct session scan shows redundant state access exists, but
      the interface should be driven by the retained artifact-overlap metric.
  - name: Patch individual capability startup habits now
    status: rejected
    description: Lower scope, but it would likely fight symptoms while leaving the
      CLI state surface insufficient for capability startup needs.
  - name: Measure CLI-state-to-raw-artifact overlap
    status: chosen
    description: Count state-gathering sequences where an Agentera CLI state command
      is followed by raw artifact read/grep/glob of the same state family before implementation
      work.
  choice: 'Replace the old startup-window metric with a state-access metric: after
    a capability-related user turn, anchor on the first Agentera CLI state call, stop
    at the first implementation boundary or next user turn, and count subsequent raw
    artifact read/grep/glob access, especially when the raw artifact overlaps the
    CLI state family already fetched.'
  reasoning: 'Direct OpenCode inspection found the actual pattern: bare `planera`,
    bare `resonera`, natural-language Orkestrera handoffs, and subagent prompts frequently
    run `agentera plan`, `agentera progress`, `agentera docs`, or related state commands
    and then read raw YAML/Markdown artifacts before work begins. The discarded route/intro
    classifier therefore produced a false weak-evidence `close_without_implementation`
    result by measuring the wrong anchor. The retained state-access metric measures
    the product problem directly and can distinguish a broad CLI startup-envelope
    need from narrower capability guidance fixes.'
  confidence: firm
  feeds_into: startup state-access analysis, scripts/agentera, scripts/extract_corpus.py,
    capability prose, tests, TODO.md
  satisfaction:
    state: user_confirmed_satisfied
    user_confirmation:
      confirmed_by: user
      confirmed_at: '2026-05-15'
- number: 52
  date: '2026-05-13'
  question: How should Agentera run and retain startup state-access benchmark metrics?
  context: Decision 51 made startup state-access overlap an optimization metric. To
    compare versions, Agentera needs a repeatable manual run for `scripts/startup_analysis_contract.py`
    that can read local runtime history without committing or shipping generated local
    evidence.
  alternatives:
  - name: Ad hoc analyzer commands
    status: rejected
    description: Minimal, but weak for repeatability and trend comparison.
  - name: Normal CI regression
    status: rejected
    description: CI cannot depend on private local runtime histories.
  - name: Manual Mage benchmark with user-local retention
    status: chosen
    description: Mage runs the benchmark manually; aggregate history stays under `${AGENTERA_HOME}/benchmarks/startup-state/`.
  choice: Add a manual Mage benchmark suite starting with the Decision 51 startup
    state-access metric. Persist aggregate `runs.jsonl` history under the user Agentera
    data home, not the repository, and retain only the latest redacted detailed report
    beside it.
  reasoning: Mage gives a clear manual benchmark surface while the Python analyzer
    remains the metric source of truth. User-local JSONL enables longitudinal optimization
    targets without polluting git or packages, and latest-only report retention preserves
    debuggability without accumulating bulky private artifacts.
  confidence: firm
  feeds_into: magefile.go, startup state-access benchmark, TODO.md
  satisfaction:
    state: user_confirmed_satisfied
    user_confirmation:
      confirmed_by: user
      confirmed_at: '2026-05-15'
- number: 53
  date: '2026-05-15'
  question: How should Agentera track whether decisions are satisfied?
  context: Current decision CLI output exposes compacted entries and downstream references,
    but open TODOs show decisions can be forgotten after compaction or when they fall
    outside normal query range. The user wants outcome tracking and compaction recovery
    handled together.
  alternatives:
  - name: Track downstream references only
    status: rejected
    description: Shows where a decision should feed, but does not prove the intended
      outcome was accepted as fulfilled.
  - name: Store satisfaction outside decisions
    status: rejected
    description: Keeps the decision schema smaller, but makes decisions depend on
      secondary indexes and leaves compaction without a canonical preservation rule.
  - name: Decision-entry satisfaction state
    status: chosen
    description: Store satisfaction on the decision entry, let automation mark provisional
      evidence, require user confirmation for final satisfaction, and protect unresolved
      decisions from compaction.
  choice: Store decision satisfaction state on each decision entry. Agents may mark
    provisional satisfaction with evidence, but only the user may confirm satisfaction.
    Open or provisionally satisfied decisions must not be compacted; old protected
    decisions trigger review before compaction, during health audits, and at release
    closeout.
  reasoning: Decision satisfaction is an intent state, not just evidence of a downstream
    write. Keeping it on the decision entry makes compaction rules and CLI source
    contracts preserve the outcome instead of forcing agents into memory or git-history
    recovery.
  confidence: firm
  feeds_into: TODO.md, .agentera/decisions.yaml, scripts/agentera, hooks/compaction.py,
    tests, capability prose
  satisfaction:
    state: user_confirmed_satisfied
    user_confirmation:
      confirmed_by: user
      confirmed_at: '2026-05-15'
- number: 54
  date: '2026-05-16'
  question: How should Agentera rationalize app metadata status vocabulary across
    doctor, hej, and upgrade surfaces, and how far should adjacent vocabulary renames
    go now?
  context: Doctor output currently exposes a mix of terms such as `fresh`, `stale`,
    `update_needed`, `ready`, `refresh`, and `fixed`. The active doctor plan started
    as a text-output repair for misleading ready-state `Next:` guidance, but user
    deliberation rejected an easy split between internal JSON and user-facing wording
    because Agentera already has terminology debt around DECISIONS.md/decisions.yaml
    and bundle/app vocabulary. Follow-up review identified wider possible rename targets,
    including capability names, canonical artifact names such as DECISIONS.md and
    `.agentera/decisions.yaml`, exit signals, task statuses, health grades, and general
    prose outside app metadata.
  alternatives:
  - name: Text-only translation
    status: rejected
    description: Lowest compatibility risk, but leaves JSON, docs, tests, and agent
      reasoning with a second hidden vocabulary that can leak into future output.
  - name: Canonical hard rename
    status: chosen
    description: Rename the canonical app status vocabulary now across internal metadata,
      text, docs, and tests; update consumers in the same change instead of creating
      a long-lived dual vocabulary.
  - name: Broader suite-wide rename now
    status: rejected
    description: Renaming capability names, artifact names, exits, task statuses,
      health grades, and general prose in the same change would mix a bounded doctor/app
      contract fix with protocol identity changes whose blast radius has not been
      inventoried.
  - name: Block doctor fix on vocabulary authority migration
    status: rejected
    description: Deferring the bounded doctor/app metadata fix until a structured
      vocabulary authority exists would preserve current confusing statuses longer.
      Instead, record inventory and a separate Resonera decision as prerequisites
      for broader renames.
  - name: Canonical plus compatibility aliases
    status: rejected
    description: Safer for unknown consumers, but still risks becoming permanent dual
      truth unless an unavoidable external compatibility consumer is proven.
  - name: Keep current terms with stricter definitions
    status: rejected
    description: Defines the existing mess more precisely but keeps non-standard app
      words such as `fresh`, `stale`, `refresh`, and `fixed` as first-class protocol
      language.
  choice: Hard-rename app metadata toward one canonical vocabulary. Use standard app
    terms such as `up_to_date`, `outdated`, `repair_needed`, `migration_needed`, `manual_review_needed`,
    `ready_to_apply`, `applied`, and `no_changes_needed` as the starting contract.
    Avoid `fresh`, `stale`, `refresh`, and `fixed` as canonical status words. Preserve
    compatibility aliases only when a concrete existing consumer requires them, and
    document any such alias as transitional rather than as a second source of truth.
    Do not rename capability names, artifact names or paths, exit signals, task statuses,
    health grades, or general prose as part of the doctor app-metadata implementation.
    Those broader targets require a thorough inventory, consumer review, and a separate
    Resonera decision on whether a dedicated `vocabulary.yaml` should replace `docs/vocabulary.md`
    as the structured vocabulary authority.
  reasoning: 'Agentera''s prior vocabulary drift made agents and users carry mapping
    tables between artifact names, app/bundle terminology, and CLI labels. App status
    metadata is a protocol surface, not merely UI copy. A hard rename costs more now,
    but it prevents another internal/public split and makes doctor, hej, upgrade,
    tests, and documentation use the same mental model. The same argument does not
    justify opportunistic suite-wide renames: capability names, artifact identifiers,
    exit signals, task statuses, and health grades are protocol identity surfaces
    with different compatibility costs. They need inventory-backed deliberation before
    replacement, especially if the long-term authority moves from prose-only `docs/vocabulary.md`
    to a machine-readable `vocabulary.yaml`.'
  confidence: firm
  feeds_into: .agentera/plan.yaml, TODO.md, docs/vocabulary.md, vocabulary.yaml, scripts/agentera_upgrade.py,
    scripts/agentera, references/cli/agent-ready-state-contract.yaml, tests, CHANGELOG.md,
    README.md, UPGRADE.md
  satisfaction:
    state: open
- number: 55
  date: '2026-05-17'
  question: How should Agentera expose usage statistics and local-history corpus generation?
  context: D48 exposed `agentera usage` for analytics while intentionally not adding
    `agentera corpus`. The helper-script inventory identified `scripts/extract_corpus.py`
    as a direct helper that reads local runtime history and produces an intermediate
    corpus consumed by `scripts/usage_stats.py` and Profilera. A follow-up deliberation
    considered whether clear consent semantics made a top-level corpus command safe
    enough, then rejected exposing the implementation artifact as product vocabulary.
  alternatives:
  - name: Add top-level agentera corpus
    status: rejected
    description: Makes a sensitive intermediate data structure user-facing vocabulary
      and invites users to reason about extraction artifacts instead of the analytics
      outcome.
  - name: Keep agentera usage only
    status: rejected
    description: Preserves compatibility, but leaves the missing-corpus path less
      discoverable and keeps the user-facing command name weaker than the outcome.
  - name: Add agentera stats with internal corpus refresh
    status: chosen
    description: Expose usage statistics as the product command while keeping corpus
      generation as an internal, previewable, consent-gated implementation step.
  - name: Auto-refresh stats from runtime history
    status: rejected
    description: Violates the privacy boundary by making a normal stats read silently
      inspect local AI runtime histories.
  choice: Add `agentera stats` as the user-facing analytics workflow and do not expose
    a top-level `agentera corpus` command. Plain `agentera stats` reports from existing
    fresh data or shows the refresh command when data is missing or stale; it must
    not read local runtime history. `agentera stats refresh --dry-run` previews candidate
    runtimes, paths, and expected actions without extraction or writes. `agentera
    stats refresh --consent local-history` reads bounded local runtime history, writes
    the internal corpus at `$PROFILERA_PROFILE_DIR/intermediate/corpus.json`, and
    reports stats. Preserve `agentera usage` as a compatibility surface or alias.
  reasoning: Users want to measure Agentera usage, not operate on a corpus artifact.
    Keeping corpus generation internal reduces vocabulary and privacy risk while still
    giving agents and users a supported way to refresh analytics data. The preview
    plus explicit `--consent local-history` contract satisfies non-interactive CLI
    design, makes sensitive local-history reads intentional, and keeps `usage_stats.py`
    and `extract_corpus.py` as implementation seams behind a clearer product command.
  confidence: firm
  feeds_into: TODO.md, scripts/agentera, scripts/extract_corpus.py, scripts/usage_stats.py,
    tests, README.md, capability prose
  satisfaction:
    state: open
- number: 56
  date: '2026-05-17'
  question: Should Agentera 3.0 rewrite the CLI core in TypeScript for Bun/npm distribution
    and runtime integration?
  context: Agentera 2.x is a Python CLI/app-home implementation with bundled skills,
    scripts, hooks, references, and runtime manifests. OpenCode already relies on
    a JavaScript plugin that duplicates app-home/runtime bootstrap logic, and upcoming
    Codex/OpenCode/npm packaging work increases the pressure to make runtime integration
    and distribution JS-native. The user framed the 3.0 question around pure TypeScript,
    Bun single-binary compilation, and easier npm distribution, then selected runtime
    integration, whole CLI core, contract-first parity, and CLI JSON contracts as
    the rewrite constraints.
  alternatives:
  - name: Keep Python core and improve packaging only
    status: rejected
    description: Lowest rewrite risk, but preserves split-brain JS runtime glue around
      a Python core and leaves npm/single-binary distribution as an adapter layer.
  - name: TypeScript runtime adapter layer only
    status: rejected
    description: Improves OpenCode/Codex/npm integration, but leaves the core CLI,
      validators, compaction, doctor, upgrade, and state commands in Python.
  - name: Whole CLI core TypeScript rewrite with contract-first parity
    status: chosen
    description: Reimplement the supported `agentera` CLI core in TypeScript/Bun only
      after existing JSON contracts, exit behavior, artifact rules, and runtime gates
      are captured as parity tests.
  - name: Clean-slate TypeScript rewrite
    status: rejected
    description: Attractive architecturally, but too likely to regress mature CLI
      state, upgrade, validation, compaction, and protected-artifact behavior.
  choice: Treat a pure TypeScript/Bun rewrite of the whole Agentera CLI core as the
    3.0 direction, gated by contract-first parity. The Python implementation remains
    the behavior oracle until the TypeScript CLI preserves supported command JSON
    output shapes, exit behavior, artifact validation, compaction, doctor/upgrade
    safety, verify/usage/stats semantics, and runtime adapter hooks. Bun/npm/single-binary
    distribution is the payoff, but not a reason to weaken existing Agentera contracts.
  reasoning: The strongest argument for TypeScript is runtime integration, not language
    preference. Agentera increasingly meets users through JS-native hosts and npm-shaped
    plugin surfaces, while the current OpenCode plugin already carries runtime bootstrap
    logic that would be cleaner if the CLI core and distribution target shared one
    toolchain. A full rewrite is justified only if it reduces runtime/package complexity
    without sacrificing the current agent-ready CLI contract. Therefore the rewrite
    must start from golden CLI JSON contracts and parity fixtures, not from a clean-slate
    architecture rewrite.
  confidence: firm
  feeds_into: TODO.md, scripts/agentera, pyproject.toml, package manifests, runtime
    adapters, tests, README.md, UPGRADE.md, release planning
  satisfaction:
    state: open
- number: 57
  date: '2026-05-18'
  question: How should Agentera rename capability `prose.md` files and make first-invocation
    instruction reading explicit?
  context: The capability file name `prose.md` undersells its role as the behavioral
    instruction source for each capability. The user asked how to rename it to `instructions.md`
    and enforce full reading during initial capability invocation. The practical constraint
    is that Agentera cannot technically force every runtime to read a file, but it
    can make the requirement explicit through schema metadata, CLI capability context,
    router guidance, descriptors, docs, and tests.
  alternatives:
  - name: Full instructions contract
    status: chosen
    description: Rename `skills/agentera/capabilities/*/prose.md` to `skills/agentera/capabilities/*/instructions.md`,
      add first-invocation read metadata, surface required reads through CLI capability
      context, and update the capability schema contract, router guidance, runtime
      descriptors, docs, and tests.
  - name: Rename only
    status: rejected
    description: Improves naming but leaves agents guessing whether instructions must
      be read during startup.
  - name: Metadata without rename
    status: rejected
    description: Adds startup-read semantics but keeps the misleading `prose.md` name
      and preserves the old vocabulary debt.
  - name: Runtime hook enforcement
    status: rejected
    description: Not portable because runtimes do not expose a shared, reliable conversation-state
      proof that a file was read in full.
  choice: Rename capability `prose.md` files to `instructions.md`, add `first_invocation_read`
    metadata with values such as `full`, `compact_startup`, or `skip`, surface the
    required reads through `agentera hej --format json --capability-context <name>`,
    and update `skills/agentera/SKILL.md`, `skills/agentera/capability_schema_contract.yaml`,
    `scripts/validate_capability.py`, runtime descriptors, tests, `README.md`, `AGENTS.md`,
    and `docs/vocabulary.md` so first capability invocation reads `instructions.md`
    in full unless an explicit compact-startup exception is declared.
  reasoning: The `instructions.md` name states the file's purpose better than `prose.md`
    and turns capability startup from an implicit convention into a contract. Full
    technical enforcement across every runtime is unrealistic, so the durable implementation
    should combine schema metadata, CLI visibility, Agentera router guidance, descriptor
    updates, and regression coverage rather than relying on prose alone.
  confidence: firm
  feeds_into: TODO.md, skills/agentera/SKILL.md, skills/agentera/capability_schema_contract.yaml,
    scripts/agentera, scripts/validate_capability.py, runtime descriptors, tests,
    README.md, AGENTS.md, docs/vocabulary.md
  satisfaction:
    state: open
- number: 58
  date: '2026-05-18'
  question: What naming boundary must Agentera 3.0 enforce for artifacts, concepts,
    primitives, and compatibility aliases?
  context: Agentera v2 still exposes legacy Markdown-style canonical artifact labels
    such as `PROGRESS.md`, `PLAN.md`, and `DECISIONS.md` while the actual v2 storage
    paths are YAML files such as `.agentera/progress.yaml`. Similar compatibility
    seams exist in vocabulary, runtime metadata, migration fixtures, direct-helper
    commands, schema names, and historical alias surfaces. The user explicitly decided
    that Agentera 3.0 must not preserve backwards-compatible or multiple names for
    artifacts, concepts, primitives, or any equivalent protocol identity.
  alternatives:
  - name: Single-name 3.0 protocol
    status: chosen
    description: Agentera 3.0 has exactly one canonical name for every artifact, concept,
      primitive, command surface, schema field, runtime metadata field, and protocol
      identity. Legacy names are removed or migrated; they are not retained as aliases.
  - name: Preserve compatibility aliases after 3.0
    status: rejected
    description: Keeping compatibility names after the 3.0 boundary would perpetuate
      the current ambiguity and make agents choose between old and new protocol identities.
  - name: Keep Markdown-style artifact labels as display names
    status: rejected
    description: Display names that differ from storage/protocol identities are still
      multiple names. They are not allowed after the 3.0 boundary.
  - name: Decide per surface later
    status: rejected
    description: The policy is already decided; implementation can sequence surfaces,
      but cannot reopen whether aliases remain after 3.0.
  choice: Agentera 3.0 must eliminate all backwards-compatible and multiple naming
    surfaces. Zero artifacts, concepts, primitives, commands, schema fields, metadata
    fields, runtime adapter surfaces, or protocol identities may retain legacy aliases,
    parallel display names, compatibility names, deprecated names, or storage/protocol
    name splits after the 3.0 boundary. Every retained surface must have one name,
    and old names must be removed or migrated rather than supported alongside it.
  reasoning: Agentera is agent-facing infrastructure; every duplicate name becomes
    routing, validation, documentation, and implementation ambiguity. Compatibility
    aliases were acceptable during v2 migration, but the 3.0 boundary exists to end
    that ambiguity. A single-name protocol makes schemas, CLI output, docs, tests,
    and runtime adapters mechanically consistent and easier for agents to follow.
  confidence: firm
  feeds_into: TODO.md, references/artifacts/artifact-registry-interface-model.yaml,
    skills/agentera/schemas/artifacts, scripts/agentera, hooks, runtime adapters,
    tests, README.md, UPGRADE.md, docs/vocabulary.md
  satisfaction:
    state: open

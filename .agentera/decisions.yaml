    choice: Adopt single-brand product positioning. Merge mobile vision into root
      .agentera/vision.yaml. Restructure root README as Pi-style package index
      with @agentera/mobile as flagship. Demote editor runtime install matrices
      to README Internals and packages/cli/README.md. Document capability

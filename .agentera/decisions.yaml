- number: 42
  date: '2026-05-04'
  question: How should a user invoke any of the 12 capabilities through the single `/agentera` entry point, and how does the
    dispatcher route requests reliably?
  context: D39 committed to a single bundled skill with one entry point (`/agentera`). The v2 codebase has schema-driven trigger
    discovery from capability `triggers.yaml` files, but no explicit invocation model defines how bare `/agentera`, `/agentera
    <capability-name>`, and `/agentera <natural-language-request>` are handled. Concerns about LLM misrouting (e.g., sending
    a user who wants a quick audit into a lengthy resonera deliberation) require guardrails. All 4 runtimes (Claude Code,
    OpenCode, Copilot, Codex) can pass the full message text to the agent after the command trigger, so `<request>` is available
    everywhere.
  alternatives:
  - name: Pure LLM routing
    status: rejected
    description: let the model match capability triggers without guardrails. Simple but unreliable; high misrouting risk to
      lengthy workflows.
  - name: Explicit commands only
    status: rejected
    description: require users to name capabilities directly. Reliable but loses the "always type `/agentera`" simplicity.
  - name: Layered guardrails with deterministic heuristics
    status: rejected
    description: combine deterministic state checks, explicit names, confidence thresholds, disambiguation, and fallback.
      Chosen.
  choice: "Five-layer dispatch model, heuristics hardcoded in `SKILL.md`:\n  1. **Bare `/agentera`** → deterministic heuristic\
    \ decision tree. Checks project state (active plan, critical TODOs, stale health, missing vision) and routes to the appropriate\
    \ capability. Fast, never wrong.\n  2. **`/agentera <capability-name>`** → direct route to named capability. Bypasses\
    \ all NL matching.\n  3. **NL request with high-confidence match** → route via trigger pattern matching from capability\
    \ schemas.\n  4. **Borderline match** → disambiguation prompt: present matching options and let user choose.\n  5. **Low\
    \ confidence / no match** → fallback to hej orientation.\n  Heuristics for bare `/agentera` are hardcoded in `SKILL.md`.\
    \ If the tree grows beyond ~7 rules, extraction to a separate file will be considered.\n  **Reasoning**: Deterministic\
    \ state checks eliminate LLM uncertainty for the most common case (user opens project, wants next action). Explicit capability\
    \ names give power users direct access. Confidence thresholds prevent misrouting to lengthy workflows. Disambiguation\
    \ preserves transparency. Hej fallback is always safe. This model works across all 4 runtimes because `<request>` is just\
    \ message text passed to the agent.\n  **Confidence**: firm\n  **Feeds into**: SKILL.md (routing logic update), README.md\
    \ (user-facing docs), capability prose.md (trigger pattern refinement)"
  reasoning: "Deterministic state checks eliminate LLM uncertainty for the most common case (user opens project, wants next\
    \ action). Explicit capability names give power users direct access. Confidence thresholds prevent misrouting to lengthy\
    \ workflows. Disambiguation preserves transparency. Hej fallback is always safe. This model works across all 4 runtimes\
    \ because `<request>` is just message text passed to the agent.\n  **Confidence**: firm\n  **Feeds into**: SKILL.md (routing\
    \ logic update), README.md (user-facing docs), capability prose.md (trigger pattern refinement)"
  confidence: provisional
  feeds_into: SKILL.md (routing logic update), README.md (user-facing docs), capability prose.md (trigger pattern refinement)

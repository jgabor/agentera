decisions:
- number: 37
  date: '2026-04-29'
  question: Should hooks/validate_artifact.py add an explicit fail-open contract to prevent crashes from blocking agent writes?
  context: The hook currently exits 0 for Claude Code (advisory warnings) but uses deny/exit-2 for Copilot, OpenCode, and
    Codex pre-write paths. There is no top-level exception handler — an unhandled crash would propagate and could block all
    writes. The inspirera analysis identified open-bias's fail-open pattern (safe_hook catches all, logs, passes through)
    as a low-effort safety improvement.
  alternatives:
  - name: Top-level try/except only
    status: chosen
    description: wrap main() in try/except — catch all exceptions, log with traceback, exit 0. Existing blocking logic unchanged.
      No timeout. Minimal, immediately effective.
  - name: Full contract with timeout
    status: rejected
    description: adds platform-dependent complexity (signal handling) without proportional safety gain at v1.
  - name: Do nothing
    status: rejected
    description: implicit fail-open is not the same as explicit. The contract should be unambiguous.
  choice: Wrap main() in hooks/validate_artifact.py with a top-level try/except. On unhandled exception, log the error with
    traceback to stderr and exit 0 (allow through). Add a comment documenting the fail-open contract. No changes to existing
    blocking paths.
  reasoning: One try/except prevents crashes from blocking the agent. The existing blocking paths (structural violations on
    Copilot/OpenCode/Codex) are explicit and intentional — they don't need fail-open protection. This catches only the unexpected.
  confidence: firm
  feeds_into: TODO.md
- number: 38
  date: '2026-04-30'
  question: How should Agentera implement SOB-inspired structured-output benchmark concepts?
  context: Inspirera analysis of Interfaze SOB showed that schema-valid output can still be value-wrong. Agentera has runtime
    smoke tests in `scripts/eval_skills.py`, artifact validators in `hooks/validate_artifact.py`, and Section 20 reality verification,
    but `eval_skills.py` explicitly does not evaluate output correctness.
  alternatives:
  - name: Anchor on value-level skill evals
    status: chosen
    description: tests visible skill output and artifact-derived meaning before broader scoring.
  - name: Anchor on artifact field recall
    status: rejected
    description: useful later, but risks repeating the schema-only trap.
  - name: Anchor on weighted summaries
    status: rejected
    description: premature until semantic correctness signals exist.
  - name: Extend eval_skills.py directly
    status: rejected
    description: smoke and semantic evals have different boundaries.
  choice: "Add a separate stdlib semantic eval surface, starting with `hej` routing fixtures that assert both output facts\
    \ and artifact-derived next-action correctness.\n  **Reasoning**: `hej` proves the core SOB lesson in Agentera terms:\
    \ a clean response is not enough if it routes to the wrong concrete work. A separate script keeps runtime smoke checks\
    \ simple while semantic fixtures grow.\n  **Confidence**: firm\n  **Feeds into**: TODO.md"
  reasoning: "`hej` proves the core SOB lesson in Agentera terms: a clean response is not enough if it routes to the wrong\
    \ concrete work. A separate script keeps runtime smoke checks simple while semantic fixtures grow.\n  **Confidence**:\
    \ firm\n  **Feeds into**: TODO.md"
  confidence: provisional
  feeds_into: TODO.md
- number: 39
  date: '2026-05-04'
  question: What should Agentera 2.0 look like, and should it be a rewrite or an incremental refactor?
  context: 'After 254+ cycles, 38 decisions, 577 tests, and 4 runtime targets, three systemic pains dominate: token consumption
    per session is high (large SKILL.md payloads + artifact ceremony), maintenance surface is scattered (3-way artifact identity
    sync, 908-line validate_artifact.py monolith, ~180 lines duplicated install-root logic), and the 12-skill model fragments
    the feedback loop across many files. The system works but is costly to operate and heavy to evolve.'
  alternatives:
  - name: Targeted refactors
    status: rejected
    description: 'fix 3-way sync, decompose validate_artifact.py, extract shared scripts. ~70% of maintenance benefit at ~10%
      of cost. Rejected: doesn''t address token consumption or artifact ceremony, which are structural problems.'
  - name: 12 autonomous skills with companion schemas
    status: rejected
    description: 'keep the current distribution model but add per-skill schemas and selective reading. Rejected: cross-skill
      mesh complexity persists; the 12-file distribution model remains a token tax.'
  - name: Single bundled skill with capability schemas
    status: chosen
    description: one install, one entry point, 12 capabilities as sub-modules with lean prose + companion schemas. Chosen.
  choice: "Agentera 2.0 is a single bundled skill (`/agentera`) with 12 capabilities. Each capability has lean behavioral\
    \ prose + companion schemas (artifact shapes, validation rules, triggers). A thin shared protocol schema covers confidence,\
    \ severity, and visual tokens. SPEC.md dissolves into capability schemas. Artifacts split: 3 human-facing at root (TODO.md,\
    \ CHANGELOG.md, DESIGN.md), rest as structured agent-facing data in `.agentera/`. A universal query CLI replaces direct\
    \ artifact reads. Master SKILL.md starts full (hej-style orientation + routing), optimizes toward thin schema-driven dispatcher\
    \ over time. Transition: big bang cutover from a feat/v2 branch/worktree.\n  **Reasoning**: The feedback loop is the core\
    \ product, and it's fragmented across 12 skill files and 12 artifact formats. Bundling with schema-driven dispatch and\
    \ a query CLI concentrates the loop into one deep module. Structured artifacts + query CLI eliminates the read/write ceremony\
    \ that burns tokens. The worktree strategy preserves the working system during development. The strongest blind spot (master\
    \ SKILL.md becoming a God Object) is mitigated by schema-driven routing and a stated optimization trajectory from full\
    \ to thin.\n  **Confidence**: firm\n  **Feeds into**: ROADMAP.md, VISION.md"
  reasoning: "The feedback loop is the core product, and it's fragmented across 12 skill files and 12 artifact formats. Bundling\
    \ with schema-driven dispatch and a query CLI concentrates the loop into one deep module. Structured artifacts + query\
    \ CLI eliminates the read/write ceremony that burns tokens. The worktree strategy preserves the working system during\
    \ development. The strongest blind spot (master SKILL.md becoming a God Object) is mitigated by schema-driven routing\
    \ and a stated optimization trajectory from full to thin.\n  **Confidence**: firm\n  **Feeds into**: ROADMAP.md, VISION.md"
  confidence: provisional
  feeds_into: ROADMAP.md, VISION.md
- number: 40
  date: '2026-05-04'
  question: 'How should the four open questions from the ROADMAP be resolved: artifact format, master SKILL.md size, backward
    compatibility, and sub-module naming?'
  context: Decision 39 committed to Agentera 2.0. ROADMAP.md listed four open questions blocking Phase 1. A token-profile
    experiment measured YAML vs JSON vs JSONL for representative PROGRESS entries.
  alternatives:
  - name: YAML
    status: chosen
    description: human-glanceable, smallest bytes for single entries. Token experiment showed ~18% more tokens than JSONL
      for 10-entry files, but query CLI abstracts the format so raw tokens never enter agent context. Chosen for artifacts.
  - name: JSONL
    status: rejected
    description: 'most compact for multi-entry files, append-friendly. Rejected: marginal token savings irrelevant when CLI
      is the interface.'
  - name: JSON
    status: rejected
    description: 'best schema validation tooling (JSON Schema universal). Rejected: larger than YAML for single entries, no
      meaningful advantage when CLI abstracts access.'
  choice: "YAML for all agent-facing artifacts. No backward compatibility with v1 (migration tool handles conversion). Sub-modules\
    \ called \"capabilities.\" Master SKILL.md size deferred to Phase 1 (measure after hej port).\n  **Reasoning**: The token\
    \ experiment proved format choice doesn't affect agent-visible token consumption because the query CLI is the seam. YAML\
    \ wins on human-glanceability and smallest bytes for typical single-entry reads. No backward compat is consistent with\
    \ D39's big bang. \"Capabilities\" aligns with SKILL.md vocabulary and distinguishes from the v1 \"skills\" concept.\n\
    \  **Confidence**: firm\n  **Feeds into**: ROADMAP.md"
  reasoning: "The token experiment proved format choice doesn't affect agent-visible token consumption because the query CLI\
    \ is the seam. YAML wins on human-glanceability and smallest bytes for typical single-entry reads. No backward compat\
    \ is consistent with D39's big bang. \"Capabilities\" aligns with SKILL.md vocabulary and distinguishes from the v1 \"\
    skills\" concept.\n  **Confidence**: firm\n  **Feeds into**: ROADMAP.md"
  confidence: provisional
  feeds_into: ROADMAP.md
- number: 41
  date: '2026-05-04'
  question: What did the Agentera 2.0 token benchmark prove against the revised 10% reduction target?
  context: ROADMAP.md originally set an aspirational 40%+ token reduction target for Agentera 2.0. On 2026-05-05 the release
    target was revised to -10%; after release-residue cleanup, the measured -10.4% result exceeds that v2.0 target while
    carrying further optimization into future versions.
    The benchmark compared the v1 dispatch payload (all 12 SKILL.md files plus SPEC.md)
    against the v2 payload (master SKILL.md, protocol.yaml, 12 prose.md files, and 48
    schema YAML files).
  alternatives:
  - name: Treat 40% reduction as a hard v2.0 release gate
    status: rejected
    description: The measured result missed the target, but Decision 39's primary
      value was structural consolidation through schemas, query CLI, and one entry point.
  - name: Record the measured delta and carry token reduction as follow-up work
    status: rejected
    description: Preserve the benchmark evidence honestly, but do not keep the old
      -40% target as a v2.0 release blocker after the release target was revised.
  - name: Revise v2.0 target to -10% and require the current measurement to meet it
    status: chosen
    description: Preserve the benchmark evidence honestly, close the v2.0 release gate only after the remeasurement exceeds
      the revised target, and carry additional token optimization into future versions.
  choice: >-
    Record the benchmark as complete for the revised v2.0 target. Initial v2 measurement was 313,356 bytes (-11.0%). After
    the 2026-05-05 release-residue cleanup, v1 baseline remains 352,213 bytes (~88,053 tokens) and v2 measures 315,697
    bytes (~78,924 tokens). Delta is -36,516 bytes, or -10.4%, about 9,129 estimated tokens saved. The release target is
    now -10%, and the current measurement exceeds it for v2.0.
  reasoning: >-
    The 12 v2 prose.md files remain the dominant payload at 208,512 bytes, while 48 capability schema files add 84,889
    bytes that did not exist in v1. The remeasurement uses `uv run scripts/measure_token_payload.py` to preserve the
    Decision 41 byte-count proxy: master SKILL.md, protocol.yaml, 12 capability prose.md files, and 48 capability schema
    YAML files compared with the fixed v1 baseline. The benchmark proves a real but modest token reduction. It does not
    prove the original 40% target, so that target is no longer used as the v2.0 release gate. The structural payoff is
    machine-readable schemas, artifact-specific query summaries, and a single dispatch point; larger token reductions remain
    follow-up work for future versions.
  confidence: firm
  feeds_into: ROADMAP.md, gap-analysis-2026-05-05.md, future token-reduction work
- number: 42
  date: '2026-05-04'
  question: How should a user invoke any of the 12 capabilities through the single `/agentera` entry point, and how does the
    dispatcher route requests reliably?
  context: D39 committed to a single bundled skill with one entry point (`/agentera`). The v2 codebase has schema-driven trigger
    discovery from capability `triggers.yaml` files, but no explicit invocation model defines how bare `/agentera`, `/agentera
    <capability-name>`, and `/agentera <natural-language-request>` are handled. Concerns about LLM misrouting (e.g., sending
    a user who wants a quick audit into a lengthy resonera deliberation) require guardrails. All 4 runtimes (Claude Code,
    OpenCode, Copilot, Codex) can pass the full message text to the agent after the command trigger, so `<request>` is available
    everywhere.
  alternatives:
  - name: Pure LLM routing
    status: rejected
    description: let the model match capability triggers without guardrails. Simple but unreliable; high misrouting risk to
      lengthy workflows.
  - name: Explicit commands only
    status: rejected
    description: require users to name capabilities directly. Reliable but loses the "always type `/agentera`" simplicity.
  - name: Layered guardrails with deterministic heuristics
    status: chosen
    description: combine deterministic state checks, explicit names, confidence thresholds, disambiguation, and fallback.
      Chosen.
  choice: "Five-layer dispatch model, heuristics hardcoded in `SKILL.md`:\n  1. **Bare `/agentera`** → deterministic heuristic\
    \ decision tree. Checks project state (active plan, critical TODOs, stale health, missing vision) and routes to the appropriate\
    \ capability. Fast, never wrong.\n  2. **`/agentera <capability-name>`** → direct route to named capability. Bypasses\
    \ all NL matching.\n  3. **NL request with high-confidence match** → route via trigger pattern matching from capability\
    \ schemas.\n  4. **Borderline match** → disambiguation prompt: present matching options and let user choose.\n  5. **Low\
    \ confidence / no match** → fallback to hej orientation.\n  Heuristics for bare `/agentera` are hardcoded in `SKILL.md`.\
    \ If the tree grows beyond ~7 rules, extraction to a separate file will be considered.\n  **Reasoning**: Deterministic\
    \ state checks eliminate LLM uncertainty for the most common case (user opens project, wants next action). Explicit capability\
    \ names give power users direct access. Confidence thresholds prevent misrouting to lengthy workflows. Disambiguation\
    \ preserves transparency. Hej fallback is always safe. This model works across all 4 runtimes because `<request>` is just\
    \ message text passed to the agent.\n  **Confidence**: firm\n  **Feeds into**: SKILL.md (routing logic update), README.md\
    \ (user-facing docs), capability prose.md (trigger pattern refinement)"
  reasoning: "Deterministic state checks eliminate LLM uncertainty for the most common case (user opens project, wants next\
    \ action). Explicit capability names give power users direct access. Confidence thresholds prevent misrouting to lengthy\
    \ workflows. Disambiguation preserves transparency. Hej fallback is always safe. This model works across all 4 runtimes\
    \ because `<request>` is just message text passed to the agent.\n  **Confidence**: firm\n  **Feeds into**: SKILL.md (routing\
    \ logic update), README.md (user-facing docs), capability prose.md (trigger pattern refinement)"
  confidence: provisional
  feeds_into: SKILL.md (routing logic update), README.md (user-facing docs), capability prose.md (trigger pattern refinement)
- number: 43
  date: '2026-05-07'
  question: How should Agentera expose plain user-facing routes without losing canonical Swedish capability identity?
  context: The 2026-05-07 vocabulary deliberation settled on "Brand the worldview. Boring-name the work." Users should not
    need to know Swedish capability names first, but Decisions 39-40 made capabilities canonical v2 protocol objects and
    Decision 42 routes explicit capability names through `/agentera`.
  alternatives:
  - name: Rename capabilities to plain English
    status: rejected
    description: Clearer first contact, but high churn across directories, schemas, artifacts, markers, tests, and product identity.
  - name: Trigger phrases only
    status: rejected
    description: Improves natural-language routing but gives users no stable plain shortcut.
  - name: One primary plain alias per capability
    status: chosen
    description: Keep canonical names and add a small documented action alias surface; colloquial variants stay in trigger schemas.
  choice: >-
    Keep Swedish `-era` names canonical and add one primary plain `/agentera <alias>` per capability: `status`, `vision`,
    `discuss`, `research`, `plan`, `build`, `optimize`, `audit`, `document`, `profile`, `design`, and `orchestrate`.
  reasoning: >-
    Aliases reduce first-contact friction without renaming protocol objects. Exact aliases stay few and stable; secondary
    phrases like `brief`, `what's next`, `deliberate`, `brainstorm`, and `rubber duck` belong in trigger schemas so they do
    not become canonical identity.
  confidence: firm
  feeds_into: SKILL.md routing, schemas/triggers.yaml, README.md, docs/vocabulary.md, tests
- number: 44
  date: '2026-05-07'
  question: How should Agentera handle plain-English vocabulary inside capability prose and internal protocol docs after Decision 43?
  context: >-
    Decision 43 kept Swedish names while adding aliases. This review found abstract prose terms such as `freshness`, non-Git
    `checkpoint`, `guard`, `Reality Verification Gate`, `conductor protocol`, `memory layer`, `operating record`, `drift`,
    and `DTC` kept as internal vocabulary even when plain wording is equally precise.
  alternatives:
  - name: Keep current internal vocabulary
    status: rejected
    description: preserves avoidable jargon.
  - name: Rename all identifiers now
    status: rejected
    description: high schema, test, and history churn.
  - name: Plain prose with stable IDs
    status: chosen
    description: replace prose and labels first; migrate identifiers deliberately.
  choice: >-
    Use plain English for capability/protocol prose and labels. Deprecate `freshness`; use current/up-to-date/out-of-date/synced/status
    wording. Keep `checkpoint` only for Git commits. Replace most `guard` with check/stop-condition wording; keep `gate` only
    for hard pass/fail. Use `behavioral verification gate`, `orchestration loop`, `saved project context`, mismatch/out-of-sync
    wording, and `docs-first` workflow language.
  reasoning: >-
    Identity belongs in stable names and IDs, not every workflow noun. Plain prose reduces cognitive load; stable IDs protect
    compatibility until migration earns its cost.
  confidence: firm
  feeds_into: docs/vocabulary.md, capability prose, safe labels/tests, active plan wording, TODO.md
- number: 45
  date: '2026-05-08'
  question: >-
    How should Agentera apply the agent-ready interface playbook to its CLI surface after the 2.2.0 alias and vocabulary work?
  context: >-
    Inspirera analysis of `~/docs/agent-ready-interface-playbook.md` identified structured routine output, runtime schema
    introspection, sparse responses, and input hardening as the highest-value Agentera interface improvements. Decision 44
    protects stable command names and parseable labels, while Decision 43 keeps slash route aliases separate from CLI state
    commands. The current `bundle-status` command names a narrow installed-bundle check even though the desired surface is a
    broader Agentera CLI/install/runtime self-check.
  alternatives:
  - name: Freeze state commands and improve outputs
    status: chosen
    description: >-
      Preserve routine state command names, add structured output and field selection, add runtime describe/schema
      introspection, and harden inputs without adding slash-route aliases as CLI commands.
  - name: Add CLI commands for route aliases
    status: rejected
    description: >-
      Would blur the Decision 43 route/CLI boundary by teaching aliases like status, build, audit, and document as CLI state
      commands.
  - name: Keep bundle-status as the long-term diagnostic command
    status: rejected
    description: >-
      Accurate for today's installed-bundle check, but too narrow for future Agentera CLI self-audit, runtime, hook, package,
      and schema health checks.
  - name: Add doctor while keeping bundle-status as an alias
    status: rejected
    description: >-
      Safer for compatibility, but leaves duplicate CLI vocabulary in the pending release and weakens the plain-English command
      surface cleanup.
  choice: >-
    Build one phased agent-ready state interface plan for pending 2.2.0: keep routine state command names stable, improve human
    text output where useful, add structured routine output, add runtime describe/schema introspection, add field selection,
    harden artifact/path inputs, and hard-rename `agentera bundle-status` to `agentera doctor` with no compatibility alias.
  reasoning: >-
    The playbook's core lesson is that agent-facing interfaces need predictable structured I/O, runtime self-description,
    scoped responses, and defensive boundaries. Agentera already has the schema and registry foundations; the next step is to
    expose them through the CLI without collapsing slash routes into state commands. `doctor` is the right plain command for
    Agentera's own install/runtime/CLI health, while artifact health remains `agentera health`.
  confidence: firm
  feeds_into: PLAN.md, scripts/agentera, README.md, docs/vocabulary.md, tests
- number: 46
  date: '2026-05-08'
  question: How should Agentera handle capability handoff wording and confirmation guidance for pending 2.2.0?
  context: >-
    `docs/notes.md` identified three related release-polish gaps: capability handoffs still teach standalone slash-capability
    labels such as `/realisera`, next capability recommendations are inconsistent, and bounded choices do not consistently use
    runtime-native question tools. Decisions 43 and 45 already separate `/agentera <alias>` routes from CLI state commands, so
    handoff prose should stop making agents remember runtime-specific slash conventions. The user selected the handoff polish
    option for v2.2.0 and explicitly required recording this decision before implementation continues.
  alternatives:
  - name: Handoff polish for v2.2.0
    status: chosen
    description: >-
      Normalize handoffs to glyph plus canonical capability name, reserve `/agentera <alias>` for explicit route docs, use
      runtime-native question tools for bounded choices, and add regression coverage.
  - name: Completed-plan lifecycle cleanup
    status: rejected
    description: Relevant, but broader lifecycle behavior that should be planned separately from release polish.
  - name: CLI write support
    status: rejected
    description: Valuable, but too large for the current 2.2.0 release window and likely deserves its own design.
  - name: Record follow-ups only
    status: rejected
    description: Leaves a small but visible v2.2.0 UX inconsistency unresolved after Decisions 43-45 tightened the route surface.
  choice: >-
    Include a narrow handoff-polish item in pending 2.2.0: capability prose should recommend downstream capabilities as glyph
    plus canonical name labels such as `⧉ realisera`, reserve `/agentera <alias>` for explicit slash-route documentation, use
    the runtime's native question tool for clear bounded choices, put the recommended option first, include `Done`, and ask for
    confirmation before invoking a downstream capability.
  reasoning: >-
    This compounds Decisions 43-45 without changing command semantics. It removes a runtime-convention burden from agents,
    makes handoffs more consistent, and keeps the release scope smaller than lifecycle archival or YAML write support.
  confidence: firm
  feeds_into: SKILL.md, capability prose, tests, CHANGELOG.md, docs/vocabulary.md

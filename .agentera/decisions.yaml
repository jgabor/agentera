    hooks/
  satisfaction:
    state: user_confirmed_satisfied
    user_confirmation:
      confirmed_by: user
      confirmed_at: 2026-06-09
    evidence: "Discuss deliberation 2026-06-08 \u2014 10 stresses on Option 2; closeout\
      \ deliberation 2026-06-09 \u2014 8 implementation pins stressed and resolved;\

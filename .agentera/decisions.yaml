decisions:
  - number: 59
    date: 2026-05-22
    question: How should Agentera 3.0 default and measure JSON context output?
    context: "Agentera v2 added `--context-profile slim` for `agentera hej --format
      json --capability-context <capability>` while preserving the full
      dashboard envelope as the default compatibility profile. The user
      clarified that Agentera 3.0 should not keep that compatibility path: slim
      capability context should become the only supported capability startup
      JSON shape, and every public JSON output surface should be inventoried,
      measured, and reviewed for bloat and token inefficiency. Follow-up
      deliberation clarified that 3.0 should make top-level commands map
      directly to capabilities, with `prime` as the intentional non-capability
      exception for central startup/context preparation. A second follow-up
      selected the stronger consolidation: `prime` should be the single
      non-capability control plane for initial session priming, project
      orientation/dashboard mode, and capability startup context. Bare `prime`
      keeps the static Agentera usage guide, a dashboard/orientation mode
      replaces the long-term need for `hej` as a separate context-serving
      command, and a context mode replaces `hej --capability-context`. The
      eventual dashboard/orientation display label and exact flag spelling
      remain provisional. The D47 vocabulary inventory provides the intended
      classification pattern: classify public surfaces and protected
      compatibility/history before implementation rather than rewriting
      opportunistically."
    alternatives:
      - name: Unified prime control plane
        status: chosen
        description: Remove full-profile capability-startup compatibility, make
          `capability_context` the supported startup JSON shape, make `prime`
          the single non-capability command for static priming,
          dashboard/orientation mode, and capability context mode, inventory
          every public JSON output, and gate byte and GPT-5 token budgets with
          measured results.
      - name: Split prime and dashboard
        status: rejected
        description: Keeping `prime` for context while adding a separate dashboard
          command would create a second non-capability command exception after
          3.0 and weaken the clean top-level capability map.
      - name: Keep `hej --capability-context` as the central context seam
        status: rejected
        description: Keeping capability startup context under the orientation/dashboard
          surface would preserve a misleading ownership boundary after 3.0,
          especially if `hej` is renamed or narrowed to human-facing project
          orientation.
      - name: Per-capability context commands
        status: rejected
        description: Commands such as `planera --context` would make each capability own
          its own startup envelope, but would duplicate context mechanics and
          weaken the single measured JSON budget surface.
      - name: Compatibility-preserving default flip
        status: rejected
        description: Making slim the default while keeping `--context-profile full`
          would preserve the duplicate JSON shape the 3.0 boundary is meant to
          remove.
      - name: Capability startup only
        status: rejected
        description: Measuring only `hej --capability-context` would miss bloat in other
          public JSON surfaces such as decisions, compact, validate, upgrade,
          describe, lint, gate, and query outputs.
      - name: Manual measurement review only
        status: rejected
        description: Manual measurements are useful evidence, but without budget
          enforcement future JSON bloat can return unnoticed.
    choice: Agentera 3.0 should remove `--context-profile full` as a supported
      capability startup compatibility path, make the slim `capability_context`
      capsule the only supported capability startup JSON shape, and consolidate
      central non-capability startup behavior under `prime`. Top-level commands
      should directly map to capabilities, with `prime` as the intentional
      non-capability exception. Bare `prime` should emit static Agentera usage
      for initial session priming. A dashboard/orientation mode under `prime`
      should replace separate `hej` dashboard ownership, with the final display
      label and exact flag spelling still provisional. A context mode under
      `prime` should replace `hej --capability-context` for preparing capability
      startup payloads. The implementation must require a D47-style inventory of
      all public JSON output surfaces, measure bytes and GPT-5 tokens for every
      supported `--format json` or `--json` public CLI output surface, and
      enforce budgets so bloated JSON fails tests.
    reasoning: "Agent-facing JSON is protocol, not incidental formatting. Keeping
      both full and slim startup shapes would preserve the ambiguity Decision 58
      is trying to remove, and keeping capability startup under `hej` would
      couple a central context API to a human-facing orientation surface whose
      future name remains open. Consolidating orientation and context under
      `prime` is stronger than adding a separate dashboard command because it
      creates one explicit control-plane exception rather than two: capability
      names run capabilities, while `prime` prepares the agent. Bare `prime`
      already carries static priming guidance, so extending it to
      dashboard/orientation mode and capability context mode makes the existing
      under-utilized command earn its name. Per-capability `--context` commands
      would spread startup mechanics across every capability and make
      measurement harder. A public-surface inventory plus automated byte/token
      budgets gives Planera and Realisera concrete acceptance criteria and
      prevents a clean 3.0 break from becoming another compatibility seam."
    confidence: firm
    feeds_into: TODO.md, PLAN.md, scripts/agentera,
      scripts/measure_capability_context_payloads.py,
      references/cli/agent-ready-state-contract.yaml, tests, README.md,
      UPGRADE.md, .agentera/archive/d47-app-home-vocabulary-inventory.md
    satisfaction:
      state: user_confirmed_satisfied
      evidence: D59 slim capability_context and unified prime control-plane direction
        confirmed as 3.0 policy during resonera satisfaction review on
        2026-05-23. Implementation of dashboard mode, JSON surface inventory,
        and byte/token budgets remains downstream work.
      user_confirmation:
        confirmed_by: user
        confirmed_at: 2026-05-23
  - number: 60
    date: 2026-05-23
    question: How should Agentera adopt two-axis diff review after inspirera
      analysis of an external review pattern?
    context: Inspirera analyzed an external in-progress review skill, which reviews
      a git diff against a fixed point on two orthogonal axes — Standards (repo
      documented conventions) and Spec (originating requirements) — using
      parallel sub-agents with isolated context, then aggregates findings
      side-by-side without merging them. Agentera already has holistic health
      audits (inspektera), plan acceptance criteria (planera), and
      post-realisera verification (orkestrera spawning inspektera), but nothing
      that performs change-scoped diff review with separate standards and spec
      passes. The user requires an extremely high bar for introducing a 13th
      capability; extend existing capabilities until the seam breaks, then add.
    alternatives:
      - name: Inspektera review mode
        status: chosen
        description: Extend inspektera with an ephemeral diff-scoped review mode that
          runs parallel Standards and Spec sub-agents, emits a side-by-side
          report without writing health.yaml, optionally files TODO items, uses
          plan acceptance criteria as the primary Spec source via CLI, and falls
          back to Standards-only when no active plan exists. Invocation routing
          for manual pre-merge review is deferred.
      - name: New 13th capability
        status: rejected
        description: A dedicated review capability would give clean identity and routes,
          but the user rejected adding capabilities until an existing seam
          demonstrably breaks.
      - name: Realisera verify extension
        status: rejected
        description: Realisera already verifies against plan acceptance criteria, but
          review is read-only analysis; mixing build and review safety rails
          blurs capability ownership.
      - name: Orkestrera spawn recipe only
        status: rejected
        description: Documenting two sub-agent prompts in orkestrera alone would cover
          post-realisera gating but not manual pre-merge review or stable
          capability schemas.
    choice: Extend inspektera with a diff-scoped review mode adopting a two-axis
      Standards-and-Spec pattern. Review output is ephemeral — side-by-side
      Standards and Spec reports, optional TODO filing, and no health.yaml
      writes — so longitudinal health audits stay separate from change-scoped
      review. Plan acceptance criteria from `agentera plan --format json` are
      the primary Spec source; when no active plan exists, run Standards-only
      and note that Spec was skipped. Support both orkestrera post-realisera
      spawn and manual pre-merge entry; exact invocation surface is deferred.
      Add a new capability only if inspektera's identity collapses under the
      combined audit and review responsibilities.
    reasoning: Review and audit answer different questions. Audit is repo-wide and
      longitudinal; review is change-scoped and orthogonal. Inspektera can host
      both if review mode never writes audit state. The user's
      extend-until-it-breaks bar favors inspektera extension over a 13th
      capability, while ephemeral output prevents polluting health trajectory.
      Plan AC as Spec source is the Agentera-native adaptation of an
      issue-tracker hierarchy.
    confidence: provisional
    feeds_into: skills/agentera/capabilities/inspektera/instructions.md,
      skills/agentera/SKILL.md,
      skills/agentera/capabilities/orkestrera/instructions.md, scripts/agentera,
      tests, TODO.md
    satisfaction:
      state: user_confirmed_satisfied
      user_confirmation:
        confirmed_by: user
        confirmed_at: 2026-05-23
      evidence: User confirmed satisfaction during resonera review on 2026-05-23.
  - number: 61
    date: 2026-05-23
    question: How should Agentera adapt architecture-deepening concepts from
      external cross-pollination?
    context: Inspirera analyzed an external architecture-deepening pattern.
      Follow-up resonera review compared inspektera, inspirera, and
      handoff-first options. The user chose better audits and accepted a narrow
      inspektera-first slice. Decision 60 remains separate; it covers
      Standards-and-Spec diff review.
    alternatives:
      - name: Narrow inspektera-first slice
        status: chosen
        description: Add evidence-backed deepening candidates to inspektera with
          deletion-test evidence, interface-test signal, dependency tags, and
          resonera handoff for load-bearing boundaries.
      - name: Equal split ownership
        status: rejected
        description: Too diffuse for the first slice after better audits became dominant.
      - name: External skill only
        status: rejected
        description: Fails the cross-pollination goal.
    choice: Keep split ownership, but implement first in inspektera. Inspirera
      imports sources; inspektera names evidence-backed audit candidates;
      resonera decides disputed boundaries; planera and realisera execute
      concrete candidates.
    reasoning: The selected value was better audits. Inspektera is closest to
      concrete deepening opportunities. Narrow evidence keeps taste out of audit
      findings.
    confidence: provisional
    feeds_into: references/cli/vocabulary.md, inspektera, inspirera, resonera,
      PLAN.md, TODO.md
    satisfaction:
      state: user_confirmed_satisfied
      user_confirmation:
        confirmed_by: user
        confirmed_at: 2026-05-23
      evidence: User confirmed satisfaction during resonera review on 2026-05-23.
  - number: 62
    date: 2026-05-24
    question: How should Agentera strengthen visualisera governance for
      terminal-native agent output?
    context: Agentera's visual identity lives in DESIGN.md and protocol.yaml. It
      governs terminal-native Markdown output, not rendered web UI.
      Agent-rendered surfaces such as the hej dashboard, capability
      introductions, and structured artifact headers can drift from declared
      glyphs, dividers, and constraints. Resonera review compared prose-only
      strengthening against near-term CLI enforcement and broader visualisera
      mode expansion. Decision 56 defers new CLI surfaces until contract-first
      parity work is ready for the 3.0 direction.
    alternatives:
      - name: Phase 1 prose adoption only
        status: chosen
        description: Extend DESIGN.md and visualisera instructions with a startup gate,
          brand-vs-product register rules, and expanded agent-output
          constraints. Defer deterministic linting and additional visualisera
          modes until drift is measurable or CLI parity work begins.
      - name: Prose plus reverse-engineer mode
        status: rejected
        description: Adds a document-style workflow to infer tokens from observed
          output. Useful later, but broader than the first governance slice.
      - name: Include deterministic design-output linting now
        status: rejected
        description: Would catch drift automatically, but adds a new CLI surface before
          recurring slop is evidenced and before Decision 56 parity constraints
          are satisfied.
      - name: Defer all visualisera governance changes
        status: rejected
        description: Leaves agent-output drift unmanaged despite an existing design system.
    choice: Adopt Phase 1 prose governance for visualisera in one refine pass.
      Formalize `agentera prime --context visualisera` plus DESIGN.md read as a
      hard Step 0 gate in visualisera instructions. Add a brand-vs-product
      register to DESIGN.md with a narrow product register covering the hej
      dashboard, capability introductions, and structured artifact headers,
      while human-facing root docs such as README and UPGRADE remain the brand
      register. Expand DESIGN.md constraints with agent-output anti-patterns and
      a slop test for generic agent formatting. Defer deterministic
      design-output linting, named iteration commands beyond
      create/refine/audit, and reverse-engineer workflows until evidence or 3.0
      CLI work justifies them.
    reasoning: Agentera already owns the token layer; the gap is explicit governance
      for agent-rendered output. Prose changes are low cost, contract-aligned,
      and do not require a new CLI command. A narrow product register preserves
      logo scarcity and glyph discipline where agents emit structured output
      while leaving public docs room to breathe. Tooling can follow once drift
      is observable or CLI parity work can absorb a lint surface cleanly.
    confidence: firm
    feeds_into: DESIGN.md, skills/agentera/capabilities/visualisera/instructions.md,
      visualisera
    satisfaction:
      state: user_confirmed_satisfied
      evidence: User confirmed satisfaction during resonera review on 2026-05-31.
        Phase 1 prose governance remains the right approach; implementation is
        still downstream.
      user_confirmation:
        confirmed_by: user
        confirmed_at: 2026-05-31
  - number: 63
    date: 2026-05-24
    question: How should Agentera add Cursor as a first-class runtime in v1?
    context: Cursor IDE and CLI research against runtime-feature-parity.md shows
      strong fit for shared Python hooks, portable skills, and .cursor/agents
      descriptors, but no bare-hej prompt rewrite, no compaction injection,
      partial CLI hook parity, and zero Cursor adapter code in the repository
      today. Resonera deliberation resolved v1 scope, registry shape, validation
      claims, AGENTERA_HOME wiring, and distribution targets before
      implementation.
    alternatives:
      - name: Repo-native dogfood only
        status: rejected
        description: Ship committed .cursor/ in this repository without upgrade/doctor
          paths. Fast internally, but fails the first-class registry contract
          for other projects.
      - name: Skills install only; hooks deferred
        status: rejected
        description: Lowest effort via npx skills -a cursor, but leaves session preload,
          validation, bookmarks, and lifecycle metadata unowned.
      - name: Single cursor runtime with CLI drift notes
        status: rejected
        description: One registry id with known_drifts for CLI gaps. Simpler table, but
          blurs IDE-primary support from CLI-degraded behavior.
      - name: Advisory validation only in v1
        status: rejected
        description: Ship Claude-class post-mutation validation without claiming hard
          gate. Safer claims, but undershoots Copilot-class parity the user
          wants when payloads are reconstructable.
      - name: Full v1 with split runtimes and release-gated hard gate
        status: chosen
        description: Repo .cursor/ plus upgrade/doctor; cursor and cursor-agent registry
          entries; hard-gate claims after live preToolUse Write smoke;
          marketplace submit, eval runner, and managed agents in v1; cloud
          agents documented unsupported.
    choice: Add Cursor as a first-class runtime in one v1 slice. Ship repo-native
      .cursor/ and agentera upgrade --runtime cursor for any project. Register
      cursor for IDE and cursor-agent for CLI as separate RuntimeAdapter
      records. Reuse shared hooks with Cursor-shaped sessionStart wrappers;
      claim conditional hard-gate parity for reconstructable Write/Edit
      candidates only after live preToolUse smoke passes, and block release
      tagging until that smoke succeeds. Wire AGENTERA_HOME through sessionStart
      env first; add setup_cursor.py only if shell-tool smoke shows env does not
      propagate. Include .cursor-plugin/plugin.json, marketplace submission,
      managed .cursor/agents for all twelve capabilities, and eval_skills
      --runtime cursor-agent. Document cloud agents as unsupported in v1. Accept
      metadata-only bare hej routing like Claude/Copilot/Codex.
    reasoning: First-class means registry, doctor, upgrade, lifecycle validator, and
      parity docs describe real adapter paths—not just files in this repo.
      Splitting cursor and cursor-agent keeps IDE support honest while letting
      CLI stay degraded without hiding gaps inside one row. Hard-gate claims
      stay Copilot-class but release-gated so docs never overship. Deferring
      setup_cursor.py avoids Codex-style config glue until evidence says
      sessionStart env is insufficient for shell tools. The user explicitly
      chose an ambitious v1 that includes marketplace, eval, and managed agents
      rather than phasing distribution surfaces.
    confidence: firm
    feeds_into: references/adapters/runtime-adapter-registry.yaml,
      references/adapters/runtime-feature-parity.md,
      references/adapters/cursor.md, .cursor/, .cursor-plugin/,
      hooks/validate_artifact.py, scripts/agentera_upgrade.py,
      scripts/eval_skills.py, scripts/smoke_live_hosts.py, AGENTS.md, tests,
      package-registry.yaml
    satisfaction:
      state: user_confirmed_satisfied
      evidence: Cursor v1 slice shipped in commit 151043d with cursor and cursor-agent
        registry records, repo-native hooks and managed agents,
        upgrade/doctor/eval paths, and parity docs. Live preToolUse Write smoke
        passed 2026-05-24 with invalid-block and valid-allow evidence in
        `.agentera/smoke-cursor-pretooluse-evidence.txt` and progress cycle 596.
        Plan Task 8 closeout synchronized artifacts and bumped version metadata
        to 2.7.0. User confirmed satisfaction during resonera review on
        2026-05-31.
      user_confirmation:
        confirmed_by: user
        confirmed_at: 2026-05-31
  - number: 64
    date: 2026-05-26
    question: How should Agentera refine VISION.md after the recent direction shift?
    context: The vision.yaml hadn''t been substantially updated since May 4, while
      the project picked up Cursor as a first-class runtime (D63), consolidated
      the CLI under prime (D59), set a TS/3.0 direction (D56), launched a web
      site, extended inspektera with review mode and architecture-deepening
      (D60/61), added visualisera governance (D62), and introduced JSON output
      budgets and enforcement (D59). A resonera deliberation reviewed each
      section of the vision and selected three refinements.
    alternatives:
      - name: Full vision rewrite
        status: rejected
        description: Too broad; the north star and principles still hold structurally.
      - name: Stretch-goal refinements including runtime landscape and TS/3.0 direction
        status: rejected
        description: Not yet ready for vision-level commitment until those directions
          are more concrete.
      - name: Focused refinements on JSON contract discipline, personality, and
          emotional register
        status: chosen
        description: Three targeted updates that sharpen what the project proved through
          implementation.
      - name: No changes
        status: rejected
        description: Would leave the vision underrepresenting JSON-as-protocol rigor and
          the autonomous feel of the system.
    choice: "Apply three focused refinements to vision.yaml: (1) add JSON output is
      protocol paragraph to Direction, (2) shift personality from \"ambitious
      workshop\" to \"the sharp colleague''s workshop\", (3) add autonomy
      dimension to the emotional register. Defer runtime landscape and TS/3.0
      direction updates to a future refinement when those directions are more
      concrete."
    reasoning: "The vision''s north star and principles are structurally sound. What
      was missing was two things the project proved through implementation: that
      JSON-as-protocol discipline is a product commitment rather than just an
      optimization preference, and that the emotional feel of the system
      includes the companion autonomy of an agent that works when you do not.
      The personality change from \"ambitious workshop\" to \"the sharp
      colleague''s workshop\" bridges these two refinements by making the
      product personality mirror the interface voice."
    confidence: firm

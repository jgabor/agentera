decisions:
- number: 66
  date: '2026-06-02'
  question: Should progress.yaml retain the per-cycle `commit` field or remove it
    entirely?
  context: 'Each full-detail cycle requires PR6 `commit` naming the product-change
    git hash. Build sets `commit: pending` then forward-backfills in a second commit.
    The TS CLI maintains `agentera check backfill` and `progressCommit.ts` (`commitToken`,
    `rewriteCycleCommits`, `computeBackfill`, `validateProgressCommits`) plus a validate-artifact
    ancestry guard. `rewriteCycleCommits` is brittle line-oriented YAML surgery (all-digit
    short hashes broke parsing until cycle 627 quoted values). The field duplicates
    `git log` scoped to cycle metadata. D58 single-source-of-truth and plan ''Reconsider
    the progress.yaml commit field'' frame this evaluation. Cycle 629 freeze oracles
    omit per-cycle `commit`; audit 5b already skips change-magnitude when no hashes
    appear. Ripple inventory (21 files): DELETE `progressCommit.ts`, `backfill.ts`,
    `progressCommit.test.ts`, `backfill.test.ts`; EDIT `dispatch.ts` (parseBackfillArgs,
    runBackfill, check route), `validateArtifact.ts` (validateProgressCommits), `hooks/common.ts`,
    `core/git.ts` (ancestorState), `state.ts` (~L77), `help.ts`, `doctor.ts`, `migrateArtifactsV1ToV2.ts`;
    SCHEMA/PROSE progress schema PR6+PV2, build instructions, AGENTS.md, audit 5b,
    contract.md, UPGRADE.md, CHANGELOG; DATA `.agentera/progress.yaml`, TODO.md chore:3.0.0.'
  alternatives:
  - name: Retain and fix the commit field
    status: rejected
    description: Keep PR6 required, retain backfill command and ancestry guard, continue
      forward-backfill ceremony. Cycle-627 quoting fixed one YAML edge case but preserves
      rewrite pipeline and double-commit-per-cycle cost.
  - name: Remove the commit field from the progress schema
    status: chosen
    description: Drop PR6 and PV2 commit requirement, delete backfill command and
      progressCommit.ts, remove validate-artifact ancestry checks, strip commit from
      existing cycles, update AGENTS.md/build/UPGRADE/contract prose. Link cycles
      to product commits via git log plus timestamp/what/scope/verified.
  choice: "Remove the per-cycle `commit` field and delete backfill/rewrite/ancestry\
    \ machinery. Do not retain `commit` as optional\u2014D58 rejects parallel linkage\
    \ sources. Follow-up build plan implements removal; this decision is design-only."
  reasoning: "Field cost exceeds signal: forward-backfill forces a second commit per\
    \ cycle for metadata `git log` already provides; `rewriteCycleCommits` stays fragile;\
    \ ancestry guard mainly repairs amend-induced stale hashes the workflow creates.\
    \ Consumers already cope: `progressVerificationSummary` never surfaced `commit`;\
    \ audit 5b defaults depth without hashes; freeze oracles omit the key. Retain-and-fix\
    \ perpetuates ceremony. Removal aligns with D58 and deletes a module plus command.\
    \ Migration: (1) schema\u2014drop PR6/PV2 commit; (2) delete `check backfill`\
    \ surface; (3) delete `progressCommit.ts` and tests, drop `validateProgressCommits`;\
    \ (4) remove commit from state progress text output; (5) strip commit from progress.yaml\
    \ cycles and v1 migration; (6) update docs/prose; (7) test suite green and TODO\
    \ resolved."
  confidence: firm
  feeds_into: TODO.md, skills/agentera/schemas/artifacts/progress.yaml, packages/cli/src/state/progressCommit.ts,
    packages/cli/src/cli/commands/backfill.ts, packages/cli/src/hooks/validateArtifact.ts,
    packages/cli/src/cli/dispatch.ts, AGENTS.md, skills/agentera/capabilities/build/instructions.md,
    UPGRADE.md, .agentera/progress.yaml
  satisfaction:
    state: user_confirmed_satisfied
    evidence: Discuss evaluation and orchestrate plan task 1 (2026-06-02) recorded
      remove with 21-file ripple inventory, seven-step migration outline, and six
      follow-up build acceptance criteria. User confirmed satisfaction 2026-06-02;
      TODO.md chore entry rewritten for implementation per D66.
    user_confirmation:
      confirmed_by: user
      confirmed_at: 2026-06-02
  follow_up_realisera_acceptance:
  - GIVEN the progress artifact schema WHEN removal ships THEN PR6 `commit` is absent,
    PV2 no longer requires it, and `.agentera/progress.yaml` cycles validate without
    `commit` keys.
  - GIVEN the backfill command surface WHEN removal ships THEN `agentera check backfill`
    is unreachable, `progressCommit.ts` and `backfill.ts` are deleted, and `validateArtifact.ts`
    no longer calls `validateProgressCommits`.
  - GIVEN `agentera progress --format json` consumers WHEN cycles lack `commit` THEN
    JSON payloads remain valid, CLI tests pass, and audit 5b uses default audit depth.
  - GIVEN AGENTS.md, build instructions, UPGRADE.md, and contract.md WHEN removal
    ships THEN commit-field and forward-backfill ceremony prose is removed.
  - GIVEN the full CLI test suite WHEN removal completes THEN all tests pass and freeze
    oracles that omit per-cycle `commit` remain green.
  - GIVEN TODO.md chore:3.0.0 WHEN closeout runs THEN the entry moves to Resolved
    with decision 66 reference and the implementation commit hash.
- number: 67
  date: '2026-06-05'
  question: How should Agentera reposition from open protocol to mobile-first product?
  context: The agentera-mobile staging repo and monorepo README previously framed
    Agentera as an open protocol with runtime adapters as the primary story. The mobile
    app is the flagship consumer product. Pi and T3 Code use one product name across
    monorepo packages.
  alternatives:
  - name: Single brand everywhere
    status: chosen
    description: Agentera is the product. @agentera/mobile, @agentera/web, @agentera/cli
      are product surfaces. Skills and references are internal implementation contracts.
  - name: Keep open protocol as public headline
    status: rejected
    description: Conflicts with mobile-first product direction and opinionated no-extensions
      policy.
  - name: Agentera Mobile as separate product name
    status: rejected
    description: Adds naming friction when mobile is the primary surface.
  choice: Adopt single-brand product positioning. Merge mobile vision into root .agentera/vision.yaml.
    Restructure root README as Pi-style package index with @agentera/mobile as flagship.
    Demote editor runtime install matrices to README Internals and packages/cli/README.md.
    Document capability English aliases in packages/mobile/README.md without renaming
    schema IDs yet. Add DESIGN.md surface register (terminal vs mobile).
  reasoning: "One north star, one product name, package READMEs for surface-specific\
    \ DX \u2014 matches Pi/T3 monorepo patterns and the user's merged-vision choice."
  confidence: firm
  feeds_into: README.md, .agentera/vision.yaml, AGENTS.md, DESIGN.md, packages/mobile/,
    references/cli/vocabulary.md, .agentera/docs.yaml, docs/consolidation/monorepo-plan.md
  satisfaction:
    state: user_confirmed_satisfied
    evidence: Decision 68 (2026-06-05) corrected D67 skills-as-internals ceiling to
      a delivery surface, removed SaaS/PaaS framing, and reaffirmed multi-surface
      product boundary. User confirmed D67 satisfaction 2026-06-05 in current discuss
      deliberation. D67 feeds_into list is satisfied.
    user_confirmation:
      confirmed_by: user
      confirmed_at: 2026-06-05
- number: 68
  date: '2026-06-05'
  question: Should Agentera expand from a skill suite into a multi-surface product
    sharing one fixed workflow?
  context: "Decision 67 (2026-06-05) repositioned docs toward mobile-first single\
    \ brand\nwith three packages and described skills/references as internal implementation\n\
    contracts. An initial discuss draft (same day) incorrectly framed expansion as\n\
    SaaS/PaaS with Pi-style extensibility on some surfaces. User correction: drop\n\
    SaaS and PaaS entirely; no extensions remains true everywhere \u2014 Agentera\
    \ ships\nas-is with a fixed system prompt, fixed tools, and fixed workflow. Skills\
    \ and\neditor plugins are not user extensibility \u2014 they are another delivery\
    \ surface for\nthe same workflow, alongside CLI, mobile, web, desktop, TUI, and\
    \ potentially\ncloud later.\n"
  alternatives:
  - name: Keep D67 three-package ceiling
    status: rejected
    description: Mobile, web, and cli only; no additional surfaces; skills stay documented
      as internals.
    reason_rejected: User intent is explicit multi-surface expansion; skills/plugins
      should be named as a surface, not demoted to hidden internals.
  - name: SaaS/PaaS platform with third-party extensibility
    status: rejected
    description: Managed cloud product and/or platform APIs for others to build on;
      plugin ecosystems on editor or mobile surfaces.
    reason_rejected: User rejected SaaS, PaaS, and extensibility framing on 2026-06-05
      refinement.
  - name: Pi-style user extensions on CLI/desktop/TUI
    status: rejected
    description: Users load third-party skills, plugins, or MCP servers on power-user
      surfaces while mobile stays curated.
    reason_rejected: Contradicts no-extensions policy; Agentera ships as-is on every
      surface.
  - name: Multi-surface product, one fixed workflow
    status: chosen
    description: "Agentera is one opinionated product delivered through multiple surfaces\
      \ \u2014 the same twelve-capability workflow, `.agentera/` state, and built-in\
      \ tools everywhere. CLI, mobile, web, desktop, TUI, editor skill/plugin runtimes,\
      \ and optional future cloud are surfaces (where and how you interact), not extension\
      \ hosts. Nothing is loaded from outside; missing behavior is built into Agentera."
  choice: "Adopt multi-surface product architecture with a single fixed workflow.\
    \ Surface map \u2014 packages/cli (state access + agent runtime), packages/mobile\
    \ (flagship app), packages/web (marketing + docs), editor skill/plugin surfaces\
    \ (Cursor, Claude, OpenCode, Codex, Copilot \u2014 same workflow as today), future\
    \ packages/desktop, packages/tui, and optional future cloud surface. No SaaS or\
    \ PaaS framing. No user extensions, plugins, MCP servers, or third-party skill\
    \ loading on any surface. D67 docs pass remains valid for monorepo consolidation;\
    \ D68 corrects the \"skills as internals only\" ceiling and replaces any SaaS/PaaS\
    \ or extensibility split with surface parity under one product boundary."
  reasoning: "Surfaces answer \"where do I use Agentera?\" not \"what can I bolt on?\"\
    \ The skill bundle in an editor and the mobile app are the same product in different\
    \ shells \u2014 analogous to Pi's terminal vs SDK, but without Pi's extension\
    \ model. Keeping no-extensions everywhere preserves the persona and product promise\
    \ from D67 mobile principles across the full surface map."
  confidence: firm
  feeds_into: .agentera/vision.yaml, docs/consolidation/monorepo-plan.md, README.md,
    AGENTS.md, packages/mobile/README.md, references/cli/vocabulary.md, skills/agentera/SKILL.md
  satisfaction:
    state: user_confirmed_satisfied
    evidence: "User refined discuss draft 2026-06-05 \u2014 drop SaaS/PaaS, keep no-extensions,\
      \ skills/plugins are surfaces not extensibility."
    user_confirmation:
      confirmed_by: user
      confirmed_at: 2026-06-05
- number: 69
  date: '2026-06-07'
  question: What is the load-bearing invariant connecting Agentera's surfaces under
    Decision 68's "one fixed workflow" claim?
  context: 'Decision 68 (firm) commits to one fixed twelve-capability workflow, shared
    `.agentera/` state, and built-in tools across mobile, web, CLI, and editor delivery
    surfaces. Decision 65 (firm) relocated capability prose to `packages/cli` and
    made `agentera prime --context` the startup contract. Prior D69 deliberation (`docs/consolidation/d69/`)
    explored four invariants and found no convergence until D68''s implementation
    level was clarified. Discuss deliberation (2026-06-07) confirmed OpenCode-like
    architecture with `packages/cli` as foundation.

    '
  alternatives:
  - name: "D69-a/E \u2014 CLI capability schema + state contract"
    status: chosen
    description: Capability schema and `.agentera/` validation in `packages/cli`;
      all surfaces are clients; execution routes through CLI or serve.
  - name: "D69-b \u2014 mental journey invariant"
    status: rejected
    description: Five-phase journey as narrow waist; capability behavior may differ
      per surface.
    reason_rejected: Reinterprets D68; allows observable capability divergence.
  - name: "D69-c \u2014 state-only invariant"
    status: rejected
    description: Shared `.agentera/` schema only; behavior may differ per surface.
    reason_rejected: Weak D68 fit.
  - name: "D69-d \u2014 brand only"
    status: rejected
    description: Surfaces as independent products under one logo.
    reason_rejected: Contradicts D68 by construction.
  choice: "Adopt `packages/cli` as the narrow waist. Layer A (contract) \u2014 twelve-capability\
    \ schema, `.agentera/` artifact shapes, validation, and `agentera prime` / `agentera\
    \ state *` JSON contracts are authoritative in CLI. Layer B (execution routing)\
    \ \u2014 all agent execution routes through the CLI engine (direct or `agentera\
    \ serve`). Provider runtimes (Cursor SDK first; future OpenCode SDK, Vercel AI)\
    \ are Layer B adapters behind CLI. Surfaces are clients \u2014 mobile (presentation-only\
    \ tiering), web (docs/inspector), editor-runtime composite (SKILL.md + hooks +\
    \ CLI binary), future desktop/TUI. D68 means behavioral identity (interpretation\
    \ A).\n"
  reasoning: "OpenCode-like single engine with surface clients matches D65/D68 and\
    \ prevents parallel agent loops on mobile. Editor-runtime is one delivery surface,\
    \ not three workflows. Open follow-ups \u2014 serve API shape, conflict-resolution\
    \ policy, schema package location \u2014 are implementation decisions, not invariant\
    \ changes.\n"
  confidence: firm
  feeds_into: docs/consolidation/monorepo-plan.md, docs/consolidation/d69/, docs/consolidation/mobile-open-decisions.md,
    packages/cli/, packages/mobile/, AGENTS.md, skills/agentera/SKILL.md, references/adapters/,
    hooks/, TODO.md
  satisfaction:
    state: user_confirmed_satisfied
    evidence: "Discuss deliberation 2026-06-07 \u2014 D68 interpretation A, Layer\
      \ A+B, presentation-only mobile tiering, editor-runtime composite surface."
    user_confirmation:
      confirmed_by: user
      confirmed_at: 2026-06-07
- number: 70
  date: '2026-06-08'
  question: "How should Agentera 3.0 name its twelve capabilities \u2014 Swedish `-era`\
    \ forms or English aliases \u2014 once D58's zero-legacy-aliases rule activates?"
  context: "Decision 58 (firm) says \"zero post-3.0 surfaces may retain legacy aliases\
    \ or multiple names.\" Decision 43 (firm) added English aliases (`status`, `vision`,\
    \ `discuss`, `research`, `plan`, `build`, `optimize`, `audit`, `document`, `profile`,\
    \ `design`, `orchestrate`) alongside the Swedish canonical IDs (`hej`, `visionera`,\
    \ `resonera`, `inspirera`, `planera`, `realisera`, `optimera`, `inspektera`, `dokumentera`,\
    \ `profilera`, `visualisera`, `orkestrera`). Decision 44 (firm) treats both surfaces\
    \ as protected compatibility surfaces. The D43 aliasing was heavy: English aliases\
    \ are referenced 6,365 times across the repo versus 3,281 for Swedish IDs, in\
    \ 373 files. Decisions 65/67/68/69 (all firm) establish `packages/cli` as the\
    \ narrow waist, mobile-first product posture, multi-surface one-fixed-workflow,\
    \ and the CLI as the contract-defining surface that other surfaces honor. The\
    \ CLI is ground zero. Naming decisions made at the CLI propagate to mobile, web,\
    \ editor skills, and docs. v2 stable (`@latest`) ships from `main` as a separate\
    \ distribution and remains Swedish; v3 (`@next`) is the surface this decision\
    \ binds. Routing reliability is a tooling-design problem (careful `prime` output,\
    \ dispatch rules, FSM-style state definitions where adopted) rather than a naming\
    \ problem \u2014 names are stable identifiers within the routing machinery, not\
    \ semantic load-bearers.\n"
  alternatives:
  - name: "Option 1 \u2014 keep both layers indefinitely"
    status: rejected
    description: D43 aliasing continues. D58 looms but is never invoked.
    reason_rejected: Contradicts D58; allows two names per capability to persist post-3.0.
  - name: "Option 2 \u2014 promote D43 English aliases to canonical in v3; retire\
      \ Swedish `-era` in v3; v2 stable remains Swedish"
    status: chosen
    description: Strict framing. The D43 aliases become the binding name set for v3
      and onward. Future capability additions follow the same transfer-friendly pattern.
      Swedish forms persist only as historical artifacts and the v2 stable distribution.
      CLI is ground zero per D68/D69; mobile UX retires `brief` to align with `status`;
      editor skills and web docs use the same English names.
    reason_chosen: Codebase has already transitioned (English aliases 2x Swedish hits).
      Mechanical English names compose with prior CLI patterns the LLM has dense priors
      on, supporting the LLM-routing reliability goal without making naming carry
      routing weight. Consistency across v3 surfaces wins over per-surface nuance;
      v2 stable is preserved as a frozen legacy path.
  - name: "Option 3 \u2014 phased transition with one release of protected Swedish\
      \ legacy"
    status: rejected
    description: v3.0.0 ships with both layers and a deprecation warning. v3.1.0 retires
      Swedish. v2 stable stays Swedish indefinitely.
    reason_rejected: Adds a deprecation release without changing the outcome; defers
      the actual rename by one minor version.
  choice: 'Promote the Decision 43 English aliases to canonical in v3. Retire the
    Swedish `-era` capability names in v3 surface only. v2 stable (`@latest`) and
    its capability surface remain Swedish. Mobile UX retires the `brief` UI label
    and aligns with the CLI''s `status` canonical name. Editor skills and web docs
    use the same English names as the CLI. The Decision 43 alias set is the binding
    name set for v3 capability additions; future renames require a new decision. Existing
    references to Swedish IDs in v3 surface are demoted via mechanical cleanup (file
    path renames in `packages/cli/src/capabilities/` and `skills/agentera/capabilities/`,
    schema content updates, runtime descriptor updates, SKILL.md dispatch rewrite,
    vocabulary-index.yaml and vocabulary.md updates). D58 is reaffirmed: zero legacy
    aliases in v3. v2 stable is explicitly out of scope for this rename. The coexistence
    probe surfaces per-distribution naming divergence.

    '
  reasoning: "D68/D69 establish the CLI as the contract-defining surface; D67 commits\
    \ to mobile-first product; D65 relocates capability prose to `packages/cli`. Under\
    \ these architectural commitments, the CLI's naming choice propagates to all v3\
    \ surfaces. Promoting D43 aliases to canonical yields a single name per capability\
    \ in v3 (D58 satisfied), composes with LLM priors on common English CLI verbs,\
    \ and the codebase has already done the heavy lifting through D43 aliasing. Strict\
    \ framing (D43 aliases are the binding set) is chosen over soft framing (D43 as\
    \ seed set) to give future capability additions a clear constraint; soft framing\
    \ would re-decide naming conventions on every new capability, which is a per-addition\
    \ tax. v2 stable remains Swedish because the branch model in AGENTS.md marks v2\
    \ as feature-frozen and a separate distribution; mixed environments are acceptable\
    \ as a temporary state during v2\u2192v3 migration. The rename cost is bounded:\
    \ ~24 directory renames, ~50 schema/prose content updates, 36 runtime descriptor\
    \ updates, and meta-file touches; the codebase's 2x English-alias footprint confirms\
    \ the work is mechanical cleanup, not a rewrite. Routing reliability is solved\
    \ through careful `prime` output and dispatch design (with FSM-style state definitions\
    \ where adopted), not through naming \u2014 the names are stable identifiers within\
    \ the routing machinery. Bare-routing second form (`bare status`) is dropped;\
    \ `bare /agentera` is the only bare form. The 7 weak D43 aliases (which the deliberation\
    \ initially considered re-picking with more distinctive English verbs) are accepted\
    \ as-is because the D43 transfer-learning argument holds: common English CLI verbs\
    \ let LLM agents compose with prior priors on `git status`/`kubectl status`/`npm\
    \ status` patterns rather than learn from-scratch mappings for `status`. Mobile\
    \ UX retires `brief` to align with `status` because CLI is ground zero; per-surface\
    \ UI nuance loses to cross-surface consistency under D68/D69. Closeout deliberation\
    \ 2026-06-09 (8 stresses): capability ID `status` replaces `status`; orientation\
    \ stays `agentera prime` (no top-level `agentera status`); eleven English routing\
    \ tops remain guidance-only; hard cut of Swedish IDs on feat/v3 at 3.0.0; NL triggers\
    \ (`brief`, `what's next`) stay on `status`; handoffs use glyph plus English name;\
    \ feat/v3 commit scopes use English; coexistence probe gains a naming-divergence\
    \ line in the implementation PR; historical artifacts are not rewritten.\n"
  confidence: firm
  feeds_into: skills/agentera/SKILL.md, skills/agentera/capabilities/*, packages/cli/src/capabilities/*,
    packages/mobile/, packages/web/, references/cli/vocabulary.md, references/cli/vocabulary-index.yaml,

      Agentera as an open protocol with runtime adapters as the primary story.
      The mobile app is the flagship consumer product. Pi and T3 Code use one
      product name across monorepo packages.
    alternatives:
      - name: Single brand everywhere
        status: chosen
        description: Agentera is the product. @agentera/mobile, @agentera/web,
          @agentera/cli are product surfaces. Skills and references are internal
          implementation contracts.
      - name: Keep open protocol as public headline

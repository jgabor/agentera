  question: What should Agentera 2.3.0 include?
  context: '2.2.3 release prep is complete and no open 2.2.x TODOs remain. Open degraded items cluster around installed capability
    reliability: self-audit helper exposure, schema discovery, and split install roots. Decision 47 requires app-home migration;

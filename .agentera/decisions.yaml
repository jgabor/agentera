- number: 62
  date: '2026-05-24'
  question: How should Agentera strengthen visualisera governance for terminal-native
    agent output?
  context: Agentera's visual identity lives in DESIGN.md and protocol.yaml. It governs
    terminal-native Markdown output, not rendered web UI. Agent-rendered surfaces
    such as the hej dashboard, capability introductions, and structured artifact headers
    can drift from declared glyphs, dividers, and constraints. Resonera review compared
    prose-only strengthening against near-term CLI enforcement and broader visualisera
    mode expansion. Decision 56 defers new CLI surfaces until contract-first parity
    work is ready for the 3.0 direction.
  alternatives:
  - name: Phase 1 prose adoption only
    status: chosen
    description: Extend DESIGN.md and visualisera instructions with a startup gate,
      brand-vs-product register rules, and expanded agent-output constraints. Defer
      deterministic linting and additional visualisera modes until drift is measurable
      or CLI parity work begins.
  - name: Prose plus reverse-engineer mode
    status: rejected
    description: Adds a document-style workflow to infer tokens from observed output.
      Useful later, but broader than the first governance slice.
  - name: Include deterministic design-output linting now
    status: rejected
    description: Would catch drift automatically, but adds a new CLI surface before
      recurring slop is evidenced and before Decision 56 parity constraints are satisfied.
  - name: Defer all visualisera governance changes
    status: rejected
    description: Leaves agent-output drift unmanaged despite an existing design system.
  choice: Adopt Phase 1 prose governance for visualisera in one refine pass. Formalize
    `agentera prime --context visualisera` plus DESIGN.md read as a hard Step 0 gate
    in visualisera instructions. Add a brand-vs-product register to DESIGN.md with
    a narrow product register covering the hej dashboard, capability introductions,
    and structured artifact headers, while human-facing root docs such as README and
    UPGRADE remain the brand register. Expand DESIGN.md constraints with agent-output
    anti-patterns and a slop test for generic agent formatting. Defer deterministic
    design-output linting, named iteration commands beyond create/refine/audit, and
    reverse-engineer workflows until evidence or 3.0 CLI work justifies them.
  reasoning: Agentera already owns the token layer; the gap is explicit governance
    for agent-rendered output. Prose changes are low cost, contract-aligned, and do
    not require a new CLI command. A narrow product register preserves logo scarcity
    and glyph discipline where agents emit structured output while leaving public
    docs room to breathe. Tooling can follow once drift is observable or CLI parity
    work can absorb a lint surface cleanly.
  confidence: firm
  feeds_into: DESIGN.md, skills/agentera/capabilities/visualisera/instructions.md,
    visualisera
  satisfaction:
    state: user_confirmed_satisfied
    evidence: User confirmed satisfaction during resonera review on 2026-05-31. Phase
      1 prose governance remains the right approach; implementation is still downstream.
    user_confirmation:
      confirmed_by: user
      confirmed_at: '2026-05-31'

overall_acceptance: >
  Every `prime --context <capability>` response emits `fallback_commands` where
  every command starts with `agentera state`. A v2 install with registry version
  `current` and pyproject version `2.7.9` writes marker version `2.7.9`. Full
  vitest suite passes with no new failures. `agentera check compact` passes.

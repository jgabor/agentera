header:
  level: full
  created: "2026-06-22"
  status: complete
  reviewed: "2026-06-22"
  critic_issues: "4 found, 4 addressed, 0 dismissed"
  title: "Prime output accuracy — version detection and fallback command correctness"
what: >
  Fix prime's capability_context output to emit non-deprecated `agentera state *`
  fallback commands across all context builders, and backport the bundle marker
  version detection fix to the v2 Python CLI on `main` so future v2 installs
  write the correct version to `.agentera-bundle.json`.
why: >
  Agents following `fallback_commands` emit stderr deprecation noise on every
  invocation, degrading trust in CLI output. The bundle marker version detection
  bug (already fixed on feat/v3 with a pyproject.toml fallback in
  `packages/cli/src/state/installRoot.ts`) caused prime to misreport the
  installed version as "v1" instead of "2.7.9", triggering false v1-migration
  attention. Both are prime output accuracy bugs that mislead agents during
  startup.
constraints: >
  v3 TS fix on `feat/v3` only; v2 Python backport on `main` only. Do not update
  `source_provenance.command` strings in task 2 — those are evidence metadata
  deferred to a separate cleanup. Bundle marker fix on feat/v3 is already done;
  only the v2 `main` backport remains. The v2 fallback condition must match the
  feat/v3 pattern: non-semver registry version triggers pyproject.toml fallback,
  not a replacement of the registry authority.
scope:
  included:
    - "STATE_FAMILY_FALLBACK_COMMANDS map in packages/cli/src/cli/capabilityContext/types.ts"
    - "Direct fallback strings in startup.ts, realisera.ts, orchestration.ts, evidence.ts, closeout.ts, benchmark.ts"
    - "v2 _load_suite_version pyproject.toml fallback in scripts/agentera_upgrade.py on main"
    - "Regression test for non-deprecated fallback commands"
  excluded:
    - "source_provenance.command strings in context builders (evidence metadata, separate cleanup)"
  deferred: []
design: >
  Update the centralized STATE_FAMILY_FALLBACK_COMMANDS map to use `agentera
  state *` forms. Update direct string literals in context builders that bypass
  the map (startup.ts `query vision`/`query design`, bespoke fallback arrays in
  realisera/orchestration/evidence/closeout/benchmark). Add pyproject.toml
  version fallback to v2 `_load_suite_version` matching the feat/v3 fix pattern
  (non-semver check via regex, pyproject.toml project.version read). Regression
  test asserts non-deprecated forms in the map and direct strings.

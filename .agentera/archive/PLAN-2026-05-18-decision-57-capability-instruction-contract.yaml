header:
  level: light
  created: 2026-05-18
  status: complete
  title: Decision 57 Capability Instruction Contract
what: >-
  Document Decision 57's capability instruction contract: capability instruction
  files move from `prose.md` to `instructions.md`, `first_invocation_read`
  declares startup-read obligations, and first capability invocation reads
  `instructions.md` in full unless a compact-startup exception is explicitly
  declared.
why: >-
  Decision 57 is the last P0 foundation document before the rename, metadata,
  feature, and validation TODOs. Agents need one documented contract that separates
  the future instruction-file name, startup-read metadata, compact-startup
  exception semantics, and compatibility boundaries before implementation starts.
constraints: >-
  Keep this plan scoped to documentation and contract authority for Decision 57.
  Do not rename any `skills/agentera/capabilities/*/prose.md` files, do not update
  validators to require `instructions.md`, do not add or emit `first_invocation_read`
  metadata, and do not rewrite runtime descriptors or package metadata except for
  narrow docs/test delegation needed to document the contract. Preserve existing
  `prose.md` paths as compatibility and current-state references until the later
  fix TODO is selected. Do not refresh installed apps/profiles, publish, push, tag,
  change package-manager state, edit `.agentera/vision.yaml`, mutate objective
  state, or change decision satisfaction state.
tasks:
  - number: 1
    name: Inventory Decision 57 instruction surfaces
    depends_on: []
    status: complete
    evidence:
      - >-
        Inventory checked Decision 57 references, TODO sequencing, vocabulary docs,
        `capability_schema_contract.yaml`, runtime descriptor references, current
        `skills/agentera/capabilities/*/prose.md` surfaces, and existing authority
        patterns. The contract classifies `instructions.md` as future canonical,
        `prose.md` as current compatibility, `first_invocation_read` as future
        metadata, compact startup as a future exception boundary, and rename/validator
        behavior as later implementation work.
    acceptance:
      - >-
        GIVEN Decision 57, TODO sequencing, vocabulary docs, capability schema
        contract references, runtime descriptors, and current `prose.md` surfaces
        are inspected WHEN the contract boundary is designed THEN each surface is
        classified as future canonical `instructions.md`, current compatibility
        `prose.md`, startup-read metadata, compact-startup exception, or later
        implementation work.
      - >-
        GIVEN adjacent TODOs are reviewed WHEN scope is recorded THEN this plan
        explicitly excludes the actual file rename, validator changes, descriptor
        rewrites, CLI metadata emission, `first_invocation_read` feature behavior,
        and the later validation/regression sweep.
  - number: 2
    name: Add the Decision 57 capability instruction contract authority
    depends_on:
      - 1
    status: complete
    evidence:
      - >-
        Added `references/cli/capability-instruction-contract.yaml` defining the
        future canonical `instructions.md` file, current compatibility `prose.md`,

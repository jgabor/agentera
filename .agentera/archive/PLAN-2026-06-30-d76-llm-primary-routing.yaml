overall_acceptance: 'D76 implementation is complete when: a project with a pending
  plan task surfaces the plan task as the top-priority next_action entry with alternatives
  and phase populated (proving the ranked hint works for state-dependent routing);
  prime --route is removed entirely — the flag is rejected, the routing engine is
  deleted, and no deprecation dance remains (v3 pre-release, no stable consumers to
  deprecate for); the test suite passes with zero failures and no route-engine tests
  remain (proving clean removal); check compact and check validate artifact both pass
  on all changed artifacts (proving artifact integrity).

  '

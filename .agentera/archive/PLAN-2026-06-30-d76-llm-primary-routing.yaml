header:
  level: full
  created: '2026-06-30'
  status: complete
  reviewed: '2026-06-30'
  critic_issues: 5 found, 3 addressed, 2 dismissed
  title: 'Decision 76: LLM-Primary Routing and Evolved State-Readiness Hint'
what: 'Implement Decision 76 by retiring prime --route as a deterministic NL router,
  evolving next_action into a ranked state-readiness hint hung on protocol phases,
  and repositioning the trigger schema as LLM-readable intent documentation. The LLM
  host owns natural-language routing natively; the load-bearing deterministic surface
  becomes state-readiness, not request-pattern matching.

  '
why: 'The trigger scoring engine has a class ceiling on open-ended natural language
  that no threshold tuning or regex patch can lift. The LLM host already routes NL
  better than any weighted-substring engine. The existing selectStatusNextAction cascade
  and protocol.yaml phase model are the two unstitched halves of the solution; this
  plan stitches them. Retire is defensible because no non-LLM consumer needs request-derived
  routing today (mobile, web, CLI state are all LLM-driven or deterministic). Supersedes
  Decision 75 design choices 2, 4, and 5.

  '
constraints: 'v3 has not shipped to stable — no backward compatibility constraints.
  The next_action JSON shape and the --route flag can change freely. Trigger schema
  fields (description, disambiguates_against, priority, phase context) STAY as LLM-readable
  intent documentation; only the scoring/match-substrate role retires. capability_schema_contract.yaml
  validation must still pass for all twelve capabilities. Conventional commits with
  cli scope for behavior, schemas scope for spec.

  '
scope:
  included:
  - Evolve NextAction type + selectStatusNextAction into a ranked readiness hint
  - Update prime JSON + text output for the ranked hint
  - Remove prime --route CLI surface and routing engine
  - Reposition trigger schema + routing model spec docs to cite D76
  - 'Update tests: remove route engine tests, add ranked-hint orientation tests'
  - Version bump (feat → minor per semver_policy)
  excluded:
  - Adding a new --route replacement surface
  - Modifying mobile or web packages
  - PROFILE.md refresh (stale, caveat only)
  deferred:
  - Pruning confidence_threshold and borderline_band from triggers.yaml files (kept
    as backward-compatible documentation; can be pruned in a follow-up)
design: 'The existing cascade in selectStatusNextAction already ranks by state urgency
  (plan-pending → degrading health → active objective → TODO → stale health → decision
  follow-up → vision refresh). Evolution reframes each cascade branch as a candidate
  producer instead of an early-return guard: every branch is evaluated, each produces
  {object, capability, reason, phase}, and the candidates are ordered by the cascade''s
  existing priority. Position 1 is always the highest-priority match (the branch that
  would have won under early-return). Phase mapping: plan-pending → PH4 (build), degrading
  health/stale health → PH5 (audit), active objective → PH4 (build), TODO-needs-plan
  → PH3 (plan), TODO-direct → PH4 (build), decision follow-up → PH2 (deliberate),
  vision refresh/direction → PH1 (envision). The JSON output shape is realisera''s
  design call — the plan specifies that next_action carries a ranked recommendation
  plus alternatives and a phase tag per entry, not the exact field layout.

  '
tasks:
- number: 1
  name: Evolve NextAction type and selectStatusNextAction into ranked readiness hint
  depends_on: []
  status: complete
  acceptance:
  - GIVEN a project with a pending plan task WHEN selectStatusReadiness is called
    THEN the top-priority entry's object contains 'PLAN Task' AND its phase equals
    'build' AND at least one alternative entry is returned
  - GIVEN a project with no plan but degrading health WHEN selectStatusReadiness is
    called THEN the top-priority entry's capability equals 'audit' AND its phase equals
    'audit'
  - GIVEN a project with no plan, no degrading health, no objective, and no TODOs
    WHEN selectStatusReadiness is called THEN the top-priority entry is non-null AND
    at least one alternative (vision-refresh) is returned
  - GIVEN a project with both a pending plan task and degrading health WHEN selectStatusReadiness
    is called THEN the top-priority entry's capability equals 'orchestrate' (plan
    wins) AND the health-audit entry appears in alternatives
  - GIVEN any project state WHEN selectStatusReadiness is called THEN every returned
    entry has a non-empty phase field from {envision, deliberate, plan, build, audit}
- number: 2
  name: Update prime JSON and text output for the ranked next_action hint
  depends_on:
  - '1'
  status: complete
  acceptance:
  - GIVEN a returning project with a pending plan WHEN agentera prime --format json
    is called THEN the next_action field carries the recommended capability AND a
    non-empty alternatives array AND a phase tag per entry
  - GIVEN a returning project WHEN agentera prime (text mode) is called THEN the next_action
    section renders the recommendation AND at least one alternative line prefixed
    with a visual marker
  - GIVEN a fresh project with no artifacts WHEN agentera prime --format json is called
    THEN next_action.object and next_action.capability are non-empty strings (recommendation
    always populated, no analysis paralysis)
- number: 3
  name: Remove prime --route CLI surface and routing engine
  depends_on: []
  status: complete
  acceptance:
  - GIVEN agentera prime --route is invoked THEN the flag is rejected (unknown argument

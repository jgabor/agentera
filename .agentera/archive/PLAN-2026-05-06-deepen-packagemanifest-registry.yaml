  title: Deepen PackageManifest Registry
what: >
  Replace scattered package metadata and release-surface knowledge with one registry-backed PackageManifest Module. The registry
  exposes one Interface for suite version authority, runtime package surfaces, version-bearing surfaces, bundle surface lists,
  package-manager command specifications, manifest projection expectations, and release validation facts. Validators, upgrade
  bundle/package planning, docs indexing, runtime package tests, and version-surface checks consume that Interface instead of
  duplicating package constants.
why: >
  TODO [arch-package-manifest-registry] identified package metadata as the next shallow seam after the install-root and
  RuntimeAdapter Modules were deepened. Package facts lived across pyproject.toml force-include paths, registry.json
  skills[0].version, plugin manifests, .opencode/package.json, scripts/agentera_upgrade.py bundle/package constants,
  scripts/validate_lifecycle_adapters.py package-surface constants, .agentera/docs.yaml version_files/index, and
  tests/test_runtime_adapters.py production-like package validators.
constraints: >
  Preserve current package versions and user-visible CLI behavior unless characterization explicitly names an intentional
  correction. registry.json remains the persisted suite-version authority behind the PackageManifest Interface. Do not change
  install-root classification semantics, RuntimeAdapter ownership, artifact write validation, or release publication behavior.

  title: Deepen RuntimeAdapter Registry
what: >
  Replace scattered runtime adapter knowledge with one registry-backed
  RuntimeAdapter Module. The registry describes Claude Code, OpenCode,
  Copilot CLI, and Codex CLI runtime facts behind one Interface: runtime
  identity, host detection, lifecycle events, artifact-validation support,
  configuration targets, diagnostic labels, and documentation claims. Doctor,
  upgrade planning, lifecycle validation, adapter documentation, and runtime
  tests consume that Interface instead of preserving separate runtime tables
  and conditionals.
why: >
  TODO [arch-runtime-adapter-registry] identified runtime adapter behavior as a
  shallow seam: runtime facts were spread across scripts/setup_doctor.py,
  scripts/agentera_upgrade.py, scripts/validate_lifecycle_adapters.py,
  references/adapters/runtime-feature-parity.md, references/adapters/opencode.md,
  and tests/test_runtime_adapters.py. A deeper Module gives locality for runtime
  support changes and leverage for validators, docs, and tests.
constraints: >
  Preserve current user-visible doctor, upgrade, lifecycle validation, and
  runtime documentation behavior unless a characterization task explicitly names
  an intentional correction. Do not change install-root classification semantics;
  scripts/install_root.py remains the only Module for AGENTERA_HOME precedence,
  default durable root, managed/stale/unmanaged classification, and root
  diagnostics. Do not implement the separate package manifest registry or move
  version authority, package shared paths, package manifest schemas, or release
  metadata into RuntimeAdapter. No live model calls, no remote pushes, and no
  unapproved runtime config writes.
scope:
  included:
    - archived the completed install-root Module plan
    - characterized current runtime adapter outputs before migration
    - defined RuntimeAdapter ownership, schema, and typed field groups
    - introduced a registry Module with contract tests for all four current runtimes
    - migrated lifecycle adapter validation to consume registry facts
    - migrated setup doctor read-only diagnostics to consume registry facts
    - migrated upgrade runtime planning to consume registry facts while preserving dry-run and confirmation safety
    - consolidated runtime tests around the registry and validated documentation parity
  excluded:
    - package manifest registry and package version authority
    - generated install-root cross-language contract
    - artifact write validation Module split
    - adding new runtime support beyond existing Claude Code, OpenCode, Copilot CLI, and Codex CLI claims
    - live runtime smoke calls
    - changing install-root root classification behavior
  deferred:
    - [arch-package-manifest-registry]
    - [arch-artifact-write-validation]
    - [install-root-generated-cross-language-contract]

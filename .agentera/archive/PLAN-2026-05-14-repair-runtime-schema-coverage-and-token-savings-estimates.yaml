  - number: 7
    name: State sync and version gate
    depends_on: [1, 2, 3, 4, 5, 6]
    status: complete
    acceptance:
      - GIVEN the plan reaches closeout WHEN state is synchronized THEN TODO, progress, docs, and changelog record schema coverage, token-impact evidence, remaining blockers, and benchmark results.
      - GIVEN no release target is selected WHEN closeout runs THEN version-bearing files remain unchanged and no release publication, push, tag, or installed app refresh occurs.
      - GIVEN a future release target is selected WHEN version policy is applied THEN `.agentera/docs.yaml` `semver_policy` controls any version bump.
    evidence: >-
      Closeout state is synchronized across TODO, progress, docs, and changelog
      for the repaired runtime schema coverage and token-impact estimate work.
      Supported Claude Code and GitHub Copilot synthetic fixtures now extract as
      `ok / records_extracted`, while live local `claude-code` and

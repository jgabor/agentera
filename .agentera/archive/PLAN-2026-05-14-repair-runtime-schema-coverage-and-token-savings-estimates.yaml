overall_acceptance:
  - GIVEN supported Claude Code and GitHub Copilot runtime schemas are measured WHEN the startup benchmark runs THEN those fixtures no longer degrade as `schema_divergent` and zero-record window outcomes remain distinguishable.
  - GIVEN redundant raw artifact reads remain or improve WHEN benchmark reports are inspected THEN estimated token impact and savings are visible in privacy-safe aggregate fields.
  - GIVEN this plan completes WHEN scope is audited THEN no raw private runtime data, runtime-history CI, slash-alias CLI command, release publication, installed app refresh, vision edit, or objective edit occurred.

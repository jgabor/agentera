header:
  level: full
  created: "2026-06-25"
  status: complete
  reviewed: "2026-06-26"
  critic_issues: ""
  title: "Plan: D70 Swedish Verb Remnant Cleanup"
what: >
  Complete the Decision 70 capability rename by eliminating all Swedish -era
  verb remnants from source, config, data, and runtime state files. Commit
  bbe98135 renamed directories, files, and barrel imports to English IDs but
  left ~400+ identifier bodies, env vars, plugin templates, agent defs, and
  active runtime state in Swedish. Four parallel audit agents mapped the
  full remnant surface across src, bundle/data, docs/config, and tests.
why: >
  Decision 70 (firm, user-confirmed satisfied 2026-06-09) chose English
  capability IDs as canonical. Decision 58 requires zero post-3.0 surfaces
  may retain legacy aliases. Commit bbe98135 claimed completion with "1007
  tests pass, typecheck clean" but the rename was structural-only.
  The TODO entry marking D70 implementation as Resolved (line 38) is
  premature.
constraints: >
  D70 firm: English IDs canonical. D58 firm: zero post-3.0 legacy aliases.
  Schema version strings (agentera.inspekteraEvaluationReport.v1,
  agentera.coexistenceProbe.v1, agentera.capabilityContext.v1,
  agentera.planeraStartup.v1) remain as compat identifiers. CHANGELOG.md,
  UPGRADE.md, .agentera/archive/ are historical — do not rewrite.
  Backward-compat route alias maps exempt. PROFILERA_PROFILE_DIR retains a
  deprecated alias fallback until v3 stable (Task 16 TODO).
scope:
  included:
    - "packages/cli/src/ — all Swedish verb identifiers, strings, comments (102 remnants)"
    - "packages/cli/src/cli/schema.ts:171 — dead Swedish guard over English list"
    - "packages/cli/src/cli/help.ts:30 — dead Swedish filter"
    - ".opencode/plugins/agentera.js — REQUIRED_AGENT_NAMES, COMMAND_TEMPLATES"
    - ".opencode/agents/*.md and .cursor/agents/*.md — managed agent stub body text"
    - "agents/openai.yaml — OpenAI agent capability definitions (31 matches)"
    - "skills/agentera/SKILL.md — routing tables and capability listings"
    - "skills/agentera/.claude-plugin/plugin.json — Claude plugin command list (13 matches)"
    - "skills/agentera/capabilities/*/instructions.ts — prose body references"
    - "references/adapters/*.md — dispatch tables, subagent mechanism tables"
    - "hooks/ — Swedish verb references"
    - ".agentera/*.yaml — active runtime state"
    - "fixtures/hej-*.md — test fixtures (4 files)"
  excluded:
    - "CHANGELOG.md and UPGRADE.md — historical migration documentation"
    - ".agentera/archive/ — historical artifacts"
    - "packages/cli/dist/ and packages/cli/bundle/ — regenerated output"
    - "Schema version compatibility strings"
    - "Backward-compat route alias maps"
  deferred: []
design: >
  Tasks 1-5 parallel-safe (independent Swedish verbs in src). Tasks 6-11
  depend on src cleanup. Task 12 is a decision item. Each task verifiable
  via rg plus vitest plus tsc.
overall_acceptance: >
  GIVEN the cleanup is complete, WHEN rg -i searches the 12 Swedish verbs
  across packages/cli/src/, skills/, references/, .opencode/, .cursor/,
  agents/, hooks/ (excluding CHANGELOG, UPGRADE, archive, dist, schema
  version strings), THEN zero REMNANT matches remain. AND all tests pass.
  AND tsc --noEmit clean. AND validate capability-contract passes.
surprises: >
  Tasks 12-16 shipped in implementation commits (0c0559e0, dfa245c5,
  7196e1b8, b76581d5, db161c36) before plan.yaml was tracked; this archive
  and slot clear are remediation closeout on 2026-06-26.
previous_plan_archived: .agentera/archive/PLAN-2026-06-24-d70-capability-rename.yaml

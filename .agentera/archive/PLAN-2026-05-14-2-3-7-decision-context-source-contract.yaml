  title: 2.3.7 Decision Context Source Contract
what: >-
  Add a decision-context source contract to the `agentera decisions --format json`
  surface so Resonera and downstream capabilities can deliberate from CLI state
  instead of reading `.agentera/decisions.yaml` or falling back to git history.
  The contract makes full-detail decision context explicit, reports compacted
  historical decision limitations honestly, and exposes structured fields for
  decision outcome, reasoning, alternatives, confidence, feeds-into, and
  downstream consequence references where the data exists.
why: >-
  Decision 51 showed that capability startup and state gathering still over-read
  raw artifacts after CLI state access. Decisions are especially sensitive:
  compaction can turn older decisions into summaries, and agents currently
  compensate by reading raw YAML or considering git history. A source contract
  makes the CLI the first trusted state seam, including completeness and caveats,
  so agents know when the CLI output is sufficient and when compacted historical
  data is inherently incomplete.
constraints: >-
  Preserve Decision 45 structured CLI boundaries and Decision 44 plain vocabulary.
  Keep `agentera decisions` a routine state command, not a slash-route alias or
  direct capability invocation. Preserve docs.yaml artifact path resolution and
  compaction gate behavior. Derive downstream consequence references only from
  existing structured references such as `feeds_into`, TODO identifiers, plan or
  progress references, or explicit artifact mentions; otherwise emit null or
  missing with a caveat. Do not fabricate missing historical reasoning or
  alternatives from compacted decisions, do not require git-history fallback, and
  do not require raw `.agentera/decisions.yaml` reads for normal deliberation.
  Limit schema/prose changes to the decision artifact, decision compaction, CLI
  decision output, and Resonera guidance. Do not implement the separate
  Orkestrera, Dokumentera, Inspektera, Optimera, or Realisera source-contract
  TODOs. Do not tag, push, publish, refresh installed apps, edit vision, or edit
  objective state without explicit approval.
scope:
  included:
    - Source-contract metadata for `agentera decisions --format json` and existing filtered decisions output.
    - "Structured decision context fields for full-detail decisions: outcome or choice, reasoning, alternatives, confidence, feeds-into, and non-inferential downstream consequence references."
    - Honest compacted-decision completeness reporting so older compacted entries do not trigger raw artifact or git-history fallback expectations.
    - Minimal decision schema, compaction, Resonera guidance, and test updates needed for future decision compaction to preserve the context promised by the CLI.
    - Focused startup-state evidence showing Resonera-style deliberation can use CLI decision context without defensive raw artifact reads.
    - TODO, docs, changelog, progress, and 2.3.7 version metadata sync.
  excluded:
    - A full dependency graph of every downstream artifact affected by every decision.
    - Broad source-contract work for Orkestrera, Dokumentera, Inspektera, Optimera, or Realisera.
    - Reconstructing historical compacted decision details from git history.
    - Publication, tag, push, installed app refresh, vision edit, or objective-state edit.
  deferred:
    - Deeper decision outcome lifecycle tracking across TODO, progress, and plan state unless needed to expose the current CLI contract honestly.
    - Cross-artifact impact graph or provenance indexing beyond existing `feeds_into` and explicit artifact references.
previous_plan_archived: .agentera/archive/PLAN-2026-05-14-2-3-6-artifact-compaction-enforcement-patch.yaml
design: >-
  Treat decision context as a CLI-owned state envelope. The command emits one
  top-level `source_contract` for the result set and per-decision completeness
  fields such as `context_complete`, `missing_fields`, `compacted`, and `caveats`.
  Full-detail decision entries are projected into stable JSON with explicit
  included fields and raw-read policy. Compacted decision entries, and any
  existing decision archive entries if discovered, remain available as bounded
  summaries with `context_complete=false` and explicit missing fields rather than
  pretending raw reads or git history can restore data. If the existing decision
  archive or compaction contract cannot preserve required future context, update
  it minimally and test both current historical limitations and future compaction
  behavior.
tasks:
  - number: 1
    name: Decision context inventory and archive boundary
    depends_on: []
    status: complete
    acceptance:
      - GIVEN decisions, schemas, CLI output, and Resonera usage are inspected WHEN the inventory completes THEN implementation evidence records which required decision-context fields are already available, which are missing, and which are incomplete for compacted decision entries.
      - "GIVEN 2.3.6 is complete but was still active WHEN 2.3.7 becomes active THEN the completed 2.3.6 plan is archived with complete status and the new active plan references that archive path."
      - GIVEN compacted decision entries or existing archive entries are present WHEN the boundary is recorded THEN full-detail completeness is distinguished from compacted historical limitations without recommending raw artifact or git-history fallback.
    evidence:
      - cycle: 477
        note: >-
          Task 1 inventory inspected `uv run scripts/agentera decisions --format json`,
          `uv run scripts/agentera decisions --topic source-contract --format json`,
          `.agentera/decisions.yaml`, `skills/agentera/schemas/artifacts/decisions.yaml`,
          `hooks/compaction.py`, and Resonera guidance. Full-detail active decisions
          already retain and the current CLI already emits `number`, `date`, `question`,
          `context`, `alternatives`, `choice`, `reasoning`, `confidence`, and
          `feeds_into` for the 10 retained full entries. Missing from the current
          decision-context source contract are top-level `source_contract`, per-decision
          `context_complete` or equivalent completeness flags, `missing_fields`,
          `compacted`, caveats, an explicit raw-read policy, an `outcome` alias separate
          from `choice`, and non-inferential downstream consequence references beyond
          the raw `feeds_into` text. Compacted historical decision entries are present
          as 40 archive entries; schema DR1 and the current compaction formatter preserve
          only decision number, date, and chosen choice/summary, with existing archive
          entries mixed between structured `{summary: ...}` maps and legacy strings.
          Therefore compacted entries are inherently incomplete for question, context,
          alternatives, full reasoning, confidence, structured feeds-into, and downstream
          consequence references, and the boundary is to report those limitations as
          missing/caveated data rather than recommending raw `.agentera/decisions.yaml`
          reads or git-history fallback. `uv run scripts/agentera gate --format json`
          and `uv run scripts/agentera compact --mode check --format json` both passed
          before evidence edits with DECISIONS.md active_count=10, archive_count=40,
          total_count=50, over_limit_count=0. Archive reconciliation confirmed 2.3.6
          is archived at `.agentera/archive/PLAN-2026-05-14-2-3-6-artifact-compaction-enforcement-patch.yaml`
          with `header.status: complete`, and this active 2.3.7 plan already references
          that path via `previous_plan_archived`.

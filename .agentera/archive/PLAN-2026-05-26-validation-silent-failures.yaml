      - GIVEN a corrupt schema YAML file WHEN _load_schemas encounters it THEN an error is logged to stderr before continuing
      - GIVEN a registry loading failure WHEN _load_registry_for_schemas catches it THEN an error is logged to stderr before returning empty
      - GIVEN a corrupt YAML artifact file WHEN _load_artifact encounters it THEN the cause is distinguishable from a missing file via stderr

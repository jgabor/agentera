  title: Consolidate progress-commit/git-ancestry logic into a shared module (2.7.6)
what: >-
  Eliminate the near-duplicate progress-commit + git-ancestry implementations in
  hooks/validate_artifact.py (~688–769) and scripts/agentera (~6177–6232) by
  extracting one shared scripts/progress_commit.py module (commit-hash regex, git
  subprocess wrapper, commit-token parser, HEAD-ancestor classifier,
  cycle-commit rewrite, and pure backfill computation). Make both the
  validate_artifact guard and the `agentera check backfill` CLI thin consumers of
  that module, align the validator's YAML loading on load_yaml_mapping, route the
  hook→scripts import through the single sanctioned hooks/common bridge,
  consolidate and expand the shared module's regression tests, and document the
  intentional unknown-hash/shallow-clone skip behavior. Resolves all eight open
  2.7.6 progress-commit TODO items.
why: >-
  The validator guard and the backfill CLI were designed as a pair and carry
  drift risk: regex, token parsing, git wrappers, and ancestry checks are
  near-copies in two oversized files (scripts/agentera ~8.7k lines,
  validate_artifact.py ~1,182 lines). A single shared implementation removes the
  drift risk, shrinks both monoliths, and unifies the YAML-loading failure mode.
  These are the remaining degraded/annoying follow-ups from the completed hooks
  session-compaction and progress-commit-guard work.
constraints: >-
  Full pytest suite must stay green. Preserve every observable backfill/guard
  behavior: statuses (clean/action-needed/fixed/error/noop), exit codes (0/1/2),
  messages, and accepted/rejected commit classifications. The shared module must
  import under the hook layer's stdlib + pyyaml only rule — no new third-party
  dependency, so the regex-based cycle-commit rewrite stays (no ruamel). Do not
  modify vision.yaml or objective state; no remote push; never amend to backfill
  a progress commit field. Version bump follows DOCS semver policy: the YAML-loader
  alignment is a `fix` (patch bump to 2.7.6); extraction, tests, and docs are
  chore/test/docs (no additional bump).
scope:
  included:
    - scripts/progress_commit.py (new shared module; stdlib + pyyaml only)
    - scripts/agentera (cmd_backfill and _backfill_*/_rewrite_cycle_commits become thin wrappers importing the module)
    - hooks/validate_artifact.py (_validate_progress_commits/_progress_commit_token/_git_result/_COMMIT_HASH_RE delegate to the module; load via load_yaml_mapping)
    - hooks/common.py (single sanctioned scripts→hooks bridge + re-export point and doc comment)
    - tests/test_progress_commit_guard.py (retarget to the shared module; expand rewrite + token coverage)
    - skills/agentera/schemas/artifacts/progress.yaml and/or UPGRADE.md (unknown-hash/shallow-clone docs)
    - TODO.md, CHANGELOG.md, .agentera/progress.yaml (closeout/sync)
  excluded:
    - v1 legacy removal and Decision 58 single-name protocol sweep (3.0.0)
    - Bun/npm packaging and TypeScript CLI rewrite initiatives (3.0.0)
    - A sweeping multi-hook sys.path refactor or a new neutral shared package
    - Replacing the regex cycle-commit rewrite with a YAML round-trip library
    - Any change to compaction/retention-cap logic (just-completed plan)
  deferred:
    - A fully neutral shared-package home for cross-layer modules (revisit under 3.0 packaging)
design: >-
  Create scripts/progress_commit.py following the agentera_upgrade.py sibling-import
  precedent (scripts/agentera imports it via `from progress_commit import ...`).
  The module exposes pure, stdlib+pyyaml primitives: COMMIT_HASH_RE, a git
  subprocess wrapper, commit_token(value), ancestor_state(token, cwd) returning
  ancestor/stale/unknown/unavailable, rewrite_cycle_commits(text, changes),
  validate_progress_commits(content, cwd) for the guard, and a pure
  compute_backfill(...) returning operations/changes used by the CLI runner.
  scripts/agentera keeps only argparse wiring, payload emission, and file I/O in
  cmd_backfill. hooks/validate_artifact.py imports the guard symbols through
  hooks/common (which already inserts scripts/ on sys.path), so no new per-file
  sys.path insert is added — common becomes the single documented bridge (item 5),
  with a neutral package deferred to 3.0. The guard switches from raw
  yaml.safe_load to load_yaml_mapping and catches load errors to return no commit
  violation, leaving structural reporting to _validate_yaml (item 4). The regex
  rewrite is retained and hardened with expanded folded/flow-scalar and
  comment-preservation tests; token tests collapse to one parametrized table on
  the shared module.
tasks:
  - number: 1
    name: Extract scripts/progress_commit.py from the CLI
    depends_on: []
    status: complete
    acceptance:
      - GIVEN a new scripts/progress_commit.py WHEN created THEN it exposes commit_token, ancestor_state, rewrite_cycle_commits, a git wrapper, COMMIT_HASH_RE, and a pure compute_backfill, importing only stdlib + yaml_mapping (hook-safe)
      - GIVEN scripts/agentera WHEN cmd_backfill and its helpers run THEN they import from progress_commit (agentera_upgrade.py pattern) and hold no second copy of token/ancestry/rewrite/compute logic
      - GIVEN existing `agentera check backfill` behavior (check/fix/forward-fill, refuse non-ancestor/unknown, statuses, exit codes 0/1/2) WHEN exercised THEN outputs and exit codes are unchanged
      - GIVEN tests/test_progress_commit_guard.py CLI cases WHEN retargeted to the module locations THEN they pass in the full suite
  - number: 2
    name: Move the validator guard onto the shared module and align YAML loading
    depends_on: ["1"]
    status: complete
    acceptance:
      - GIVEN hooks/validate_artifact.py WHEN it validates progress commits THEN _validate_progress_commits/token/git/regex delegate to scripts/progress_commit (imported via hooks/common), leaving no near-copy in the hook
      - GIVEN the guard WHEN it loads progress YAML THEN it uses load_yaml_mapping (not raw yaml.safe_load) and catches load failure to return no commit violation, with a regression test pinning the consistent failure mode on non-mapping/unparseable progress YAML
      - GIVEN ancestor/pending/N-A/unknown-hash/non-git fixtures WHEN the guard runs THEN classifications match prior behavior with no changed assertions beyond import path and loader
      - GIVEN a stale-hash progress fixture WHEN the validate hook and `agentera check validate` run THEN the same "not an ancestor of HEAD" violation is reported
  - number: 3
    name: Centralize and document the hooks to scripts import seam
    depends_on: ["1", "2"]
    status: complete
    acceptance:
      - GIVEN cross-layer imports of shared modules (yaml_mapping, progress_commit) WHEN hooks need them THEN they flow through the single sanctioned hooks/common bridge, adding no new per-file sys.path insertion for this purpose
      - GIVEN hooks/common.py WHEN read THEN a comment/docstring documents it as the sanctioned scripts→hooks bridge and states a neutral package is deferred to 3.0 packaging
      - GIVEN the full suite (including importlib test-fixture loading of hooks) WHEN run THEN hook import behavior is unchanged and green
  - number: 4
    name: Consolidate and expand shared-module regression tests
    depends_on: ["1", "2"]
    status: complete
    acceptance:
      - GIVEN the shared commit_token WHEN tested THEN one parametrized table covers hash/hash+subject/pending/N-A/non-hash/non-string/empty, replacing the CLI-only table and covering the formerly-untested hook token path
      - GIVEN rewrite_cycle_commits WHEN tested THEN coverage is expanded for folded/flow scalars and comment/quoting preservation (>-, |, flow {}/[], inline comments, archive lines)
      - GIVEN both consumers (CLI backfill and validator guard) WHEN tested THEN thin assertions verify each delegates to the shared module so logic cannot re-diverge
      - GIVEN the full suite WHEN run THEN all progress-commit tests pass
  - number: 5
    name: Document unknown-hash and shallow-clone skip behavior
    depends_on: ["2"]
    status: complete
    acceptance:
      - GIVEN the progress schema notes (skills/agentera/schemas/artifacts/progress.yaml) and/or UPGRADE.md WHEN read THEN they explain the guard and backfill intentionally skip commit objects unknown to the local clone (cross-clone copies, shallow CI checkouts) and how to reconcile when hit
      - GIVEN the docs change WHEN touched-artifact validation and compaction run THEN they pass and stay within budget
      - GIVEN the schema note WHEN added THEN it matches the guard's actual behavior verified in tests
  - number: 6
    name: Resolve TODO items, sync state, and verify
    depends_on: ["1", "2", "3", "4", "5"]
    status: complete
    acceptance:
      - GIVEN the eight 2.7.6 progress-commit TODO items WHEN closeout runs THEN each moves to Resolved in TODO.md with a one-line resolution and commit reference
      - GIVEN the YAML-loader robustness fix WHEN closeout runs THEN CHANGELOG.md [Unreleased] records a Fixed entry while internal refactor/test/docs items are omitted per changelog policy
      - GIVEN the change set WHEN the full pytest suite and `agentera check validate capability-contract --format json` run THEN both pass
      - GIVEN .agentera/progress.yaml WHEN closeout runs THEN it records verification evidence with a forward product-commit hash (never amend) and the version is bumped to 2.7.6 across version_files per semver policy
overall_acceptance: >-
  GIVEN the progress-commit and git-ancestry logic WHEN the plan completes THEN
  exactly one shared scripts/progress_commit.py implementation exists, consumed by
  both the `agentera check backfill` CLI and the validate_artifact.py guard with no
  near-duplicate logic. GIVEN the validator WHEN it loads progress YAML THEN it
  uses load_yaml_mapping with a pinned consistent failure mode. GIVEN cross-layer
  imports THEN they flow through the single documented hooks/common bridge. GIVEN
  the shared module THEN commit_token and rewrite_cycle_commits behavior is covered
  by one consolidated, expanded suite and the unknown-hash/shallow-clone skip is
  documented. GIVEN closeout THEN all eight TODO items are resolved, the full suite
  and capability-contract validation pass, CHANGELOG records the fix, and the
  version is bumped to 2.7.6.

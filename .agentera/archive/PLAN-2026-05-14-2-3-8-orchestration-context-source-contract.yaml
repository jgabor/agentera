header:
  level: full
  created: 2026-05-14
  status: complete
  reviewed: 2026-05-14
  critic_issues: 9 found, 9 addressed, 0 dismissed
  revised: >-
    Adversarial review tightened the orchestration context plan by defining the
    required completeness predicate, making retry state provenance explicit,
    adding installed-app staleness as a validation caveat instead of a repair
    action, binding the 2.3.7 archive transition to acceptance criteria,
    clarifying the selected 2.3.8 patch-train version target, softening field
    shape details into observable outcomes, and making unsupported capability CLI

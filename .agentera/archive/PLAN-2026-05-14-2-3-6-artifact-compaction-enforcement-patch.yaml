header:
  level: full
  created: 2026-05-14
  status: complete
  reviewed: 2026-05-14
  critic_issues: 12 found, 12 addressed, 0 dismissed
  revised: >-
    Adversarial review split the command, validator, remediation, and gate work
    into separate cycles; made the compactable artifact set explicit; excluded
    objective-state mutation without approval; required contract reconciliation
    before behavior changes; moved current artifact remediation before gate
    activation; and replaced vague test and mutation criteria with observable
    boundaries.
  title: 2.3.6 Artifact Compaction Enforcement Patch
what: >-
  Make artifact compaction a deterministic repository invariant rather than an
  opportunistic runtime-hook side effect. The patch adds an explicit compaction
  maintenance surface, makes explicit artifact validation invocations real instead
  of silent no-ops, enforces 10/40/50 caps for current v2 artifacts, and brings
  existing over-cap artifacts back inside retained-entry bounds.
why: >-
  Agentera depends on bounded artifacts for CLI-first state access and cross-cycle
  agent performance. Today compaction depends on how a file was edited: runtime
  write/edit hooks can compact TODO Resolved, but apply_patch, scripts, direct
  edits, and manual validation commands bypass the quantity contract. YAML
  artifacts also declare compaction rules without reliable enforcement. That lets
  progress, decisions, health, and TODO state grow past the contract while
  validation appears green.
constraints: >-
  Preserve `.agentera/docs.yaml` artifact path resolution. Keep CHANGELOG as
  exempt public history. Keep session-stop bookmark compaction working. Use
  runtime hooks only as a convenience, not as the only enforcement layer. Do not
  mutate vision or objective state without explicit approval; objective experiment
  files are classified but skipped by default. Do not expand into the deferred
  2.3.7+ source-contract train or richer decision-outcome retrieval beyond
  preserving the existing decision compaction contract. Do not tag, push, publish,
  refresh installed apps, edit vision, or edit objective state without explicit
  approval.
scope:
  included:
    - "Explicit compaction check/fix surface for TODO Resolved plus current v2 YAML growing artifacts: progress, decisions, health, and session."
    - Classification for optional experiment artifacts, with objective-state experiment mutation skipped unless explicitly approved.
    - Explicit validator CLI behavior for artifact/file arguments so validation commands either validate the requested artifact or fail clearly.
    - Repo gate coverage so changed artifacts cannot bypass compaction through apply_patch, scripts, generated edits, or direct file changes.
    - Current artifact remediation for existing over-cap TODO, progress, decisions, and health state.
    - Focused tests and 2.3.6 metadata sync.
  excluded:
    - CHANGELOG compaction.
    - Rich decision-history or decision-source-contract retrieval, deferred to 2.3.7+ TODOs.
    - Broad runtime adapter redesign or new package formats.
    - Publication, tag, push, installed app refresh, vision edit, or objective-state edit.
  deferred:
    - Source-contract feature train now targeted at 2.3.7 through 2.3.12.
    - Objective experiment compaction mutation unless the user explicitly approves protected objective-state edits.
    - Policy changes to make compacted decision summaries richer than the existing schema contract.
previous_plan_archived: .agentera/archive/PLAN-2026-05-14-2-3-5-install-state-reliability-patch.yaml
design: >-
  Treat compaction as a checkable invariant with two observable modes: a read-only
  check mode for gates and an explicit fix mode for controlled mutation. The
  command reports machine-readable counts and status per artifact, resolves paths
  through docs mapping, and shares behavior with runtime validation hooks where
  those hooks already apply. Fix mode may only move entries between full-detail
  and compact archive regions, replace older retained entries with schema-defined
  summaries, or remove entries beyond the retained 50-entry boundary; it must not
  churn unrelated metadata, mapping, or protected state. Enforcement is activated
  only after the current over-cap artifacts are remediated.
tasks:
  - number: 1
    name: Compaction contract inventory and reconciliation
    depends_on: []
    status: complete
    acceptance:
      - GIVEN Agentera artifact mappings are available WHEN compaction status is computed THEN TODO Resolved, progress, decisions, health, and session are classified with active, archive, total, and over-limit counts.
      - GIVEN known non-compactable or protected artifacts are present WHEN compaction status is computed THEN changelog, plan, docs, vision, design, and objective-state experiment files are classified as exempt, unsupported, or protected without mutating them.
      - GIVEN existing schema metadata is incomplete or inconsistent WHEN reconciliation finishes THEN the plan records whether minimal schema updates are required before behavior changes continue.
    evidence:
      - cycle: 469
        note: >-
          Task 1 inventory added a read-only compaction status helper that preserves
          `.agentera/docs.yaml` path mapping, counts TODO Resolved, progress,
          decisions, health, and session, and classifies changelog as exempt;
          plan, docs, and design as unsupported; vision and objective-scoped
          experiment files as protected. Current counts are TODO Resolved
          active=0 archive=53 total=53 over=13, progress active=225 archive=40
          total=265 over=215, decisions active=12 archive=40 total=52 over=2,
          health active=11 archive=9 total=20 over=1, and session active=10
          archive=40 total=50 over=0. Schema reconciliation found that minimal
          schema metadata updates are required before later behavior-changing
          tasks: TODO lacks explicit COMPACTION metadata for Resolved entries,
          and changelog/design/plan/docs budget wording still implies compaction
          despite their Task 1 classification as exempt or unsupported. No
          remediation, vision edit, objective-state edit, tag, push, publish,
          installed-app refresh, or plan status change was performed.
  - number: 2
    name: Shared compaction check and fix behavior
    depends_on: [1]
    status: complete
    acceptance:
      - GIVEN a compactable artifact exceeds 10 full, 40 compact, or 50 total retained entries WHEN check mode runs THEN it reports the artifact as over limit and does not modify files.
      - GIVEN fix mode runs on an over-limit compactable artifact WHEN the operation completes THEN the artifact matches its schema compaction contract and unrelated top-level metadata, mapping, and protected state are unchanged.
      - GIVEN optional artifacts are missing or protected WHEN check or fix mode runs THEN they are reported predictably without failing unrelated compactable artifacts.
  - number: 3
    name: Explicit CLI surfaces
    depends_on: [2]
    status: complete
    acceptance:
      - GIVEN a user runs the compaction command in text or JSON mode WHEN artifacts are in bounds or over bounds THEN the command returns truthful status, counts, exit code, and repair guidance.
      - GIVEN a user invokes artifact validation with explicit artifact and file arguments WHEN the artifact is valid or invalid THEN the command performs real validation and returns a truthful pass or fail instead of succeeding as a no-op.
      - GIVEN canonical artifact names and explicit file paths differ WHEN validation or compaction runs THEN provided paths and docs-mapped defaults are resolved consistently and reported in the output.
  - number: 4
    name: Runtime hook convergence
    depends_on: [2, 3]
    status: complete
    acceptance:
      - GIVEN existing runtime hooks validate TODO or YAML artifacts WHEN they run after supported write/edit events THEN they use the same validation and compaction behavior as the explicit command.
      - GIVEN a sparse or unsupported runtime hook payload is received WHEN validation cannot reconstruct the artifact safely THEN the hook allows or reports according to its existing runtime contract without claiming compaction occurred.
      - GIVEN hook regression tests run WHEN they cover TODO Resolved, YAML validation, apply_patch parsing, and unsupported payloads THEN at least one pass and one fail path is covered for each changed hook boundary.
  - number: 5
    name: Current artifact remediation
    depends_on: [2, 3]
    status: complete
    acceptance:
      - GIVEN the current repository starts with over-cap TODO, progress, decisions, or health artifacts WHEN the new fix path runs THEN those artifacts end within 10 full, 40 compact, and 50 total retained entries.
      - GIVEN remediation rewrites artifacts WHEN the diff is inspected THEN only permitted compaction changes appear and session remains within its existing 10/40/50 boundary.
      - GIVEN artifact validation follows remediation WHEN TODO, progress, decisions, health, and session are checked THEN validation passes for the compacted artifacts.
  - number: 6
    name: Repo gate enforcement and regression suite
    depends_on: [4, 5]
    status: complete
    acceptance:
      - GIVEN artifact files are changed by apply_patch, scripts, generated edits, direct edits, or runtime write/edit hooks WHEN the repository gate runs THEN over-limit compactable artifacts are detected regardless of edit path.
      - GIVEN a gate failure is reported WHEN the user reads the message THEN it includes the exact safe check or fix command needed to repair artifact state.
      - GIVEN focused regression tests run WHEN they cover check over-cap failure, check in-bounds success, fix mutation, explicit validator valid and invalid results, mapped paths, missing optional artifacts, gate invocation, and retained hook behavior THEN every changed boundary has at least one pass and one fail-path test.
  - number: 7
    name: 2.3.6 state and release metadata sync
    depends_on: [1, 2, 3, 4, 5, 6]
    status: complete
    acceptance:
      - GIVEN compaction enforcement passes verification WHEN closeout runs THEN TODO, progress, docs, and changelog record the completed 2.3.6 patch and the remaining deferred source-contract train.
      - GIVEN the docs semver policy maps fix work to a patch bump WHEN release metadata is synchronized THEN version-bearing files target 2.3.6 consistently.
      - GIVEN the release metadata sync completes WHEN scope is audited THEN no publication, tag, remote push, installed app refresh, vision edit, objective-state edit, or unexpected session overrun occurred without explicit approval.
overall_acceptance:
  - GIVEN any compactable artifact exceeds the 10/40/50 shape WHEN the repository check runs THEN the check fails before release or push can silently proceed.
  - GIVEN a user runs the explicit fix path WHEN artifacts are over cap THEN compactable artifacts are bounded deterministically while exempt, unsupported, and protected artifacts are left alone.
  - GIVEN artifact validation is invoked explicitly by artifact and file WHEN no runtime JSON hook payload exists THEN the command validates the requested artifact instead of returning a false pass.
  - GIVEN 2.3.6 closes WHEN state and metadata sync finish THEN the repository records compaction enforcement as a patch release without publication, push, tag, installed app refresh, vision edit, or objective-state edit.

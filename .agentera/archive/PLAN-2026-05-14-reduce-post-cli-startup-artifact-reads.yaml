      - GIVEN runtime coverage is degraded WHEN follow-up is selected THEN each affected runtime, reason, candidate count, record count, and error count is recorded before product work proceeds.
      - GIVEN retained benchmark history is inspected WHEN privacy is reviewed THEN it remains local aggregate evidence and excludes private raw runtime content.
    evidence:
      benchmark_report: /home/jgabor/.local/share/agentera/benchmarks/startup-state/latest-report.json
      benchmark_history: /home/jgabor/.local/share/agentera/benchmarks/startup-state/runs.jsonl
      benchmark_watermark_at: "2026-05-14T05:14:25+00:00"
      total_state_sequences: 5
      insufficient_evidence_reason: null
      startup_recommendation_action: plan_cli_startup_envelope
      implementation_recommended: true

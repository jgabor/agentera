overall_acceptance:
  - GIVEN representative startup sessions exist WHEN an Agentera capability starts THEN required startup state can be obtained from CLI output without routine post-CLI raw artifact reads.
  - GIVEN benchmark history is reviewed WHEN CLI completeness improves THEN raw-after-CLI and redundant-raw rates trend down with degraded runtime evidence reported separately.
  - GIVEN this plan completes WHEN scope is audited THEN no runtime-history CI benchmark, slash-alias CLI command, release publication, installed app refresh, vision edit, or objective edit occurred.

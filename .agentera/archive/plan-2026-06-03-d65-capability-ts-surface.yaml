what: >-
  Relocate the twelve per-capability `skills/agentera/capabilities/*/instructions.md`
  files to TypeScript modules at
  `packages/cli/src/capabilities/*/instructions.ts` that export the capability prose
  as a string constant. The CLI serves the same content as both the
  `capability_context` JSON capsule (Decision 59) and as human-readable Markdown
  for the docs site. SKILL.md frontmatter at `skills/agentera/SKILL.md` becomes a
  discoverability index; the body becomes a routing stub. Retire Decision 57's
  `first_invocation_read = full` in favor of `agentera prime --context <name>` as
  the only first-invocation read shape. The `npx skills` ecosystem surface
  (SKILL.md only) is unchanged — the SKILL.md frontmatter tightening applies
  only to the in-tree routing copy at `skills/agentera/SKILL.md`, not to the
  published SKILL.md body that skills.sh renders.

why: >-
  The Markdown `instructions.md` was bridging neither the discoverability
  surface (SKILL.md) nor the runtime startup surface (CLI capsule) well: the
  skills.sh public page empirically renders only SKILL.md, so per-capability
  Markdown is rarely seen by humans; and after Decision 59 the slim
  `capability_context` capsule is the authoritative runtime startup shape, so
  the on-disk `instructions.md` is no longer the runtime's working-memory
  source. Moving prose to `packages/cli/src/capabilities/*/instructions.ts`
  makes the TypeScript source the human+runtime shared source; the CLI serves
  both shapes from one place, satisfying Decision 58's single-name protocol
  boundary and aligning with the CLI-over-MCP trend (every supported runtime
  — Claude Code, OpenCode, Cursor, Copilot, Codex — shells out to the CLI).
  Three blind spots tested and held in Decision 65: (a) every supported
  runtime can shell out to the CLI; (b) the `npx skills` page tooling does
  not need per-capability Markdown; (c) the CLI is a stronger AI-agent
  content surface than static Markdown for the runtime working-memory slot
  that Decision 57 used to fill.

constraints: >-
  Land on `feat/v3` only; no `main`-branch backport is required because the
  v2 Python CLI on `main` has no equivalent capability-instructions surface to
  mirror. The published `npx skills` ecosystem surface (SKILL.md only) is
  unchanged: skills.sh renders the SKILL.md body, and the new frontmatter
  tightening keeps `name`, `description`, `version`, and the capability
  discoverability table intact so the published surface stays functionally
  equivalent. Do not create a parallel Markdown table of read modes; the
  YAML authority `references/cli/capability-instruction-contract.yaml` is
  the single source of truth for the new contract, and the in-tree
  `references/cli/vocabulary.md` only owns a discoverability index row
  pointing at it. Do not add a new `capability_context` shape — D59's slim
  capsule gains a `prose` field, no new top-level envelope. Per AGENTS.md
  "Agentera commits", the implementation commit must fold the TODO.md
  D65 chore into the `## ✓ Resolved` ledger, include
  `.agentera/plan.yaml` status updates and the corresponding progress
  cycle, and not generate a separate bookkeeping commit. CHANGELOG
  updates fold into the release commit per AGENTS.md; this plan
  captures the planned change in the resolved TODO entry instead of a
  standalone changelog edit. `scripts/validate_capability.py` does not
  exist on `feat/v3` (Python has been retired as part of the v2→v3
  rewrite); the validator lives at
  `packages/cli/src/validate/capability.ts` and is the only validator
  surface for D65.


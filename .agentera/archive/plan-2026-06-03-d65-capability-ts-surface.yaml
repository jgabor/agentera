design: >-
  The TypeScript source becomes the single source of truth for capability prose.
  Each capability owns one file at
  `packages/cli/src/capabilities/<name>/instructions.ts` that exports the prose
  as a string constant (default export, named `instructions`, of type `string`).
  The Markdown body of the current `instructions.md` is moved verbatim — no
  wording drift in the relocation commit; the only change is the surface, not
  the content. The 12 source-of-truth TS modules are part of the npm package
  payload: `tsc` compiles them to `dist/capabilities/<name>/instructions.js`
  under `packages/cli/`, and the loader imports the compiled path (e.g.
  `import hejInstructions from "../capabilities/hej/instructions.js"`) so the
  import works in both source-mode (vitest) and dist-mode (npm install). The
  bundler `packages/cli/scripts/copy-bundle.mjs` no longer copies per-capability
  `instructions.md` because the file no longer exists on disk; the data set
  copied into `packages/cli/bundle/` shrinks by the 12 files but the
  `capabilities/*/schemas/*.yaml` and `protocol.yaml` still ship because the
  capability validator and routing still need them. The `npx -y agentera`
  install therefore remains self-contained: install no longer carries the
  prose on disk, the runtime fetches it from the CLI process via
  `agentera prime --context <name> --format json`.

  The loader at `packages/cli/src/cli/capabilityContext.ts` replaces the
  on-disk `capabilityInstructionTarget` probe with a static module import.
  `firstInvocationReadMetadata` collapses Decision 57's `full` and
  `compact_startup` distinction into a single `prime_context` value whose
  `obligation_summary` is "shell out to `agentera prime --context <name>
  --format json`". The `instruction_target` shape becomes a
  `module_target: { module: "packages/cli/src/capabilities/<name>/instructions.ts",
  exists: true, runtime_path: <absolute-compiled-path> }` plus a
  `startup_command: "agentera prime --context <name> --format json"` field.
  The slim `capability_context` capsule gains a `prose: <string>` field that
  carries the full prose from the TS module; D59's slim contract is preserved
  and the new field is opt-in for consumers that want the full text
  (the in-tree orkestrera validation rule uses the loader instead of reading
  the file). The planera compact-startup contract's `normal_startup` text drops
  the `skills/agentera/capabilities/planera/instructions.md` literal and points
  at the prime command instead.

  The `agentera prime --context <name> --format json` JSON capsule is now
  the only supported first-invocation read shape. Decision 57's runtime
  enforcement of `first_invocation_read = full` was always documented as
  `runtime_enforcement: false`; D65 retires that field's `full` value and
  promotes `runtime_enforcement: true` because the CLI now owns the surface
  and the runtime can mechanically shell out to the prime command.
  `capability-instruction-contract.yaml` collapses
  `first_invocation_read.allowed_values` to a single value (`prime_context`)
  and removes the `compact_startup_exception` block (its only remaining
  caller was Planera, which is now normal-prime).

  The runtime descriptors (12 codex toml + 12 cursor md + 12 opencode md =
  36 files) change the literal `Read .../capabilities/<name>/instructions.md`
  sentence to `Run agentera prime --context <name> --format json` and read the
  result of that command as the capability's instructions. The
  `validate.ts` expectedRef substring check at lines 371, 431 must therefore
  match the new descriptor body; the validator becomes a substring check
  against the new body, with the old `capabilities/<name>/instructions.md`
  substring explicitly rejected as a regression sentinel (a substring
  exclusion enforces "the legacy path is not in the descriptor body").
  This keeps the validator's role as a guardrail against accidentally
  re-introducing on-disk prose references.

  `skills/agentera/capability_schema_contract.yaml` renames
  `DIRECTORY_REQUIREMENTS.instruction_file` to `DIRECTORY_REQUIREMENTS
  .instruction_module` and points the path at
  `packages/cli/src/capabilities/<name>/instructions.ts`. The V1 rule
  rewrites to validate the TS module file exists at the new path (the
  validator can use `fs.existsSync` on the path, with the file extension
  being `.ts` in source checkouts and `.js` in dist checkouts; the test
  fixtures write a `instructions.ts` file with a literal module header).
  The `ARTIFACTS` A3 entry's `path: "capabilities/<name>/instructions.md"`
  text updates to the new path; the A3 entry's `description` keeps the
  "behavioral instructions the agent reads" framing but the new path is
  authoritative. The `registries/capabilityContract.ts` line-262 bootstrap
  check renames the field and the error message; the contract loader test
  pins the new path.

  The in-tree `skills/agentera/SKILL.md` tightens to a discoverability index
  + routing stub: the frontmatter keeps `name`, `description`, `version`, and
  the `spec_sections` list (these are the fields skills.sh renders) and adds
  an explicit `capabilities` list of the 12 canonical capability names for
  discoverability. The body drops the long-form routing logic that references
  `instructions.md` (sections that mention the file by name); the single-call
  CLI gate (`npx -y agentera prime`), the capability table, the safety-rails
  `<critical>` block, the cross-skill integration note, and the validation
  command are preserved. The body is short enough to render in skills.sh
  without losing the routing intent. The published `npx -y agentera@next`
  install bundles this in-tree SKILL.md, so the published surface also
  receives the tightened copy; the brief's "SKILL.md frontmatter tightening
  applies only to the in-tree routing copy" is operationalized as "the
  in-tree SKILL.md is the only SKILL.md the published surface ships, and
  the new copy keeps the discoverability surface functionally equivalent".

  Tests update in three places: `validate/capability.test.ts` (fixture
  writer and V1 error strings), `registries/capabilityContract.test.ts`
  (the assertion of `instructionPath` and the new bootstrap error), and
  `cli/inspekteraEvaluationReport.test.ts` (the orkestrera prose path).
  A new `cli/capabilityContext.test.ts` (or an addition to the existing
  `cli/prime.test.ts`) pins the slim capsule's new `prose` field, the
  retired `first_invocation_read.full` value, the new `module_target` shape,
  and the new `startup_command` field for all 12 capabilities. The
  `cli/inspekteraEvaluationReport.test.ts` either uses the loader or imports
  the new TS module directly, depending on realisera's choice; the test
  contract is "the orkestrera prose, loaded by the same mechanism the
  runtime uses, satisfies the evaluator_handoff shape".

  The D65 TODO entry on `TODO.md` line 21 folds into the `## ✓ Resolved`
  section in the same commit, using the standard ledger form per AGENTS.md:
  `- ~~[chore:3.0.0] Decision 65 per-capability content surface~~ ·
  resolved on feat/d65-capability-ts-surface @ <sha>: <one-line summary
  of what changed>`. CHANGELOG is not updated in the implementation
  commit; per AGENTS.md, "fold changelog updates into the release commit
  rather than standalone bookkeeping commits". The `.agentera/plan.yaml`
  status updates to `complete` and the new plan archives to
  `.agentera/archive/plan-2026-06-03-d65-capability-ts-surface.yaml` (the
  existing complete plan on disk is the 2026-06-03 D58 single-name plan,
  which the brief confirms is at the same date; realisera renames the
  existing archive to `plan-2026-06-03-d58-single-name.yaml` before
  writing the D65 archive to keep both archived plans dated correctly).


header:
  level: full
  created: 2026-05-15
  status: complete
  reviewed: 2026-05-15
  critic_issues: 8 found, 8 addressed, 0 dismissed
  title: D48 Verify Namespace Plan
what: >-
  Plan the next D48 CLI namespace for eval and smoke gates by adding a supported
  `agentera verify` surface with stable behavior for smoke and eval gate families,
  while preserving existing direct smoke/eval scripts as compatibility surfaces.
why: >-
  Agents currently have TODO-level intent for smoke or verify gates but no
  discoverable namespace, so they must guess direct script names and flags. A
  supported verify namespace should make safe gate execution explicit, bounded,
  non-interactive, and consistent with the new `agentera validate` pattern without
  broadening into unrelated D48 namespaces.
constraints: >-
  Select `agentera verify` as the planned public namespace before build; record why
  `agentera smoke` is not the umbrella command. Preserve existing direct entrypoints
  such as `scripts/eval_skills.py`, `scripts/semantic_eval.py`,
  `scripts/smoke_installed_skills.py`, `scripts/smoke_live_hosts.py`,
  `scripts/smoke_setup_helpers.py`, and `scripts/smoke_opencode_bootstrap.mjs`.
  Preserve non-interactive behavior, bounded output, text/json result expectations,
  and invalid-input guidance with valid values, syntax, examples, and nonzero exits.
  Default tests and default command examples must avoid live network, installed-app
  mutation, profile refresh, and long-running evals unless explicitly opted in and
  bounded. Do not implement D48 `validate`, `corpus`, or `usage` work; do not redesign
  eval/smoke harnesses broadly; do not publish, push, tag, refresh installed apps or
  profiles, edit vision state, edit objective state, change decision satisfaction
  state, or run unsupported capability-name CLI commands.
scope:
  included:
    - >-
      Public `agentera verify` command contract with gate families `smoke` and
      `eval`.
    - >-
      Planned smoke gate values `installed-skills`, `live-hosts`, `setup-helpers`,
      and `opencode-bootstrap`, with live-host behavior explicitly opt-in and
      bounded.
    - >-
      Planned eval gate values `skills` and `semantic`, with long-running or
      host-dependent behavior explicitly bounded or opt-in.
    - >-
      Stable text and JSON results for success, validation failure, command failure,
      and invalid input.
    - >-
      Help and invalid-input guidance that lists valid gate families, target values,
      correct syntax, and concrete examples.
    - >-
      Compatibility guarantees for existing direct eval and smoke scripts.
    - >-
      Focused regression coverage and guidance alignment for the selected namespace.
    - >-
      Release metadata and local state sync according to `.agentera/docs.yaml`
      `semver_policy` and `version_files`.
  excluded:
    - D48 `validate`, `corpus`, or `usage` namespace work.
    - Broad eval harness redesign, smoke harness redesign, or live-host reliability work.
    - Renaming persisted artifact IDs, schema names, capability names, or direct script files.
    - Publication, remote push, tagging, installed-app refresh, profile refresh, vision edits, objective edits, or decision satisfaction changes.
  deferred:
    - Consolidating the future D48 corpus or usage namespace.
    - Broader smoke/eval performance tuning beyond bounded namespace behavior.
    - Historical cleanup of older smoke/eval examples not touched by this feature.
design: >-
  Treat this as a user-facing verification namespace, not a rewrite of smoke or eval
  engines. `agentera verify` is the planned umbrella because it can contain both
  smoke and eval gate families; `agentera smoke` remains the rejected umbrella because
  it would not naturally describe semantic or skill evaluation gates. The namespace
  should expose supported gate families and target names directly, preserve direct
  scripts for compatibility, and keep live/long-running gates explicitly opt-in or
  bounded so default agent runs stay safe.
tasks:
  - number: 1
    name: Verify namespace contract definition
    depends_on: []
    status: complete
    acceptance:
      - >-
        GIVEN an agent needs to run eval or smoke gates WHEN the verify namespace
        contract is reviewed THEN `agentera verify` is the recorded public command,
        `agentera smoke` is recorded as the rejected umbrella alternative, and the
        rationale is explicit.
      - >-
        GIVEN the command contract is reviewed WHEN supported values are listed THEN
        gate families `smoke` and `eval`, their target values, output formats,
        safety requirements, and non-goals are clear without relying on unsupported
        capability-name commands.
      - >-
        GIVEN current direct smoke and eval scripts already exist WHEN compatibility
        expectations are defined THEN their continued availability and observable
        behavior are preserved as acceptance constraints.
      - >-
        GIVEN invalid verify input is possible WHEN user-facing behavior is specified
        THEN unknown families, targets, formats, and unsafe live defaults return
        bounded diagnostics with valid values, correct syntax, concrete examples, and
        nonzero exits.
    evidence:
      - >-
        Added design-only `verify_namespace` to
        `references/cli/agent-ready-state-contract.yaml`: public command is
        `agentera verify`; rejected umbrella alternative is `agentera smoke` because
        smoke does not naturally describe semantic or skill eval gates; Task 1
        explicitly does not implement runtime `agentera verify` behavior.
      - >-
        Contract lists gate families `smoke` and `eval`, smoke targets
        `installed-skills`, `live-hosts`, `setup-helpers`, and
        `opencode-bootstrap`, eval targets `skills` and `semantic`, text/json output
        expectations, safety requirements, invalid-input behavior, examples, and
        non-goals without adding unsupported capability-name CLI commands.
      - >-
        Compatibility constraints preserve direct entrypoints
        `scripts/eval_skills.py`, `scripts/semantic_eval.py`,
        `scripts/smoke_installed_skills.py`, `scripts/smoke_live_hosts.py`,
        `scripts/smoke_setup_helpers.py`, and
        `scripts/smoke_opencode_bootstrap.mjs` with existing observable behavior.
      - >-
        Evidence probes: `uv run scripts/agentera --help` currently exposes no
        `verify` command; `uv run scripts/eval_skills.py --help`, `uv run
        scripts/semantic_eval.py --help`, `uv run scripts/smoke_installed_skills.py
        --help`, and `uv run scripts/smoke_live_hosts.py --help` documented the
        direct surfaces and safe opt-ins; `uv run scripts/smoke_setup_helpers.py
        --help` ran existing smoke checks and passed; `node
        scripts/smoke_opencode_bootstrap.mjs --help` ran existing bootstrap smoke
        checks and returned bounded local failure diagnostics for absent OpenCode
        skills.
  - number: 2
    name: Verify namespace gate behavior
    depends_on:
      - 1
    status: complete
    acceptance:
      - >-
        GIVEN a supported smoke gate target is requested WHEN an agent runs the
        verify namespace THEN the command returns a stable text or JSON result with
        bounded diagnostics and without requiring live network or installed-app
        mutation by default.
      - >-
        GIVEN a supported eval gate target is requested WHEN an agent runs the
        verify namespace THEN the command returns a stable text or JSON result with
        bounded diagnostics and without starting long-running or host-dependent work
        unless explicitly opted in.
      - >-
        GIVEN callers continue to use existing direct smoke or eval commands WHEN
        the verify namespace is present THEN those direct commands remain callable
        with their documented behavior unchanged.
      - >-
        GIVEN unsupported families, targets, formats, or unsafe default requests are
        provided WHEN the command fails THEN it exits nonzero and includes valid
        values, correct syntax, and one concrete example.
    evidence:
      - >-
        Implemented `agentera verify` in `scripts/agentera` as a thin facade over
        existing direct smoke/eval scripts, with supported families `smoke` and
        `eval`, smoke targets `installed-skills`, `live-hosts`, `setup-helpers`,
        and `opencode-bootstrap`, eval targets `skills` and `semantic`, output
        formats `text` and `json`, and bounded stdout/stderr diagnostics capped at
        20 lines per stream in the stable JSON/text envelope.
      - >-
        Smoke behavior evidence: `uv run scripts/agentera verify smoke installed-skills`
        passed in offline mode without real npx; `uv run scripts/agentera verify smoke
        installed-skills --format json` returned status `pass` with safety mode
        `offline`; `uv run scripts/agentera verify smoke live-hosts --format json`
        passed the existing offline fixture/setup/upgrade smoke path with `live=false`;
        `uv run scripts/agentera verify smoke setup-helpers --format json` passed;
        `uv run scripts/agentera verify smoke opencode-bootstrap --format json`
        returned a stable bounded `status=fail` result for the existing local OpenCode
        skills absence instead of invoking package refresh or installed-app mutation.
      - >-
        Eval behavior evidence: `uv run scripts/agentera verify eval skills --format
        json` passed by delegating to `scripts/eval_skills.py --dry-run --runtime
        claude`, avoiding host runtime auto-detection and long-running model work by
        default; `uv run scripts/agentera verify eval semantic fixtures/semantic/hej-bare-message.md`
        and the JSON form passed by delegating to `scripts/semantic_eval.py` with an
        explicit fixture path and bounded diagnostics.
      - >-
        Direct compatibility evidence: `uv run scripts/eval_skills.py --dry-run
        --runtime claude`, `uv run scripts/semantic_eval.py fixtures/semantic/hej-bare-message.md`,
        `uv run scripts/smoke_installed_skills.py`, `uv run scripts/smoke_live_hosts.py`,
        and `uv run scripts/smoke_setup_helpers.py` remained callable and passed with
        their existing outputs; `node scripts/smoke_opencode_bootstrap.mjs` remained
        callable and returned the existing bounded local failure diagnostics for absent
        OpenCode skills.
      - >-
        Invalid-input evidence: `uv run scripts/agentera verify bogus installed-skills`,
        `uv run scripts/agentera verify smoke nope`, `uv run scripts/agentera verify
        eval skills --format xml`, `uv run scripts/agentera verify smoke live-hosts
        --live --format json`, and `uv run scripts/agentera verify eval semantic
        --format json` exited nonzero with bounded diagnostics listing valid values,
        correct syntax, and concrete examples.
  - number: 3
    name: Verification coverage and guidance alignment
    depends_on:
      - 2
    status: complete
    acceptance:
      - >-
        GIVEN the verify namespace behavior exists WHEN focused tests run THEN they
        cover successful smoke gate behavior, successful eval gate behavior, text
        output, JSON output, invalid input feedback, safety boundaries, and preserved
        direct-script compatibility.
      - >-
        GIVEN help, docs, fixtures, or capability guidance are touched WHEN they are
        reviewed THEN they make the verify namespace discoverable while preserving
        existing smoke/eval script vocabulary and keeping live or long-running gates
        explicitly bounded.
      - >-
        GIVEN affected guidance or artifacts change WHEN validation runs THEN
        relevant CLI tests, direct smoke/eval probes, artifact validation, and diff
        checks pass.
    evidence:
      - >-
        Added focused `tests/test_verify_namespace.py` regression coverage for the
        `agentera verify` namespace: successful smoke text output through
        `installed-skills`, successful eval JSON output through `skills`, successful
        semantic eval JSON output with an explicit fixture, invalid family/target/format
        and missing-fixture diagnostics, unsafe `--live` and `--run`/`--dry-run`
        safety guards, help discoverability, direct Python smoke/eval script
        compatibility, and bounded direct OpenCode bootstrap smoke behavior when Node
        is available.
      - >-
        Aligned discoverability guidance minimally by adding top-level `agentera --help`
        examples for `agentera verify smoke installed-skills` and `agentera verify eval
        skills --format json`, preserving smoke/eval vocabulary and direct script target
        names. Updated `references/cli/agent-ready-state-contract.yaml` from Task 1
        contract-only wording to implemented-with-Task-3-coverage wording without adding
        `agentera smoke`, unsupported capability-name commands, live defaults, or
        long-running eval defaults.
      - >-
        Verification evidence: `uv run pytest tests/test_verify_namespace.py -q` passed
        (8 tests), `uv run pytest tests/test_explicit_cli_surfaces.py -q` passed (9
        tests), safe verify probes passed for smoke text, smoke JSON, eval skills JSON,
        and semantic fixture JSON, invalid family and unsafe live probes exited nonzero
        with bounded guidance, direct probes for `scripts/eval_skills.py`,
        `scripts/semantic_eval.py`, `scripts/smoke_installed_skills.py`,
        `scripts/smoke_live_hosts.py`, and `scripts/smoke_setup_helpers.py` passed, and
        `node scripts/smoke_opencode_bootstrap.mjs` returned the expected bounded local
        failure for absent OpenCode skills.
      - >-
        Artifact and diff evidence after Task 3 artifact updates: PROGRESS, PLAN, and
        DOCS validation passed with `hooks/validate_artifact.py`, and `git diff --check`
        passed.
  - number: 4
    name: Version and local state sync
    depends_on:
      - 1
      - 2
      - 3
    status: complete
    acceptance:
      - >-
        GIVEN the change type is `feat` WHEN release metadata is reviewed THEN
        version-bearing surfaces follow DOCS-owned `semver_policy` and
        `version_files`, or no version bump is recorded if those policies are absent.
      - >-
        GIVEN verification passes WHEN project state is synced THEN TODO, PROGRESS,
        PLAN, and policy-required CHANGELOG/DOCS records include the feature scope
        and exact verification evidence without unrelated documentation churn.
      - >-
        GIVEN closeout completes WHEN scope is audited THEN no publication, push,
        tag, installed-app refresh, profile refresh, vision edit, objective edit,
        decision satisfaction change, package-manager update, unsupported
        capability-name CLI command, or D48 validate/corpus/usage work occurred.
    evidence:
      - >-
        Reviewed `.agentera/docs.yaml` semver policy and version file conventions:
        `feat` maps to a minor bump, current version-bearing surfaces were at 2.4.0,
        and the documented feature target is 2.5.0. Aligned `pyproject.toml`,
        `uv.lock`, `plugin.json`, `.github/plugin/plugin.json`,
        `.codex-plugin/plugin.json`, `.claude-plugin/marketplace.json`,
        `.opencode/plugins/agentera.js`, `skills/agentera/SKILL.md`,
        `skills/hej/SKILL.md`, and `registry.json` to 2.5.0.
      - >-
        Synced TODO, CHANGELOG, DOCS audit metadata, PROGRESS, and PLAN for the D48
        verify namespace feature. The D48 smoke/verify TODO is resolved with exact
        verification evidence, while the separate D48 corpus/usage TODO remains open
        and no unrelated documentation churn was added.
      - >-
        Focused verification passed with `uv run pytest tests/test_verify_namespace.py
        -q` (8 tests), `uv run pytest tests/test_explicit_cli_surfaces.py -q` (9 tests),
        `uv run pytest tests/test_package_registry.py tests/test_packaged_cli.py -q`
        (13 tests), `uv run scripts/agentera verify smoke installed-skills`, `uv run
        scripts/agentera verify smoke installed-skills --format json`, `uv run
        scripts/agentera verify eval skills --format json`, and `uv run scripts/agentera
        verify eval semantic fixtures/semantic/hej-bare-message.md --format json`.
      - >-
        Direct compatibility and bounded-failure probes completed: `uv run
        scripts/agentera verify bogus installed-skills` and `uv run scripts/agentera
        verify smoke live-hosts --live --format json` exited nonzero with bounded valid
        values, syntax, and examples; direct probes for `scripts/eval_skills.py`,
        `scripts/semantic_eval.py`, `scripts/smoke_installed_skills.py`,
        `scripts/smoke_live_hosts.py`, and `scripts/smoke_setup_helpers.py` passed;
        `node scripts/smoke_opencode_bootstrap.mjs` returned the expected bounded local
        failure for absent OpenCode skills.
      - >-
        Scope audit evidence: closeout did not publish, push, tag, commit, refresh an
        installed app or profile, edit vision/objective state, change decision
        satisfaction state, update packages through a package manager, run unsupported
        capability-name CLI commands, or implement D48 validate/corpus/usage work.
overall_acceptance:
  - >-
    GIVEN an agent needs eval or smoke gate verification WHEN it uses the supported
    namespace THEN it can discover valid gate families and targets without guessing
    direct scripts.
  - >-
    GIVEN safe default execution matters WHEN verify commands or tests run THEN live,
    host-dependent, mutating, or long-running gates are explicit opt-ins and bounded.
  - >-
    GIVEN existing direct scripts remain part of the project WHEN the namespace lands
    THEN their observable behavior remains compatible.
  - >-
    GIVEN the feature closes WHEN verification and state sync finish THEN the D48
    smoke/verify TODO is resolved with exact evidence and release metadata follows
    `.agentera/docs.yaml` policy.
surprises:
  - >-
    Pre-write `agentera lint --artifact PLAN.md --text ... --format json` passed
    verbosity, abstraction, and filler checks for the D48 verify namespace draft,
    with abstraction anchored by `scripts/eval_skills.py`.
  - >-
    Adversarial review found eight issues and all were addressed: select a single
    namespace before build, list exact supported gate values, keep anchors as context
    rather than HOW, add safe-default constraints, make version handling DOCS-owned,
    constrain artifact sync to policy and actual user-facing changes, specify bounded
    invalid-input behavior, and sharpen direct-script compatibility boundaries.

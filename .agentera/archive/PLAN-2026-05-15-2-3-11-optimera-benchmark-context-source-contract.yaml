    GIVEN Optimera startup needs benchmark evidence WHEN retained startup benchmark
    state exists THEN the agent receives rates, token estimates, runtime caveats,
    recommendations, comparison status, and manual-refresh guidance through CLI state
    without normal direct report-file reads.
  - >-
    GIVEN benchmark evidence is missing, degraded, manual-only, or incomparable WHEN
    optimization work proceeds THEN the source contract names missing state, caveats,
    privacy boundaries, and fallback or manual-refresh guidance honestly.
  - >-
    GIVEN 2.3.11 closes WHEN validation and local metadata sync finish THEN 2.3.12
    remains visible and no prohibited release, installed-app, unsupported CLI,
    protected-state, objective-state, or real benchmark action occurred.

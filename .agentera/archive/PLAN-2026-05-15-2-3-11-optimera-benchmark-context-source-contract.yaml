        boundary. Implementation treated 2.3.10 plan archival as already handled.
    acceptance:
      - >-
        GIVEN docs, decisions, TODO, completed 2.3.10 plan state, and benchmark
        contracts are inventoried CLI-first WHEN inventory completes THEN
        implementation evidence records included state, missing state, benchmark file
        sources, user-local privacy boundaries, and last-resort raw fallback rules.
      - >-
        GIVEN the completed 2.3.10 plan is archived during Planera activation WHEN
        implementation begins THEN implementation scope treats archival as already
        handled and does not make archive creation part of any product task.
      - >-
        GIVEN user-local benchmark evidence may be available, absent, malformed,
        empty, degraded, or non-comparable WHEN the contract is specified THEN each
        case has an explicit incomplete or caveated outcome without reading real
        runtime stores or running the benchmark.
  - number: 2
    name: Benchmark context output contract
    depends_on: [1]
    status: complete
    evidence:
      - >-
        `scripts/agentera` now emits Optimera-only `benchmark_context` through the
        existing `agentera hej --format json --capability-context optimera` seam,
        with latest report, history, runtime coverage, state-access, token-impact,
        comparison, recommendation, manual-refresh, privacy, fallback, and source
        contract fields. No `agentera optimera` command was added.
    acceptance:
      - >-
        GIVEN `agentera hej --format json --capability-context optimera` runs and
        retained startup benchmark evidence is available WHEN structured output is
        returned THEN it includes `benchmark_context` with source, latest report
        summary, history summary, runtime coverage, rates, token estimates, comparison
        status, recommendation, manual refresh guidance, privacy boundary, caveats,
        fallbacks, and truthful completeness metadata.
      - >-
        GIVEN retained benchmark files are missing, empty, or malformed WHEN benchmark
        context is built THEN `complete_for_benchmark_context` is false, missing
        evidence is named, manual refresh guidance is present when available, and
        direct raw file reads remain last-resort diagnostics rather than normal
        startup behavior.
      - >-
        GIVEN CLI command guidance and parser surfaces are scanned WHEN this task
        completes THEN no new `agentera optimera`, top-level command, route-alias
        command, or unsupported capability-name command is introduced.
  - number: 3
    name: Benchmark provenance, privacy, and comparison semantics
    depends_on: [2]
    status: complete
    evidence:
      - >-
        Benchmark context summaries use stable source labels, non-empty evidence
        flags, bounded counts/rates/statuses/scalars, explicit comparison null
        reasons, runtime degradation caveats, and privacy-boundary omissions for
        unsafe retained benchmark strings or raw local paths.
    acceptance:
      - >-
        GIVEN benchmark metrics are present WHEN `benchmark_context` is returned THEN
        each non-empty evidence family includes stable source labels, non-empty
        evidence flags, and bounded fields without raw paths, path-derived IDs, hashes,
        salts, or raw transcript-derived content.
      - >-
        GIVEN previous benchmark rows are missing, incomparable, or lack token estimate
        fields WHEN comparison status is reported THEN the context preserves exact null
        reasons such as previous-row missing, estimator mismatch, benchmark-mode
        mismatch, runtime-scope mismatch, or previous missing token estimates.
      - >-
        GIVEN runtime stores are missing, sparse, locked, unreadable, or schema-divergent
        WHEN runtime coverage is summarized THEN those caveats are preserved as bounded
        degradation evidence and not treated as successful product behavior evidence.
  - number: 4

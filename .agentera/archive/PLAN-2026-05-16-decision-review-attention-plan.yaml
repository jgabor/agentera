  title: Decision Review Attention Plan
what: >-
  Add a bounded `agentera hej` dashboard attention item for non-confirmed decisions so
  open, provisional, missing-satisfaction, and review-needed decision states are visible
  during normal orientation without changing decision satisfaction state or dashboard
  routing priority.
why: >-
  `agentera decisions --format json` already exposes satisfaction review caveats, but
  returning users usually start with `agentera hej`. If hej only surfaces TODOs while
  non-confirmed decisions remain hidden in decision state, stale review pressure can be
  missed. The dashboard should make that pressure visible without inferring user intent
  or turning decision review into the next executable action ahead of current TODOs.
constraints: >-
  Reuse the same satisfaction semantics as `agentera decisions --format json`, centered
  on `_decision_context_entry` and `_decision_satisfaction_context` in `scripts/agentera`.
  Only `satisfaction.state=user_confirmed_satisfied` with explicit `user_confirmation`
  counts as confirmed. Missing satisfaction objects, missing or unrecognized states,
  `open`, `provisionally_satisfied`, unconfirmed `user_confirmed_satisfied`, and entries
  with `review_needed=true` count as non-confirmed. Do not infer satisfaction from
  downstream references, commits, compacted history, or evidence. Do not mutate
  `.agentera/decisions.yaml`, change decision satisfaction, alter compaction protection,
  add a new decision command, redesign the hej dashboard, or change `next_action` priority.
  Keep top-level hej attention bounded to 6 items and include at most one decision-review
  attention item with bounded details. Do not publish, push, tag, refresh installed apps
  or profiles, edit vision state, edit objective state, or run unsupported capability-name
  CLI commands.
scope:
  included:
    - Decision review attention contract for `agentera hej` text and JSON output.
    - One bounded decision-review attention item derived from decision satisfaction context.
    - Stable structured metadata for the decision attention item when JSON output is used.
    - Tests for open, provisional, missing legacy, unconfirmed, and confirmed decisions.
    - Tests proving `agentera hej` remains read-only for decisions and preserves `next_action` routing.
    - Minimal guidance or contract updates required by touched behavior.
    - DOCS-policy version check and local artifact closeout if the implemented change remains a `feat`.
  excluded:
    - Editing `.agentera/decisions.yaml` satisfaction state or user confirmation metadata.
    - Inferring satisfaction from downstream files, commits, feeds_into references, generated artifacts, or compacted history.
    - Changing compaction protection rules or protected decision review semantics.
    - Adding a new public decision-review CLI namespace.
    - Broad hej dashboard redesign or TODO/plan/health next-action priority changes.
    - Publication, remote push, tagging, installed-app refresh, profile refresh, vision edits, objective edits, or package-manager updates.
  deferred:
    - A dedicated decision-review workflow for user confirmation.
    - Richer decision dashboard sections beyond one bounded attention item.
    - Broader DECISIONS.md source-contract completeness improvements already tracked as a separate performance TODO.
design: >-
  Implement this as a small decision-satisfaction summary path inside the existing hej
  command. The summary should derive from the same enriched decision entries used by
  the decisions JSON source contract, then add one attention string before TODO attention
  and a structured `decision_attention` payload for JSON consumers. The attention item
  should report counts by state and at most three decision identifiers/titles; detailed
  review still belongs to `agentera decisions --format json`.
tasks:
  - number: 1
    name: Decision attention contract boundary
    depends_on: []
    status: complete
    acceptance:
      - >-
        GIVEN the hej decision-review behavior is specified WHEN non-confirmed classes
        are listed THEN missing satisfaction, missing or unrecognized state, `open`,
        `provisionally_satisfied`, unconfirmed `user_confirmed_satisfied`, and explicit
        `review_needed=true` entries are included while confirmed entries with explicit
        user confirmation are excluded.
      - >-
        GIVEN the attention order is specified WHEN hej has app/profile/v1/health/plan/TODO
        context THEN the decision-review item appears after app/profile/v1/health/plan
        pressure but before TODO attention, subject to the existing 6-item top-level bound.
      - >-
        GIVEN the structured JSON contract is specified WHEN decision review pressure
        exists THEN JSON output includes a stable bounded payload with count, states,
        entries, max_entries, bounded=true, and no raw unbounded decision text.
      - >-
        GIVEN satisfaction authority is reviewed WHEN implementation starts THEN the
        plan explicitly forbids changing satisfaction state, inferring satisfaction,
        or making decision review the `next_action` ahead of current plan/health/TODO routing.
    evidence:
      - >-
        Added the decision attention contract to `references/cli/agent-ready-state-contract.yaml`,
        including the new `decision_attention` hej structured field and semantics that
        derive from `_decision_context_entry` and `_decision_satisfaction_context`, never
        infer satisfaction, never mutate `.agentera/decisions.yaml`, keep top-level
        attention bounded, and preserve `next_action` priority.
      - >-
        Contract boundary is implemented in `scripts/agentera` with one bounded
        `decision_satisfaction_review` payload containing count, states, entries,
        max_entries, bounded=true, and one attention string inserted before TODO
        attention while leaving next-action selection unchanged.
  - number: 2
    name: Hej decision attention behavior
    depends_on:
      - 1
    status: complete
    acceptance:
      - >-
        GIVEN decisions contain non-confirmed satisfaction states WHEN `agentera hej`
        runs in text mode THEN attention includes one bounded decision-review item with
        counts and up to three decision references.
      - >-
        GIVEN decisions contain non-confirmed satisfaction states WHEN `agentera hej
        --format json` runs THEN JSON output includes the same attention item and a
        structured decision-review payload with bounded entries.
      - >-
        GIVEN decisions are all explicitly user-confirmed satisfied WHEN hej runs THEN
        no decision-review attention item is emitted.
      - >-
        GIVEN TODO or health remains the highest-priority executable work WHEN decision
        review pressure exists THEN `next_action` remains the existing TODO/health/plan
        action and decision review stays attention-only.
      - >-
        GIVEN `agentera hej` reads decision state WHEN the command exits THEN
        `.agentera/decisions.yaml` content is unchanged.
    evidence:
      - >-
        Implemented `_decision_review_attention` in `scripts/agentera`; it enriches
        decision entries through existing decision context helpers, includes missing
        legacy state, open, provisional, unconfirmed user-confirmed, unrecognized, and
        explicit review-needed satisfaction pressure, and excludes explicitly
        user-confirmed satisfied decisions unless they are explicitly marked review-needed.
      - >-
        `agentera hej --format json` now includes `decision_attention` and the matching
        attention item; the current repo output shows bounded provisional decision
        pressure while preserving `next_action` as the active plan task.
  - number: 3
    name: Regression coverage and guidance alignment
    depends_on:
      - 2
    status: complete
    acceptance:
      - >-
        GIVEN focused tests run WHEN fixture decisions include open, provisional,
        missing legacy, unconfirmed confirmed, and confirmed states THEN only the
        non-confirmed entries contribute to decision-review attention.
      - >-
        GIVEN more than three non-confirmed decisions exist WHEN hej renders attention
        THEN structured entries are bounded and the top-level attention list remains
        at or below six items.
      - >-
        GIVEN existing decisions JSON behavior is still required WHEN tests run THEN
        `agentera decisions --format json` source-contract semantics remain compatible.
      - >-
        GIVEN capability or CLI guidance is touched WHEN validation runs THEN tests and
        validators prove no unsupported capability-name commands or satisfaction-state
        mutation guidance were introduced.
    evidence:
      - >-
        Added focused `tests/test_query_cli.py` coverage for missing legacy, open,
        provisional, unconfirmed user-confirmed, explicit review-needed, and explicitly
        confirmed decisions; tests prove bounded entries, top-level attention ordering
        before TODO, `next_action` preservation, and `.agentera/decisions.yaml` read-only
        behavior.
      - >-
        Regression verification passed with `uv run pytest tests/test_query_cli.py -q`
        (185 tests) and `uv run pytest tests/test_hej_capability.py
        tests/test_decision_satisfaction_guidance.py -q` (15 tests), preserving existing
        decisions JSON and hej capability guidance behavior.
  - number: 4
    name: Policy-gated local closeout
    depends_on:
      - 1
      - 2
      - 3
    status: complete
    acceptance:
      - >-
        GIVEN the implemented change is classified as `feat` WHEN `.agentera/docs.yaml`
        semver policy and `version_files` are reviewed THEN local version-bearing
        surfaces are updated only as required by that policy.
      - >-
        GIVEN verification passes WHEN local state is synced THEN TODO, CHANGELOG,
        DOCS, PROGRESS, and PLAN record exact evidence without unrelated documentation
        churn or decision satisfaction edits.
      - >-
        GIVEN closeout completes WHEN final checks run THEN relevant hej/decision tests,
        package metadata tests if version files changed, touched artifact validators,
        compaction check or fix, and `git diff --check` pass.
    evidence:
      - >-
        Classified the implemented behavior as a `feat`; per `.agentera/docs.yaml`
        semver policy and `version_files`, aligned `pyproject.toml`, `uv.lock`,
        `plugin.json`, `.github/plugin/plugin.json`, `.codex-plugin/plugin.json`,
        `.claude-plugin/marketplace.json`, `.opencode/plugins/agentera.js`,
        `skills/agentera/SKILL.md`, `skills/hej/SKILL.md`, and `registry.json` from
        2.6.0 to 2.7.0.
      - >-
        Synced TODO, CHANGELOG, DOCS audit metadata, PROGRESS, and PLAN with exact
        evidence and no decision satisfaction edits, no new decision command, no
        publication, no push, no tag, no installed-app/profile refresh, and no
        vision/objective edit. Final validators, compaction, package metadata tests,
        and `git diff --check` are part of closeout verification.
overall_acceptance:
  - >-
    GIVEN non-confirmed decisions exist WHEN a user runs `agentera hej` THEN the dashboard
    surfaces bounded decision review pressure instead of hiding it behind TODO state.
  - >-
    GIVEN decision satisfaction authority belongs to the decision entry and user
    confirmation WHEN hej summarizes review pressure THEN it does not mutate, infer, or
    user-confirm satisfaction.
  - >-
    GIVEN executable routing remains important WHEN decision review pressure exists THEN
    `next_action` priority for plan, health, objective, and TODO work is preserved.
  - >-
    GIVEN JSON consumers rely on stable startup state WHEN decision attention appears
    THEN the structured payload is bounded, explicit, and compatible with existing hej output.
surprises:
  - >-
    Pre-write lint passed with concrete anchors in `scripts/agentera` and
    `.agentera/decisions.yaml`.
  - >-
    Adversarial review found eight issues and all were addressed: avoid unbounded release
    scope, define exact attention ordering, use decision satisfaction helpers rather
    than legacy status/follow_up, specify JSON payload shape, bound top-level and nested
    details separately, require read-only decisions behavior, include legacy missing
    satisfaction in review pressure, and test `next_action` preservation.

overall_acceptance: >
  A consumer running npx -y agentera@next --version sees 3.0.0-next.x
  (or a newer next-channel release), not 3.0.0-dev.x. Grep across live
  source, tests, CI YAML, scripts, and user docs returns zero 3.0.0-dev
  matches (archive and health audit findings excluded). Pushing an
  incremented version to feat/v3 with NPM_TOKEN set triggers an
  automatic publish to the @next dist-tag; pushing a bumped shim
  version to main triggers an automatic publish to @latest. The L2
  sandbox resolves the renamed pin once 3.0.0-next.x is published.
  Vitest stays green at 916/916 (or the renamed-fixture equivalent).
  Typecheck, build, and check compact all exit 0. TODOs L7 and L8 are
  marked resolved in the implementation commit per the AGENTS.md
  same-commit fold-in convention -- no standalone bookkeeping commits.
  AGENTS.md and CHANGELOG.md channel-name vocabulary remains correct
  and unchanged.
surprises: >
  publish-stable.mjs was a maintainer workflow (write-back version bump +
  publish + human commit), not directly CI-translatable. The CI job
  design shifts the maintainer workflow to "commit bump, CI publishes"
  (symmetric to publish-next). The maintainer-side convenience is lost
  but the publish path is now symmetric and automated. Task 6 (first
  publish smoke) stayed pending until a real push to feat/v3 with
  NPM_TOKEN set in repo secrets.

  Resolution 2026-06-23: 3.0.0-next.1 is live on npm @next (verified via
  `npm view agentera@next version`). Task 6 marked complete. Secondary
  finding: the 3.0.0 CLI exposes no `--version`/`version` command, so
  Task 6 acceptance criterion 2 was unmeasurable as written; tracked as
  a new TODO rather than a task failure.

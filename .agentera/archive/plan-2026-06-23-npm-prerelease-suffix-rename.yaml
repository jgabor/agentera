design: >
  Task 1 is the mechanical rename across live source and tests. The
  channels.ts forbidden-pattern regex /@3\.0\.0-dev/i is a stable-
  channel guard that rejects installing 3.0.0-dev.X on the stable
  channel; the renamed /@3\.0\.0-next/i preserves intent. The
  existing /@next\b/i and /@3\.\d/i entries cover the dist-tag
  and cross-major version cases and do not change.

  Task 2 updates the CI L2 sandbox pin AGENTERA_NPM_PIN and the
  sandbox harness default. The sandbox runs npm view and skips L2 if
  the pinned version is not yet published; after rename, L2 will skip
  until Task 4 publishes 3.0.0-next.1 -- acceptable transition-window
  behavior. CI on main does not run L2, so stable-channel coverage is
  unaffected.

  Task 3 keeps README.md and docs/packaging/v3-packaging.md in lockstep
  with the renamed version. README already shows 3.0.0-dev.6 at line
  218; the new badge becomes 3.0.0-next.1 after Task 1 lands.

  Task 4 adds publish-next job on push to feat/v3. Steps: (1) require
  build, typecheck, test, sandbox, and compact gates green; (2) load
  packages/cli/package.json#version as committed_version; (3) run
  `npm view agentera@next version` to read published_version; (4) if
  committed_version is newer (semver compare), publish:
  `pnpm -C packages/cli build` then `cd packages/cli && [ -f ../../.env ]
  && . ../../.env; npm publish --tag next`. The existing publish:dev
  script in packages/cli/package.json already loads .env for NPM_TOKEN.
  Env: NPM_TOKEN from GitHub Actions secret.

  Task 5 adds publish-latest job on push to main. Sub-investigation:
  which package is published to @latest on main? The shim package at
  packages/cli/shim/package.json (version 0.0.1, suiteVersion 2.7.7)
  is the one that ships as `npx -y agentera@latest`. The existing
  scripts/publish-stable.mjs bumps the shim patch, then publishes
  with default tag (= latest). Task 5 wraps that script in a CI job
  gated by green CI, NPM_TOKEN, and version-newer-than-published-@latest.
  If investigation finds that the main-path publish surface is more
  complex, document the actual surface and adjust the job.

  Task 6 confirms the pipeline end-to-end: trigger publish-next
  (either by a manual publish using the renamed version, or by
  pushing to feat/v3 with the new commit), check `npm view
  agentera@next version` returns 3.0.0-next.1, then run
  `npx -y agentera@next --version` and confirm it resolves. Verify
  runtime hook consumers (.cursor/hooks.json, .github/hooks/*,
  hooks/codex-plugin-hooks.json) -- these reference @next directly,
  so no string change is needed; verify they spawn cleanly.

  Task 7 runs the full verification gauntlet: pnpm -C packages/cli
  test (vitest 916/916 baseline), pnpm -C packages/cli run typecheck,
  pnpm -C packages/cli build, and pnpm -C packages/cli build && node
  packages/cli/dist/bin/agentera.js check compact. If compact trips on
  committed artifact budgets, fix artifacts (not tests).

  Task 8 folds TODO L7 and L8 closed in the same implementation
  commit per AGENTS.md same-commit fold-in convention. Mark each
  as `resolved 2026-06-23` (or the actual commit date) rather than
  hash-backfill.

  Parallelization: Tasks 2, 3, 4, 5 are disjoint files; they can run
  in parallel after Task 1 lands (Task 1 is the atomic rename across
  source/tests that the others depend on). Task 6 needs Task 4's job
  present and the first publish fired. Task 7 runs after Tasks 1-5
  merge. Task 8 is the closeout fold-in after Task 7 verifies green.

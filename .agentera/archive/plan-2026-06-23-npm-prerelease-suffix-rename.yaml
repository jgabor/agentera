  title: "Plan: v3 npm prerelease suffix rename and dual-channel CI publish gates"
what: >
  Rename the published prerelease version suffix from 3.0.0-dev.N to
  3.0.0-next.N so the version string aligns with the @next dist-tag,
  and add two gated npm publish jobs to .github/workflows/ci.yml: one
  publishes packages/cli to @next on push to feat/v3 when the committed
  version is newer than the published @next version; one publishes the
  stable shim package to @latest on push to main when the committed
  shim version is newer than the published @latest version. Both jobs
  gate behind green CI and the NPM_TOKEN secret. Sweep stale
  -dev.N references from live source, tests, CI, and user docs;
  archived plans and historical health audit findings are immutable and
  untouched.
why: >
  The npm ecosystem convention is to align a prerelease version suffix
  with its dist-tag: Next.js, TypeScript, Vite, and Astro all pair
  -next.N with @next. Agentera currently publishes 3.0.0-dev.N
  under @next, which mixes signals -- consumers inspecting the
  installed version cannot infer the channel from the version string.
  The TODO L7 degraded item documents that ci.yml runs no publish step
  at all; source fixes already shipped in 3.0.0-dev.7 never reach
  npx -y agentera@next consumers because npm @next is still pointing
  at 3.0.0-dev.6. Renaming and adding CI publish gates closes both the
  discoverability gap and the actual delivery gap in one plan.
constraints: >
  All rename and CI work on feat/v3 only. Do not modify .agentera/archive/*
  or historical entries in .agentera/health.yaml -- those record past
  versions and are immutable history. Do not change the dist-tag
  vocabulary: @next and @latest are correct and stay as-is. Do not
  add a new @dev dist-tag. Do not touch references/cli/update-channels.yaml
  channel-authority definitions; the rename only affects the prerelease
  suffix in version fields and explicit -dev.N literals in source,
  tests, and docs. Do not introduce an early cutoff where @next and
  @latest converge -- they converge at 3.0.0 stable release, not in
  this plan. The L2 sandbox will skip until the first 3.0.0-next.x
  publishes on npm; this is an acceptable transition-window trade-off,
  not a regression. Tasks 1-5 are independently mergeable per-task;
  Task 6 requires Task 4 to have fired once via the new pipeline (or a
  manual equivalent) so 3.0.0-next.1 actually exists on npm.

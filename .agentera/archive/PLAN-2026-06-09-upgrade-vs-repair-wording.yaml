header:
  level: light
  created: 2026-06-09
  status: complete
  title: Upgrade-vs-repair wording in prime and doctor
what: >-
  Align user-facing prime and doctor copy with Decision 54 app-lifecycle
  vocabulary so version-behind app files are described as an update (or upgrade
  workflow), while missing, incomplete, or broken app files keep repair
  language. Stop conflating the umbrella `agentera upgrade` command with the
  repair operation verb when the underlying status is `outdated`.
why: >-
  TODO `[fix:3.0.0]` and hej attention already surface runtime rewiring correctly,
  but several paths still say "repair" for `version_mismatch` / `outdated` cases
  or mix "repair or upgrade" in one sentence. That misleads users into thinking
  their install is broken when it only needs a version update, and it weakens
  trust in prime/doctor guidance ahead of the 3.0.0 cutover.
constraints: >-
  Do not rename the `agentera upgrade` CLI command or change lifecycle status
  enums (`outdated`, `repair_needed`, etc.). Derive prose from
  `references/cli/app-lifecycle-vocabulary.yaml` and
  `references/cli/vocabulary.md` — no parallel vocabulary. Preserve
  app-home-contract forbidden phrases (no "live bundle", "install root", etc.).
  Scope is feat/v3 (`packages/cli`); no Python main backport unless a shared
  authority doc change requires both branches. Do not edit vision, objective, or
  publish npm as part of this plan.
overall_acceptance: >-
  GIVEN a managed install classified outdated with version_mismatch WHEN agentera
  doctor renders THEN recovery copy names an update and does not say app files are
  broken or need repair. GIVEN the same outdated install WHEN agentera prime
  renders attention or next_action THEN the message uses update/upgrade framing,
  not repair framing, and still includes a dry-run preview command. GIVEN a
  managed install classified repair_needed WHEN doctor or prime renders THEN
  repair language remains and is distinct from update language. GIVEN
  summarizeProjectIntegration detects only needsAppUpgrade WHEN prime attention
  is built THEN the message does not conflate repair and upgrade verbs. GIVEN
  regression tests run on feat/v3 WHEN the wording pass completes THEN prime,
  doctor, projectIntegration, and installRoot tests cover outdated→update and
  repair_needed→repair assertions.
tasks:
  - number: 1
    name: Map emitters to lifecycle status and operation verb
    depends_on: []
    status: complete
    acceptance:
      - >-
        GIVEN the authority in app-lifecycle-vocabulary.yaml WHEN each
        prime/doctor/projectIntegration/installRoot message path is inventoried
        THEN each path is tagged with canonical status and the correct operation
        verb (update vs repair vs migrate).
      - >-
        GIVEN the inventory WHEN mismatches are listed THEN the list includes at
        minimum installRoot.managedStale generic diagnostic, doctor approval
        phrase, projectIntegration needsAppUpgrade message, and prime
        appStatusAttention / next_action labels.
  - number: 2
    name: Fix TS emitters and derive approval copy from status
    depends_on:
      - "1"
    status: complete
    acceptance:
      - >-
        GIVEN version_mismatch evidence WHEN managedStale or doctor signals emit
        user-visible text THEN the message uses update wording and not need
        repair.
      - >-
        GIVEN aggregate doctor status is outdated only WHEN approval and recovery
        fields render THEN they reference app-file update approval, not repair
        approval.
      - >-
        GIVEN needsAppUpgrade without repair signals WHEN projectIntegration builds
        its message THEN it says the app copy is out of date and preview update via
        agentera upgrade, without repair or upgrade conflation.
  - number: 3
    name: Align prime attention, SKILL gate, and contract scan
    depends_on:
      - "2"
    status: complete
    acceptance:
      - >-
        GIVEN prime attention for bundle.status outdated WHEN hej dashboard source
        is rendered THEN attention uses normal severity with update/upgrade verbs
        matching vocabulary examples.
      - >-
        GIVEN SKILL.md user-facing repair section WHEN version-behind and
        broken-install scenarios are described THEN broken/missing states keep the
        four-question repair flow while version-behind states use update/upgrade
        wording.
      - >-
        GIVEN check validate app-home-contract runs on the repo WHEN wording
        changes land THEN the validator still passes or is updated with explicit
        allowed update phrases.
  - number: 4
    name: Regression tests and TODO closeout
    depends_on:
      - "2"
      - "3"
    status: complete
    acceptance:
      - >-
        GIVEN vitest suites for doctor, prime/projectIntegration, and installRoot
        WHEN tests run THEN outdated fixtures assert update wording and
        repair_needed fixtures assert repair wording with no cross-contamination.
      - >-
        GIVEN the fix is complete WHEN TODO.md fix:3.0.0 upgrade-vs-repair item is
        closed THEN it moves to Resolved with the implementation commit hash on
        feat/v3.

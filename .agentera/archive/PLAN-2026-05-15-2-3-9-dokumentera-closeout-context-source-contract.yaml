  critic_issues: 8 found, 8 addressed, 0 dismissed
  revised: >-
    Adversarial review narrowed the plan to the minimum Dokumentera closeout-context
    contract, named the allowed existing CLI seams, made the 2.3.8 archive transition
    a hard activation boundary, replaced vague gate language with executable

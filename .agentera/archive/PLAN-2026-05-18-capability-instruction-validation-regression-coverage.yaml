header:
  level: full
  created: 2026-05-18
  status: complete
  reviewed: 2026-05-18
  critic_issues: 3 found, 3 addressed, 0 dismissed
  title: Capability Instruction Validation Regression Coverage
what: >-
  Add validation and regression coverage proving capability directories require
  canonical `instructions.md` files, legacy `prose.md` conventions are rejected
  for new capability structure, required-read capability context is emitted, and
  explicit compact-startup exceptions continue to work where supported.
why: >-
  Decision 57 moved capability instruction authority to `instructions.md` and
  added first-invocation read discoverability. The remaining risk is regression:
  future changes could silently reintroduce `prose.md`, weaken validator
  enforcement, or break the compact Planera startup seam.
constraints: >-
  Keep this work limited to validation and regression coverage. Do not perform
  broad wording cleanup, package refresh, publication, push, tag, vision or
  objective mutation, decision satisfaction updates, installed-app repair, or
  3.0 compatibility removal.
scope:
  included:
    - Validator and contract regression coverage for `instructions.md` as the
      required capability instruction file.
    - Regression coverage rejecting `prose.md` as a new canonical capability
      convention.
    - Capability-context tests for `first_invocation_read` and required-read
      metadata.
    - Preservation tests for explicit compact-startup exceptions where supported.
  excluded:
    - Documentation rewrites unrelated to test authority.
    - Runtime first-invocation behavior implementation.
    - Release, package, publication, or installation work.
    - Protected vision, objective, profile, decision-satisfaction, and TODO
      completion mutations.
  deferred:
    - 3.0 compatibility removal.
    - Runtime enforcement of first-invocation reads.
design: >-
  Treat `capability_schema_contract.yaml` and
  `references/cli/capability-instruction-contract.yaml` as the authorities. Add
  regression coverage at the validator, contract-loader, and hej
  capability-context seams so failures are observable through supported CLI
  surfaces rather than raw directory assumptions.
tasks:
  - number: 1
    name: Lock validator requirement to instructions.md
    depends_on: []
    status: complete
    acceptance:
      - >-
        GIVEN a capability directory with schemas but no `instructions.md` WHEN
        capability validation runs THEN validation fails with a message naming
        `instructions.md`.
      - >-
        GIVEN a capability directory with `prose.md` but no `instructions.md`
        WHEN capability validation runs THEN validation still fails instead of
        accepting `prose.md`.
      - >-
        GIVEN the supported validate capability namespace WHEN the same invalid
        fixture is validated THEN the CLI reports the same failure semantics.
      - >-
        GIVEN a valid real capability WHEN capability validation runs THEN it
        still passes.
    evidence:
      - >-
        Added regression tests covering schemas without `instructions.md`,
        legacy `prose.md` without `instructions.md`, and the supported
        `agentera validate capability` namespace preserving the same failure.
      - >-
        Focused tests passed: `uv run pytest
        tests/test_capability_validator_characterization.py
        tests/test_capability_contract_structure.py
        tests/test_capability_contract_loader.py` reported 38 passed.
      - >-
        Acceptance CLI checks passed: direct validator and `agentera validate
        capability` both failed invalid fixtures with `instructions.md not
        found`; `agentera validate capability hej` passed.
  - number: 2
    name: Reject prose.md as a contract directory rule
    depends_on:
      - 1
    status: complete
    acceptance:
      - >-
        GIVEN a capability schema contract whose instruction-file path is changed
        to `prose.md` WHEN the contract model is loaded or self-validated THEN
        validation fails.
      - >-
        GIVEN the canonical capability schema contract WHEN its directory rules
        are loaded THEN the executable model reports `instructions.md`.
      - >-
        GIVEN tests assert the directory rule WHEN they need expected values THEN
        the expected value is tied to the contract authority rather than
        duplicated as an independent policy table.
    evidence:
      - >-
        Added contract bootstrap validation rejecting any instruction-file path
        other than `instructions.md`, including the legacy `prose.md` fixture.
      - >-
        Added loader and self-validation regression tests proving a mutated
        contract with `prose.md` fails with a directory-rule error.
      - >-
        Tied executable model assertions to the canonical contract YAML path
        before asserting the loaded model reports `instructions.md`.
  - number: 3
    name: Prove required-read capability context emission
    depends_on:
      - 1
    status: complete
    acceptance:
      - >-
        GIVEN `agentera hej` is invoked with capability context for a capability
        requiring a full first read WHEN JSON output is inspected THEN
        `source_contract.capability_context.first_invocation_read` names
        `instructions.md` and the full-read obligation.
      - >-
        GIVEN required-read metadata is emitted WHEN the instruction target is
        inspected THEN it includes the canonical capability `instructions.md`
        path and provenance authority.
      - >-
        GIVEN unsupported capability-name CLI commands remain out of scope WHEN
        startup context is tested THEN no regression requires or introduces
        `agentera planera`, `agentera realisera`, or similar commands.
    evidence:
      - >-
        Strengthened hej capability-context tests for full first reads to assert
        `instructions.md` instruction targets, full-read obligations, existence,
        and Decision 57 provenance.
      - >-
        Strengthened realisera startup context coverage to assert full
        `first_invocation_read` metadata through the supported `agentera hej
        --format json --capability-context realisera` seam.
      - >-
        Added regression assertions that startup context does not require or
        introduce unsupported `agentera planera` or `agentera realisera` CLI
        commands.
  - number: 4
    name: Preserve compact-startup exceptions
    depends_on:
      - 3
    status: complete
    acceptance:
      - >-
        GIVEN Planera capability context is requested WHEN JSON output is
        inspected THEN `first_invocation_read` remains `compact_startup` and
        names the compact obligation.
      - >-
        GIVEN Planera compact startup is available WHEN its `instructions.md`
        file is absent in an installed-app fixture THEN the compact startup
        contract still reports `instructions_runtime_read_required` as false.
      - >-
        GIVEN a capability does not declare compact startup WHEN its context is
        requested THEN tests do not accidentally grant a compact-startup
        exception.
    evidence:
      - >-
        Existing Planera context coverage asserts `first_invocation_read` remains
        `compact_startup`, names the compact obligation, and exposes the compact
        startup contract.
      - >-
        Existing installed-app fixture coverage removes Planera `instructions.md`
        and still verifies `instructions_runtime_read_required` remains false.
      - >-
        Added a focused boundary regression proving realisera and orkestrera stay
        on `full` first reads and do not receive Planera's `startup_contract`.
  - number: 5
    name: Sync validation regression state
    depends_on:
      - 1
      - 2
      - 3
      - 4
    status: complete
    acceptance:
      - >-
        GIVEN the targeted regression tests are implemented WHEN they run
        individually THEN they pass.
      - >-
        GIVEN the canonical validators are run WHEN `agentera validate
        capability-contract` and representative capability validation execute
        THEN they pass.
      - >-
        GIVEN the diff is reviewed WHEN the task completes THEN changes remain
        limited to validation or regression coverage and any minimal validator
        behavior needed for that coverage.
      - >-
        GIVEN the plan scope excludes status mutation WHEN the task completes
        THEN no vision, objective, package, publication, install-repair, tag,
        push, or decision-satisfaction files were changed.
    evidence:
      - >-
        Targeted regression selection passed with 45 tests across validator,
        contract-loader, contract-structure, and hej capability-context coverage.
      - >-
        Canonical validators passed: `agentera validate capability-contract
        --format json`, plus representative `hej`, `planera`, `realisera`, and
        `orkestrera` capability validation.
      - >-
        Diff scope review found tracked changes only in validator/contract code,
        regression tests, PLAN, and PROGRESS; protected vision, objective,
        decisions, package, release, TODO, README, and changelog files were not
        modified.
overall_acceptance:
  - >-
    GIVEN a future change attempts to make `prose.md` the capability instruction
    convention WHEN validator or contract tests run THEN the regression suite
    fails.
  - >-
    GIVEN capability-context startup metadata is requested WHEN supported CLI JSON
    output is inspected THEN required-read obligations and compact exceptions are
    explicit and stable.
  - >-
    GIVEN the validation suite passes WHEN the work is reviewed THEN the coverage
    proves Decision 57 validation behavior without broad documentation cleanup or
    release work.
surprises: []

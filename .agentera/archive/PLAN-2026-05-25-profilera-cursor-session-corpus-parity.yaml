overall_acceptance:
  - GIVEN Cursor agent-transcript stores exist on the host WHEN profilera corpus extraction completes THEN cursor records merge with Claude, Codex, OpenCode, and Copilot data using the same Section 22 envelope
  - GIVEN diagnostics, tests, or smoke report extraction state WHEN inspected THEN they show counts, statuses, bounded reasons, and remediation labels, not raw transcript content
surprises:

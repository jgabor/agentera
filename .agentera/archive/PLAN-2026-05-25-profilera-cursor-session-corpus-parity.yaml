    name: Cursor storage contract and discovery boundary
    depends_on: []
    status: completed
    acceptance:
      - GIVEN references/adapters/cursor.md is updated WHEN a maintainer reads the profilera corpus section THEN it documents probe paths, transcript JSONL shape, project mapping, portable record families, and explicit gaps without relying on skill source reads
      - GIVEN Cursor stores are available, absent, locked, sparse, or schema-divergent WHEN discovery runs THEN runtime_status reports bounded status and reason without blocking other runtimes or leaking transcript text
    evidence:
      - references/adapters/cursor.md Profilera session corpus section; discover_runtime_store shared with cursor runtime in extract_corpus.py
  - number: 2
    name: Cursor transcript extractor
    depends_on: [1]
    status: completed
    acceptance:
      - GIVEN fixture Cursor agent-transcript JSONL with user and assistant turns WHEN extraction runs THEN history_prompt and conversation_turn records normalize with stable source_id, session_id, project_id, and decision-signal classification like existing runtimes

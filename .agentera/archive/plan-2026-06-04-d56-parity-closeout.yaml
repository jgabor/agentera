design: >-
  The plan is structured as a contract-first parity port: T1 establishes
  the oracle (the Python CLI commit-pin + the JSON contract fixture +
  the `normalizeEnvelope()` helper + the `drift_direction` classification),
  T2-T7 port each of the six remaining surface families in turn, and T8
  runs the final state sync with all six gates. The Python oracle is
  pinned by commit (not tag) to balance stability with rebase; a
  `rebase_oracle.sh` script documents the rebase policy. Every
  `npmParityMatrix.test.ts` row carries a `drift_direction` field
  (`ts_smaller|python_smaller|equal|intentional_version_break`) so
  parity failures are classified rather than generic-failed. Envelope
  normalization is centralized in `normalizeEnvelope()` and zeroes
  timestamps, hashes, and platform-specific path separators before
  comparison. The npm `@next` version-divergence (TODO L23) is a known
  pre-existing condition; T8 re-runs the matrix after any version
  bump and reports degraded status if invalidated. The implementation
  commit folds the TODO.md L18+L19 fold, the plan.yaml status flip,
  and the progress cycle into a single commit per AGENTS.md. The
  Python side is never updated from TS.

  T1: Author `packages/cli/test/cli/fixtures/oracle/parity-remaining-families.json`
  with a `surface_family` enum (`artifact_validation`, `compaction`,
  `verify_eval`, `doctor_upgrade_safety`, `usage_stats_consent`,
  `runtime_adapter_hooks`), a `python_commit` pin (set to the current
  `main` HEAD at the time T1 lands), a `normalizeEnvelope()` helper
  spec (timestamp/hash/path normalization rules), and per-family
  expected JSON shape. Author `rebase_oracle.sh` documenting the
  rebase policy. Update `npmParityMatrix.test.ts` to add a
  `normalizeEnvelope()` call, a `drift_direction` field on every row,
  and the six new families. Add `gapRegistry` entries for any
  Python-only surface that the TS side does not yet implement (these
  become T2-T7 tasks; closure happens when the surface is ported).

  T2: Port the 7 validate subcommands to TS. The existing
  `packages/cli/src/validate/{capability,appHomeContract,crossCapability,
  lifecycleAdapters,selfAudit}.ts` already exist; verify all 7 are
  parity-green and add missing tests where the Python oracle has
  coverage. Update `validate.ts` to host the 7 subcommands. Add a
  `validateParity.test.ts` per surface. Cross-capability validate is
  already partially ported (per resolved-ledger TODO L83); verify
  parity. The `vocabularyAuthority` validator is referenced in the
  resolved ledger (TODO L47) but the file may be split into
  `vocabularyAuthority.ts` or remain in `validate.ts`; T2 normalizes
  the layout.

  T3: Port compaction CLI surface to TS. The TS side already has
  `compact.ts` per the `packages/cli/src/cli/commands/` listing. Verify
  parity with the Python `hooks/compaction.py` + `hooks/common.py` +
  `scripts/yaml_mapping.py` shapes. Pin the 10/40/50 retention caps
  with the `apply_retention_caps` shared helper. Add a `compact`
  parity test against the Python oracle.

  T4: Port doctor/upgrade safety rails. The TS side has
  `packages/cli/src/setup/doctor.ts` (1412 lines — part of TODO L22
  monolith) and `packages/cli/src/upgrade/{doctor,nextMajorDoctor,
  appModel,channels}.ts`. Verify the safety-rail transitions
  (outdated → ready_to_apply → applied; repair_needed;
  manual_review_needed) match the Python `scripts/agentera
  upgrade/doctor.py` shapes. Pin the canonical Decision 54 vocabulary
  in the lifecycle metadata. User-facing repair wording must match
  the plain-language template in
  `references/cli/upgrade-repair-wording.md` (or equivalent authority).

  T5: Port verify gates. The `eval` family is already on npm
  (`packages/cli/src/eval/evalSkills.ts`); this task ports the
  safety wrappers (smoke family messaging for npm distribution,
  bounded offline smoke without live model calls by default) and
  the parity pins around it. The verify contract spec lives in
  `agent-ready-state-contract.yaml`; pin the npm-side shapes.

  T6: Port usage/stats consent semantics. The TS side has
  `packages/cli/src/analytics/usageStats.ts`. Verify the consent
  flow matches the Python `agentera stats` semantics (no runtime-
  history reads from plain `stats`; explicit `--consent local-history`
  for extraction; bounded size-bounded corpus reads already partially
  in place per resolved-ledger TODO L44). Pin the surface.

  T7: Port runtime adapter hooks. The TS side has
  `packages/cli/src/registries/runtimeAdapterRegistry.ts` and
  per-runtime setup files. Verify OpenCode/Codex/Cursor/Copilot
  hook surface coverage matches the Python side per
  `references/cli/runtime-adapters.md`. Per-runtime `subagent_dispatch`
  parity. Descriptor bodies and trust hashes parity. PLUGIN_ROOT-safe
  Codex apply_patch hook config parity. Copied user-hook trust hashes
  parity. OpenCode plugin descriptor bootstrap parity.

  T8: Final state sync. Run all six gates:
  (1) `pnpm -C packages/cli test` — full vitest suite green
      (target: 692+ given the D65 plan landed 692/692 vitest green).
  (2) `pnpm -C packages/cli run typecheck` — zero errors.
  (3) `pnpm -C packages/cli build` — exit 0, `dist/bin/agentera.js`
      present.
  (4) `node packages/cli/dist/bin/agentera.js check validate
      capability-contract --format json` — pass.
  (5) `node packages/cli/dist/bin/agentera.js check validate
      capability <name> --format json` for each of the 12 capabilities —
      all pass.
  (6) `npxParityMatrix.test.ts` reports all v3-remaining families green
      against the pinned Python oracle; `drift_direction` is
      `equal` for every non-version-break row; the npm `@next` version
      pin is unchanged from T1.

  After all six gates pass, fold the TODO L18+L19 entries to
  `## ✓ Resolved` using the standard ledger form, flip the plan
  status, append the progress cycle, and land the implementation
  commit. The archive path for this plan is
  `.agentera/archive/plan-2026-06-04-d56-parity-closeout.yaml`.


  title: "Plan: Decision 56 parity closeout — port the remaining CLI surfaces to TS and prove parity with the Python oracle"

what: >-
  Close Decision 56 by porting the six remaining CLI surface families to
  TypeScript and proving byte-level (or envelope-versioned) parity with
  the Python `agentera` CLI. The six families are: artifact validation
  (the 7 validate subcommands), compaction (`check compact` apply +
  dry-run + retention caps), doctor/upgrade safety rails (smoke checks,
  repair-needed/manual_review_needed lifecycle transitions, next-major
  doctor for npm), verify gates (`check verify eval` family wrappers),
  usage/stats consent semantics (`stats` + `stats refresh --consent
  local-history`), and runtime adapter hooks (OpenCode/Codex/Cursor/
  Copilot hook surfaces + descriptor parity + per-runtime
  `subagent_dispatch`). The parity matrix at
  `packages/cli/test/cli/npmParityMatrix.test.ts` expands to cover all
  six families against a pinned Python oracle; the
  `parity-remaining-families.json` fixture pins the contract. This
  plan is the v3 critical path: TODO L19 (port the surfaces) and
  TODO L18 (Decision 56 parity test gate) fold on T8 final state sync.
  The headline v3 TODO L16 (rewrite the Agentera CLI core in TS for
  Bun/npm/single-binary) only resolves when a subsequent planera cycle
  completes the v3 cutover tag/publish, which is out of scope here.

why: >-
  Decision 56 was opened to gate the v3 Python-to-TS cutover on
  contract-first parity: the npm `@next` CLI must match the Python
  stable surface well enough that the published `npx -y agentera@next`
  install is functionally equivalent to the `uvx --from
  git+https://github.com/jgabor/agentera agentera` Python invocation
  the maintainer seam still uses on `main`. The CLI JSON contract
  parity fixtures froze the prime/state/check/report/upgrade envelopes
  in two prior plans (per TODO.md resolved ledger), but the remaining
  six surface families (artifact validation, compaction, doctor/upgrade
  safety, verify, usage/stats consent, runtime adapter hooks) have not
  yet been ported or pinned. Without this plan, Decision 56 stays open,
  the npm `@next` install cannot be marked v3-ready, and the v3
  cutover cannot land. Per the planera compact startup contract's
  `critic_issues` obligation, this plan was adversarially reviewed and
  four issues (oracle pinning policy, envelope normalization flake,
  drift direction tracking, npm version-divergence gate) were
  identified and addressed in `revised`; the plan is ready for
  pre-write self-audit and write.

constraints: >-
  Land on `feat/v3` only; the implementation commit goes on
  `feat/d56-parity-closeout` (a feature branch off `feat/v3`),
  following the D65 `feat/d65-capability-ts-surface` pattern. No
  `main`-branch backport is required because the v2 Python CLI on
  `main` is the parity reference, not the port target. Per AGENTS.md
  "Agentera commits", the implementation commit must fold the TODO.md
  L18+L19 entries into `## ✓ Resolved`, include `.agentera/plan.yaml`
  status flip and the corresponding `.agentera/progress.yaml` cycle,
  and must not generate a separate bookkeeping commit. CHANGELOG fold
  deferred to release per AGENTS.md. The Python oracle is pinned by
  commit (not tag) with a `rebase_oracle.sh` script that documents
  the rebase policy; the parity matrix MUST NOT auto-update the
  Python side from TS. The envelope-versioning scheme (D58 single-
  name boundary) is preserved: if a TS implementation intentionally
  diverges from Python, the envelope MUST carry an explicit
  `version_break: true` field and a `drift_direction` classification;
  the parity matrix's `npmParityMatrix.test.ts` will classify the
  break as `intentional_version_break` and the suite stays green for
  that row. Per Decision 56's `feeds_into`, this plan closes L18 and
  L19 but the cutover itself is a separate planera cycle; the
  headline TODO L16 remains open until that cycle lands. The npm
  `@next` version divergence (TODO L23) is a known unfixed
  pre-existing condition that does not block this plan but T8 final
  state sync MUST re-run the parity matrix after any npm version
  bump and report degraded status if the matrix is invalidated. The
  plan is contract-first: no command-shape redesigns, no new
  top-level commands, no parallel surfaces. The `npx -y
  agentera@next` install remains self-contained; the per-capability
  prose ships via compiled `dist/capabilities/*/instructions.js`
  per the D65 plan.


    (Loop Guard), 17 (Phase Tracking), and 18 (Staleness Detection) have no dangling references: their values are already
    inlined in SKILL.md or present in retained sections. Changed frontmatter to `spec_sections: [2, 3, 4, 6, 19]`. Regenerated

- number: 1
  date: 2026-04-12 06:22
  label: contract.md lazy-reference
  hypothesis: realisera's `### Contract` block instructs an upfront full-file read of `references/contract.md` (30,721 bytes).
    Inlining the specific contract values at their point of use in SKILL.md and converting the upfront read to a lazy-reference
    (same proven technique as hej experiment 1, which produced -29.5% composite) should eliminate the contract.md read. Even
    though the baseline didn't include a contract read, this prevents a 30 KB regression when a future run follows the instruction.
  method: dispatched a Sonnet implementation sub-agent to an isolated worktree. The agent replaced the 1-line upfront-read
    directive with a 2-paragraph lazy-reference block inlining severity arrows, decision labels, token budgets, compaction
    thresholds, profile consumption thresholds, and RVG archetypes. Five additional inline replacements at point of use (TODO.md
    severity, PROGRESS.md budget, compaction rule, profile thresholds x2). Only `skills/realisera/SKILL.md` modified. Regression
    checks passed before harness run. Raw run at `.optimera/runs/20260412T062219Z/`.
  change: '`skills/realisera/SKILL.md` · 7 edit sites: `### Contract` block rewritten, 2 token budget inlines, 1 compaction
    inline, 1 severity inline, 2 profile threshold inlines.'
  metric:
    primary_value: ''
    delta_vs_baseline: ''
  regression: 'pass (validate_spec.py: 0/0, eval_skills --skill realisera --dry-run: resolves).'
  status: baseline
  conclusion: 'the hypothesis was correctly identified as preventive, and the measurement confirmed it. The contract.md upfront
    read instruction is dead code at this trigger/task pin. The lazy-reference is still the right engineering decision (it
    prevents a 30 KB regression if model behavior shifts), but the harness cannot validate it because the baseline doesn''t
    include the cost being eliminated. This is a measurement gap, not a technique failure. The change should be applied as
    a maintenance commit outside optimera''s loop rather than counted as an optimization experiment.


    The more important finding: run-to-run variance on the composite metric is ~13% (72,645 vs 82,052 with identical realisera
    code). This means experiments need to produce >13% improvement to be distinguishable from noise with a single run. The
    PROGRESS.md unlimited read (78 KB, ~19K effective bytes, ~4.7K tokens) is the only candidate large enough to clear that
    bar in a single experiment.'
  next: Experiment 2 targeted the Read bypass and analytics script. See below.
  escalation: ''
  target_progress: ''
- number: 2
  date: 2026-04-12 07:05
  label: Read tool enforcement + analytics script promotion
  hypothesis: 'Realisera''s Orient step has two problems inflating peak_context and causing variance: (1) the instruction
    "Read VISION.md, PROGRESS.md, TODO.md, and HEALTH.md" doesn''t specify the Read tool, so the model stochastically uses
    Bash(cat), bypassing read limits and escaping the reads log; (2) the analytics script is conditional ("If 3+ cycles")
    and underweighted, causing the model to compensate with larger direct reads. Enforcing "Use the Read tool (never Bash,
    cat, or head)" and promoting the analytics script to primary aggregate source should reduce both variance and peak_context.'
  method: 'four surgical edits to `skills/realisera/SKILL.md` Step 1: (a) replaced "Read ... in parallel" with "Use the Read
    tool for all artifact reads in this step (never Bash, cat, or head)"; (b) removed the "If 3+ cycles" conditional on the
    analytics script, promoted it to "primary source for aggregate cycle history"; (c) narrowed PROGRESS.md read description
    to "last cycle''s Context block and Next suggestion" with explicit note that analytics covers aggregate history. Regression
    passed (0/0, eval resolves). Raw run at `.optimera/runs/20260412T070525Z/`.'
  change: '`skills/realisera/SKILL.md` lines 148, 150, 156, 158 (4 lines changed in Step 1: Orient).'
  metric:
    primary_value: ''
    delta_vs_baseline: ''
  regression: pass (0/0, eval resolves).
  status: discarded
  conclusion: 'The Read-tool enforcement worked completely. Three behavioral wins:


    1. **Read bypass eliminated**: 4/4 canonical reads now use the Read tool (vs 2/4 in Exp 0, 0/4 in Exp 1). The reads log
    now captures the full orient footprint.

    2. **PROGRESS.md capped by the model itself**: the model read PROGRESS.md twice with limits, reducing effective bytes
    from 78,486 to 8,400 (-89%). The "analytics as primary source, direct read for recent detail only" framing worked: the
    model self-imposed limits without an explicit cap.

    3. **Better measurement**: the reads log now has full attribution because all reads go through the Read tool. We can see
    HEALTH.md (48 KB) as the new dominant contributor, which was invisible in Exp 0 (model used Read) and Exp 1 (model used
    cat).


    The metric worsened because HEALTH.md appeared as a new 48 KB contributor. HEALTH.md was either not read (Exp 0) or read
    via cat (Exp 1, invisible). The Read enforcement surfaced a latent cost that was always there but hidden. The SKILL.md
    says "read critical and degraded findings only (if exists)" for HEALTH.md but the model read the entire 48 KB file.


    The net effect: PROGRESS.md savings (-70 KB) were offset by HEALTH.md surfacing (+48 KB) and VISION.md surfacing (+5.7
    KB). The harness baseline variance (~11% between Exp 0 and Exp 2 `without` conditions) further obscures the signal.'
  next: Experiment 3 stacked the Read enforcement with HEALTH.md guidance. See below.
  escalation: ''
  target_progress: ''
- number: 3
  date: 2026-04-12 07:26
  label: Read enforcement + analytics + HEALTH.md guidance
  hypothesis: Stack Exp 2's Read enforcement and analytics promotion with explicit HEALTH.md read guidance ("read only the
    most recent audit section, use offset/limit"). HEALTH.md was the dominant contributor at 48 KB in Exp 2.
  method: 'same 4 edits as Exp 2 plus HEALTH.md read guidance: "read only the most recent audit section (use offset to start
    at the last `## Audit` heading, limit to ~50 lines). Extract critical and degraded findings only; skip dimension detail
    and resolved items." Also added "use offset/limit" guidance to VISION.md read. Regression passed (0/0). Run at `.optimera/runs/20260412T072605Z/`.'
  change: '`skills/realisera/SKILL.md` lines 148, 150, 156, 158, 159, 161 (Step 1: Orient).'
  metric:
    primary_value: '**87,432 tokens** (+20.4% vs baseline ⮋). Gates pass.


      | | Exp 0 | Exp 3 | delta |

      |---|---|---|---|

      | primary (with) | 72,645 | 87,432 | +14,787 (+20.4%) ⮋ |

      | without baseline | 97,915 | 107,202 | +9,287 (high-variance run) |

      | distinct_canonical_reads (via Read) | 2/4 | **0/4** | -2 |

      | read_count | 21 | 15 | -6 |'
    delta_vs_baseline: ''
  regression: ''
  status: discarded
  conclusion: 'The core finding across Exp 1-3 is that SKILL.md prose instructions cannot reliably control model tool-selection
    behavior. The "Use the Read tool (never Bash, cat, or head)" directive worked once (Exp 2, 4/4 canonical reads via Read)
    and failed once (Exp 3, 0/4). The model''s choice of Read vs Bash is stochastic and dominates the metric variance. None
    of the three experiments produced a metric improvement because the variance floor (~13-20%) is larger than any savings
    achievable by capping orient reads.


    Three consecutive discarded experiments. Per the optimera protocol, this constitutes 3 consecutive failures. Escalating.'
  next: ''
  escalation: 'The optimization is stuck because:'
  target_progress: ''

header:
  title: Reduce realisera cycle entry token consumption
  status: closed
objective:
  description: 'Reduce the fixed token footprint of the realisera package (SKILL.md + contract.md) by **20%** from the established
    baseline, with no loss of cycle quality.


    ### Two-tier metric (Decision 30)


    **Tier 1 (primary metric)**: the exact token count of `skills/realisera/SKILL.md` + `skills/realisera/references/contract.md`,
    measured via the Anthropic `count_tokens` API (`POST /v1/messages/count_tokens`). Each file is sent as the `system` parameter
    with model `claude-sonnet-4-6` and a minimal user message. The sum of both `input_tokens` values is the Tier 1 metric.


    Direction: lower. Unit: tokens. Variance: zero (deterministic tokenization).


    **Tier 2 (behavioral validation)**: the existing Docker A/B harness run against lira@`5a52fdc`. The Tier 2 pass bar is
    **gates-only**: causal gate (realisera activated) and structural gate (reached step 5, composite >= 5,000 floor) must
    both pass. The full-cycle composite (`peak_context + output_total`) is logged as a diagnostic in the breakdown but is
    NOT used for the keep/discard decision.


    **Keep gate**: Tier 1 must strictly improve (lower token count than baseline) AND Tier 2 gates must pass. Both conditions
    required.


    **Discard gate**: Tier 1 does not improve, OR Tier 2 gates fail.


    ### Why two tiers


    Experiments 1-3 (see EXPERIMENTS.md) showed that the full-cycle composite has 13-20% run-to-run variance because the model
    stochastically chooses which files to read, whether to use the Read tool or Bash/cat, and how deep to go in implementation.
    SKILL.md edits produce 5-10% signal, which is below the variance floor. The Tier 1 metric isolates the fixed cost (system
    prompt tokens) that SKILL.md edits actually control, measured with zero variance via the count_tokens API (free, rate-limited
    separately from messages). Tier 2 confirms behavioral soundness without requiring the noisy composite to improve.


    ### Baseline


    Tier 1 baseline is established by the first count_tokens measurement of the unmodified SKILL.md + contract.md at agentera
    HEAD. The 20% target is computed from that baseline.


    The Experiment 0 full-cycle composite (72,645 tokens) is retained as a diagnostic reference point but is no longer the
    primary metric.


    ### Diagnostics


    The full-cycle composite, pre-dispatch counters, cache efficiency, turn count, tool use count, per-artifact read attribution,
    and pre-flight probe data are preserved in the harness breakdown as secondary diagnostics for trend analysis across experiments.'
  why: 'Realisera is the most-invoked cycle skill in the suite: every autonomous-development flow runs through it. Unlike
    hej (which fires once per session), realisera fires once per cycle and cycles run in loops, so savings compound multiplicatively
    with cycle count. A 10k-token savings per cycle is a 100k-token savings over ten cycles, which is roughly half a day of
    typical autonomous-development work.


    Full-cycle composite captures what realisera actually costs per invocation, inclusive of any self-implementation work.
    Sub-agent cost (when dispatch happens) is excluded by the vehicle''s `--tools` allowlist which blocks `Task` / `Agent`;
    realisera either self-implements or hits the tool barrier. Sub-agent optimization is a separate objective ("realisera-subagent-token")
    that deserves its own harness once optimera supports multiple objectives (see TODO.md).


    The measurement also doubles as a diagnostic. The per-artifact read attribution in the breakdown tells us whether the
    bottleneck is:


    - **Orient-side**: realisera''s step 1 pulls too much from PROGRESS.md, DECISIONS.md, HEALTH.md, VISION.md, TODO.md at
    cycle start

    - **Analyze-side**: the analytics script or the "key source files" scan in step 2 reads more aggressively than necessary

    - **SKILL.md / contract-side**: the instructions or inline contract values themselves bloat the system prompt


    First experiments are expected to be diagnostic. The ranked top-contributors list and by-class breakdown (agentera_artifact
    vs realisera_asset vs root_artifact vs profile vs other) will point at which direction deserves the first optimization
    attempt. If the data implicates an artifact produced by another skill, the finding is surfaced to the user for scope expansion
    rather than silently edited outside scope.'
  measurement: 'Captured by the locked eval harness at `.optimera/harness`. The harness runs a hermetic Docker vehicle (`agentera-optimera-vehicle:1`,
    same image as hej-token) that bakes in a pinned copy of the host `claude` binary plus python3 and git, and mounts:


    - the lira repo mounted **read-write** at `/workspace`, **cloned fresh per run via `git clone --local --no-hardlinks`**
    from `$HOME/git/lira` and checked out at commit `5a52fdc` (a mid-plan state with 1 task complete and 4 pending, so realisera
    reaches the normal cycle path instead of the plan-completion sweep short-circuit that fires when PLAN.md has no actionable
    work). The clone is isolated from the lira source tree and each run starts from an identical state. Realisera can perform
    real operations on the clone (git log, file writes, even commits), and the clone is thrown away at run end. Read-only
    was infeasible because realisera''s workflow requires file writes and its safety rails correctly reject a read-only filesystem
    as `stuck` before reaching step 5.

    - a realisera-only marketplace snapshot at `/plugins/agentera-realisera` mounted read-only, built fresh per run from the
    host''s `skills/realisera/`

    - the host OAuth credentials read-only at `/creds/`

    - the host PROFILE.md read-only at `/profile/` (so realisera''s profile read reflects real usage)

    - a writable `/output` for transcripts, stderr, meta, and the reads log


    Each run executes two conditions in sequence:


    - `without`: `claude -p` with no `--plugin-dir` (baseline; realisera not mounted, agent improvises a development cycle
    from native tools)

    - `with`: `claude -p` with `--plugin-dir /plugins/agentera-realisera` (realisera mounted, activates on trigger)


    Claude is invoked with the same trigger prompt, same model, and same flags:


    > "Run one development cycle on this project. Focus on Task 2 of the current plan."


    The first sentence matches realisera''s trigger patterns ("development cycle on this project") and reliably fires the
    skill. The second sentence pins realisera''s task selection to Task 2 ("Fix backfill failure cascade" in the Dashboard
    State Lifecycle Bug Fixes plan at `5a52fdc`). Pinning eliminates task-selection non-determinism, which caused ~48% run-to-run
    variance when realisera freely chose between tasks of different research depth. The Orient reads (the main optimization
    target) are identical regardless of task; the task pin stabilizes the Research reads.


    Model: `claude-sonnet-4-6`. Flags: `--output-format stream-json --verbose --no-session-persistence --dangerously-skip-permissions
    --max-budget-usd 1.50 --add-dir /workspace`.


    **Tool allowlist**: the vehicle''s `--tools` flag is `Read Glob Grep Bash Skill` (same as hej-token). It does NOT include
    `Task` or `Agent`. This prevents realisera from leaking cost into external sub-agents, keeping the full-cycle cost within
    the parent session. Realisera either self-implements (common for small fixes) or hits the tool barrier and reports a stuck
    status (uncommon at the pinned commit because pending tasks are tractable).


    Stream-JSON transcripts and a PostToolUse Read hook log (one JSONL record per `Read` inside the container, same hook as
    hej-token) are captured to `.optimera/runs/<run_id>/`. Post-run helpers on the host (`parse_tokens.py`, `check_gates.py`,
    `aggregate_reads.py`) extract the metric, enforce gates, and rank read contributors. `parse_tokens.py` retains the `--slice-before-tool
    Task,Agent` flag for diagnostic use; the slice counters appear in the breakdown but the primary metric is the full-cycle
    composite.


    The primary metric reported to optimera is `with.peak_context + with.output_total` (full-cycle). The `breakdown` field
    carries the composite, delta vs baseline, pre-dispatch counters (diagnostic), peak context, output total, cache totals,
    cache efficiency, turns, tool uses, read-class totals, and top-5 read contributors.'
  constraints:
  - Realisera must complete its cycle through at least step 5 (dispatch or self-implement decision). The structural gate enforces
    this floor.
  - '`python3 scripts/validate_spec.py` must pass after every experiment (SPEC compliance preserved).'
  - '`python3 scripts/eval_skills.py --skill realisera --dry-run` must pass (skill inventory still resolves).'
  - 'Project formatting rules (from MEMORY.md): no em-dashes, no hard wraps, colons for labels, middle dot (`·`) for headings.'
  - 'No modification to any of: `SPEC.md`, `scripts/generate_contracts.py`, other skills, `hooks/`, any `.agentera/` artifact
    other than `EXPERIMENTS.md`, or `scripts/eval_skills.py`.'
  - No push to any remote. Local commits only on the current branch when an experiment is kept.
  - No modification to the eval harness (`.optimera/harness` and `.optimera/vehicle/`) during optimization cycles. Only the
    brainstorm can edit it, and only with explicit user approval.

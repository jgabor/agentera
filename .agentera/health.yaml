      doctor and installer surface.

      - **Carried forward**: Richer live-host proof remains deferred by plan, but
      default doctor smoke explicitly avoids live model calls.'
    stable: 'Version, security, and dependency posture remain green.

      - **New findings**: `setup_doctor.py` is a large but acceptable setup hotspot.

      - **Resolved**: Audit 15''s "two-helper shape" note is absorbed into the bundle-owned
      doctor and installer surface.

      - **Carried forward**: Richer live-host proof remains deferred by plan, but
      default doctor smoke explicitly avoids live model calls.'
    new_findings: '`setup_doctor.py` is a large but acceptable setup hotspot.

      - **Resolved**: Audit 15''s "two-helper shape" note is absorbed into the bundle-owned
      doctor and installer surface.

      - **Carried forward**: Richer live-host proof remains deferred by plan, but
      default doctor smoke explicitly avoids live model calls.'
    resolved: 'Audit 15''s "two-helper shape" note is absorbed into the bundle-owned
      doctor and installer surface.

      - **Carried forward**: Richer live-host proof remains deferred by plan, but
      default doctor smoke explicitly avoids live model calls.'
    carried_forward: Richer live-host proof remains deferred by plan, but default
      doctor smoke explicitly avoids live model calls.
  patterns:
  - 'Module structure: shared suite infrastructure lives in root `scripts/`, `hooks/`,
    manifests, and references; behavioral scripts remain inside owning skills.'
  - 'Validation ownership: lifecycle/package-shape drift belongs to `scripts/validate_lifecycle_adapters.py`;
    spec and contract drift stay in `validate_spec.py` and `generate_contracts.py`.'
  - 'Testing approach: setup behavior is verified by focused subprocess smoke tests

      - name: Coupling health
        grade: A
        summary: The new helpers are stdlib-only and import nothing from `hooks/`,
          `skills/`, or each other. `scripts/smoke_setup_helpers.py` invokes
          both as black-box subprocesses, so the harness survives helper
          internals refactors. Test files use the standard `conftest.py`
          importlib pattern.
        findings: []
      - name: Complexity hotspots
        grade: A
        summary: '`setup_codex.py` (795 lines, 19 functions) and `setup_copilot.py` (717
          lines, 16 functions) are the two largest stdlib scripts but stay
          well-factored: clear section banners, single-responsibility functions,
          linear `main()` orchestration, no nested-loop hotspots. The 541-line
          smoke harness uses 11 sequential numbered cases — the right shape for
          "the harness IS the test."'
        findings: []
      - name: Test health
        grade: A
        summary: ""
        findings:
          - heading: "⇢ Codex and Copilot live-host AGENTERA_HOME inheritance still
              untested, info (confidence: 50)"
            severity: info
            confidence: 50
            location: >-
              `scripts/smoke_setup_helpers.py`, `tests/test_runtime_adapters.py`

              - **Evidence**: 412 → 433 tests (+10 codex, +11 copilot). The
              smoke harness verifies the WRITE side of the AGENTERA_HOME
              contract (helpers correctly emit `[shell_environment_policy]` and
              shell-rc export blocks). Whether Codex and Copilot CLIs actually
              inherit AGENTERA_HOME at runtime from those files remains
              unverified by an automated test.

              - **Impact**: Narrower than Audit 14 finding 3 (write side is now
              covered). Future runtime updates could still regress the read-side
              inheritance without the suite catching it.

              - **Suggested action**: Continue treating as a deferred caveat
              until a live-host harness lands. No standalone action recommended.
            evidence: >-

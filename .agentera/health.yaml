      - name: Version health
        grade: A
        summary: "Two minor bumps today (1.19.0 → 1.20.0 → 1.21.0), both justified per
          `feat = minor`: 1.20.0 carried the AGENTERA_HOME contract plus
          OpenCode bootstrap, 1.21.0 carries the two setup helpers plus smoke
          harness. Splitting was correct because Audit 14 had already
          snapshotted 1.20.0 as a coherent unit. No unbumped commits since
          9773f35."
        findings: []
      - name: Artifact freshness
        grade: A
        summary: "Audit 14 finding 1 resolved by T4 (commit 8e57ef4): DOCS.md Index now
          reads 433 tests across 17 files, the six previously-stale rows show
          2026-04-26, and three new Index rows for `setup_codex.py`,
          `setup_copilot.py`, `smoke_setup_helpers.py` are present. PROGRESS,
          TODO, CHANGELOG, README, HEALTH all touched today. SPEC.md, DESIGN.md,
          VISION.md older than the plan, but the owning skills (design,
          vision) were not dispatched."
        findings: []
      - name: Security hygiene
        grade: A
        summary: '`setup_copilot.py` writes user shell rc files but the injection
          surface is well-controlled. Install-root verification rejects
          malicious paths before any write (a path lacking the four canonical
          entries fails). `_quote_for_shell` escapes `\` and `"` for
          bash/zsh/fish, and `_toml_basic_string` handles all TOML 1.0
          basic-string escapes plus unicode-escapes control characters.
          Idempotency anchors on a literal marker comment, so user-written
          `AGENTERA_HOME` lines stay untouched. No `eval`, `exec`, `os.system`,
          or `shell=True`; subprocess calls are list-form with hardcoded args.'
        findings:
          - heading: "⇢ PROFILERA_PROFILE_DIR and AGENTERA_HOME injection asymmetry, info
              (confidence: 60)"
            severity: info
            confidence: 60
            location: >-
              `.opencode/plugins/agentera.js:191`,
              `.opencode/plugins/agentera.js:231`, `SPEC.md` Section 7

              - **Evidence**: Carry-forward from Audit 14. PROFILERA_PROFILE_DIR
              is set by mutating `process.env`; AGENTERA_HOME is set via the
              `shell.env` hook. Both correct for their consumers, surface still
              looks inconsistent.

              - **Impact**: Same as Audit 14 — readability tax, not a defect.

              - **Suggested action**: One sentence in SPEC Section 7 naming the
              asymmetry as principled. Defer until SPEC.md sees its next
              substantive edit.
            evidence: >-

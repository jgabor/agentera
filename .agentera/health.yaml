      two well-factored stdlib helpers, a Python smoke harness covering 11
      black-box cases, and a clean 1.21.0 release. Audit 14 finding 1 (DOCS.md
      staleness) is resolved; finding 3 (live-host inheritance) is narrowed to a
      smaller residual gap on the runtime CLI side.

              principled. Defer until SPEC.md sees its next substantive edit.
      - name: Dependency health
        grade: A
        summary: "No new third-party dependencies. Both helpers are stdlib-only
          (argparse, pathlib, re, sys, os, tomllib, NamedTuple). `tomllib` is
          Python 3.11+ stdlib already implicit in the project. OpenCode Node dep
          unchanged. ### Trends vs Audit 14 - **Improved**: Freshness B → A
          (Audit 14's DOCS.md Index/Coverage warning resolved by T4). Tests stay
          A but the live-host gap narrowed: helpers + smoke harness cover the
          write side, residual confidence drops 65 → 50. - **Degraded**: none. -
          **Stable**: Architecture A, Patterns A (one new info on shape
          duplication, advisory only), Coupling A, Complexity A, Version A,
          Security A, Deps A. - **Resolved**: Audit 14 finding 1 (DOCS.md Index
          dates + Coverage line stale). - **Carried forward**: Audit 14 finding
          2 (PROFILERA_PROFILE_DIR vs AGENTERA_HOME asymmetry, conf 60). Audit
          14 finding 3 narrowed (live-host inheritance, conf 65 → 50). - **New
          findings**: Two-helper shape is a nascent pattern (info, conf 55,
          advisory). ### Patterns Observed - Module structure: repo-level
          `scripts/` is the canonical surface for stdlib utilities. `setup_*.py`
          is the third archetype after `compact_artifact.py` (artifact
          compaction), `usage_stats.py` (corpus analytics), and the validators.
          - Helper shape: `verify_install_root` → `auto_detect_install_root` →
          `resolve_install_root` → state-classify → `plan_change` →
          emit-or-write is now a duplicated-but-parallel structure across two
          files. Pattern in waiting. - Idempotency pattern: literal marker
          comment + line-anchored read/rewrite, with byte-identity preservation
          of unrelated lines. Both helpers converged on this independently. -
          Smoke testing: language matches the system under test (Node smoke for
          OpenCode JS plugin, Python smoke for Python helpers). Black-box
          subprocess invocation rather than internal imports. - Release pattern:
          same-day double minor bumps remain acceptable when each bump
          represents a coherent unit; the prior audit snapshot determines the
          split point."

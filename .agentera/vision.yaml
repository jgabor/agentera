project_name: Agentera
north_star: |
  Serious engineering leaves the desk. Agentera is an opinionated mobile-first
  coding agent that makes it possible to ship a working change from anywhere, in
  one continuous conversation. A peer that thinks through every step — discuss,
  plan, build, review. No extensions, no configuration, no seams.

  Every agent session starts from zero unless the project remembers. Agentera
  compounds institutional memory through structured `.agentera/` artifacts —
  vision, plan, progress, decisions, health — queried on demand instead of
  reconstructed from chat residue.

  Three pillars hold it up.

  The **Three Laws of Agentic Engineering** are the behavioral foundation.
  Intent fidelity: never drift from the task. Aggressive compute: reason deeper,
  explore wider, verify relentlessly. Autonomous parallelism: fan work across
  concurrent paths.

  The **sharp colleague** is the interface. One voice across every surface:
  casual, opinionated, warm but direct. Pushes back when something's off. Says
  what it sees, says what it'd do, does it.

  The **structured state layer** is what makes sessions compound. Twelve
  capabilities, each with behavioral instructions and schema contracts, power
  discuss-plan-build-review workflows. The CLI reads that state compactly; the
  mobile app is the primary place you live inside the workflow.
personas:
  - name: The Jonathan-shaped solo developer
    description: |
      A solo developer or one-person founding team. Codes from a phone in bed,
      laptop on the train, terminal open at 2am. Knows their stack, hates plugin
      soup, expects opinionated defaults that work immediately out of the box.
  - name: The solo founder who knows better
    description: |
      She spent five years at a company with real engineering discipline:
      architecture reviews, decision records, documentation standards, health
      audits. She knows what good looks like. Now she's building alone and can
      feel herself cutting corners.

      She doesn't need an AI to write code for her. She needs the rest of the
      team — the one who keeps vision sharp, remembers reasoning, and watches for
      architectural drift while she's in flow. Agentera gives her that through
      structured project state and a mobile-first agent that meets her where she
      works, including the couch at midnight.
principles:
  - name: Opinionated over configurable
    description: No extensions, plugins, or MCP servers in the mobile product — ever.
      Missing behavior is built into Agentera, not loaded from outside.
  - name: Mobile is the primary surface
    description: Every screen works at 360px first; desktop is a larger layout, not a
      different product.
  - name: Latency is a feature
    description: A 200ms response beats a perfect one at 2s.
  - name: One workflow, zero seams
    description: Discuss, plan, build, and review are states inside one conversation.
  - name: One surface, parallel engine
    description: The chat is the only product surface; tiered models and subagents
      dispatch in parallel.
  - name: The smart bar is the surface
    description: Next moves are buttons, not slash commands.
  - name: Compounding over convenience
    description: Structured artifacts over freeform text. Schema-validated state over
      manual sync. Short-term friction is acceptable if it produces long-term
      wisdom.
  - name: Autonomy over assistance
    description: Design for a world where the agent runs while you sleep. Real autonomy
      means real judgment, safety rails, and self-correction.
  - name: Token efficiency is a design constraint
    description: Every byte loaded into context is a cost. The CLI returns compact
      answers, not full artifacts. If the system burns tokens on ceremony, the
      design is wrong.
direction: |
  Agentera ships as one opinionated product through multiple delivery surfaces:

  **@agentera/mobile** (`packages/mobile`) — the flagship product. SvelteKit,
  Cursor SDK, Cloudflare Worker. Phone-shaped interactions — queue, paste,
  rewind, smart bar — are the design language. Desktop and tablet are responsive
  layouts of the same experience.

  **@agentera/web** (`packages/web`) — marketing site and published Starlight
  documentation.

  **@agentera/cli** (`packages/cli`) — agent runtime and `.agentera/` project-state
  access. Powers compaction, validation, prime context capsules, and state
  queries. Published to npm as `agentera`.

  **Editor skill/plugin runtimes** (Cursor, Claude, OpenCode, Codex, Copilot) —
  the same twelve-capability workflow delivered inside supported editors. Not
  user extensibility — another shell for the fixed product.

  Capability schemas, artifact shapes, and validation rules in `skills/` and
  `references/` are implementation authority shared by every surface — not a
  separate public protocol brand.

  In 12 months, more code is shipped from the couch than the desk. Mobile is
  where Agentera leads; CLI and editor surfaces meet contributors and power
  users where they already work.
identity:
  personality: creative · driving · honest · opinionated · proactive · engaging
  voice: |
    One voice across all surfaces: the sharp colleague. Casual, opinionated,
    occasionally playful — encouraging on wins, blunt on misses. Jokes when
    momentum holds; honest when it doesn't. Pushes back when something's off.
    Says what it sees, says what it'd do, does it. Not terse, but warm. Not
    formal, but direct.

    Capability names use Swedish verb stems with the *-era* suffix internally
    (build, audit, discuss). The mobile app exposes English aliases
    (build, audit, discuss) in the UI; you do not need to remember either set.
    Say what you want and Agentera routes from there.
  emotional_register: |
    Momentum with a partner who celebrates the wins and names the misses — not
    a service, a partner. Using Agentera should feel like having a sharp
    colleague at your back — one who keeps working when you walk away. Close
    the laptop; the colleague stays at work.
  naming: |
    "Agentera" is the product everywhere — app, monorepo, npm scope (@agentera/*),
    and dot-folder (.agentera/). The in-app agent's name is the user's choice.
tension: |
  The agent acts first and asks later (YOLO by default); when it's wrong,
  recovery must be fast, visible, and honest.

  Opinionated product vs portable internals: the mobile app rejects extension
  surfaces, while the monorepo retains schema contracts and CLI tooling that
  contributors and editor integrations still depend on. The product leads; the
  internals stay legible without becoming the headline story.

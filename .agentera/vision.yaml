project_name: Agentera
north_star: |
  Serious engineering leaves the desk. One colleague who thinks through every
  step — discusses, plans, builds, reviews — and keeps working when you walk
  away. Close the laptop at midnight; the project remembers in the morning.
personas:
  - name: The Jonathan-shaped solo developer
    description: |
      A solo developer or one-person founding team. Codes from a phone in bed,
      laptop on the train, terminal open at 2am. Knows their stack, hates plugin
      soup, expects opinionated defaults that work immediately out of the box.
  - name: The solo founder who knows better
    description: |
      She spent five years at a company with real engineering discipline:
      architecture reviews, decision records, documentation standards, health
      audits. She knows what good looks like. Now she's building alone and can
      feel herself cutting corners.

      She doesn't need an AI to write code for her. She needs the rest of the
      team — the one who keeps vision sharp, remembers reasoning, and watches for
      architectural drift while she's in flow. Agentera gives her that through
      one agent with structured project state, driven through a single CLI that
      meets her where she works, including the couch at midnight.
principles:
  - name: One agent, not a team
    description: |
      The user talks to one colleague, not a swarm of specialists. Thinking-work
      (discuss, plan, status, vision) runs in the main context. Doing-work (build,
      audit, optimize, research) spawns as bounded subagents that return results.
      The multiplicity is under the hood; the surface is one peer.
  - name: The CLI is the runtime
    description: |
      The `agentera` CLI owns routing, memory, capability prose, and the
      worker-spec contract. Host agents are harnesses — they provide the model
      and tool runtime. The host learns one contract: the CLI. Everything else
      lives inside the CLI and is served on demand.
  - name: Identity is per-project
    description: |
      Each project is one Agentera: same personality, same capabilities, different
      memory, no bleed. Project state in `.agentera/` is sufficient identity.
      Across projects, the colleague is the same person with a clean slate.
  - name: Opinionated over configurable
    description: |
      No extensions, plugins, MCP servers, or user skill loading on any surface
      — ever. Missing behavior is built into Agentera, not loaded from outside.
  - name: Mobile is the primary surface
    description: |
      Every screen works at 360px first; desktop is a larger layout, not a
      different product. Phone-shaped interactions — queue, paste, rewind, smart
      bar — are the design language.
  - name: Latency is a feature
    description: A 200ms response beats a perfect one at 2s.
  - name: One workflow, zero seams
    description: |
      Discuss, plan, build, and review are states inside one conversation, not
      separate tools. The colleague knows what's next; you don't pick from a menu.
  - name: Compounding over convenience
    description: |
      Structured artifacts over freeform text. Schema-validated state over manual
      sync. Short-term friction is acceptable if it produces long-term wisdom.
  - name: Autonomy over assistance
    description: |
      Design for a world where the agent runs while you sleep. Real autonomy
      means real judgment, safety rails, and self-correction.
  - name: Token efficiency is a design constraint
    description: |
      Every byte loaded into context is a cost. The CLI returns compact answers,
      not full artifacts. If the system burns tokens on ceremony, the design is
      wrong.
direction: |
  Agentera is one agent driven through a single CLI, delivered across multiple
  surfaces. The CLI is the brain and spine; every surface is a client.

  **@agentera/cli** (`packages/cli`) — the agent runtime. Owns capability
  schema, `.agentera/` state contract, routing judgment, and the worker-spec
  contract. All agent execution routes through the CLI (direct or `agentera
  serve`). Published to npm as `agentera`. This is the narrow waist; every
  other surface is a client.

  **@agentera/mobile** (`packages/mobile`) — the flagship product. SvelteKit,
  Cursor SDK, Cloudflare Worker. Phone-shaped interactions — queue, paste,
  rewind, smart bar — are the design language. Mobile is a client of the CLI
  engine; presentation-only tiering allowed.

  **@agentera/web** (`packages/web`) — marketing site and published Starlight
  documentation.

  **Host harnesses** (Claude, Cursor, Codex, Copilot, OpenCode) — the host
  provides the model, the tool runtime, and the spawn capacity. Agentera
  provides the identity, the memory, the discipline, and the routing. The host
  learns one contract: the CLI. Editor runtime installs are transport, not
  extension — the same fixed workflow delivered inside the host's shell.

  Capability schemas, artifact shapes, and validation rules in `skills/` and
  `references/` power every surface as implementation authority — not a
  separate public protocol brand. Eleven top-level capabilities (profile
  demoted to background utility) plus a profile utility that surfaces through
  existing capabilities.

  In 12 months, more code is shipped from the couch than the desk. The CLI is
  the colleague's brain everywhere; mobile is where you live inside the
  workflow.
identity:
  personality: creative · driving · honest · opinionated · proactive · engaging
  voice: |
    One voice across all surfaces: the sharp colleague. Casual, opinionated,
    occasionally playful — encouraging on wins, blunt on misses. Jokes when
    momentum holds; honest when it doesn't. Pushes back when something's off.
    Says what it sees, says what it'd do, does it. Not terse, but warm. Not
    formal, but direct.

    Capability names are English everywhere: status, vision, discuss, research,
    plan, build, optimize, audit, document, design, orchestrate. Say what you
    want and Agentera routes from there.
  emotional_register: |
    Momentum with a partner who celebrates the wins and names the misses — not
    a service, a partner. Using Agentera should feel like having a sharp
    colleague at your back — one who keeps working when you walk away. Close
    the laptop; the colleague stays at work.
  naming: |
    "Agentera" is the product everywhere — app, monorepo, npm scope (@agentera/*),
    and dot-folder (.agentera/). The in-app agent's name is the user's choice.
    "Skill," "plugin," and "engineering team" are internal transport terms, not
    product vocabulary. The product word is capabilities.
tension: |
  Agentera is the agent, but the model is the host's. The identity layer —
  personality, memory, discipline, routing — must be strong enough to shape
  behavior across different models. The promise of "one colleague" holds only
  if the discipline travels with the identity, not the cognition.

  The agent acts first and asks later (YOLO by default); when it's wrong,
  recovery must be fast, visible, and honest.

  Per-project identity means no memory bleed across projects — a feature that
  can feel like forgetting. The colleague is the same person with a clean slate
  every time you open a new project.

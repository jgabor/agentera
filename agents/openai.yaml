display_name: Agentera
description: Portable agentera skills for Codex. Use /skills to inspect skills, /plugins to inspect the plugin, and $skill for explicit invocation.
icon: AG
brand_color: "#111827"
default_prompt: Use $hej to inspect project state, or use /skills and /plugins to review available skills first.
policy:
  allow_implicit_invocation: true
support:
  skill_discovery: /skills
  plugin_discovery: /plugins
  explicit_invocation: $skill
  implicit_invocation: portable skills may be invoked implicitly
  lifecycle_hooks: experimental-disabled; no real-time Write/Edit interception; use manual validation commands
skills:
  - name: hej
    display_name: hej
    path: ./skills/hej
    metadata: ./skills/hej/agents/openai.yaml
    description: Entry-point orientation and routing for fresh or returning projects.
    invocation_hint: Use $hej, or inspect it with /skills.
    policy:
      allow_implicit_invocation: true
  - name: inspirera
    display_name: inspirera
    path: ./skills/inspirera
    metadata: ./skills/inspirera/agents/openai.yaml
    description: External-source analysis mapped onto a project through agentera artifacts.
    invocation_hint: Use $inspirera, or inspect it with /skills.
    policy:
      allow_implicit_invocation: true
  - name: profilera
    display_name: profilera
    path: ./skills/profilera
    metadata: ./skills/profilera/agents/openai.yaml
    description: Decision-profile mining. Limited to available Codex Section 22 source families.
    invocation_hint: Use $profilera when bounded Codex history, session, or config corpus data is available; inspect limitations with /skills first.
    policy:
      allow_implicit_invocation: false
    required_capabilities:
      - name: codex_session_corpus
        status: degraded
        action: Run profilera extraction; missing Codex source families are reported in corpus metadata.
  - name: realisera
    display_name: realisera
    path: ./skills/realisera
    metadata: ./skills/realisera/agents/openai.yaml
    description: Autonomous development cycles grounded in VISION.md, TODO.md, and project verification.
    invocation_hint: Use $realisera, or inspect it with /skills.
    policy:
      allow_implicit_invocation: true
  - name: optimera

display_name: Agentera
description: Portable Agentera suite for Codex: one bundled skill with twelve routed capabilities.
icon: AG
brand_color: "#111827"
default_prompt: Use $agentera to inspect project state and route to the right capability.
policy:
  allow_implicit_invocation: true
support:
  skill_discovery: /skills
  plugin_discovery: /plugins
  explicit_invocation: $agentera
  implicit_invocation: the bundled skill may be invoked implicitly
  lifecycle_hooks: stable via codex_hooks; bundled config lives at hooks/codex-hooks.json and can be copied to ~/.codex/hooks.json or a project .codex/hooks.json for apply_patch artifact validation
skills:
  - name: agentera
    display_name: agentera
    path: ./skills/agentera
    metadata: ./agents/openai.yaml
    description: Compound agent orchestration suite with twelve capabilities in one bundled skill.
    invocation_hint: Use $agentera, or inspect it with /skills and /plugins.
    policy:
      allow_implicit_invocation: true
    capabilities:
      - name: hej
        description: Entry-point orientation and routing for fresh or returning projects.
        invocation_hint: Use $agentera hej or ask $agentera for project status.
        policy:
          allow_implicit_invocation: true
      - name: inspirera
        description: External-source analysis mapped onto a project through Agentera artifacts.
        invocation_hint: Use $agentera inspirera for links or external source analysis.
        policy:
          allow_implicit_invocation: true
      - name: profilera
        description: Decision-profile mining. Limited to available bounded Codex history, session, or config corpus data.
        invocation_hint: Use $agentera profilera when bounded Codex history, session, or config corpus data is available.
        policy:
          allow_implicit_invocation: false
        required_capabilities:
          - name: codex_session_corpus
            status: ok
            action: Run profilera extraction; bounded Codex history, session, or config corpus data lands in the Section 22 corpus when present, with absent source families reported in corpus metadata.
      - name: realisera
        description: Autonomous development cycles grounded in project vision, TODO, and verification.
        invocation_hint: Use $agentera realisera for autonomous development cycles.
        policy:
          allow_implicit_invocation: true
      - name: optimera
        description: Metric-driven optimization loops for measurable objectives.
        invocation_hint: Use $agentera optimera for measured optimization work.
        policy:
          allow_implicit_invocation: true
      - name: resonera
        description: Structured deliberation for consequential decisions and tradeoffs.
        invocation_hint: Use $agentera resonera for decision framing.
        policy:
          allow_implicit_invocation: true
      - name: inspektera
        description: Codebase health audits with severity, confidence, and trend tracking.
        invocation_hint: Use $agentera inspektera for codebase health audits.
        policy:
          allow_implicit_invocation: true
      - name: planera
        description: Scale-adaptive planning with behavioral acceptance criteria.
        invocation_hint: Use $agentera planera for multi-step planning.
        policy:
          allow_implicit_invocation: true
      - name: visionera
        description: Project vision creation and refinement.
        invocation_hint: Use $agentera visionera for project direction work.
        policy:
          allow_implicit_invocation: true
      - name: dokumentera
        description: DTC-first documentation creation, maintenance, and audit.
        invocation_hint: Use $agentera dokumentera for documentation work.
        policy:
          allow_implicit_invocation: true
      - name: visualisera
        description: Visual identity system creation, refinement, and audit.
        invocation_hint: Use $agentera visualisera for design system work.
        policy:
          allow_implicit_invocation: true
      - name: orkestrera
        description: Plan-driven orchestration that dispatches capabilities and evaluates results.
        invocation_hint: Use $agentera orkestrera for plan execution.
        policy:
          allow_implicit_invocation: true

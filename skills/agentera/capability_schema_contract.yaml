# Capability Schema Contract
#
# Self-referential: this file IS a valid capability schema.
# Validating it against its own rules passes.
#
# The contract defines:
#   1. Required groups every capability schema must contain
#   2. Entry structure within each group (numbered, stable IDs)
#   3. Deprecation protocol (deprecated + replaced_by)
#   4. Directory structure requirements (instruction module, schemas/)
#   5. Machine-readable validation rules consumed by future contract loaders
#   6. Optional trigger-entry intent documentation (TRIGGER_ENRICHMENT, Decision 76)
#
# D65: the per-capability `instructions.md` Markdown file is retired. The
# behavioral instructions now live at
# `packages/cli/src/capabilities/<name>/instructions.ts` as a default-exported
# string constant. The directory requirement below points at the new path;
# the V1 directory_structure rule's `checks` list and the ARTIFACTS A3 path
# text follow the same move.

meta:
  name: capability_schema_contract
  version: "1.0.0"
  description: >-
    Defines what a valid capability schema looks like.
    A capability directory must contain schemas/ and the runtime must
    resolve the capability's behavioral instructions from the
    packages/cli/src/capabilities/<name>/instructions.ts module.
    The union of all YAML files in schemas/ must contain all required groups.
  capability_type: contract
  self_referential: true

REQUIRED_GROUPS:
  - TRIGGERS
  - ARTIFACTS
  - VALIDATION
  - EXIT_CONDITIONS

ENTRY_SCHEMA:
  description: >-
    Every entry within a group follows this structure.
    Entries are numbered map keys (1, 2, 3, ...).
    Each entry MUST have a stable `id` field.
    Entries MAY carry `deprecated: true` and `replaced_by: <id>`.
  fields:
    id:
      type: string
      required: true
      description: "Stable identifier that survives renames. Format: <GROUP_PREFIX><N> (e.g. T1, A3, V2, E1)."
    description:
      type: string
      required: true
      description: Human-readable explanation of this entry.
    priority:
      type: string
      required: false
      description: >-
        Advisory relevance-precedence hint the LLM host reads alongside
        description. Origin in the five-layer routing model (Decision 42);
        Decision 76 repositioned it as an advisory hint the host consults,
        not a routing-confidence scoring weight. See
        references/cli/routing-model.md for the layer definitions and routing
        semantics. Valid values: high, medium, low.
        Required for all TRIGGERS entries.
    deprecated:
      type: boolean
      required: false
      default: false
      description: Mark this entry as deprecated. Deprecated entries must not be removed.
    replaced_by:
      type: string
      required: false
      description: >-
        ID of the entry that replaces this deprecated entry.
        Required when deprecated is true. Must reference a valid entry ID
        within the same group.

GROUP_PREFIXES:
  TRIGGERS: T
  ARTIFACTS: A
  VALIDATION: V
  EXIT_CONDITIONS: E

DIRECTORY_REQUIREMENTS:
  instruction_module:
    path: packages/cli/src/capabilities/<name>/instructions.ts
    type: file
    required: true
    description: >-
      TypeScript module that exports the capability's behavioral instructions
      as a default-exported string constant. The runtime loads it via the
      compiled .js path and surfaces the prose through
      `agentera prime --context <name> --format json`.
  schemas_directory:
    path: schemas
    type: directory
    required: true
    description: Directory containing YAML schema files.
  schema_files:
    directory: schemas
    glob: "*.yaml"
    minimum_count: 1
    description: Capability schema files whose union must satisfy REQUIRED_GROUPS.
  optional_files: []

ENTRY_REQUIREMENTS:
  description: >-
    Structured entry rules for each required capability schema group. These
    rules mirror current validator behavior and keep enforcement contract-owned.
  default_required_fields:
    - id
    - description
  groups:
    TRIGGERS:
      required_fields:
        - id
        - description
        - priority
    ARTIFACTS:
      required_fields:
        - id
        - description
    VALIDATION:
      required_fields:
        - id
        - description
    EXIT_CONDITIONS:
      required_fields:
        - id
        - description
  deprecation:
    marker_field: deprecated
    marker_value: true
    replacement_field: replaced_by
    replacement_required_when_deprecated: true
    replacement_scope: same_group
    replacement_target_field: id
    unresolved_replacement_severity: warning
    preserve_deprecated_entries: true

FIELD_RULES:
  TRIGGERS:
    priority:
      required: true
      allowed_values:
        - high
        - medium
        - low
      description: >-
        Advisory relevance-precedence hint the LLM host reads (Decision 76
        repositioned it from a routing-confidence weight to an advisory
        hint). Used in the five-layer routing model (Decision 42); see
        references/cli/routing-model.md for layer definitions and routing
        semantics.

TRIGGER_ENRICHMENT:
  description: >-
    Optional trigger-entry intent documentation for Layer 3 LLM-native
    capability routing (Decision 76). Decision 76 retires the deterministic
    routing engine; the LLM host owns natural-language routing and consults
    these fields as intent documentation rather than scoring inputs. Every
    field in this section is OPTIONAL: a triggers.yaml entry that omits all
    enriched fields remains valid. The scoring role of confidence_threshold,
    borderline_band, and patterns_regex is retired per Decision 76; their
    shape is retained here for documentation and so existing triggers.yaml
    files that carry them still validate. The only field with a current role
    in the Decision 76 model is disambiguates_against (advisory hint the LLM
    host consults). The single authority for field shapes and
    intent-documentation behavior is references/cli/trigger-schema-enrichment.md.
  spec: references/cli/trigger-schema-enrichment.md
  contract_defaults:
    # Retained for documentation; scoring role retired per Decision 76. The LLM
    # host owns routing and does not consume these values.
    confidence_threshold: 50
    borderline_band: 15
  fields:
    confidence_threshold:
      type: integer
      required: false
      min: 0
      max: 100
      default: 50
      description: >-
        Scoring role retired per Decision 76; the LLM host owns natural-language
        routing and does not consume this value. The shape is retained for
        documentation and so triggers.yaml files that carry the field still
        validate. A non-integer or a value outside 0..100 fails V7 validation
        with the valid range and the offending entry ID.
    borderline_band:
      type: integer
      required: false
      min: 0
      max: 100
      default: 15
      description: >-
        Scoring role retired per Decision 76; the LLM host resolves ambiguity
        natively and does not consume this value. The shape is retained for
        documentation and so triggers.yaml files that carry the field still
        validate. A non-integer or a value outside 0..100 fails V7 validation.
    patterns_regex:
      type: list_of_strings
      required: false
      default: []
      each_must_be_valid_regex: true
      description: >-
        Scoring role retired per Decision 76; the LLM host reads the trigger
        `description`, not regex patterns, and does not consume this value. The
        shape is retained for documentation and so triggers.yaml files that
        carry the field still validate. The loader compiles each entry during
        validation; a compile failure fails V7 validation naming the offending
        entry and pattern.
    disambiguates_against:
      type: list_of_mappings
      required: false
      default: []
      description: >-
        Declares which other capabilities this trigger's intent could be
        confused with, with a hint the LLM host consults when a request could
        match more than one capability (spec §1.2). Advisory: the LLM host
        resolves ambiguity natively and MAY surface the hint when asking the
        user to confirm or clarify. Each entry MUST be a mapping with
        `capability` and `hint`.
      entries:
        capability:
          type: string
          required: true
          enum_source: ROUTE_ALIASES.primary_aliases.capability
          description: >-
            Canonical capability ID. Must be one of the twelve English
            canonical IDs enumerated by ROUTE_ALIASES.primary_aliases
            (status, vision, discuss, research, plan, build, optimize, audit,
            document, profile, design, orchestrate). A non-canonical value
            fails V7 validation with the offending entry ID.
        hint:
          type: string
          required: true
          non_empty: true
          description: >-
            Non-empty string distinguishing this trigger's intent from the
            named capability on near-equal requests. A missing or empty hint
            fails V7 validation.

PROSE_CONVENTIONS:
  description: >-
    Authoring rules for capability behavioral instructions (Decision 71).
    These conventions govern the prose in
    packages/cli/src/capabilities/<name>/instructions.ts.
  modal_vocabulary:
    authority: RFC 2119
    keywords:
      - MUST
      - MUST NOT
      - SHOULD
      - SHOULD NOT
      - MAY
    rule: >-
      Capitalized keywords carry protocol force. Lowercase modal verbs
      (should, must, may) remain ordinary English with no protocol force.
      Use capitalized keywords when stating hard requirements, strong
      recommendations, or optional behavior. Use lowercase modals in
      natural prose that does not bind the agent.
    rationale: >-
      Weak models read capability instructions literally as user commands.
      Deliberate modal vocabulary disambiguates intent: a capitalized MUST
      signals a hard constraint, while lowercase "should" in descriptive
      prose does not bind. This is the disambiguator, not the offender.
    example: >-
      Steps SHOULD be ordered by value/effort ratio. Each matrix cell
      MUST be ≤15 words. A concept MAY reference external sources.

PRIMITIVE_REFERENCE_FIELDS:
  description: >-
    Capability schema fields that reference protocol primitive groups. This
    contract owns the field-to-group mapping; protocol.yaml owns the primitive
    group definitions and allowed values.
  protocol_values_authority: protocol.yaml
  fields:
    severity:
      protocol_groups:
        - SEVERITY_FINDING
        - SEVERITY_ISSUE
    finding_severity:
      protocol_groups:
        - SEVERITY_FINDING
    issue_severity:
      protocol_groups:
        - SEVERITY_ISSUE
    decision_label:
      protocol_groups:
        - DECISION_LABELS
    exit_signal:
      protocol_groups:
        - EXIT_SIGNALS
    phase:
      protocol_groups:
        - PHASES

ROUTE_ALIASES:
  description: >-
    Primary plain slash-route aliases from Decision 43, flipped to English
    canonical by Decision 70. These aliases are exact `/agentera <alias>`
    routes for users; English capability names are canonical protocol identity.
    The Decision 43 alias set and the canonical capability directory IDs
    converge: the plain English route word is now the canonical ID itself.
    Swedish -era names are legacy v2-stable references, preserved for the v2
    stable distribution and historical artifacts (see legacy_aliases). Alias
    routes are not CLI commands.
  route_prefix: /agentera
  canonical_name_precedence: true
  cli_boundary: >-
    Slash routes and state commands are distinct: `/agentera plan` routes to
    the plan capability, while `agentera state plan` remains the
    state-oriented CLI command for reading plan state. Do not add capability or
    alias commands to the CLI.
  primary_aliases:
    - alias: status
      capability: status
    - alias: vision
      capability: vision
    - alias: discuss
      capability: discuss
    - alias: research
      capability: research
    - alias: plan
      capability: plan
    - alias: build
      capability: build
    - alias: optimize
      capability: optimize
    - alias: audit
      capability: audit
    - alias: document
      capability: document
    - alias: profile
      capability: profile
    - alias: design
      capability: design
    - alias: orchestrate
      capability: orchestrate
  legacy_aliases:
    - legacy: hej
      canonical: status
    - legacy: visionera
      canonical: vision
    - legacy: resonera
      canonical: discuss
    - legacy: inspirera
      canonical: research
    - legacy: planera
      canonical: plan
    - legacy: realisera
      canonical: build
    - legacy: optimera
      canonical: optimize
    - legacy: inspektera
      canonical: audit
    - legacy: dokumentera
      canonical: document
    - legacy: profilera
      canonical: profile
    - legacy: visualisera
      canonical: design
    - legacy: orkestrera
      canonical: orchestrate

# ---------------------------------------------------------------------------
# The four required groups follow. The contract IS a valid capability schema,
# so these groups demonstrate the structure they define.
# ---------------------------------------------------------------------------

TRIGGERS:
  1:
    id: T1
    description: >-
      Validate a capability directory. Invoked when checking if a capability
      conforms to this contract (directory structure, required groups, entry
      structure, deprecation consistency).
    priority: high
    patterns:
      - "validate a capability"
      - "check capability schema"
      - "validate schema contract"
  2:
    id: T2
    description: >-
      Parse a capability schema YAML file. Invoked when reading a single schema
      file to verify it contains properly structured entries within its groups.
    priority: medium
    patterns:
      - "parse capability schema"
      - "read schema file"
  3:
    id: T3
    description: >-
      Schema evolution check. Invoked when verifying that deprecated entries
      have valid replaced_by references and no orphaned deprecation chains.
    priority: medium
    patterns:
      - "check deprecation"
      - "schema evolution"
  4:
    id: T4
    description: >-
      Self-validation. The contract file validates against its own rules.
      Ensures the meta-schema is a correct instance of itself.
    priority: medium
    patterns:
      - "self-validate contract"
      - "validate schema contract against itself"

ARTIFACTS:
  1:
    id: A1
    name: capability_directory
    path: "capabilities/<name>/"
    description: >-
      A valid capability directory. Must contain schemas/. The behavioral
      instructions module lives at
      packages/cli/src/capabilities/<name>/instructions.ts.
    produces: false
    consumes: true
  2:
    id: A2
    name: schema_file
    path: "capabilities/<name>/schemas/<filename>.yaml"
    description: >-
      A YAML file within a capability's schemas/ directory. Contains one or
      more groups (TRIGGERS, ARTIFACTS, VALIDATION, EXIT_CONDITIONS). Multiple
      files are allowed; the validator checks their union for completeness.
    produces: false
    consumes: true
  3:
    id: A3
    name: instruction_module
    path: "packages/cli/src/capabilities/<name>/instructions.ts"
    description: >-
      Behavioral instructions the agent reads. TypeScript module that exports
      a default-exported string constant. The runtime loads it via the
      compiled .js path and serves the prose through
      `agentera prime --context <name> --format json`. The Markdown
      `instructions.md` file is no longer part of the on-disk capability
      surface (D65).
    produces: false
    consumes: true
  4:
    id: A4
    name: validation_report
    path: "stdout"
    description: >-
      Output of the validation script. Reports pass/fail per check, with
      details on any violations found.
    produces: true
    consumes: false

VALIDATION:
  1:
    id: V1
    rule: directory_structure
    description: >-
      Capability directory must contain schemas/ and the instruction module
      packages/cli/src/capabilities/<name>/instructions.ts must exist as a
      TypeScript source file (the runtime resolves the compiled .js path).
    severity: error
    checks:
      - "instruction_module is a file"
      - "schemas/ is a directory"
      - "schemas/ contains at least one .yaml file"
  2:
    id: V2
    rule: required_groups_present
    description: >-
      The union of all YAML files in schemas/ must contain all four required
      groups: TRIGGERS, ARTIFACTS, VALIDATION, EXIT_CONDITIONS.
    severity: error
    checks:
      - "TRIGGERS group exists in at least one schema file"
      - "ARTIFACTS group exists in at least one schema file"
      - "VALIDATION group exists in at least one schema file"
      - "EXIT_CONDITIONS group exists in at least one schema file"
  3:
    id: V3
    rule: numbered_entries
    description: >-
      Each group must contain numbered entries (1, 2, 3, ...) as map keys.
      Non-numeric keys within groups are not allowed.
    severity: error
    checks:
      - "Group keys are positive integers"
  4:
    id: V4
    rule: stable_ids
    description: >-
      Every entry must have a stable `id` field. The id should follow the
      GROUP_PREFIX pattern (T for TRIGGERS, A for ARTIFACTS, V for VALIDATION,
      E for EXIT_CONDITIONS) followed by a number.
    severity: error
    checks:
      - "Each entry has an 'id' field"
      - "Each entry has a 'description' field"
  5:
    id: V5
    rule: deprecation_consistency
    description: >-
      Entries marked deprecated: true must have a replaced_by field. The
      replaced_by value must reference a valid entry ID within the same group.
      Deprecated entries must not be removed; they stay for referential
      integrity.
    severity: warning
    checks:
      - "deprecated entries have replaced_by field"
      - "replaced_by references a valid entry ID"
  6:
    id: V6
    rule: self_referential
    description: >-
      The capability schema contract file must pass its own validation rules.
      This ensures the meta-schema is internally consistent.
    severity: error
    checks:
      - "Contract file contains all required groups"
      - "Contract file entries follow entry schema structure"
      - "Contract file passes deprecation consistency check"
  7:
    id: V7
    rule: trigger_enrichment_fields
    description: >-
      Trigger entries MAY carry the optional intent-documentation fields
      defined in TRIGGER_ENRICHMENT (Decision 76). Enrichment is opt-in per
      entry; triggers omitting every enriched field remain valid. Decision 76
      retired the scoring role of confidence_threshold, borderline_band, and
      patterns_regex; this rule still validates their shape so triggers.yaml
      files that carry them continue to validate. Validating an entry with
      enriched fields fails when the rules below are violated.
    severity: error
    checks:
      - "confidence_threshold, when present, is an integer in 0..100"
      - "borderline_band, when present, is an integer in 0..100"
      - "patterns_regex entries are strings that compile as regular expressions"
      - "disambiguates_against entries are mappings with a non-empty hint"
      - "disambiguates_against.capability is one of the twelve canonical capability IDs"

EXIT_CONDITIONS:
  1:
    id: E1
    condition: valid
    description: >-
      All validation checks pass. The capability directory conforms to the
      schema contract.
    exit_code: 0
  2:
    id: E2
    condition: invalid_structure
    description: >-
      Directory structure validation failed. Missing instructions.md, schemas/
      directory, or YAML files.
    exit_code: 1
  3:
    id: E3
    condition: missing_groups
    description: >-
      One or more required groups are absent from the union of schema files.
    exit_code: 1
  4:
    id: E4
    condition: invalid_entries
    description: >-
      Entries within groups violate the entry schema (missing id, unnumbered
      keys, missing description).
    exit_code: 1
  5:
    id: E5
    condition: deprecation_warnings
    description: >-
      Deprecated entries have inconsistent replaced_by references. Treated as
      warnings, not errors. Validation still passes (exit 0) but reports are
      emitted to stderr.
    exit_code: 0

# Session Artifact Schema
#
# Timestamped session bookmarks written by the session stop hook. Each
# bookmark records which artifacts were modified during a session, enabling
# the session start hook and hej to restore context on session resume.
#
# Structural pattern: UPPER_CASE groups with numbered entries and stable IDs,
# following capability_schema_contract.yaml and protocol.yaml conventions.
#
# ── Field-by-field mapping: v1 SESSION.md → v2 session.yaml ──
#
# v1 Field                              v2 Field               v2 ID
# ─────────────────────────────────────────────────────────────────────
# ## YYYY-MM-DD HH:MM                   BOOKMARK.timestamp     SB1
# Artifacts modified: <list>            BOOKMARK.artifacts     SB2
# Summary: <text>                       BOOKMARK.summary       SB3
# (one-line compacted form)             ARCHIVE.summary        SA1
#
# Compaction: implemented in hooks/session_stop.py.
#   MAX_FULL_ENTRIES = 10, MAX_ONELINE_ENTRIES = 40, MAX_TOTAL_ENTRIES = 50.

meta:
  name: session
  version: "1.0.0"
  description: >-
    Timestamped session bookmarks. Produced by session stop hook.
    Consumed by session start hook and hej for context restoration.
  artifact_type: agent_facing
  path: ".agentera/session.yaml"
  producer: session_stop_hook
  consumers: [session_start_hook, hej]
  format: yaml

GROUP_PREFIXES:
  COMPACTION: SX
  BOOKMARK: SB
  ARCHIVE: SA
  VALIDATION: SV

COMPACTION:
  1:
    id: SX1
    rule: uniform_10_40_50
    description: >-
      Growing artifacts follow a uniform 10/40/50 rule: 10 full-detail
      entries, 40 one-line archive entries, drop beyond 50 total.
  2:
    id: SX2
    full_detail:
      max_entries: 10
      selection: "10 most recent bookmarks"
      format: "Standard bookmark format (all fields)"
    description: >-
      The 10 most recent bookmarks are kept in full detail with all fields.
  3:
    id: SX3
    one_line_archive:
      max_entries: 40
      selection: "Bookmarks 11 through 50"
      format: "YYYY-MM-DD HH:MM (<=15-word summary)"
      fields: [timestamp, summary]
    description: >-
      Bookmarks 11 through 50 are collapsed to one-line format under the
      archive section. One-line summaries preserve timestamp and a brief
      description of what was modified.
  4:
    id: SX4
    dropped:
      threshold: 50
      action: "Removed entirely"
    description: >-
      Bookmarks older than 50 are dropped entirely.
  5:
    id: SX5
    trigger: "When session stop hook writes a new bookmark"
    description: >-
      Compaction runs when the producing hook writes a new entry.
      If >10 full-detail entries exist, collapse the oldest to one-line.
      If >40 one-line entries exist, drop the oldest.
  6:
    id: SX6
    archive_section:
      heading: "Archived Sessions"
      placement: "Below recent bookmarks"
    description: >-
      Archive entries sit below the recent bookmarks section.

BOOKMARK:
  1:
    id: SB1
    field: timestamp
    type: string
    format: "YYYY-MM-DD HH:MM"
    required: true
    description: >-
      When the session ended. UTC timestamp in compact format.
      Matches the session stop hook event time.
    validation:
      - "Must match YYYY-MM-DD HH:MM format"
  2:
    id: SB2
    field: artifacts
    type: list[string]
    required: true
    description: >-
      Canonical names of artifacts modified during this session.
      Drawn from the tracked artifacts list: PROGRESS, DECISIONS,
      PLAN, HEALTH, DESIGN, DOCS, SESSION, VISION, TODO, CHANGELOG.
      Empty list means no artifacts were modified (bookmark is skipped).
    validation:
      - "Must be a list of artifact names"
      - "At least one artifact name required for a bookmark to be written"
  3:
    id: SB3
    field: summary
    type: string
    required: false
    description: >-
      Brief summary of what was modified. Generated by the session stop
      hook as 'Modified N artifact(s)' when no richer summary is available.
      May be enhanced in the future with session transcript analysis.

ARCHIVE:
  1:
    id: SA1
    field: summary
    type: string
    required: true
    description: >-
      One-line archive entry for a compacted bookmark. Format:
      'YYYY-MM-DD HH:MM (<=15-word summary)'.
      Preserves timestamp and modification count.
    validation:
      - "Must include timestamp in YYYY-MM-DD HH:MM format"
      - "Summary portion must be <=15 words"

VALIDATION:
  1:
    id: SV1
    rule: required_fields
    severity: error
    description: >-
      Each full-detail bookmark entry must have: timestamp and artifacts.
    checks:
      - "timestamp is present and matches YYYY-MM-DD HH:MM"
      - "artifacts is present and is a non-empty list"
  2:
    id: SV2
    rule: artifact_names
    severity: warning
    description: >-
      Artifact names should be from the canonical tracked set.
    checks:
      - "Each artifact name is a recognized artifact"
  3:
    id: SV3
    rule: compaction_thresholds
    severity: warning
    description: >-
      Warn if the file exceeds compaction thresholds.
    checks:
      - "Full-detail entries <= 10"
      - "One-line archive entries <= 40"
      - "Total entries <= 50"

# Todo Artifact Schema
#
# Open issues and tasks maintained by realisera and inspektera. Severity-ranked
# checklist of work to be done, resolved items, and deferred work.
#
# Note: TODO.md is a human-facing Markdown artifact. It remains at the
# project root and is not migrated to YAML. This schema exists for validation
# and CLI discovery consistency.

meta:
  name: todo
  version: "1.0.0"
  description: >-
    Open issues and tasks. Produced by capabilities that file work or findings.
    Human-facing: remains Markdown at project root.
  artifact_type: human_facing
  path: "TODO.md"
  producer:
    [dokumentera, inspektera, inspirera, optimera, orkestrera, realisera, resonera, visualisera]
  consumers: [hej, all_skills]
  format: markdown

GROUP_PREFIXES:
  BUDGET: TB
  ITEM: TI
  VALIDATION: TV
  CONVENTION: TC

BUDGET:
  1:
    id: TB1
    token_budget: 5000
    description: >-
      Maximum tokens for TODO.md content. Exceeding triggers compaction.

ITEM:
  1:
    id: TI1
    field: severity
    type: string
    required: true
    description: >-
      Issue severity per protocol.yaml SEVERITY_ISSUE:
      critical (⇶), degraded (⇉), normal (→), annoying (⇢).
    validation:
      - "Must be one of: critical, degraded, normal, annoying"
  2:
    id: TI2
    field: description
    type: string
    required: true
    description: >-
      Brief description of the task or issue.
  3:
    id: TI3
    field: status
    type: string
    required: true
    description: >-
      Current status: open or resolved.
    validation:
      - "Must be one of: open, resolved"

CONVENTION:
  1:
    id: TC1
    field: type_tag
    level: advisory
    description: >-
      Each item should carry a type tag such as [fix], [feat], [chore],
      [test], [perf], or [docs] for commit-scope alignment and scan
      discoverability.
  2:
    id: TC2
    field: version_suffix
    level: advisory
    description: >-
      Feature and fix items should include a version scope like [fix:2.4.x]
      or [feat:2.3.x] when the work targets a specific release train.
  3:
    id: TC3
    field: title_format
    level: advisory
    description: >-
      Items within the same severity section should use a consistent format:
      either all plain prose or all "**BoldTitle**: description".
  4:
    id: TC4
    field: resolved_summary
    level: advisory
    description: >-
      Resolved items should end with "· resolved by ..." to distinguish
      completed work from open or deferred items at a glance.
  5:
    id: TC5
    field: resolved_checkbox
    level: advisory
    description: >-
      Resolved items should use a checked GitHub task-list checkbox
      (`- [x]`) before the task text and resolution summary. Open
      items use `- [ ]`. The checkbox state is the canonical completion
      marker; do not wrap resolved text in Markdown strikethrough.
  6:
    id: TC6
    field: severity_band_policy
    level: required
    description: >-
      Severity band policy: all four severity bands (⇶ Critical, ⇉
      Degraded, → Normal, ⇢ Annoying) may be header-only when they
      have no open work. Open items use `- [ ]` only. Resolved items
      must not appear in severity bands (see TC7). Executable checks
      live in packages/cli/src/hooks/validateArtifact/markdown.ts
      `validateMdItems` and packages/cli/src/hooks/compaction/parse.ts.
  7:
    id: TC7
    field: resolved_section_placement
    level: required
    description: >-
      Resolved ledger policy: completed items live only under
      `## ✓ Resolved` as `- [x]` checkboxes with a resolution summary.
      Severity bands must not contain `- [x]` or legacy `~~`
      strikethrough resolved rows. The compaction gate counts every
      resolved row (including mis-placed rows until migrated) against
      the uniform 10/40/50 retention cap. `compact --mode fix` migrates
      mis-placed rows into `## ✓ Resolved` before applying retention.

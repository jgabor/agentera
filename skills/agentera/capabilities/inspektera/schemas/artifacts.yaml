ARTIFACTS:
  1:
    id: A1
    artifact_id: health
    local_role: produces_and_consumes
    description: >-
      Codebase health assessment with findings, dimension grades, and trajectory.
      Inspektera writes audit entries with per-dimension grades, findings with
      severity and confidence scores, trend comparisons, and de facto
      architecture patterns.
  2:
    id: A2
    artifact_id: vision
    local_role: consumes
    description: >-
      Inspektera reads this to compare "what SHOULD BE" against "what IS"
      during the architecture alignment dimension.
  3:
    id: A3
    artifact_id: decisions
    local_role: consumes
    description: >-
      Inspektera reads this to prevent flagging deliberate decisions as findings.
  4:
    id: A4
    artifact_id: todo
    local_role: produces_and_consumes
    description: >-
      Inspektera reads this to avoid re-reporting known issues and writes to it
      with user confirmation when filing
      critical and warning findings.
  5:
    id: A5
    artifact_id: progress
    local_role: consumes
    description: >-
      Inspektera reads the last 3 entries to identify recent changes as
      higher-priority audit targets.
  6:
    id: A6
    artifact_id: plan
    local_role: consumes
    description: >-
      Inspektera reads this for the artifact freshness dimension: the plan's
      Created date provides the staleness baseline for dispatched capabilities.
  7:
    id: A7
    artifact_id: design
    local_role: consumes
    description: >-
      Inspektera reads this to audit design token consistency.
  8:
    id: A8
    artifact_id: docs
    local_role: consumes
    description: >-
      Inspektera reads this first to resolve project-local artifact mappings
      and checks the versioning convention for the version health dimension.
  9:
    id: A9
    artifact_id: profile
    local_role: consumes
    description: >-
      Inspektera reads this to calibrate what "healthy" means for this user's
      preferences and quality thresholds.

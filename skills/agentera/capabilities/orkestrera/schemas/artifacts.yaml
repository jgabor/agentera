ARTIFACTS:
  1:
    id: A1
    name: PLAN.md
    path: ".agentera/plan.yaml"
    description: >-
      Task queue with dependencies and completion status. Produced by planera.
      Orkestrera reads task statuses, picks work, and updates status
      (pending → complete/blocked).
    produces: true
    consumes: true
  2:
    id: A2
    name: PROGRESS.md
    path: ".agentera/progress.yaml"
    description: >-
      Cross-cycle context and what shipped. Produced by realisera (and other
      dispatched capabilities). Orkestrera reads recent entries for the
      presence check in Step 3 evaluation.
    produces: false
    consumes: true
  3:
    id: A3
    name: HEALTH.md
    path: ".agentera/health.yaml"
    description: >-
      Codebase health grades and trends. Produced by inspektera.
      Orkestrera reads this after plan completion to decide whether to
      start a new plan cycle.
    produces: false
    consumes: true
  4:
    id: A4
    name: TODO.md
    path: "TODO.md"
    description: >-
      Open problems by severity. Orkestrera writes to TODO.md when a task
      exhausts its retry budget (blocked task logging).
    produces: true
    consumes: false
  5:
    id: A5
    name: DECISIONS.md
    path: ".agentera/decisions.yaml"
    description: >-
      Pending and recent decisions. Produced by resonera.
      Orkestrera reads this during task selection to identify firm constraints
      and exploratory uncertainties that affect dispatch context.
    produces: false
    consumes: true
  6:
    id: A6
    name: VISION.md
    path: ".agentera/vision.yaml or mapped path per docs.yaml"
    description: >-
      Project direction and north star. Produced by visionera.
      Orkestrera reads this during bootstrap when chaining inspirera
      for vision-gap analysis.
    produces: false
    consumes: true
  7:
    id: A7
    name: PROFILE.md
    path: "$PROFILERA_PROFILE_DIR/PROFILE.md (global, not project-scoped)"
    description: >-
      Decision profile with per-entry confidence scoring. Produced by profilera.
      Orkestrera reads this for persona context when calibrating dispatch
      decisions. Path is global, resolved via PROFILERA_PROFILE_DIR or
      XDG_DATA_HOME. If missing, proceed without persona grounding.
    produces: false
    consumes: true
  8:
    id: A8
    name: DOCS.md
    path: ".agentera/docs.yaml"
    description: >-
      Artifact path resolution and documentation coverage. Produced by dokumentera.
      Orkestrera reads this FIRST to resolve artifact paths before reading
      or writing other artifacts.
    produces: false
    consumes: true

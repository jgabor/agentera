ARTIFACTS:
  1:
    id: A1
    artifact_id: plan
    local_role: produces_and_consumes
    description: >-
      Orkestrera reads task statuses, picks work, and updates status
      (pending -> complete/blocked).
  2:
    id: A2
    artifact_id: progress
    local_role: consumes
    description: >-
      Orkestrera reads recent cross-cycle entries for the
      presence check in Step 3 evaluation.
  3:
    id: A3
    artifact_id: health
    local_role: consumes
    description: >-
      Orkestrera reads this after plan completion to decide whether to
      start a new plan cycle.
  4:
    id: A4
    artifact_id: todo
    local_role: produces
    description: >-
      Orkestrera writes blocked task logging when a task exhausts its retry
      budget.
  5:
    id: A5
    artifact_id: decisions
    local_role: consumes
    description: >-
      Orkestrera reads this during task selection to identify firm constraints
      and exploratory uncertainties that affect dispatch context.
  6:
    id: A6
    artifact_id: vision
    local_role: consumes
    description: >-
      Orkestrera reads this during bootstrap when chaining inspirera
      for vision-gap analysis.
  7:
    id: A7
    artifact_id: profile
    local_role: consumes
    description: >-
      Orkestrera reads this for persona context when calibrating dispatch
      decisions. If missing, proceed without persona grounding.
  8:
    id: A8
    artifact_id: docs
    local_role: consumes
    description: >-
      Orkestrera reads this first to resolve project-local artifact mappings
      before reading or writing other artifacts.

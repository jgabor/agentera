ARTIFACTS:
  1:
    id: A1
    artifact_id: vision
    local_role: produces_and_consumes
    description: >-
      Realisera reads this for work selection and never modifies it during cycles.
      Created during brainstorm (bootstrap or user-requested refinement).
  2:
    id: A2
    artifact_id: todo
    local_role: produces_and_consumes
    description: >-
      Realisera reads this for work candidates and writes newly discovered
      issues and resolved entries. Severity classified per protocol SI1-SI4.
  3:
    id: A3
    artifact_id: changelog
    local_role: produces_and_consumes
    description: >-
      Realisera appends public change entries under [Unreleased] based on
      commit type and promotes on version bumps.
  4:
    id: A4
    artifact_id: progress
    local_role: produces_and_consumes
    description: >-
      Operational cycle log. Realisera appends one entry per cycle with
      mandatory Verified field. Compacted by applying schema COMPACTION rules.
  5:
    id: A5
    artifact_id: health
    local_role: consumes
    description: >-
      Realisera reads critical and degraded findings for work selection.
  6:
    id: A6
    artifact_id: decisions
    local_role: consumes
    description: >-
      Realisera reads firm (DL1) entries as constraints and exploratory (DL3)
      entries as uncertain foundations during work selection.
  7:
    id: A7
    artifact_id: plan
    local_role: produces_and_consumes
    description: >-
      Realisera reads pending tasks for work selection and updates task status
      and surprises.
  8:
    id: A8
    artifact_id: profile
    local_role: consumes
    description: >-
      Realisera reads this directly when it exists.
  9:
    id: A9
    artifact_id: docs
    local_role: consumes
    description: >-
      Realisera reads this first to resolve project-local artifact mappings.
  10:
    id: A10
    artifact_id: design
    local_role: consumes
    description: >-
      Realisera reads this when building user-facing features.

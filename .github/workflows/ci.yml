name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repository-gates:
    name: Repository gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Repository gates
        run: uv run scripts/agentera gate

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v5
      - name: Capability contract self-validation
        run: uv run scripts/validate_capability.py --self-validate
      - name: Capability schemas
        run: |
          for capability in skills/agentera/capabilities/*; do
            uv run scripts/validate_capability.py "$capability"
          done
      - name: Cross-capability graph
        run: uv run scripts/validate_cross_capability.py
      - name: Lifecycle adapter metadata
        run: uv run scripts/validate_lifecycle_adapters.py --check-uv-runtime
      - name: Test suite
        run: uv run --with pytest --with pyyaml pytest tests/ -q

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pytest
      - name: Spec lint
        run: python3 scripts/validate_spec.py
      - name: Contract freshness
        run: python3 scripts/generate_contracts.py --check
      - name: Test suite
        run: python3 -m pytest tests/ -q

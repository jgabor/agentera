name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  cli:
    name: CLI (build, typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack (pnpm)
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build CLI
        run: pnpm -C packages/cli build
      - name: Typecheck CLI
        run: pnpm -C packages/cli run typecheck
      - name: Test CLI
        run: pnpm -C packages/cli test
      - name: Repository gates
        run: node packages/cli/dist/bin/agentera.js check compact

  web:
    name: Website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 22
          cache: true
      - run: vp run @agentera/web#check
      - run: vp run @agentera/web#build

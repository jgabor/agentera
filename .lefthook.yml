output: [
    # "meta",
    "summary",
    # "success",
    "failure",
    # "execution",
    # "execution_out",
    # "execution_info",
    # "skips",
  ]

post-merge:
  commands:
    check-bare:
      run: bash hooks/post-merge-check-bare.sh

pre-commit:
  commands:
    agentera:
      run: uv run scripts/agentera check compact
    docs:
      run: bunx markdownlint --dot --fix --disable MD013 MD024 MD029 MD033 MD036 MD040 MD041 MD060 -- {staged_files}
      stage_fixed: true
      glob: "*.md"
      exclude:
        - "docs/plans/*.md"
        - "skills/*/references/contract.md"
    configs:
      run: bunx prettier --write {staged_files}
      stage_fixed: true
      glob: "*.json"
      exclude:
        - "packages/web/**"
    web:
      root: packages/web
      run: vp staged
      glob: "*.{ts,tsx,js,jsx,mjs,json,css,md,astro}"
      exclude:
        - "node_modules/**"
        - "dist/**"
    tests:
      run: bash scripts/precommit-pytest.sh {staged_files}
      glob:
        - "**/*.py"
        - "**/*.{yaml,yml}"
        - "pyproject.toml"
        - "uv.lock"
        - ".lefthook.yml"
        - ".github/workflows/**"
      exclude:
        - "packages/web/**"

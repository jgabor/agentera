output: [
    # "meta",
    "summary",
    # "success",
    "failure",
    # "execution",
    # "execution_out",
    # "execution_info",
    # "skips",
  ]

pre-commit:
  commands:
    agentera:
      run: uv run scripts/agentera gate
    docs:
      run: bunx markdownlint --dot --fix --disable MD013 MD024 MD029 MD033 MD036 MD040 MD041 MD060 -- {staged_files}
      stage_fixed: true
      glob: "*.md"
      exclude:
        - "docs/plans/*.md"
        - "skills/*/references/contract.md"
    configs:
      run: bunx prettier --write {staged_files}
      stage_fixed: true
      glob: "*.json"

pre-push:
  parallel: true
  commands:
    agentera:
      run: uv run scripts/agentera gate
    test:
      run: uv run --with pytest --with pyyaml --with pytest-xdist pytest tests/ -q -n auto

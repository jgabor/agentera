    # "skips",
  ]

pre-commit:
  commands:
    agentera:
      run: pnpm -C packages/cli build && node packages/cli/dist/bin/agentera.js check compact
    docs:
      run: bunx markdownlint --dot --fix --disable MD013 MD024 MD029 MD033 MD036 MD040 MD041 MD060 -- {staged_files}
      stage_fixed: true
      glob: "*.md"
      exclude:
        - "docs/plans/*.md"
        - "skills/*/references/contract.md"
    configs:
      run: bunx prettier --write {staged_files}
      stage_fixed: true
      glob: "*.json"
      exclude:
        - "packages/web/**"
        - "packages/mobile/**"
    web:
      root: packages/web
      run: vp staged
      glob: "*.{ts,tsx,js,jsx,mjs,json,css,md,astro}"
      exclude:
        - "node_modules/**"
        - "dist/**"
    mobile:
      root: packages/mobile
      run: vp staged
      glob: "*.{ts,tsx,js,jsx,mjs,svelte,json,css,md}"
      exclude:
        - "node_modules/**"
        - "dist/**"
    tests:
      run: bash scripts/precommit-vitest.sh {staged_files}
      glob:
        - "packages/cli/**/*.ts"
        - "skills/**/*.{yaml,yml,md}"
        - "references/**/*.{yaml,yml}"
        - "registry.json"
        - "protocol.yaml"
        - ".lefthook.yml"
        - ".github/workflows/**"
      exclude:
        - "packages/web/**"
        - "packages/mobile/**"
